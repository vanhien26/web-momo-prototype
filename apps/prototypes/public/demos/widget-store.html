<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Widget Manager — MoMo</title>
  <link rel="shortcut icon" type="image/svg+xml" href="https://homepage.momocdn.net/fileuploads/svg/momo-file-240411162904.svg">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --momo:#a50064;
      --g50:#f9fafb;--g100:#f3f4f6;--g150:#eef0f3;--g200:#e5e7eb;
      --g300:#d1d5db;--g400:#9ca3af;--g500:#6b7280;
      --g600:#4b5563;--g700:#374151;--g800:#1f2937;--g900:#111827;
      --active-color:#059669;--draft-color:#f59e0b;--paused-color:#9ca3af;
      --sidebar-w:268px;
    }
    html,body{height:100%}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--g50);color:var(--g900);display:flex;flex-direction:column;min-height:100vh}

    /* HEADER */
    .hdr{background:#fff;border-bottom:1px solid var(--g200);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;height:52px}
    .brand{display:flex;align-items:center;gap:8px}
    .back-link{color:var(--g500);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:4px}
    .back-link:hover{color:var(--g900)}
    .sep{width:1px;height:18px;background:var(--g200)}
    .bmark{width:26px;height:26px;border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--momo);flex-shrink:0}
    .bmark.wp{background:#fff;border:1px solid var(--g200)}
    .bmark img{width:80%;height:80%;object-fit:contain}
    .bname{font-size:14px;font-weight:600}
    .hdr-actions{display:flex;align-items:center;gap:10px}

    /* MAIN LAYOUT */
    .manager{display:flex;flex:1;overflow:hidden}

    /* SIDEBAR */
    .sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);border-right:1px solid var(--g200);background:#fff;display:flex;flex-direction:column;overflow:hidden}
    .sidebar-top{padding:12px;border-bottom:1px solid var(--g100);display:flex;flex-direction:column;gap:8px;flex-shrink:0}
    .search-wrap{position:relative}
    .search-input{width:100%;padding:7px 10px 7px 30px;border:1px solid var(--g200);border-radius:8px;font-size:13px;background:var(--g50);outline:none;transition:border-color .15s}
    .search-input:focus{border-color:var(--momo);background:#fff}
    .search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--g400);pointer-events:none}
    .create-btn{width:100%;padding:8px;background:var(--momo);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
    .create-btn:hover{background:#8b0054}

    .instance-list{flex:1;overflow-y:auto;padding:8px 0}
    .group-label{padding:10px 12px 4px;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--g400);display:flex;align-items:center;gap:6px}
    .group-cnt{background:var(--g100);color:var(--g500);font-size:10px;padding:1px 6px;border-radius:10px}
    .inst-item{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;transition:background .1s;border-radius:0}
    .inst-item:hover{background:var(--g50)}
    .inst-item.active{background:#fdf2f8}
    .inst-icon{font-size:18px;flex-shrink:0;width:28px;text-align:center}
    .inst-info{flex:1;min-width:0}
    .inst-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--g800)}
    .inst-meta{font-size:11px;color:var(--g400);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .dot-active{background:var(--active-color)}
    .dot-draft{background:var(--draft-color)}
    .dot-paused{background:var(--paused-color)}

    /* EDITOR PANEL */
    .editor{flex:1;display:flex;flex-direction:column;overflow:hidden}

    /* Welcome screen */
    .welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--g400);text-align:center;padding:40px}
    .welcome-icon{font-size:48px}
    .welcome h2{font-size:18px;font-weight:600;color:var(--g600)}
    .welcome p{font-size:14px;line-height:1.6;max-width:320px}

    /* Editor header */
    .editor-hdr{padding:12px 20px;border-bottom:1px solid var(--g200);background:#fff;display:flex;align-items:center;gap:12px;flex-shrink:0}
    .inst-name-input{flex:1;font-size:15px;font-weight:600;border:none;outline:none;background:transparent;color:var(--g900);padding:2px 0}
    .inst-name-input:focus{border-bottom:2px solid var(--momo)}
    .status-select{padding:4px 8px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid;cursor:pointer;outline:none}
    .status-select.active{color:var(--active-color);border-color:#a7f3d0;background:#f0fdf4}
    .status-select.draft{color:#b45309;border-color:#fde68a;background:#fffbeb}
    .status-select.paused{color:var(--g500);border-color:var(--g200);background:var(--g50)}

    /* Editor body */
    .editor-body{flex:1;display:grid;grid-template-columns:320px 1fr;overflow:hidden}
    .config-panel{border-right:1px solid var(--g200);overflow-y:auto;padding:20px;background:#fff;display:flex;flex-direction:column;gap:16px}
    .preview-panel{overflow-y:auto;padding:20px;background:var(--g50)}

    /* Config sections */
    .cfg-section{display:flex;flex-direction:column;gap:10px}
    .cfg-section-title{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--g400);padding-bottom:6px;border-bottom:1px solid var(--g100)}
    .field-group{display:flex;flex-direction:column;gap:4px}
    .field-label{font-size:12px;font-weight:500;color:var(--g600)}
    .field-input{padding:7px 10px;border:1px solid var(--g200);border-radius:7px;font-size:13px;outline:none;width:100%;transition:border-color .15s;font-family:inherit}
    .field-input:focus{border-color:var(--momo)}
    textarea.field-input{resize:vertical;min-height:70px}
    .field-select{padding:7px 10px;border:1px solid var(--g200);border-radius:7px;font-size:13px;background:#fff;outline:none;width:100%;cursor:pointer}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .swatches{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
    .swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s}
    .swatch.on{border-color:var(--g800);transform:scale(1.15)}

    /* Config footer */
    .config-footer{padding:12px 20px;border-top:1px solid var(--g200);background:#fff;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .del-btn{padding:7px 14px;border:1px solid #fecdd3;background:#fff;color:#e11d48;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
    .del-btn:hover{background:#fff1f2}
    .save-btn{padding:7px 18px;background:var(--g900);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
    .save-btn:hover{background:var(--g700)}

    /* Preview */
    .prev-label{font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--g400);text-transform:uppercase;margin-bottom:10px}
    .prev-stage{background:var(--g100);border-radius:12px;padding:20px;min-height:120px;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
    .prev-meta{background:#fff;border:1px solid var(--g200);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;gap:8px}
    .prev-meta-row{display:flex;justify-content:space-between;font-size:12px}
    .prev-meta-key{color:var(--g400)}
    .prev-meta-val{font-weight:500;color:var(--g700)}
    .badge-status{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
    .bs-active{background:#d1fae5;color:#065f46}
    .bs-draft{background:#fef3c7;color:#92400e}
    .bs-paused{background:var(--g100);color:var(--g500)}

    /* Widget previews */
    .w-cta-bar{border-radius:10px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;width:100%}
    .w-cta-heading{font-size:14px;font-weight:700;color:#fff}
    .w-cta-sub{font-size:12px;opacity:.8;color:#fff;margin-top:2px}
    .w-cta-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;border:none;cursor:default;background:rgba(255,255,255,.22);color:#fff;flex-shrink:0;white-space:nowrap}

    .w-sp{background:#fff;border:1px solid var(--g200);border-radius:12px;padding:16px;width:100%}
    .w-sp-stats{display:flex;gap:20px;margin-bottom:12px;justify-content:space-around}
    .w-sp-stat{text-align:center}
    .w-sp-val{font-size:20px;font-weight:800}
    .w-sp-lbl{font-size:11px;color:var(--g400);margin-top:1px}
    .w-sp-stars{color:#f59e0b;font-size:16px;text-align:center;margin-bottom:8px;letter-spacing:2px}
    .w-sp-activity{font-size:12px;color:var(--g500);border-top:1px solid var(--g100);padding-top:10px}
    .w-sp-row{display:flex;gap:6px;margin-bottom:4px;align-items:center}
    .w-sp-dot{width:5px;height:5px;border-radius:50%;background:#10b981;flex-shrink:0}

    .w-promo{border-radius:12px;overflow:hidden;border:1px solid var(--g200);width:100%;max-width:260px;margin:auto}
    .w-promo-img{height:80px;display:flex;align-items:center;justify-content:center;font-size:36px;position:relative}
    .w-promo-badge{position:absolute;top:8px;right:8px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(255,255,255,.9);color:var(--g800)}
    .w-promo-body{padding:12px;background:#fff}
    .w-promo-title{font-size:13px;font-weight:700;margin-bottom:3px}
    .w-promo-offer{font-size:12px;color:var(--g500);margin-bottom:10px;line-height:1.4}
    .w-promo-btn{width:100%;padding:8px;border-radius:7px;font-size:12px;font-weight:700;border:none;cursor:default;color:#fff}

    .w-announce{border-radius:8px;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%}
    .w-announce-text{font-size:13px;color:#fff;flex:1}
    .w-announce-link{font-size:13px;font-weight:700;color:#fff;text-decoration:underline;white-space:nowrap}
    .w-announce-x{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;cursor:default;flex-shrink:0}

    .w-newsletter{background:#fff;border:1px solid var(--g200);border-radius:12px;padding:20px;width:100%;text-align:center}
    .w-newsletter h3{font-size:15px;font-weight:700;margin-bottom:4px}
    .w-newsletter p{font-size:12px;color:var(--g500);margin-bottom:14px}
    .w-newsletter-row{display:flex;gap:8px}
    .w-newsletter-input{flex:1;padding:8px 12px;border:1px solid var(--g200);border-radius:7px;font-size:13px;background:var(--g50)}
    .w-newsletter-btn{padding:8px 14px;border-radius:7px;font-size:13px;font-weight:700;border:none;cursor:default;color:#fff;white-space:nowrap}

    /* Type picker modal */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center}
    .overlay.open{display:flex}
    .type-modal{background:#fff;border-radius:16px;padding:24px;width:580px;max-width:95vw;max-height:85vh;overflow-y:auto}
    .modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .modal-title{font-size:16px;font-weight:700}
    .modal-x{width:28px;height:28px;border:1px solid var(--g200);background:#fff;border-radius:7px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--g500)}
    .modal-x:hover{background:var(--g100)}
    .type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .type-card{border:1px solid var(--g200);border-radius:12px;padding:14px;cursor:pointer;transition:all .15s;text-align:center}
    .type-card:hover{border-color:var(--momo);background:#fdf2f8;box-shadow:0 2px 8px rgba(165,0,100,.1)}
    .type-card-icon{font-size:28px;margin-bottom:8px}
    .type-card-name{font-size:13px;font-weight:600;color:var(--g800);margin-bottom:3px}
    .type-card-cat{font-size:11px;color:var(--g400)}

    /* Toast */
    .toast{position:fixed;bottom:24px;right:24px;background:var(--g900);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:300;transform:translateY(80px);opacity:0;transition:all .25s;pointer-events:none}
    .toast.show{transform:translateY(0);opacity:1}

    /* Scrollbar */
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--g200);border-radius:4px}
  </style>
</head>

</div>

<!-- TYPE PICKER MODAL -->
<div class="overlay" id="typeOverlay">

</div>

<div class="toast" id="toast"></div>

function renderSidebar() {
  const q = searchQ.toLowerCase()
  const filtered = instances.filter(i => i.name.toLowerCase().includes(q))

  const groups = [
    {key:'active',  label:'Đang hoạt động'},
    {key:'draft',   label:'Nháp'},
    {key:'paused',  label:'Đã tắt'},
  ]

  let html = ''
  for (const g of groups) {
    const items = filtered.filter(i => i.status === g.key)
    if (!items.length) continue
    html += `<div class="group-label">${g.label}<span class="group-cnt">${items.length}</span></div>`
    for (const it of items) {
      const t = TYPES.find(x => x.id === it.typeId)
      html += `<div class="inst-item${selected===it.id?' active':''}" onclick="selectWidget('${it.id}')">
        <span class="inst-icon">${t?.icon||'🧩'}</span>
        <div class="inst-info">
          <div class="inst-name">${it.name}</div>
          <div class="inst-meta">${t?.name||''} · ${it.page}</div>
        </div>
        <span class="status-dot dot-${it.status}"></span>
      </div>`
    }
  }
  document.getElementById('instanceList').innerHTML = html || '<div style="padding:20px;text-align:center;font-size:13px;color:var(--g400)">Không tìm thấy</div>'

  const total = instances.length
  const active = instances.filter(i => i.status === 'active').length
  document.getElementById('hdrCount').textContent = `${active} active · ${total} total`
}

function filterList() {
  searchQ = document.getElementById('searchInput').value
  renderSidebar()
}

// ── Select widget ────────────────────────────────────────────────────────────
function selectWidget(id) {
  selected = id
  renderSidebar()
  const inst = instances.find(i => i.id === id)
  renderEditor(inst)
}

// ── Editor ───────────────────────────────────────────────────────────────────
function renderEditor(inst) {
  const t = TYPES.find(x => x.id === inst.typeId)
  const ed = document.getElementById('editor')

  const statusOpts = ['active','draft','paused'].map(s =>
    `<option value="${s}"${inst.status===s?' selected':''}>${{active:'● Đang hoạt động',draft:'○ Nháp',paused:'◌ Đã tắt'}[s]}</option>`
  ).join('')

  const configFields = t.fields.map(f => {
    const val = inst.config[f.id] ?? ''
    if (f.type === 'swatches') {
      const swatches = f.opts.map(c =>
        `<span class="swatch${c===val?' on':''}" style="background:${c}" data-fid="${f.id}" data-val="${c}" onclick="swatchPick(this,'${inst.id}','${f.id}','${c}')"></span>`
      ).join('')
      return `<div class="field-group"><label class="field-label">${f.label}</label><div class="swatches">${swatches}</div></div>`
    }
    if (f.type === 'textarea') {
      return `<div class="field-group"><label class="field-label">${f.label}</label><textarea class="field-input" data-fid="${f.id}" oninput="fieldUpdate('${inst.id}','${f.id}',this.value)" placeholder="${f.ph||''}">${esc(val)}</textarea></div>`
    }
    return `<div class="field-group"><label class="field-label">${f.label}</label><input class="field-input" type="${f.type||'text'}" data-fid="${f.id}" value="${esc(val)}" oninput="fieldUpdate('${inst.id}','${f.id}',this.value)" placeholder="${f.ph||''}"${f.min!==undefined?` min="${f.min}"`:''}${f.max!==undefined?` max="${f.max}"`:''}${f.step!==undefined?` step="${f.step}"`:''}></div>`
  }).join('')

  ed.innerHTML = `
    <div class="editor-hdr">
      <input class="inst-name-input" value="${esc(inst.name)}" oninput="nameUpdate('${inst.id}',this.value)" placeholder="Tên widget...">
      <select class="status-select ${inst.status}" onchange="statusUpdate('${inst.id}',this.value,this)">${statusOpts}</select>
      <button class="save-btn" onclick="saveWidget('${inst.id}')">Lưu</button>
    </div>
    <div class="editor-body">
      <div class="config-panel">
        <div class="cfg-section">
          <div class="cfg-section-title">Nội dung</div>
          ${configFields}
        </div>
        <div class="cfg-section">
          <div class="cfg-section-title">Vị trí hiển thị</div>
          <div class="field-row">
            <div class="field-group">
              <label class="field-label">Trang</label>
              <select class="field-select" onchange="placementUpdate('${inst.id}','page',this.value)">
                ${PAGES.map(p=>`<option${p===inst.page?' selected':''}>${p}</option>`).join('')}
              </select>
            </div>
            <div class="field-group">
              <label class="field-label">Vị trí</label>
              <select class="field-select" onchange="placementUpdate('${inst.id}','pos',this.value)">
                ${POSITIONS.map(p=>`<option${p===inst.pos?' selected':''}>${p}</option>`).join('')}
              </select>
            </div>
          </div>
        </div>
      </div>
      <div class="preview-panel">
        <div class="prev-label">Preview</div>
        <div class="prev-stage" id="prevStage">${renderPreview(inst)}</div>
        <div class="prev-meta">
          <div class="prev-meta-row"><span class="prev-meta-key">Loại</span><span class="prev-meta-val">${t?.name}</span></div>
          <div class="prev-meta-row"><span class="prev-meta-key">Trang</span><span class="prev-meta-val">${inst.page}</span></div>
          <div class="prev-meta-row"><span class="prev-meta-key">Vị trí</span><span class="prev-meta-val">${inst.pos}</span></div>
          <div class="prev-meta-row"><span class="prev-meta-key">Trạng thái</span><span class="badge-status bs-${inst.status}">${{active:'Đang hoạt động',draft:'Nháp',paused:'Đã tắt'}[inst.status]}</span></div>
        </div>
      </div>
    </div>
    <div class="config-footer">
      <button class="del-btn" onclick="deleteWidget('${inst.id}')">Xoá widget</button>
      <button class="save-btn" onclick="saveWidget('${inst.id}')">Lưu thay đổi</button>
    </div>`
}

// ── Preview renderers ────────────────────────────────────────────────────────
function renderPreview(inst) {
  const c = inst.config
  switch (inst.typeId) {
    case 'cta-banner':
      return `<div class="w-cta-bar" style="background:${c.color||'#a50064'}">
        <div><div class="w-cta-heading">${esc(c.heading||'CTA Heading')}</div><div class="w-cta-sub">${esc(c.sub||'Sub-text')}</div></div>
        <button class="w-cta-btn">${esc(c.cta||'CTA')}</button>
      </div>`
    case 'social-proof':
      return `<div class="w-sp">
        <div class="w-sp-stats">
          <div class="w-sp-stat"><div class="w-sp-val">${esc(c.users||'0')}</div><div class="w-sp-lbl">Người dùng</div></div>
          <div class="w-sp-stat"><div class="w-sp-val">${parseFloat(c.rating||5).toFixed(1)}</div><div class="w-sp-lbl">Đánh giá</div></div>
          <div class="w-sp-stat"><div class="w-sp-val">${esc(c.ratingCnt||'0')}</div><div class="w-sp-lbl">Lượt review</div></div>
        </div>
        <div class="w-sp-stars">${stars(c.rating||5)}</div>
        <div class="w-sp-activity">
          <div class="w-sp-row"><span class="w-sp-dot"></span><span>${esc(c.activity||'Hoạt động gần đây')} · vừa xong</span></div>
          <div class="w-sp-row"><span class="w-sp-dot"></span><span>Nguyễn Văn A đã thanh toán hóa đơn thành công</span></div>
        </div>
      </div>`
    case 'card-promo':
      return `<div class="w-promo">
        <div class="w-promo-img" style="background:${c.color||'#a50064'}">${c.emoji||'🎁'}<span class="w-promo-badge">${esc(c.badge||'')}</span></div>
        <div class="w-promo-body">
          <div class="w-promo-title">${esc(c.title||'Tiêu đề')}</div>
          <div class="w-promo-offer">${esc(c.offer||'Mô tả ưu đãi').replace(/\n/g,'<br>')}</div>
          <button class="w-promo-btn" style="background:${c.color||'#a50064'}">${esc(c.cta||'Dùng ngay')}</button>
        </div>
      </div>`
    case 'announcement':
      return `<div class="w-announce" style="background:${c.color||'#0f172a'}">
        <div class="w-announce-text">${esc(c.message||'Thông báo...')}</div>
        <span class="w-announce-link">${esc(c.linkText||'Xem ngay')}</span>
        <div class="w-announce-x">×</div>
      </div>`
    case 'newsletter':
      return `<div class="w-newsletter">
        <h3>${esc(c.headline||'Newsletter')}</h3>
        <p>${esc(c.sub||'Sub-text')}</p>
        <div class="w-newsletter-row">
          <div class="w-newsletter-input" style="color:var(--g400)">${esc(c.ph||'email@example.com')}</div>
          <button class="w-newsletter-btn" style="background:${c.color||'#a50064'}">${esc(c.btnText||'Đăng ký')}</button>
        </div>
      </div>`
    default: return '<div style="color:var(--g400);font-size:13px">No preview</div>'
  }
}

function stars(r) {
  const n = Math.min(5, Math.max(0, parseFloat(r)||5))
  return '★'.repeat(Math.round(n)) + '☆'.repeat(5-Math.round(n))
}

// ── Field updates (live preview) ─────────────────────────────────────────────
function fieldUpdate(id, fid, val) {
  const inst = instances.find(i => i.id === id)
  if (!inst) return
  inst.config[fid] = val
  const ps = document.getElementById('prevStage')
  if (ps) ps.innerHTML = renderPreview(inst)
}

function swatchPick(el, id, fid, val) {
  const inst = instances.find(i => i.id === id)
  if (!inst) return
  inst.config[fid] = val
  document.querySelectorAll(`.swatch[data-fid="${fid}"]`).forEach(s => s.classList.toggle('on', s.dataset.val === val))
  const ps = document.getElementById('prevStage')
  if (ps) ps.innerHTML = renderPreview(inst)
}

function nameUpdate(id, val) {
  const inst = instances.find(i => i.id === id)
  if (inst) { inst.name = val; renderSidebar() }
}

function statusUpdate(id, val, sel) {
  const inst = instances.find(i => i.id === id)
  if (!inst) return
  inst.status = val
  sel.className = `status-select ${val}`
  renderSidebar()
}

function placementUpdate(id, key, val) {
  const inst = instances.find(i => i.id === id)
  if (inst) inst[key] = val
}

function saveWidget(id) {
  showToast('Đã lưu thay đổi ✓')
  renderSidebar()
}

function deleteWidget(id) {
  if (!confirm('Xoá widget này?')) return
  instances = instances.filter(i => i.id !== id)
  selected = null
  document.getElementById('editor').innerHTML = `<div class="welcome" id="welcome"><div class="welcome-icon">🧩</div><h2>Widget Manager</h2><p>Chọn một widget hoặc tạo mới.</p></div>`
  renderSidebar()
  showToast('Đã xoá widget')
}

// ── Type picker ───────────────────────────────────────────────────────────────
function openTypePicker() {
  document.getElementById('typeGrid').innerHTML = TYPES.map(t =>
    `<div class="type-card" onclick="createWidget('${t.id}')">
      <div class="type-card-icon">${t.icon}</div>
      <div class="type-card-name">${t.name}</div>
      <div class="type-card-cat">${t.category}</div>
    </div>`
  ).join('')
  document.getElementById('typeOverlay').classList.add('open')
}

function closeTypePicker() {
  document.getElementById('typeOverlay').classList.remove('open')
}

function createWidget(typeId) {
  closeTypePicker()
  const t = TYPES.find(x => x.id === typeId)
  const id = 'w' + Date.now()
  const defaultConfig = {}
  t.fields.forEach(f => {
    if (f.type === 'swatches') defaultConfig[f.id] = f.opts[0]
    else defaultConfig[f.id] = ''
  })
  const inst = { id, typeId, name: `${t.name} mới`, status:'draft', page:'Unassigned', pos:'Unassigned', config:defaultConfig }
  instances.unshift(inst)
  selected = id
  renderSidebar()
  renderEditor(inst)
  showToast(`Đã tạo ${t.name} mới`)
}

document.getElementById('typeOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeTypePicker()
})

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer
function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.classList.add('show')
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500)
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// ── Init ─────────────────────────────────────────────────────────────────────
renderSidebar()
</script>
</body>
</html>
