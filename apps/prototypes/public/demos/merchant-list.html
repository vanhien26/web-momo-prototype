<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Merchant List | MoSpark</title>
  <link rel="shortcut icon" type="image/svg+xml" href="../assets/images/momo-logo.svg">
  <style>
    @font-face{font-family:MoMo;src:url('../assets/fonts/momo-trust/MoMoTrustSans-Regular.otf')}
    @font-face{font-family:MoMo;src:url('../assets/fonts/momo-trust/MoMoTrustSans-Medium.otf');font-weight:700}
    @font-face{font-family:MoMoDisplay;src:url('../assets/fonts/momo-trust/MoMoTrustDisplay.otf');font-weight:800}
    :root{--pk:#a50064;--pk2:#d82d8b;--pk-bg:#fff2f8;--ink:#17151d;--t2:#5f5b68;--t3:#92909d;--line:#e6e4df;--soft:#f6f6f4;--white:#fff;--green:#147b57;--green-bg:#eaf8f2;--orange:#ea5a13;--orange-bg:#fff3e9;--blue:#2677c9;--blue-bg:#eef7ff;--shadow:0 10px 30px rgba(26,20,25,.06);--ease:cubic-bezier(.4,0,.2,1);--dur:0.22s}
    *{box-sizing:border-box}body{margin:0;background:#f8f7f5;color:var(--ink);font-family:MoMo,Arial,sans-serif;font-size:13px;-webkit-font-smoothing:antialiased}button{cursor:pointer}button,input,select{font:inherit}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Topbar */
    .topbar{height:58px;display:flex;align-items:center;gap:13px;padding:0 28px;border-bottom:1px solid var(--line);background:#fff;position:sticky;top:0;z-index:10}
    .back{font-size:10px;color:var(--t2);font-weight:800;text-decoration:none;transition:color var(--dur)}.back:hover{color:var(--pk)}
    .bar-divider{width:1px;height:22px;background:var(--line)}
    .brand{display:flex;align-items:center;gap:8px}.brand img{width:31px;height:31px;border-radius:9px;object-fit:contain}
    .brand strong{font:800 14px MoMoDisplay,MoMo}.brand small{display:block;color:var(--t3);font-size:8.5px;margin-top:1px}
    .sb-chip{margin-left:auto;display:inline-flex;align-items:center;gap:5px;background:#ebfff6;color:#147b57;border:1px solid #c7e3d8;border-radius:99px;padding:5px 10px;font-size:8.5px;font-weight:800}
    .sb-dot{width:6px;height:6px;border-radius:50%;background:#147b57;animation:spin 2s linear infinite;box-shadow:0 0 0 2px rgba(20,123,87,.2)}

    /* Page */
    .page{max-width:1400px;margin:auto;padding:28px 28px 60px}
    .page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:22px}
    .page-title{font:800 26px/1.2 MoMoDisplay,MoMo;margin:0}
    .page-sub{font-size:11px;color:var(--t3);margin:6px 0 0}
    .btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 14px;font-size:10px;font-weight:800;display:inline-flex;align-items:center;gap:6px;transition:all var(--dur) var(--ease);cursor:pointer}
    .btn:hover{border-color:#d9a4c3;color:var(--pk);transform:translateY(-1px)}
    .btn.primary{background:var(--pk);border-color:var(--pk);color:#fff}.btn.primary:hover{background:#8c0056}

    /* Stats */
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
    .stat-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;transition:box-shadow .2s}
    .stat-card:hover{box-shadow:var(--shadow)}.stat-card .label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--t3)}
    .stat-card .value{font:800 28px/1 MoMoDisplay,MoMo;margin:8px 0 4px}.stat-card .sub{font-size:9px;color:var(--t3)}
    .stat-card.green .value{color:var(--green)}.stat-card.pink .value{color:var(--pk)}.stat-card.blue .value{color:var(--blue)}.stat-card.orange .value{color:var(--orange)}

    /* Filter */
    .filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
    .search-wrap{position:relative;flex:1;min-width:200px;max-width:320px}
    .search-wrap input{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 10px 9px 32px;font-size:11px;outline:none;transition:border-color var(--dur);background:#fff}
    .search-wrap input:focus{border-color:var(--pk)}.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px}
    .cat-chips{display:flex;gap:6px;flex-wrap:wrap}
    .chip{border:1px solid var(--line);background:#fff;border-radius:99px;padding:5px 10px;font-size:9px;font-weight:700;color:var(--t2);cursor:pointer;transition:all var(--dur)}
    .chip:hover{border-color:#d9a4c3;color:var(--pk)}.chip.active{background:var(--ink);border-color:var(--ink);color:#fff}
    .count-badge{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--line);font-size:7.5px;font-weight:800;margin-left:3px}
    .chip.active .count-badge{background:rgba(255,255,255,.25);color:#fff}

    /* Table */
    .table-wrap{background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden;animation:fadeUp .3s var(--ease)}
    .table-meta{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--line);background:#fafaf8}
    .table-meta strong{font-size:11px}.table-meta span{font-size:9px;color:var(--t3)}
    table{width:100%;border-collapse:collapse}
    thead th{padding:10px 14px;text-align:left;font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--t3);border-bottom:1px solid var(--line);background:#fafaf8;white-space:nowrap}
    tbody tr{border-bottom:1px solid var(--line);transition:background var(--dur);cursor:pointer}
    tbody tr:last-child{border:0}tbody tr:hover{background:#fdfbfc}
    td{padding:12px 14px;font-size:10.5px;vertical-align:middle}
    .td-id{font-family:monospace;font-size:9.5px;color:var(--t3);font-weight:700}
    .td-name{font-weight:800;max-width:180px}
    .td-addr{color:var(--t2);font-size:9.5px;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .td-hours{font-size:9.5px;color:var(--green);font-weight:700;white-space:nowrap}
    .td-hours.closed{color:var(--t3);font-weight:500}

    /* Badges */
    .badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:99px;font-size:8px;font-weight:800;white-space:nowrap}
    .badge-live{background:var(--green-bg);color:var(--green)}.badge-staging{background:var(--orange-bg);color:var(--orange)}
    .badge-cashback{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
    .badge-no-promo{color:var(--t3);font-size:9px}

    .cat-badge{display:inline-flex;padding:3px 8px;border-radius:6px;font-size:8px;font-weight:800}
    .cat-food{background:#fff3e9;color:#c2410c}.cat-cafe{background:#fef3c7;color:#92400e}
    .cat-market{background:var(--blue-bg);color:var(--blue)}.cat-beauty{background:#fdf4ff;color:#86198f}
    .cat-health{background:#f0fdf4;color:#166534}.cat-fitness{background:#eff6ff;color:#1d4ed8}
    .cat-pharmacy{background:#fef2f2;color:#991b1b}.cat-bakery{background:#fff1f2;color:#be123c}
    .cat-default{background:var(--soft);color:var(--t2)}

    .open-btn{border:1px solid var(--line);background:#fff;border-radius:7px;padding:5px 10px;font-size:9px;font-weight:800;color:var(--t2);transition:all var(--dur);white-space:nowrap}
    .open-btn:hover{border-color:var(--pk);color:var(--pk);background:var(--pk-bg)}

    /* Loading skeleton */
    .skeleton{background:linear-gradient(90deg,#f0eeec 25%,#e8e5e2 50%,#f0eeec 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;display:inline-block}

    /* Empty / error */
    .empty{padding:52px;text-align:center;color:var(--t3)}.empty strong{display:block;font-size:13px;color:var(--t2);margin-bottom:6px}

    @media(max-width:900px){.stats-row{grid-template-columns:repeat(2,1fr)}.td-addr,.td-hours{display:none}}
    @media(max-width:600px){.page{padding:18px 14px}.stats-row{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <header class="topbar">
    <a class="back" href="../lab.html">← Prototype Store</a>
    <span class="bar-divider"></span>
    <div class="brand">
      <img src="https://homepage.momocdn.net/fileuploads/svg/momo-file-240411162904.svg" alt="MoMo">
      <img src="https://homepage.momocdn.net/img/4f2fa6b0-9f96-4077-b210-6e848b7d7104-1-260622153405.png" alt="Web Platform" style="width:22px;height:22px;border-radius:5px;border:1px solid rgba(0,0,0,.08)">
      <div><strong>Merchant List</strong><small>MoSpark · Supabase</small></div>
    </div>
    <span class="sb-chip"><span class="sb-dot"></span>Supabase Live</span>
  </header>

  <main class="page">
    <div class="page-head">
      <div>
        <h1 class="page-title">Merchant List</h1>
        <p class="page-sub">Toàn bộ merchants từ Supabase — click để mở trong Page Builder</p>
      </div>
      <button class="btn primary" onclick="loadData()">↺ Refresh</button>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="label">Tổng Merchants</div><div class="value"><span class="skeleton" style="width:40px;height:28px"></span></div></div>
      <div class="stat-card"><div class="label">Đang Live</div><div class="value"><span class="skeleton" style="width:32px;height:28px"></span></div></div>
      <div class="stat-card"><div class="label">Có Promotion</div><div class="value"><span class="skeleton" style="width:32px;height:28px"></span></div></div>
      <div class="stat-card"><div class="label">Danh mục</div><div class="value"><span class="skeleton" style="width:32px;height:28px"></span></div></div>
    </div>

    <div class="filter-bar">
      <div class="search-wrap"><span class="search-icon">⌕</span><input id="searchInput" placeholder="Tìm tên hoặc Merchant ID..." oninput="applyFilter()"></div>
      <div class="cat-chips" id="catChips"></div>
    </div>

    <div id="tableWrap">
      <div class="table-wrap">
        <div class="table-meta"><strong>Đang tải dữ liệu...</strong><span>Kết nối Supabase</span></div>
        <table><thead><tr><th>Merchant ID</th><th>Tên Merchant</th><th>Danh mục</th><th>Địa chỉ</th><th>Hôm nay</th><th>Cashback</th><th>Status</th><th></th></tr></thead>
        <tbody><tr><td colspan="8"><div class="empty"><span class="skeleton" style="width:200px;height:14px;display:block;margin:0 auto"></span></div></td></tr></tbody></table>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/supabase-client.js"></script>
  <script>
    const DAYS = ['CN','T2','T3','T4','T5','T6','T7'];
    const TODAY = DAYS[new Date().getDay()];

    const CAT_CLASS = {
      'Quán ăn':'cat-food','Nhà hàng':'cat-food',
      'Cafe':'cat-cafe','Trà sữa':'cat-cafe',
      'Siêu thị':'cat-market','Bách hóa':'cat-market','Cửa hàng tiện lợi':'cat-market',
      'Spa & Massage':'cat-beauty','Bar & Pub':'cat-beauty',
      'Gym & Fitness':'cat-fitness',
      'Nhà thuốc':'cat-pharmacy','Phòng khám':'cat-pharmacy',
      'Tiệm bánh':'cat-bakery',
    };

    let allData = [];
    let activeCategory = 'Tất cả';

    async function loadData() {
      document.getElementById('tableWrap').innerHTML = `
        <div class="table-wrap">
          <div class="table-meta"><strong>Đang tải...</strong><span>Supabase query</span></div>
          <table><thead><tr><th>Merchant ID</th><th>Tên Merchant</th><th>Danh mục</th><th>Địa chỉ</th><th>Hôm nay</th><th>Cashback</th><th>Status</th><th></th></tr></thead>
          <tbody><tr><td colspan="8"><div class="empty"><span class="skeleton" style="width:200px;height:14px;display:block;margin:0 auto 10px"></span><span class="skeleton" style="width:260px;height:14px;display:block;margin:0 auto"></span></div></td></tr></tbody></table>
        </div>`;

      const [{ data: merchants, error }, { data: promos }, { data: hours }] = await Promise.all([
        window.supabase.from('merchants').select('*').order('name'),
        window.supabase.from('merchant_promotions').select('merchant_id,value,type').eq('is_active', true),
        window.supabase.from('merchant_hours').select('merchant_id,open_time,close_time').eq('day', TODAY),
      ]);

      if (error) {
        document.getElementById('tableWrap').innerHTML = `<div class="table-wrap"><div class="empty"><strong>Lỗi kết nối Supabase</strong><span>${error.message}</span></div></div>`;
        return;
      }

      const promoMap = {};
      for (const p of (promos || [])) promoMap[p.merchant_id] = p;

      const hoursMap = {};
      for (const h of (hours || [])) hoursMap[h.merchant_id] = `${h.open_time} - ${h.close_time}`;

      allData = (merchants || []).map(m => ({
        ...m,
        promo: promoMap[m.merchant_id] || null,
        todayHours: hoursMap[m.merchant_id] || null,
      }));

      renderStats();
      renderCategoryChips();
      applyFilter();
    }

    function renderStats() {
      const live = allData.filter(m => m.status === 'live').length;
      const withPromo = allData.filter(m => m.promo).length;
      const cats = new Set(allData.map(m => m.category).filter(Boolean)).size;
      document.getElementById('statsRow').innerHTML = `
        <div class="stat-card green"><div class="label">Tổng Merchants</div><div class="value">${allData.length}</div><div class="sub">trong database</div></div>
        <div class="stat-card pink"><div class="label">Đang Live</div><div class="value">${live}</div><div class="sub">${allData.length - live} staging</div></div>
        <div class="stat-card blue"><div class="label">Có Promotion</div><div class="value">${withPromo}</div><div class="sub">${allData.length - withPromo} chưa có</div></div>
        <div class="stat-card orange"><div class="label">Danh mục</div><div class="value">${cats}</div><div class="sub">loại hình khác nhau</div></div>`;
    }

    function renderCategoryChips() {
      const cats = ['Tất cả', ...new Set(allData.map(m => m.category).filter(Boolean)).values()];
      document.getElementById('catChips').innerHTML = cats.map(c => {
        const count = c === 'Tất cả' ? allData.length : allData.filter(m => m.category === c).length;
        return `<button class="chip ${c === activeCategory ? 'active' : ''}" onclick="filterByCategory('${c}')">${c}<span class="count-badge">${count}</span></button>`;
      }).join('');
    }

    function filterByCategory(cat) {
      activeCategory = cat;
      renderCategoryChips();
      applyFilter();
    }

    function applyFilter() {
      const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
      let filtered = allData;
      if (activeCategory !== 'Tất cả') filtered = filtered.filter(m => m.category === activeCategory);
      if (q) filtered = filtered.filter(m =>
        m.name?.toLowerCase().includes(q) || m.merchant_id?.toLowerCase().includes(q)
      );
      renderTable(filtered);
    }

    function catBadge(cat) {
      const cls = CAT_CLASS[cat] || 'cat-default';
      return `<span class="cat-badge ${cls}">${cat || '—'}</span>`;
    }

    function hoursBadge(m) {
      const h = m.todayHours;
      if (!h || h === '00:00 - 00:00') return `<span class="td-hours closed">Đóng cửa</span>`;
      return `<span class="td-hours">${h}</span>`;
    }

    function openBuilder(m) {
      const url = `/merchant-page-builder?merchantId=${encodeURIComponent(m.merchant_id)}&merchantName=${encodeURIComponent(m.name)}&planId=${encodeURIComponent(m.merchant_id)}&cluster=Merchant+Page&primary=${encodeURIComponent((m.name||'').toLowerCase())}&volume=0`;
      window.location.href = url;
    }

    function renderTable(data) {
      const wrap = document.getElementById('tableWrap');
      if (!data.length) {
        wrap.innerHTML = `<div class="table-wrap"><div class="empty"><strong>Không tìm thấy merchant</strong><span>Thử thay đổi bộ lọc hoặc từ khóa tìm kiếm.</span></div></div>`;
        return;
      }
      const rows = data.map((m, i) => `
        <tr onclick="openBuilder(allData.find(x=>x.merchant_id==='${m.merchant_id}'))">
          <td class="td-id">${m.merchant_id}</td>
          <td class="td-name">${m.name || '—'}</td>
          <td>${catBadge(m.category)}</td>
          <td class="td-addr" title="${m.address || ''}">${m.address || '—'}</td>
          <td>${hoursBadge(m)}</td>
          <td>${m.promo ? `<span class="badge badge-cashback">↩ ${m.promo.value}</span>` : `<span class="badge-no-promo">—</span>`}</td>
          <td><span class="badge badge-${m.status === 'live' ? 'live' : 'staging'}">● ${m.status || 'staging'}</span></td>
          <td><button class="open-btn" onclick="event.stopPropagation();openBuilder(allData.find(x=>x.merchant_id==='${m.merchant_id}'))">Mở Builder →</button></td>
        </tr>`).join('');

      wrap.innerHTML = `
        <div class="table-wrap">
          <div class="table-meta">
            <strong>${data.length} merchant${data.length !== allData.length ? ` / ${allData.length} tổng` : ''}</strong>
            <span>Hôm nay: ${TODAY} · Cập nhật ${new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'})}</span>
          </div>
          <table>
            <thead><tr><th>Merchant ID</th><th>Tên Merchant</th><th>Danh mục</th><th>Địa chỉ</th><th>Hôm nay</th><th>Cashback</th><th>Status</th><th></th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    loadData();
  </script>
</body>
</html>
