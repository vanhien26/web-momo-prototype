<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MoMo — Tin tức &amp; Ưu đãi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root {
  --brand: #A50064;
  --brand-mid: #C8007A;
  --brand-dark: #6D0040;
  --bg: #F6F4F9;
  --surface: #FFFFFF;
  --surface2: #EDE9F4;
  --text: #1C0E2E;
  --text2: #5C4D6E;
  --text3: #9B8FB0;
  --border: #E4DFF0;
  --shadow: 0 2px 20px rgba(28,14,46,.08);
  --r: 16px;
  --r2: 12px;

  --font-display: 'Playfair Display', Georgia, serif;
  --font: 'Inter', -apple-system, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; scroll-behavior: smooth; }
body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.7; }

/* ── TICKER ─────────────────────────────────────────────────────── */
.ticker-wrap {
  background: var(--brand);
  color: #fff;
  overflow: hidden;
  height: 36px;
  display: flex;
  align-items: center;
  user-select: none;
}
.ticker-label {
  background: var(--brand-dark);
  padding: 0 16px;
  height: 100%;
  display: flex;
  align-items: center;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  white-space: nowrap;
  flex-shrink: 0;
  gap: 6px;
}
.ticker-track-wrap {
  overflow: hidden;
  flex: 1;
  mask-image: linear-gradient(to right, transparent 0, black 16px, black calc(100% - 16px), transparent 100%);
  -webkit-mask-image: linear-gradient(to right, transparent 0, black 16px, black calc(100% - 16px), transparent 100%);
}
.ticker-track {
  display: flex;
  animation: ticker 40s linear infinite;
  width: max-content;
}
.ticker-track:hover { animation-play-state: paused; }
.ticker-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 28px;
  font-size: 12.5px;
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  transition: opacity .15s;
}
.ticker-item:hover { opacity: .8; }
.ticker-sep { opacity: .35; padding: 0 4px; font-size: 14px; }
@keyframes ticker {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* ── HEADER ─────────────────────────────────────────────────────── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 0 var(--border);
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  height: 60px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 9px;
  text-decoration: none;
  flex-shrink: 0;
}
.logo-mark {
  width: 32px;
  height: 32px;
  background: var(--brand);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 900;
  font-size: 15px;
  letter-spacing: -.5px;
  font-family: var(--font-display);
}
.logo-text { font-size: 16px; font-weight: 700; color: var(--text); }
.logo-divider { width: 1px; height: 18px; background: var(--border); }
.logo-section { font-size: 13px; font-weight: 500; color: var(--text2); }
.header-nav {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 2px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.header-nav::-webkit-scrollbar { display: none; }
.nav-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: none;
  background: none;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s, color .15s;
  flex-shrink: 0;
}
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.nav-btn.active { background: var(--brand); color: white; }
.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.search-wrap { position: relative; }
.search-input {
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--bg);
  padding: 7px 36px 7px 14px;
  font-family: var(--font);
  font-size: 13px;
  color: var(--text);
  width: 200px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.search-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(165,0,100,.1); }
.search-input::placeholder { color: var(--text3); }
.search-icon {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 15px;
  pointer-events: none;
}
.icon-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text2);
  transition: background .15s, color .15s, border-color .15s;
  font-size: 16px;
  flex-shrink: 0;
}
.icon-btn:hover { background: var(--surface2); color: var(--text); }
.icon-btn.saved { background: var(--brand); color: white; border-color: var(--brand); }

/* ── MAIN LAYOUT ─────────────────────────────────────────────────── */
.page-wrap { max-width: 1200px; margin: 0 auto; padding: 32px 24px 80px; }

/* ── HERO ────────────────────────────────────────────────────────── */
.hero {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 20px;
  margin-bottom: 40px;
}
.hero-featured {
  position: relative;
  border-radius: var(--r);
  overflow: hidden;
  min-height: 420px;
  cursor: pointer;
  transition: transform .25s, box-shadow .25s;
}
.hero-featured:hover { transform: translateY(-3px); box-shadow: 0 24px 50px rgba(165,0,100,.18); }
.hero-thumb {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
}
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(10,4,20,.92) 0%, rgba(10,4,20,.48) 45%, transparent 75%);
}
.hero-content {
  position: relative; z-index: 2;
  height: 100%;
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 28px 28px 32px;
}

/* ── CATEGORY TAGS ───────────────────────────────────────────────── */
.cat-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .04em;
  text-transform: uppercase;
  width: fit-content;
  margin-bottom: 10px;
}
.cat-promo  { background: #A50064; color: white; }
.cat-news   { background: #1D4ED8; color: white; }
.cat-event  { background: #B45309; color: white; }
.cat-guide  { background: #065F46; color: white; }
.cat-finance { background: #5B21B6; color: white; }

.cat-tag-soft {
  display: inline-flex; align-items: center;
  padding: 3px 9px; border-radius: 20px;
  font-size: 10.5px; font-weight: 700;
  letter-spacing: .04em; text-transform: uppercase;
}
.cat-promo-soft  { background: #FDF0F7; color: #A50064; }
.cat-news-soft   { background: #EFF6FF; color: #1D4ED8; }
.cat-event-soft  { background: #FFFBEB; color: #B45309; }
.cat-guide-soft  { background: #ECFDF5; color: #065F46; }
.cat-finance-soft { background: #F5F3FF; color: #5B21B6; }

.hero-title {
  font-family: var(--font-display);
  font-size: 28px;
  line-height: 1.3;
  color: white;
  margin-bottom: 12px;
  font-weight: 700;
}
.hero-meta {
  display: flex; align-items: center; gap: 14px;
  color: rgba(255,255,255,.65); font-size: 12.5px;
}
.hero-meta span { display: flex; align-items: center; gap: 4px; }

/* ── HERO STACK ──────────────────────────────────────────────────── */
.hero-stack { display: flex; flex-direction: column; gap: 12px; }
.hero-card {
  background: var(--surface);
  border-radius: var(--r2);
  overflow: hidden;
  display: flex;
  cursor: pointer;
  transition: box-shadow .2s, transform .2s;
  border: 1px solid var(--border);
}
.hero-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
.hc-thumb {
  width: 90px; min-height: 84px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; color: rgba(255,255,255,.85);
}
.hc-body { padding: 12px 14px; flex: 1; min-width: 0; }
.hc-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.hc-title {
  font-size: 13.5px; font-weight: 600; color: var(--text);
  line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.hc-date { font-size: 11px; color: var(--text3); margin-top: 5px; display: flex; align-items: center; gap: 4px; }

/* ── SECTION HEADER ──────────────────────────────────────────────── */
.sec-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.sec-title {
  font-size: 18px; font-weight: 700; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.sec-title i { color: var(--brand); font-size: 20px; }
.art-count { font-size: 13px; color: var(--text3); }

/* ── ARTICLE GRID ─────────────────────────────────────────────────── */
.art-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 40px;
}
.art-card {
  background: var(--surface);
  border-radius: var(--r);
  overflow: hidden;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: box-shadow .25s, transform .25s;
  display: flex; flex-direction: column;
}
.art-card:hover { box-shadow: 0 10px 36px rgba(28,14,46,.1); transform: translateY(-3px); }
.art-thumb {
  height: 180px;
  display: flex; align-items: center; justify-content: center;
  font-size: 52px; color: rgba(255,255,255,.8);
  position: relative; overflow: hidden;
}
.thumb-shine {
  position: absolute; top: -40%; left: -40%;
  width: 70%; height: 70%;
  background: radial-gradient(ellipse, rgba(255,255,255,.14) 0%, transparent 70%);
  pointer-events: none;
}
.art-body {
  padding: 18px 18px 20px;
  flex: 1; display: flex; flex-direction: column;
}
.art-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.art-date { font-size: 11.5px; color: var(--text3); }
.art-title {
  font-family: var(--font-display);
  font-size: 15px; font-weight: 700; line-height: 1.45; color: var(--text);
  margin-bottom: 8px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.art-excerpt {
  font-size: 13px; color: var(--text2); line-height: 1.6; flex: 1;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.art-footer {
  display: flex; align-items: center; gap: 12px;
  margin-top: 14px; padding-top: 12px;
  border-top: 1px solid var(--border);
}
.read-time { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
.read-more {
  display: flex; align-items: center; gap: 4px;
  font-size: 12.5px; font-weight: 600; color: var(--brand);
  margin-left: auto;
}

/* ── EMPTY STATE ─────────────────────────────────────────────────── */
.empty-state {
  text-align: center; padding: 80px 24px;
  grid-column: 1 / -1;
}
.empty-state i { font-size: 48px; color: var(--text3); margin-bottom: 16px; display: block; }
.empty-state h3 { font-size: 17px; color: var(--text2); margin-bottom: 8px; }
.empty-state p { font-size: 13px; color: var(--text3); }

/* ── LOAD MORE ────────────────────────────────────────────────────── */
.load-more-wrap { text-align: center; margin-top: 4px; }
.load-more-btn {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 12px 32px;
  font-family: var(--font);
  font-size: 14px; font-weight: 600; color: var(--text);
  cursor: pointer;
  transition: background .2s, border-color .2s, color .2s, transform .2s;
}
.load-more-btn:hover { background: var(--brand); color: white; border-color: var(--brand); transform: translateY(-1px); }

/* ── READER PANEL ────────────────────────────────────────────────── */
.reader-overlay {
  position: fixed; inset: 0; z-index: 500;
  display: none; align-items: flex-start; justify-content: flex-end;
}
.reader-overlay.open { display: flex; }
.reader-backdrop {
  position: absolute; inset: 0;
  background: rgba(10,4,20,.52);
  backdrop-filter: blur(4px);
  animation: rFadeIn .25s ease;
}
.reader-panel {
  position: relative; z-index: 1;
  background: var(--surface);
  width: 720px; max-width: 100%;
  height: 100vh; overflow-y: auto;
  animation: rSlideIn .32s cubic-bezier(.22,1,.36,1);
  box-shadow: -24px 0 60px rgba(10,4,20,.2);
}
@keyframes rFadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes rSlideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

.reader-hdr {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--surface); z-index: 10;
}
.reader-back {
  width: 36px; height: 36px; border-radius: 10px;
  border: 1px solid var(--border); background: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text2); font-size: 18px; flex-shrink: 0;
  transition: background .15s, color .15s;
}
.reader-back:hover { background: var(--surface2); color: var(--text); }
.reader-hdr-title {
  font-size: 13.5px; font-weight: 600; color: var(--text2);
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.reader-acts { display: flex; gap: 8px; }

/* Reader body */
.r-hero {
  position: relative;
  height: 300px;
  display: flex; align-items: center; justify-content: center;
  font-size: 80px; color: rgba(255,255,255,.72);
  overflow: hidden;
}
.r-hero .r-shine {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 30% 35%, rgba(255,255,255,.12) 0%, transparent 60%);
}

.r-body { padding: 32px 48px 64px; }
.r-meta-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.r-meta-item { display: flex; align-items: center; gap: 5px; font-size: 12.5px; color: var(--text3); }
.r-meta-item i { font-size: 14px; }
.r-title {
  font-family: var(--font-display);
  font-size: 30px; line-height: 1.3; font-weight: 700; color: var(--text);
  margin-bottom: 14px;
}
.r-lead {
  font-size: 15.5px; line-height: 1.75; color: var(--text2);
  border-left: 3px solid var(--brand);
  padding-left: 16px;
  margin-bottom: 28px;
  font-style: italic;
}
.r-content { font-size: 15px; line-height: 1.85; color: var(--text); }
.r-content h2 {
  font-family: var(--font-display);
  font-size: 20px; font-weight: 700;
  margin: 32px 0 12px; color: var(--text);
}
.r-content h3 { font-size: 16px; font-weight: 700; margin: 24px 0 8px; }
.r-content p { margin-bottom: 16px; }
.r-content ul, .r-content ol { padding-left: 22px; margin-bottom: 16px; }
.r-content li { margin-bottom: 6px; }
.r-content strong { font-weight: 700; }
.r-content em { font-style: italic; color: var(--text2); }

.r-callout {
  background: #FDF0F7;
  border: 1px solid #F5C6DF;
  border-left: 3px solid var(--brand);
  border-radius: var(--r2);
  padding: 16px 18px;
  margin: 20px 0; font-size: 14px; line-height: 1.65;
}
.r-callout-label {
  font-weight: 700; font-size: 11.5px; letter-spacing: .06em;
  text-transform: uppercase; color: var(--brand); margin-bottom: 6px;
}
.r-box {
  background: var(--surface2);
  border-radius: var(--r2);
  padding: 20px; margin: 20px 0;
}
.r-box-title { font-weight: 700; font-size: 14px; margin-bottom: 10px; }

.r-cta {
  background: linear-gradient(135deg, var(--brand) 0%, var(--brand-mid) 100%);
  border-radius: var(--r);
  padding: 22px 26px; margin: 32px 0;
  display: flex; align-items: center; gap: 18px;
}
.r-cta-icon {
  width: 48px; height: 48px; border-radius: 14px;
  background: rgba(255,255,255,.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: white; flex-shrink: 0;
}
.r-cta-body { flex: 1; }
.r-cta-title { font-size: 15px; font-weight: 700; color: white; margin-bottom: 3px; }
.r-cta-sub { font-size: 13px; color: rgba(255,255,255,.72); }
.r-cta-btn {
  background: white; color: var(--brand);
  padding: 10px 20px; border-radius: 20px;
  font-weight: 700; font-size: 13px;
  border: none; cursor: pointer; font-family: var(--font);
  white-space: nowrap; flex-shrink: 0;
  transition: background .15s;
}
.r-cta-btn:hover { background: var(--surface2); }

.share-row {
  display: flex; align-items: center; gap: 10px;
  margin-top: 40px; padding-top: 20px;
  border-top: 1px solid var(--border);
}
.share-label { font-size: 13px; color: var(--text2); font-weight: 500; }
.share-btn {
  width: 36px; height: 36px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; color: var(--text2);
  transition: background .15s, color .15s;
}
.share-btn:hover { background: var(--surface2); color: var(--text); }

/* ── RELATED ARTICLES ─────────────────────────────────────────────── */
.related-title {
  font-size: 15px; font-weight: 700; color: var(--text);
  margin: 40px 0 16px;
  display: flex; align-items: center; gap: 8px;
}
.related-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.related-card {
  border: 1px solid var(--border); border-radius: var(--r2);
  overflow: hidden; cursor: pointer;
  transition: box-shadow .2s, transform .2s;
  display: flex;
}
.related-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
.related-thumb {
  width: 72px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: rgba(255,255,255,.8);
}
.related-body { padding: 10px 12px; }
.related-cat { margin-bottom: 4px; }
.related-t {
  font-size: 12.5px; font-weight: 600; color: var(--text);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  line-height: 1.4;
}

/* ── RESPONSIVE ──────────────────────────────────────────────────── */
@media (max-width: 1024px) {
  .hero { grid-template-columns: 1fr 280px; }
  .art-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .hero { grid-template-columns: 1fr; }
  .hero-stack { flex-direction: row; overflow-x: auto; gap: 12px; padding-bottom: 4px; }
  .hero-card { min-width: 260px; }
  .art-grid { grid-template-columns: 1fr; }
  .page-wrap { padding: 20px 16px 60px; }
  .search-input { width: 140px; }
  .r-body { padding: 24px 24px 64px; }
  .r-title { font-size: 22px; }
  .hero-title { font-size: 20px; }
  .related-grid { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
  .search-input { display: none; }
  .r-body { padding: 20px 16px 64px; }
  .r-cta { flex-direction: column; align-items: flex-start; }
}
.hidden { display: none !important; }
@media (prefers-reduced-motion: reduce) { .ticker-track { animation: none; } }
</style>
</head>
<body>

<!-- TICKER -->
<div class="ticker-wrap" aria-label="Tin tức nổi bật">
  <div class="ticker-label">
    <i class="ti ti-speakerphone"></i> HOT
  </div>
  <div class="ticker-track-wrap">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>
</div>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <a class="logo" href="#" aria-label="MoMo trang chủ">
      <div class="logo-mark">M</div>
      <span class="logo-text">MoMo</span>
      <div class="logo-divider"></div>
      <span class="logo-section">Tin tức &amp; Ưu đãi</span>
    </a>
    <nav class="header-nav" aria-label="Danh mục bài viết">
      <button class="nav-btn active" onclick="filterBy('all')">Tất cả</button>

/* ─── STATE ─────────────────────────────────────────────────────────────── */
const state = {
  filter: 'all',
  query: '',
  saved: new Set(),
  currentId: null,
  visible: 9,
};

/* ─── HELPERS ────────────────────────────────────────────────────────────── */
function fmtDate(d) {
  return new Date(d).toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric' });
}
function randomViews() {
  return (Math.floor(Math.random()*9+1) + '.' + Math.floor(Math.random()*9)) + 'K';
}

/* ─── TICKER ─────────────────────────────────────────────────────────────── */
(function buildTicker() {
  const items = [...TICKER, ...TICKER];
  document.getElementById('tickerTrack').innerHTML = items.map(i =>
    `<span class="ticker-item">${i.icon} ${i.text}</span><span class="ticker-sep">•</span>`
  ).join('');
})();

/* ─── HERO ───────────────────────────────────────────────────────────────── */
function buildHero() {
  const featured = ARTICLES.find(a => a.featured) || ARTICLES[0];
  const stack = ARTICLES.filter(a => a.id !== featured.id).slice(0, 3);

  document.getElementById('heroFeatured').innerHTML = `
    <div class="hero-featured" onclick="openArticle('${featured.id}')" role="button" tabindex="0" aria-label="${featured.title}">
      <div class="hero-thumb" style="background:${featured.grad};">
        <span style="font-size:72px;">${featured.icon}</span>
      </div>
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <span class="cat-tag cat-${featured.cat}">${CATS[featured.cat].label}</span>
        <div class="hero-title">${featured.title}</div>
        <div class="hero-meta">
          <span><i class="ti ti-calendar"></i> ${fmtDate(featured.date)}</span>
          <span><i class="ti ti-clock"></i> ${featured.readTime} phút đọc</span>
        </div>
      </div>
    </div>`;

  document.getElementById('heroStack').innerHTML = stack.map(a => `
    <div class="hero-card" onclick="openArticle('${a.id}')" role="button" tabindex="0" aria-label="${a.title}">
      <div class="hc-thumb" style="background:${a.grad};">${a.icon}</div>
      <div class="hc-body">
        <div class="hc-meta">
          <span class="cat-tag-soft cat-${a.cat}-soft">${CATS[a.cat].label}</span>
        </div>
        <div class="hc-title">${a.title}</div>
        <div class="hc-date"><i class="ti ti-calendar"></i> ${fmtDate(a.date)}</div>
      </div>
    </div>`).join('');
}

/* ─── GRID ───────────────────────────────────────────────────────────────── */
function getFiltered() {
  let list = ARTICLES;
  if (state.filter !== 'all') list = list.filter(a => a.cat === state.filter);
  if (state.query) {
    const q = state.query.toLowerCase();
    list = list.filter(a => a.title.toLowerCase().includes(q) || a.excerpt.toLowerCase().includes(q));
  }
  return list;
}

function renderGrid() {
  const filtered = getFiltered();
  const shown = filtered.slice(0, state.visible);
  const grid = document.getElementById('artGrid');
  const secTitle = document.getElementById('sectionTitle');
  const artCount = document.getElementById('artCount');
  const loadMore = document.getElementById('loadMoreWrap');
  const hero = document.getElementById('heroSection');

  secTitle.textContent = CATS[state.filter].label + (state.query ? ` — "${state.query}"` : '');
  artCount.textContent = `${filtered.length} bài viết`;
  hero.classList.toggle('hidden', state.filter !== 'all' || !!state.query);

  if (shown.length === 0) {
    grid.innerHTML = `<div class="empty-state"><i class="ti ti-search-off"></i><h3>Không tìm thấy bài viết phù hợp</h3><p>Thử từ khóa khác hoặc chọn danh mục khác</p></div>`;
    loadMore.classList.add('hidden');
    return;
  }

  grid.innerHTML = shown.map(a => `
    <article class="art-card" onclick="openArticle('${a.id}')" role="listitem" tabindex="0" aria-label="${a.title}">
      <div class="art-thumb" style="background:${a.grad};">
        <span>${a.icon}</span>
        <div class="thumb-shine"></div>
      </div>
      <div class="art-body">
        <div class="art-top">
          <span class="cat-tag-soft cat-${a.cat}-soft">${CATS[a.cat].label}</span>
          <span class="art-date">${fmtDate(a.date)}</span>
        </div>
        <div class="art-title">${a.title}</div>
        <div class="art-excerpt">${a.excerpt}</div>
        <div class="art-footer">
          <span class="read-time"><i class="ti ti-clock"></i> ${a.readTime} phút</span>
          <span class="read-more">Đọc tiếp <i class="ti ti-arrow-right"></i></span>
        </div>
      </div>
    </article>`).join('');

  loadMore.classList.toggle('hidden', filtered.length <= state.visible);
}

/* ─── FILTERS ────────────────────────────────────────────────────────────── */
function filterBy(cat) {
  state.filter = cat;
  state.visible = 9;
  document.querySelectorAll('.nav-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['all','promo','news','event','guide','finance'][i] === cat);
  });
  renderGrid();
}

function searchBy(q) {
  state.query = q.trim();
  state.visible = 9;
  renderGrid();
}

function loadMore() {
  state.visible += 6;
  renderGrid();
}

/* ─── READER ─────────────────────────────────────────────────────────────── */
function openArticle(id) {
  const a = ARTICLES.find(x => x.id === id);
  if (!a) return;
  state.currentId = id;

  const related = ARTICLES.filter(x => x.id !== id && x.cat === a.cat).slice(0, 4);

  document.getElementById('readerTitle').textContent = a.title;
  document.getElementById('readerBody').innerHTML = `
    <div class="r-hero" style="background:${a.grad};">
      <span>${a.icon}</span>
      <div class="r-shine"></div>
    </div>
    <div class="r-body">
      <div class="r-meta-row">
        <span class="cat-tag cat-${a.cat}">${CATS[a.cat].label}</span>
        <span class="r-meta-item"><i class="ti ti-calendar"></i> ${fmtDate(a.date)}</span>
        <span class="r-meta-item"><i class="ti ti-clock"></i> ${a.readTime} phút đọc</span>
        <span class="r-meta-item"><i class="ti ti-eye"></i> ${randomViews()} lượt xem</span>
      </div>
      <h1 class="r-title">${a.title}</h1>
      <p class="r-lead">${a.lead}</p>
      <div class="r-content">${a.content}</div>
      ${a.cta ? `<div class="r-cta">
        <div class="r-cta-icon"><i class="ti ${a.cta.icon}"></i></div>
        <div class="r-cta-body">
          <div class="r-cta-title">${a.cta.title}</div>
          <div class="r-cta-sub">${a.cta.sub}</div>
        </div>
        <button class="r-cta-btn">${a.cta.btn}</button>
      </div>` : ''}
      ${related.length ? `
      <div class="related-title"><i class="ti ti-articles" style="color:var(--brand);"></i> Bài viết liên quan</div>
      <div class="related-grid">${related.map(r => `
        <div class="related-card" onclick="openArticle('${r.id}')">
          <div class="related-thumb" style="background:${r.grad};">${r.icon}</div>
          <div class="related-body">
            <div class="related-cat"><span class="cat-tag-soft cat-${r.cat}-soft">${CATS[r.cat].label}</span></div>
            <div class="related-t">${r.title}</div>
          </div>
        </div>`).join('')}
      </div>` : ''}
      <div class="share-row">
        <span class="share-label">Chia sẻ:</span>
        <button class="share-btn" title="Facebook"><i class="ti ti-brand-facebook"></i></button>
        <button class="share-btn" title="Zalo"><i class="ti ti-message-circle"></i></button>
        <button class="share-btn" title="X/Twitter"><i class="ti ti-brand-x"></i></button>
        <button class="share-btn" onclick="copyLink(this)" title="Sao chép link"><i class="ti ti-link"></i></button>
      </div>
    </div>`;

  document.getElementById('readerOverlay').classList.add('open');
  document.getElementById('readerPanel').scrollTop = 0;
  document.body.style.overflow = 'hidden';
  syncSaveBtn();
}

function closeReader() {
  document.getElementById('readerOverlay').classList.remove('open');
  document.body.style.overflow = '';
  state.currentId = null;
}

function toggleReaderSave() {
  if (!state.currentId) return;
  if (state.saved.has(state.currentId)) state.saved.delete(state.currentId);
  else state.saved.add(state.currentId);
  syncSaveBtn();
}

function syncSaveBtn() {
  const btn = document.getElementById('readerSaveBtn');
  if (!btn || !state.currentId) return;
  const saved = state.saved.has(state.currentId);
  btn.classList.toggle('saved', saved);
  btn.innerHTML = saved ? '<i class="ti ti-bookmark-filled"></i>' : '<i class="ti ti-bookmark"></i>';
}

function toggleSaved() {
  const btn = document.getElementById('saveBtn');
  btn.classList.toggle('saved');
}

function shareArticle() {
  const a = ARTICLES.find(x => x.id === state.currentId);
  if (!a) return;
  if (navigator.share) navigator.share({ title: a.title, text: a.excerpt, url: window.location.href });
  else copyLink();
}

function copyLink(btn) {
  navigator.clipboard?.writeText(window.location.href).then(() => {
    if (btn) { btn.innerHTML = '<i class="ti ti-check"></i>'; setTimeout(() => btn.innerHTML = '<i class="ti ti-link"></i>', 1800); }
  });
}

/* ─── KEYBOARD ────────────────────────────────────────────────────────────── */
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeReader(); });

/* ─── INIT ───────────────────────────────────────────────────────────────── */
buildHero();
renderGrid();
</script>
</body>
</html>
