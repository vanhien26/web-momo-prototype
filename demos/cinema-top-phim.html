<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#EB2F96;--pink-50:#fdf2f8;
  --gray-900:#111827;--gray-600:#4b5563;--gray-500:#6b7280;
  --gray-400:#9ca3af;--gray-300:#d1d5db;--gray-200:#e5e7eb;--gray-100:#f3f4f6;--gray-50:#f9fafb;
  --white:#fff;--gold:#f59e0b;
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;
  --shadow-s:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-m:0 4px 16px rgba(0,0,0,.1);
}
body{font-family:'Be Vietnam Pro','Helvetica Neue',sans-serif;background:var(--gray-50);color:var(--gray-900);min-height:100vh}
.nav{background:#fff;border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:100}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;gap:20px}
.nav-links{display:flex;gap:2px}
.nav-link{font-family:inherit;font-size:14px;font-weight:700;color:var(--gray-600);background:none;border:none;cursor:pointer;padding:6px 12px;border-radius:var(--r-sm);transition:.15s}
.nav-link:hover{background:var(--gray-100);color:var(--gray-900)}
.nav-link.on{color:var(--pink)}
.nav-search-wrap{margin-left:auto;background:var(--gray-100);border-radius:20px;padding:7px 14px;display:flex;align-items:center;gap:8px}
.nav-search-wrap input{background:none;border:none;outline:none;font-size:13px;font-family:inherit;color:var(--gray-900);width:160px}
@media(max-width:768px){.nav-links,.nav-search-wrap{display:none}}

.hero{background:var(--white);border-bottom:1px solid var(--gray-200);padding:24px 20px 20px}
.hero-inner{max-width:1100px;margin:0 auto}
.hero-eyebrow{font-size:11px;font-weight:700;color:var(--pink);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.hero-title{font-size:28px;font-weight:900;margin-bottom:8px;line-height:1.15}
.hero-sub{font-size:14px;color:var(--gray-500);line-height:1.6;max-width:64ch}

.main{max-width:1100px;margin:0 auto;padding:22px 20px 56px;display:flex;flex-direction:column;gap:22px}
.section-label{font-size:11px;font-weight:800;color:var(--gray-400);text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px}
.col-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}

/* CARD chung */
.col-card{background:var(--white);border-radius:var(--r-xl);box-shadow:var(--shadow-s);border:1px solid var(--gray-200);overflow:hidden;cursor:pointer;transition:box-shadow .18s,transform .15s;text-decoration:none;display:block;color:inherit}
.col-card:hover{box-shadow:var(--shadow-m);transform:translateY(-2px)}
.col-card-header{padding:16px 18px;display:flex;align-items:center;gap:12px}
.col-icon{font-size:30px;line-height:1;flex-shrink:0;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-lg);background:var(--gray-50)}
.col-icon.emoji{font-size:26px}
.col-icon svg{flex-shrink:0}
.col-meta{flex:1;min-width:0}
.col-name{font-size:15px;font-weight:900;margin-bottom:2px}
.col-arrow{color:var(--gray-400);flex-shrink:0;transition:.15s}
.col-card:hover .col-arrow{color:var(--pink);transform:translateX(3px)}
.col-footer{padding:0 18px 16px}
.col-cta{font-size:12px;font-weight:800;color:var(--pink);display:flex;align-items:center;gap:4px}

/* accent colors per section */
.col-icon.indigo{background:#eef2ff;color:#6366f1}
.col-icon.amber{background:#fef3c7;color:#d97706}
.col-icon.green{background:#dcfce7;color:#16a34a}
.col-icon.rose{background:#ffe4e6;color:#e11d48}
.col-icon.purple{background:#f3e8ff;color:#9333ea}
.col-icon.sky{background:#e0f2fe;color:#0284c7}

/* COUNTRY GRID — Theo Quốc Gia */
.country-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:2px;background:var(--gray-200);border-radius:var(--r-xl);overflow:hidden;border:1px solid var(--gray-200)}
.cc{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;text-decoration:none;color:inherit;background:var(--white);transition:background .13s}
.cc:hover{background:var(--gray-50)}
.cc-left{display:flex;flex-direction:column;gap:3px;min-width:0}
.cc-name{font-size:14px;font-weight:800;color:var(--gray-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-desc{font-size:11px;color:var(--gray-400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-arrow{color:var(--gray-300);flex-shrink:0;transition:color .13s,transform .13s}
.cc:hover .cc-arrow{color:var(--pink);transform:translateX(2px)}

@media(max-width:600px){.col-grid{grid-template-columns:1fr}body{padding-bottom:72px}}
.mobile-bnav{display:none}
@media(max-width:768px){
  .mobile-bnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--gray-200);padding:6px 0 env(safe-area-inset-bottom,8px);z-index:200}
  .mbn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:var(--gray-400);font-size:10px;font-weight:700;padding:4px 0}
  .mbn-item.on{color:var(--pink)}
}
</style>
</head>

// ── FILTER LOGIC ─────────────────────────────────────────────────────────
const ASIA_COUNTRIES = new Set(['kr','jp','cn','vn','th','in','tw','id','ph','sg','my']);

function applyFilter(films, filter){
  return films.filter(f=>{
    if(filter.continent === 'asia' && f.type !== 'series') return false;
    if(filter.continent === 'asia' && !ASIA_COUNTRIES.has(f.country)) return false;
    if(filter.country && f.country !== filter.country) return false;
    if(filter.genre   && !(f.genres||[]).includes(filter.genre)) return false;
    if(filter.type    && f.type !== filter.type) return false;
    if(filter.before  && (f.year||9999) >= filter.before) return false;
    if(filter.from    && (f.year||0) < filter.from) return false;
    return true;
  }).sort((a,b)=>b.score-a.score);
}
