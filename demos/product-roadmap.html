<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Product Roadmap 2026 — Web Platform</title>
<meta name="description" content="Roadmap các dự án Web Platform trong năm 2026, theo từng giai đoạn H1/H2.">
<link rel="shortcut icon" type="image/svg+xml" href="https://homepage.momocdn.net/fileuploads/svg/momo-file-240411162904.svg">
<link rel="stylesheet" href="../assets/mobase-tokens.css">
<style>
* , *::before, *::after { box-sizing: border-box; }
body { margin: 0; background: var(--white); color: var(--ink); font-family: 'MoMoTrustSans', -apple-system, BlinkMacSystemFont, sans-serif; }
h1, h2, h3 { font-family: 'MoMoTrustDisplay', 'MoMoTrustSans', sans-serif; }
a { color: inherit; }

/* ─── Page shell ─────────────────────────────────────────── */
.pr-topbar {
  height: 60px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px;
  position: sticky; top: 0; background: var(--white); z-index: 10;
}
.pr-back {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 700; color: var(--muted);
  text-decoration: none; transition: color .12s;
}
.pr-back:hover { color: var(--momo); }
.pr-brand {
  display: flex; align-items: center;
  background: #050505; border-radius: 10px;
  padding: 7px 11px;
  box-shadow: 0 6px 16px rgba(16,24,40,.16);
}
.pr-brand img { height: 16px; width: auto; display: block; }
.pr-container { max-width: 1080px; margin: 0 auto; }

/* Astryx-inspired soft elevation scale, scoped to this page only */
:root {
  --rm-shadow-low: 0px 1px 1px rgba(16,24,40,.08), 0px 2px 8px rgba(16,24,40,.06);
  --rm-radius-container: 12px;
}

/* ─── Roadmap 2026 ───────────────────────────────────────── */
.rm-roadmap { padding: 40px 28px 80px; background: var(--grey-50); min-height: calc(100vh - 60px); }
.rm-roadmap-head { max-width: 1080px; margin: 0 auto 28px; }
.rm-kicker {
  margin: 0 0 4px;
  font-size: 11px; font-weight: 800; letter-spacing: .1em;
  text-transform: uppercase; color: var(--momo);
}
.rm-roadmap-title { margin: 0 0 6px; font-size: clamp(24px, 2.6vw, 32px); font-weight: 800; letter-spacing: -.4px; }
.rm-roadmap-sub { margin: 0; font-size: 13px; color: var(--muted); }

/* Track — vertical timeline (spine + stop node per phase) */
.rm-track { position: relative; max-width: 1080px; margin: 0 auto; }
.rm-stop { position: relative; padding-left: 44px; padding-bottom: 32px; }
.rm-stop::before {
  content: ''; position: absolute; left: 7px; top: 6px; bottom: -12px;
  width: 2px; background: var(--line);
}
.rm-stop:last-child { padding-bottom: 0; }
.rm-stop:last-child::before { display: none; }
.rm-stop-node {
  position: absolute; left: 0; top: 2px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--momo); border: 3px solid var(--white);
  box-shadow: 0 0 0 1.5px var(--momo);
}
.rm-stop-future::before { background: repeating-linear-gradient(180deg, var(--grey-300) 0 6px, transparent 6px 12px); }
.rm-stop-future .rm-stop-node { background: var(--white); box-shadow: 0 0 0 1.5px var(--grey-300); }
.rm-stop-placeholder { margin: 8px 0 0; font-size: 12.5px; color: var(--muted); font-style: italic; }

/* Phase */
.rm-phase-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.rm-phase-tag { font-size: 10px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; color: var(--momo); }
.rm-phase-tag-future { color: var(--muted); }
.rm-phase-status { display: flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 700; color: #15803d; }
.rm-phase-status::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: #12b76a; box-shadow: 0 0 0 3px #d1fadf; display: inline-block;
}
.rm-phase-title { margin: 0 0 6px; font-size: 20px; font-weight: 800; letter-spacing: -.3px; color: var(--ink); }
.rm-phase-summary { margin: 0 0 18px; max-width: 76ch; font-size: 12.5px; line-height: 1.6; color: var(--muted); }

/* Module grid */
.rm-module-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 10px; }
.rm-module-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--rm-radius-container);
  box-shadow: var(--rm-shadow-low);
  padding: 14px;
  display: flex; flex-direction: column; gap: 6px;
}
.rm-module-name { margin: 0; font-size: 13px; font-weight: 800; line-height: 1.3; color: var(--ink); }
.rm-module-preview { margin: 0; font-size: 11.5px; line-height: 1.5; color: var(--muted); flex: 1; }
.rm-module-full { display: none; margin: 0; font-size: 11.5px; line-height: 1.6; color: var(--muted); }
.rm-module-card.expanded .rm-module-preview { display: none; }
.rm-module-card.expanded .rm-module-full { display: block; }
.rm-module-toggle {
  align-self: flex-start; margin-top: 4px;
  border: 0; background: transparent; padding: 0;
  font-size: 10.5px; font-weight: 800; color: var(--momo);
  display: flex; align-items: center; gap: 4px; cursor: pointer;
}
.rm-module-toggle-icon { font-size: 10px; }

@media (max-width: 1000px) {
  .rm-module-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
}
@media (max-width: 640px) {
  .rm-roadmap { padding: 24px 16px 48px; }
  .rm-module-grid { grid-template-columns: 1fr 1fr; }
  .rm-stop { padding-left: 32px; }
  .rm-stop-node { width: 13px; height: 13px; }
}
</style>
</head>
<body>

<div class="pr-topbar">
  <a class="pr-back" href="/">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Trang chủ
  </a>
  <div class="pr-brand">
    <img src="https://static.momocdn.net/app/img/web-platform/logo-mospark-dark.svg" alt="MoSpark">
  </div>
</div>

<section class="rm-roadmap">
  <div class="rm-roadmap-head">
    <p class="rm-kicker">Roadmap 2026</p>
    <h1 class="rm-roadmap-title">Product Roadmap — Web Platform</h1>
    <p class="rm-roadmap-sub">Các dự án Web Platform theo từng giai đoạn trong năm.</p>
  </div>
  <div class="rm-track" id="rmTrack"></div>
</section>

<script>
const ROADMAP_PHASES = [
  {
    period: 'H1/2026',
    phase: 'Phase 1',
    status: 'done',
    title: 'Foundation & Core Builders',
    summary: 'Giai đoạn này tập trung vào việc xây dựng hạ tầng cơ bản, các công cụ khởi tạo Landing Page, Blog Editor, quản lý Keyword và đồng bộ dữ liệu Merchant.',
    modules: [
      {
        name: 'GenAI Content Engine',
        preview: 'Viết bài bằng API Claude, tự đo Token và chi phí tạo bài.',
        desc: 'Tích hợp API Claude viết bài (Outline & Detail Blog); tự động đo lường và hiển thị lượng Input/Output Tokens cũng như chi phí tạo bài viết.',
      },
      {
        name: 'PLG Project Management',
        preview: 'Quản lý campaign tăng trưởng, tự động chia cụm Keyword từ CSV.',
        desc: 'Nơi quản lý các chiến dịch tăng trưởng (Phạt nguội làm pilot). Hỗ trợ upload tệp CSV Keyword Research để tự động chia cụm Theme/Cluster kèm Volume Search và trạng thái bài viết (Chưa viết, Đã duyệt outline, Đã xuất bản). Sync trực tiếp với Blog Editor của Microsite.',
      },
      {
        name: 'Merchant Page O2O Database',
        preview: 'Đồng bộ 200K+ Merchant, GenAI tự cào dữ liệu và viết bài.',
        desc: 'Đồng bộ 200K+ Merchant MoMo (Ví Trả Sau). Đã hoàn thiện luồng: Khởi tạo Merchant -> Map M4B ID -> Check OA (MoMo Review, Ảnh) -> GenAI tự cào dữ liệu Google Maps, viết bài, gen ảnh theo template -> Merchant Editor (sẵn sàng xuất bản).',
      },
      {
        name: 'Microsite Builder',
        preview: 'Quản lý cấu trúc trang bằng Puck Editor, SEO, robots.txt, Umami.',
        desc: 'Quản lý cấu trúc trang, chỉnh sửa chi tiết từng trang bằng Puck Editor, tối ưu SEO, hỗ trợ robots.txt, llms.txt, blog của dự án, và tích hợp Umami Tracking trực tiếp trên Dashboard.',
      },
      {
        name: 'SEO Inventory Foundation',
        preview: 'Dashboard Market Cap theo Division/Use Case, ràng buộc link PLG Project.',
        desc: 'Dashboard tổng quan Market Cap của từng Division theo từng Use Case (Service). Ràng buộc chặt chẽ: khi tạo PLG Project bắt buộc phải link với Microsite và SEO Inventory tương ứng.',
      },
      {
        name: 'Blog Editor (Tiptap CRUD)',
        preview: 'Quản trị bài viết Tiptap, tự sync Keyword/Metadata từ PLG Project.',
        desc: 'Trang quản trị bài viết sử dụng Tiptap. Tự động đồng bộ Primary/Secondary Keywords và Metadata từ PLG Project. Upload Thumbnail & Social Share theo template riêng. Tích hợp AI Performance Dashboard đo chi phí và thời gian tạo bài viết.',
      },
      {
        name: 'Landing Page Builder',
        preview: 'Tạo LP bằng Prompt Gemini, kéo thả Puck Editor theo Mobase.',
        desc: 'Tạo LP bằng Prompt (Gemini), chọn template hoặc tạo từ blank. Tích hợp Puck Editor để kéo thả trực quan các block theo Mobase Design System, chia sẻ cho các Cell Teams sử dụng độc lập và đo lường bằng Umami.',
      },
      {
        name: 'Chatbot & Knowledge Base',
        preview: 'RAG từ bài viết PLG Project, kịch bản chatbot qua Typebot.',
        desc: 'UI/UX Chatbot tùy biến giao diện. Quản lý KB bằng cách cào bài viết dự án PLG đổi sang vector và chạy RAG. Tích hợp Typebot để tạo kịch bản chatbot.',
      },
      {
        name: 'Ads Manager',
        preview: 'Tạo Ads (Float/Balloon/Popup), quản lý Campaign kèm Umami tracking.',
        desc: 'Quản trị và tạo Ads (Float, Balloon, Popup). Quản lý Ads Campaign, Campaign Group và Ad Items kèm Umami tracking.',
      },
      {
        name: 'Utilities Tool',
        preview: 'Calculator/Checker code tay chuẩn Mobase, nhúng qua Shortcode.',
        desc: 'Quản lý các tiện ích (Calculator, Checker...) được tạo bằng Code tay (Hard code) chuẩn Mobase, hỗ trợ cấu hình CTA đơn giản và nhúng qua Shortcode vào Blog/Mini Web.',
      },
    ],
  },
  // Phase 2 (H2/2026) sẽ thêm vào đây khi có nội dung
];

function buildRoadmap() {
  const stops = ROADMAP_PHASES.map(p => `
    <div class="rm-stop rm-stop-${p.status}">
      <span class="rm-stop-node"></span>
      <div class="rm-stop-content">
        <div class="rm-phase-head">
          <span class="rm-phase-tag">${p.phase} · ${p.period}</span>
          <span class="rm-phase-status rm-phase-status-${p.status}">${p.status === 'done' ? 'Đã hoàn thành' : p.status}</span>
        </div>
        <h2 class="rm-phase-title">${p.title}</h2>
        <p class="rm-phase-summary">${p.summary}</p>
        <div class="rm-module-grid">
          ${p.modules.map((m, i) => `
            <article class="rm-module-card" data-rm-module="${p.period}-${i}">
              <h3 class="rm-module-name">${m.name}</h3>
              <p class="rm-module-preview">${m.preview}</p>
              <p class="rm-module-full">${m.desc}</p>
              <button type="button" class="rm-module-toggle">Xem chi tiết <span class="rm-module-toggle-icon">↓</span></button>
            </article>`).join('')}
        </div>
      </div>
    </div>`).join('') + `
    <div class="rm-stop rm-stop-future">
      <span class="rm-stop-node"></span>
      <div class="rm-stop-content">
        <span class="rm-phase-tag rm-phase-tag-future">Phase 2 · H2/2026</span>
        <p class="rm-stop-placeholder">Nội dung đang được lên kế hoạch.</p>
      </div>
    </div>`;

  document.getElementById('rmTrack').innerHTML = stops;

  document.querySelectorAll('.rm-module-card').forEach(card => {
    const toggle = () => {
      const open = card.classList.toggle('expanded');
      const btn = card.querySelector('.rm-module-toggle');
      if (btn) btn.innerHTML = open ? 'Thu gọn <span class="rm-module-toggle-icon">↑</span>' : 'Xem chi tiết <span class="rm-module-toggle-icon">↓</span>';
    };
    card.querySelector('.rm-module-toggle')?.addEventListener('click', toggle);
  });
}

buildRoadmap();
</script>
</body>
</html>
