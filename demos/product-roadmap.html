<style>
* , *::before, *::after { box-sizing: border-box; }
body { margin: 0; background: var(--white); color: var(--ink); font-family: 'MoMoTrustSans', -apple-system, BlinkMacSystemFont, sans-serif; }
h1, h2, h3 { font-family: 'MoMoTrustDisplay', 'MoMoTrustSans', sans-serif; }
a { color: inherit; }

/* ─── Page shell ─────────────────────────────────────────── */
.pr-topbar {
  height: 60px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px;
  position: sticky; top: 0; background: var(--white); z-index: 10;
}
.pr-back {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 700; color: var(--muted);
  text-decoration: none; transition: color .12s;
}
.pr-back:hover { color: var(--momo); }
.pr-brand {
  display: flex; align-items: center;
  background: #050505; border-radius: 10px;
  padding: 7px 11px;
  box-shadow: 0 6px 16px rgba(16,24,40,.16);
}
.pr-brand img { height: 16px; width: auto; display: block; }
.pr-container { max-width: 1080px; margin: 0 auto; }

/* Astryx-inspired soft elevation scale, scoped to this page only */
:root {
  --rm-shadow-low: 0px 1px 1px rgba(16,24,40,.08), 0px 2px 8px rgba(16,24,40,.06);
  --rm-radius-container: 12px;
}

/* ─── Roadmap 2026 ───────────────────────────────────────── */
.rm-roadmap { padding: 40px 28px 80px; background: var(--grey-50); min-height: calc(100vh - 60px); }
.rm-roadmap-head { max-width: 1080px; margin: 0 auto 28px; }
.rm-kicker {
  margin: 0 0 4px;
  font-size: 11px; font-weight: 800; letter-spacing: .1em;
  text-transform: uppercase; color: var(--momo);
}
.rm-roadmap-title { margin: 0 0 6px; font-size: clamp(24px, 2.6vw, 32px); font-weight: 800; letter-spacing: -.4px; }
.rm-roadmap-sub { margin: 0; font-size: 13px; color: var(--muted); }

/* Track — vertical timeline (spine + stop node per phase) */
.rm-track { position: relative; max-width: 1080px; margin: 0 auto; }
.rm-stop { position: relative; padding-left: 44px; padding-bottom: 32px; }
.rm-stop::before {
  content: ''; position: absolute; left: 7px; top: 6px; bottom: -12px;
  width: 2px; background: var(--line);
}
.rm-stop:last-child { padding-bottom: 0; }
.rm-stop:last-child::before { display: none; }
.rm-stop-node {
  position: absolute; left: 0; top: 2px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--momo); border: 3px solid var(--white);
  box-shadow: 0 0 0 1.5px var(--momo);
}
.rm-stop-future::before { background: repeating-linear-gradient(180deg, var(--grey-300) 0 6px, transparent 6px 12px); }
.rm-stop-future .rm-stop-node { background: var(--white); box-shadow: 0 0 0 1.5px var(--grey-300); }
.rm-stop-placeholder { margin: 8px 0 0; font-size: 12.5px; color: var(--muted); font-style: italic; }

/* Phase */
.rm-phase-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.rm-phase-tag { font-size: 10px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; color: var(--momo); }
.rm-phase-tag-future { color: var(--muted); }
.rm-phase-status { display: flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 700; }
.rm-phase-status::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%; display: inline-block;
}
.rm-phase-status-done { color: #15803d; }
.rm-phase-status-done::before { background: #12b76a; box-shadow: 0 0 0 3px #d1fadf; }
.rm-phase-status-in-progress { color: #b54708; }
.rm-phase-status-in-progress::before { background: #f79009; box-shadow: 0 0 0 3px #fef0c7; }
.rm-phase-title { margin: 0 0 6px; font-size: 20px; font-weight: 800; letter-spacing: -.3px; color: var(--ink); }
.rm-phase-summary { margin: 0 0 18px; max-width: 76ch; font-size: 12.5px; line-height: 1.6; color: var(--muted); }

/* Milestones — each project is a node on its own vertical bar, detail unfolds to the right */
.rm-milestones { display: flex; align-items: flex-start; gap: 28px; }
.rm-milestone-rail {
  flex: 0 0 220px;
  display: flex; flex-direction: column;
}
.rm-milestone {
  position: relative;
  display: flex; align-items: center; gap: 10px;
  padding: 8px 4px 20px 4px;
  border: 0; background: transparent;
  text-align: left; cursor: pointer;
}
.rm-milestone::before {
  content: '';
  position: absolute; left: 13px; top: 26px; bottom: -4px;
  width: 2px; background: var(--line);
}
.rm-milestone:last-child { padding-bottom: 8px; }
.rm-milestone:last-child::before { display: none; }
.rm-milestone-node {
  flex: none;
  width: 18px; height: 18px; border-radius: 50%;
  display: grid; place-items: center;
  background: var(--white); border: 2px solid var(--grey-300);
  font-size: 10px; font-weight: 900; line-height: 1;
  transition: background .15s, border-color .15s, box-shadow .15s;
}
.rm-milestone-label {
  font: 700 12.5px 'MoMoTrustSans', sans-serif; color: var(--ink);
  transition: color .15s;
}
.rm-milestone:hover .rm-milestone-node { border-color: var(--momo); }
.rm-milestone.active .rm-milestone-node { background: var(--momo); border-color: var(--momo); }
.rm-milestone.active .rm-milestone-node::after { color: #fff; }
.rm-milestone.active .rm-milestone-label { color: var(--momo); }

/* Achieved goals — phase status "done" gets a checked-off look by default */
.rm-milestone-rail[data-status="done"] .rm-milestone::before { background: var(--pink-100); }
.rm-milestone-rail[data-status="done"] .rm-milestone-node {
  background: var(--pink-50);
  border-color: var(--pink-200);
}
.rm-milestone-rail[data-status="done"] .rm-milestone-node::after {
  content: '✓'; color: var(--momo);
}
.rm-milestone-rail[data-status="done"] .rm-milestone:hover .rm-milestone-node { border-color: var(--momo); }
.rm-milestone-rail[data-status="done"] .rm-milestone.active .rm-milestone-node { background: var(--momo); border-color: var(--momo); }
.rm-milestone-rail[data-status="done"] .rm-milestone.active .rm-milestone-node::after { color: #fff; }

/* Detail panel — fills the right side when a milestone is clicked */
.rm-milestone-detail {
  flex: 1; min-width: 0;
  padding: 20px 22px;
  border: 1px solid var(--line);
  border-radius: var(--rm-radius-container);
  background: var(--white);
  box-shadow: var(--rm-shadow-low);
}
.rm-milestone-empty { margin: 0; font-size: 12.5px; color: var(--muted); font-style: italic; }
.rm-milestone-detail-name { margin: 0 0 12px; font-size: 15px; font-weight: 800; color: var(--ink); }
.rm-milestone-detail .rm-module-points { column-count: 2; column-gap: 28px; }

.rm-module-points {
  margin: 0; padding-left: 16px;
  font-size: 12px; line-height: 1.6; color: var(--muted);
}
.rm-module-points li { padding-left: 2px; margin-bottom: 8px; break-inside: avoid; }
.rm-module-points li:last-child { margin-bottom: 0; }
.rm-module-points strong { color: var(--ink); }

@media (max-width: 780px) {
  .rm-milestones { flex-direction: column; gap: 16px; }
  .rm-milestone-rail { flex: none; width: 100%; }
  .rm-milestone-detail .rm-module-points { column-count: 1; }
}
@media (max-width: 640px) {
  .rm-roadmap { padding: 24px 16px 48px; }
  .rm-stop { padding-left: 32px; }
  .rm-stop-node { width: 13px; height: 13px; }
}
</style>

const PHASE_STATUS_LABELS = {
  done: 'Đã hoàn thành',
  'in-progress': 'Đang triển khai',
  planned: 'Sắp triển khai',
};

function buildRoadmap() {
  const stops = ROADMAP_PHASES.map(p => `
    <div class="rm-stop rm-stop-${p.status}">
      <span class="rm-stop-node"></span>
      <div class="rm-stop-content">
        <div class="rm-phase-head">
          <span class="rm-phase-tag">${p.phase} · ${p.period}</span>
          <span class="rm-phase-status rm-phase-status-${p.status}">${PHASE_STATUS_LABELS[p.status] || p.status}</span>
        </div>
        <h2 class="rm-phase-title">${p.title}</h2>
        <p class="rm-phase-summary">${p.summary}</p>
        <div class="rm-milestones">
          <div class="rm-milestone-rail" data-phase="${p.period}" data-status="${p.status}">
            ${p.modules.map((m, i) => `
              <button type="button" class="rm-milestone" data-idx="${i}">
                <span class="rm-milestone-node"></span>
                <span class="rm-milestone-label">${m.name}</span>
              </button>`).join('')}
          </div>
          <div class="rm-milestone-detail" data-phase="${p.period}">
            <p class="rm-milestone-empty">Chọn một dự án bên trái để xem chi tiết.</p>
          </div>
        </div>
      </div>
    </div>`).join('');

  document.getElementById('rmTrack').innerHTML = stops;

  document.querySelectorAll('.rm-milestone-rail').forEach(rail => {
    const period = rail.dataset.phase;
    const phase = ROADMAP_PHASES.find(p => p.period === period);
    const detail = document.querySelector(`.rm-milestone-detail[data-phase="${period}"]`);
    const milestones = rail.querySelectorAll('.rm-milestone');
    const emptyHtml = '<p class="rm-milestone-empty">Chọn một dự án bên trái để xem chi tiết.</p>';

    milestones.forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = Number(btn.dataset.idx);
        const wasActive = btn.classList.contains('active');
        milestones.forEach(b => b.classList.remove('active'));

        if (wasActive) {
          detail.innerHTML = emptyHtml;
          return;
        }

        btn.classList.add('active');
        const m = phase.modules[idx];
        detail.innerHTML = `
          <h3 class="rm-milestone-detail-name">${m.name}</h3>
          <ul class="rm-module-points">
            ${m.points.map(pt => `<li><strong>${pt.title}:</strong> ${pt.desc}</li>`).join('')}
          </ul>`;
      });
    });
  });
}

buildRoadmap();
