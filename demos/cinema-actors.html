<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink-500:#EB2F96;--pink-50:#fdf2f8;--pink-100:#fce7f3;--pink-300:#f9a8d4;
  --gray-900:#111827;--gray-700:#374151;--gray-600:#4b5563;
  --gray-500:#6b7280;--gray-400:#9ca3af;--gray-300:#d1d5db;--gray-200:#e5e7eb;
  --gray-100:#f3f4f6;--gray-50:#f9fafb;--white:#fff;
  --shadow-s:0 1px 3px rgba(0,0,0,.08);
  --r-sm:8px;--r-lg:16px;--r-xl:20px;
}
body{font-family:'Be Vietnam Pro','Helvetica Neue',sans-serif;background:var(--gray-50);color:var(--gray-900);min-height:100vh}

/* NAV */
.nav{background:#fff;border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:100}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;gap:24px}
.nav-logo{display:flex;align-items:center;text-decoration:none}
.nav-links{display:flex;gap:4px}
.nav-link{font-family:inherit;font-size:14px;font-weight:700;color:var(--gray-600);background:none;border:none;cursor:pointer;padding:6px 12px;border-radius:var(--r-sm);transition:.15s}
.nav-link:hover{background:var(--gray-100);color:var(--gray-900)}
.nav-link.on{color:var(--pink-500)}
.nav-right{margin-left:auto;display:flex;align-items:center}
@media(max-width:768px){.nav-links{display:none}}

/* BREADCRUMB */
.breadcrumb-bar{background:#fff;border-bottom:1px solid var(--gray-100);padding:0 20px}
.breadcrumb-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:6px;height:37px;font-size:12px}
.bc-item{color:var(--gray-500);text-decoration:none}
.bc-item:hover{color:var(--pink-500)}
.bc-sep{color:var(--gray-300)}
.bc-current{color:var(--gray-900);font-weight:700}

/* PAGE HEADER */
.page-header{background:#fff;border-bottom:1px solid var(--gray-200);padding:24px 20px 20px}
.page-header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.page-title{font-size:26px;font-weight:800;color:var(--gray-900)}

/* FILTER BAR */
.filter-bar{background:#fff;border-bottom:1px solid var(--gray-200);padding:0 20px;position:sticky;top:56px;z-index:90}
.filter-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:4px;height:48px}
.ftab{font-family:inherit;font-size:13px;font-weight:700;color:var(--gray-500);background:none;border:none;cursor:pointer;padding:5px 14px;border-radius:var(--r-xl);white-space:nowrap;transition:.15s}
.ftab:hover{background:var(--gray-100);color:var(--gray-900)}
.ftab.on{background:var(--pink-50);color:var(--pink-500)}
.filter-count{margin-left:auto;font-size:12px;color:var(--gray-400);flex-shrink:0}

/* CONTENT */
.content{max-width:860px;margin:0 auto;padding:16px 20px 64px}

/* DIRECTORY LIST */
.dir-list{background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-lg);overflow:hidden}
.dir-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--gray-100);cursor:pointer;transition:.15s;text-decoration:none;color:inherit}
.dir-row:last-child{border-bottom:none}
.dir-row:hover{background:var(--gray-50)}

.dir-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff;flex-shrink:0}
.dir-info{flex:1;min-width:0}
.dir-name{font-size:15px;font-weight:800;color:var(--gray-900);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dir-meta{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap}
.dir-type{font-size:11px;font-weight:700;padding:1px 7px;border-radius:4px;flex-shrink:0}
.dir-type.actor{color:#1d4ed8;background:#eff6ff}
.dir-type.director{color:#7c3aed;background:#f5f3ff}
.dir-type.both{color:#065f46;background:#f0fdf4}
.dir-roles{font-size:12px;color:var(--gray-500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dir-bio{font-size:12px;color:var(--gray-500);line-height:1.45;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dir-now{font-size:12px;color:var(--pink-500);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.dir-arrow{color:var(--gray-300);flex-shrink:0}

/* empty */
.empty{text-align:center;padding:48px 20px;color:var(--gray-400);background:#fff;border-radius:var(--r-lg);border:1px solid var(--gray-200);font-size:14px}

/* MOBILE BOTTOM NAV */
.mobile-bnav{display:none}
@media(max-width:768px){
  .mobile-bnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--gray-200);padding:6px 0 env(safe-area-inset-bottom,8px);z-index:200;box-shadow:0 -1px 8px rgba(0,0,0,.08)}
  .mbn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:var(--gray-400);font-size:10px;font-weight:700;padding:4px 0;transition:.15s}
  .mbn-item.on{color:var(--pink-500)}
  .mbn-item svg{display:block}
  body{padding-bottom:72px}
  .nav-lab-link{display:none!important}
  .breadcrumb-bar{display:none}
  .page-title{font-size:22px}
  .dir-bio{display:none}
}
</style>
</head>

    nowPlaying:'Ngày Con Sống Lại',
    bio:'Danh hài kỳ cựu với hơn 25 năm hoạt động, được yêu mến qua các vai hài duyên dáng và gần gũi.' },
  { slug:'miu-le', name:'Miu Lê', initials:'ML', color:'#be185d', type:'actor',
    roles:'Diễn viên · Ca sĩ', nationality:'Việt Nam',
    nowPlaying:'Mẹ Ơi, Về Nhà',
    bio:'Ca sĩ kiêm diễn viên người Việt, nổi tiếng với bản hit Em Gái Mưa và bộ phim Tháng Năm Rực Rỡ.' },

    bio:'Một trong những diễn viên có doanh thu phòng vé cao nhất mọi thời đại; nổi tiếng với vai Black Widow trong MCU.' },

  { slug:'ly-hai', name:'Lý Hải', initials:'LH', color:'#1e40af', type:'director',
    roles:'Đạo diễn · Nhà sản xuất · Diễn viên', nationality:'Việt Nam',

    bio:'Đạo diễn và nhà sản xuất người Việt đứng sau loạt phim Lật Mặt; mỗi phần đều phá kỷ lục doanh thu phim Việt khi ra mắt.' },
  { slug:'victor-vu', name:'Victor Vũ', initials:'VV', color:'#064e3b', type:'director',
    roles:'Đạo diễn · Biên kịch', nationality:'Hoa Kỳ - Việt Nam',

    nowPlaying:null,
    bio:'Đạo diễn của The Dark Knight trilogy, Inception và Oppenheimer; người mang phong cách phi tuyến tính vào dòng phim bom tấn.' },
  { slug:'tran-thanh-huy', name:'Trần Thanh Huy', initials:'TH', color:'#7f1d1d', type:'director',
    roles:'Đạo diễn · Biên kịch', nationality:'Việt Nam',
    nowPlaying:null,
    bio:'Đạo diễn trẻ người Việt nổi lên với Ròm (2019), bộ phim đầu tay giành giải tại Busan IFF và được mua phân phối quốc tế.' },
  { slug:'bong-joon-ho', name:'Bong Joon-ho', initials:'BJ', color:'#3b0764', type:'director',
    roles:'Đạo diễn · Biên kịch · Nhà sản xuất', nationality:'Hàn Quốc',
    nowPlaying:null,
    bio:'Đạo diễn người Hàn Quốc đầu tiên giành Oscar Phim hay nhất với Parasite (2020); tác giả của Memories of Murder và Snowpiercer.' },
];

const FILTERS = ['Tất cả','Diễn viên','Đạo diễn'];
let active = 'Tất cả';

function filtered() {
  if (active === 'Diễn viên') return PEOPLE.filter(p => p.type === 'actor' || p.type === 'both');
  if (active === 'Đạo diễn') return PEOPLE.filter(p => p.type === 'director' || p.type === 'both');
  return PEOPLE;
}

function renderFilters() {
  const list = filtered();
  document.getElementById('filterTabs').innerHTML =
    FILTERS.map(f => `<button class="ftab${f===active?' on':''}" onclick="setFilter('${f}')">${f}</button>`).join('') +
    `<span class="filter-count">${list.length} người</span>`;
}

function setFilter(f) { active = f; renderFilters(); renderList(); }

function typeLabel(t) {
  if (t === 'actor') return '<span class="dir-type actor">Diễn viên</span>';
  if (t === 'director') return '<span class="dir-type director">Đạo diễn</span>';
  return '<span class="dir-type both">Diễn viên & ĐD</span>';
}

function renderList() {
  const list = filtered();
  if (!list.length) {
    document.getElementById('dirList').innerHTML = `<div class="empty">Không tìm thấy</div>`;
    return;
  }
  document.getElementById('dirList').innerHTML =
    `<div class="dir-list">${list.map(p => `
      <a class="dir-row" href="/cinema/person/${p.slug}">
        <div class="dir-avatar" style="background:${p.color}">${p.initials}</div>
        <div class="dir-info">
          <div class="dir-name">${p.name}</div>
          <div class="dir-meta">${typeLabel(p.type)}<span class="dir-roles">${p.nationality} · ${p.roles}</span></div>
          ${p.nowPlaying ? `<div class="dir-now">🎬 ${p.nowPlaying}</div>` : ''}
          <div class="dir-bio">${p.bio}</div>
        </div>
        <svg class="dir-arrow" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
      </a>`).join('')}
    </div>`;
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toastEl');
  el.textContent = msg; el.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.style.opacity='0', 2000);
}

renderFilters();
renderList();
</script>
