<title>Diễn Viên & Đạo Diễn - MoMo Cinema</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink-500:#EB2F96;--pink-600:#C22181;--pink-50:#fdf2f8;--pink-100:#fce7f3;
  --purple-500:#7C3AED;--purple-50:#f5f3ff;
  --gray-900:#111827;--gray-800:#1f2937;--gray-700:#374151;--gray-600:#4b5563;
  --gray-500:#6b7280;--gray-400:#9ca3af;--gray-300:#d1d5db;--gray-200:#e5e7eb;
  --gray-100:#f3f4f6;--gray-50:#f9fafb;--white:#fff;
  --shadow-s:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-m:0 4px 12px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.05);
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:999px;
}
body{font-family:'Be Vietnam Pro','Helvetica Neue',sans-serif;background:var(--gray-50);color:var(--gray-900);min-height:100vh}

/* NAV */
.nav{background:#fff;border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:100}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;gap:20px}
.nav-logo{display:flex;align-items:center;text-decoration:none;flex-shrink:0}
.nav-links{display:flex;gap:2px}
.nav-link{font-family:inherit;font-size:13px;font-weight:600;color:var(--gray-500);background:none;border:none;cursor:pointer;padding:6px 12px;border-radius:var(--r-sm);transition:.15s}
.nav-link:hover{background:var(--gray-100);color:var(--gray-900)}
.nav-link.on{background:var(--pink-50);color:var(--pink-500)}
.nav-right{margin-left:auto;display:flex;align-items:center}
.nav-search-wrap{display:flex;align-items:center;gap:8px;background:var(--gray-100);border:1px solid var(--gray-200);border-radius:var(--r-sm);padding:7px 13px;width:220px;color:var(--gray-400)}
.nav-search-wrap input{background:none;border:none;outline:none;color:var(--gray-900);font-size:13px;width:100%;font-family:inherit}
.nav-search-wrap input::placeholder{color:var(--gray-400)}
@media(max-width:768px){.nav-links,.nav-search-wrap{display:none}}

/* BREADCRUMB */
.breadcrumb-bar{background:#fff;border-bottom:1px solid var(--gray-100);padding:0 20px}
.breadcrumb-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:6px;height:37px;font-size:12px}
.bc-item{color:var(--gray-500);text-decoration:none}
.bc-item:hover{color:var(--pink-500)}
.bc-sep{color:var(--gray-300)}
.bc-current{color:var(--gray-900);font-weight:700}

/* PAGE HEADER */
.page-header{background:#fff;border-bottom:1px solid var(--gray-200);padding:22px 20px 18px}
.page-header-inner{max-width:1100px;margin:0 auto}
.page-title{font-size:26px;font-weight:800;color:var(--gray-900);letter-spacing:-.02em}

/* FILTER BAR */
.filter-bar{background:#fff;border-bottom:1px solid var(--gray-200);padding:0 20px;position:sticky;top:56px;z-index:90}
.filter-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:4px;height:48px}
.ftab{font-family:inherit;font-size:13px;font-weight:700;color:var(--gray-500);background:none;border:none;cursor:pointer;padding:5px 14px;border-radius:var(--r-xl);white-space:nowrap;transition:.15s}
.ftab:hover{background:var(--gray-100);color:var(--gray-900)}
.ftab.on{background:var(--pink-50);color:var(--pink-500)}
.filter-count{margin-left:auto;font-size:12px;color:var(--gray-400);flex-shrink:0}

/* CONTENT */
.content{max-width:1100px;margin:0 auto;padding:20px 20px 72px}

/* PERSON GRID */
.person-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}

/* PERSON CARD */
.person-card{background:#fff;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-s);cursor:pointer;text-decoration:none;color:inherit;display:flex;flex-direction:column;transition:transform .18s,box-shadow .18s}
.person-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-m)}

.person-photo{position:relative;aspect-ratio:2/3;overflow:hidden;background:var(--gray-100)}
.person-photo img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;transition:transform .3s}
.person-card:hover .person-photo img{transform:scale(1.04)}
.person-photo-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff}

.person-body{padding:12px 12px 14px;display:flex;flex-direction:column;gap:6px;flex:1}
.person-name{font-size:14px;font-weight:800;color:var(--gray-900);line-height:1.25;letter-spacing:-.01em}
.person-chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;line-height:1.6;flex-shrink:0}
.chip-actor{color:var(--pink-500);background:var(--pink-50)}
.chip-director{color:var(--purple-500);background:var(--purple-50)}
.person-nation{font-size:11px;color:var(--gray-400);display:flex;align-items:center;gap:4px}
.person-film{font-size:11px;color:var(--pink-500);font-weight:700;display:flex;align-items:center;gap:4px;margin-top:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.person-film span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* EMPTY */
.empty-state{text-align:center;padding:64px 20px;color:var(--gray-400);font-size:14px;display:flex;flex-direction:column;align-items:center;gap:10px}

/* MOBILE BOTTOM NAV */
.mobile-bnav{display:none}
@media(max-width:768px){
  .mobile-bnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--gray-200);padding:6px 0 env(safe-area-inset-bottom,8px);z-index:200;box-shadow:0 -1px 8px rgba(0,0,0,.08)}
  .mbn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:var(--gray-400);font-size:10px;font-weight:700;padding:4px 0;transition:.15s}
  .mbn-item.on{color:var(--pink-500)}
  .mbn-item svg{display:block}
  body{padding-bottom:72px}
  .nav-lab-link{display:none!important}
  .breadcrumb-bar{display:none}
  .page-title{font-size:22px}
  .person-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
}
</style>
</head>

</nav>

    nowPlaying:'Ngày Con Sống Lại',
    bio:'Danh hài kỳ cựu với hơn 25 năm hoạt động, được yêu mến qua các vai hài duyên dáng và gần gũi.' },
  { slug:'miu-le', name:'Miu Lê', initials:'ML', color:'#be185d',
    roles:['actor'], nationality:'Việt Nam',
    photo: null,
    nowPlaying:'Mẹ Ơi, Về Nhà',
    bio:'Ca sĩ kiêm diễn viên người Việt, nổi tiếng với bản hit Em Gái Mưa và bộ phim Tháng Năm Rực Rỡ.' },

    nowPlaying:'Trường Hè, 2001',
    bio:'Nghệ sĩ ưu tú với 35 năm cống hiến; gắn liền với vai Diễm trong bộ phim kinh điển Đất Phương Nam.' },
  { slug:'scarlett-johansson', name:'Scarlett Johansson', initials:'SJ', color:'#1d4ed8',
    roles:['actor'], nationality:'Hoa Kỳ',
    photo: '/6NsMbJXRlDZuDzatN2akFdGuTvx.jpg',
    nowPlaying:'Jurassic World Rebirth',
    bio:'Một trong những diễn viên có doanh thu phòng vé cao nhất mọi thời đại; nổi tiếng với vai Black Widow trong MCU.' },

  { slug:'ly-hai', name:'Lý Hải', initials:'LH', color:'#1e40af',

    photo: null,

    bio:'Đạo diễn và nhà sản xuất người Việt đứng sau loạt phim Lật Mặt; mỗi phần đều phá kỷ lục doanh thu phim Việt khi ra mắt.' },

    roles:['director'], nationality:'Hoa Kỳ - VN',

    nowPlaying: null,
    bio:'Đạo diễn Việt kiều Mỹ, nổi tiếng với Thiên Mệnh Anh Hùng, Trúng Số và Mắt Biếc — một trong số ít đạo diễn Việt có phong cách thị giác đặc trưng.' },
  { slug:'james-cameron', name:'James Cameron', initials:'JC', color:'#1e3a5f',
    roles:['director'], nationality:'Canada',
    photo: '/9NAZnTjBQ9WcXAQEzZpKy4vdQto.jpg',
    nowPlaying: null,
    bio:'Đạo diễn của Titanic và Avatar — hai bộ phim từng giữ kỷ lục doanh thu toàn cầu cao nhất mọi thời đại.' },
  { slug:'christopher-nolan', name:'Christopher Nolan', initials:'CN', color:'#1c1917',
    roles:['director'], nationality:'Anh - Hoa Kỳ',
    photo: '/6StfF5y4A6mCFMVFJHV9JvTguvt.jpg',
    nowPlaying: null,
    bio:'Đạo diễn của The Dark Knight trilogy, Inception và Oppenheimer; người mang phong cách phi tuyến tính vào dòng phim bom tấn.' },
  { slug:'tran-thanh-huy', name:'Trần Thanh Huy', initials:'TH', color:'#7f1d1d',
    roles:['director'], nationality:'Việt Nam',
    photo: null,
    nowPlaying: null,
    bio:'Đạo diễn trẻ người Việt nổi lên với Ròm (2019), bộ phim đầu tay giành giải tại Busan IFF và được mua phân phối quốc tế.' },
  { slug:'bong-joon-ho', name:'Bong Joon-ho', initials:'BJ', color:'#3b0764',
    roles:['director'], nationality:'Hàn Quốc',
    photo: '/cBhOmBLGtZE7UNlCiWveTWvk5Fw.jpg',
    nowPlaying: null,
    bio:'Đạo diễn người Hàn Quốc đầu tiên giành Oscar Phim hay nhất với Parasite (2020); tác giả của Memories of Murder và Snowpiercer.' },
];

const FILTERS = ['Tất cả','Diễn viên','Đạo diễn'];
let active = 'Tất cả';

function filtered() {
  if (active === 'Diễn viên') return PEOPLE.filter(p => p.roles.includes('actor'));
  if (active === 'Đạo diễn') return PEOPLE.filter(p => p.roles.includes('director'));
  return PEOPLE;
}

function renderFilters() {
  const list = filtered();
  document.getElementById('filterTabs').innerHTML =
    FILTERS.map(f => `<button class="ftab${f===active?' on':''}" onclick="setFilter('${f}')">${f}</button>`).join('') +
    `<span class="filter-count">${list.length} người</span>`;
}

function setFilter(f) { active = f; renderFilters(); renderGrid(); }

function roleChips(roles) {
  const chips = [];
  if (roles.includes('actor')) chips.push('<span class="chip chip-actor">Diễn viên</span>');
  if (roles.includes('director')) chips.push('<span class="chip chip-director">Đạo diễn</span>');
  return chips.join('');
}

function photoEl(p) {
  if (p.photo) {
    const url = TMDB_IMG + p.photo;
    return `<img src="${url}" alt="${p.name}" loading="lazy"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="person-photo-fallback" style="display:none;background:${p.color}">${p.initials}</div>`;
  }
  return `<div class="person-photo-fallback" style="background:${p.color}">${p.initials}</div>`;
}

function renderGrid() {
  const list = filtered();
  if (!list.length) {
    document.getElementById('personGrid').innerHTML =
      `<div class="empty-state"><i data-lucide="users" width="36" height="36" stroke-width="1.5"></i><span>Không tìm thấy</span></div>`;
    lucide.createIcons();
    return;
  }
  document.getElementById('personGrid').innerHTML =
    `<div class="person-grid">${list.map(p => `
      <a class="person-card" href="/cinema/person/${p.slug}">
        <div class="person-photo">${photoEl(p)}</div>
        <div class="person-body">
          <div class="person-name">${p.name}</div>
          <div class="person-chips">${roleChips(p.roles)}</div>
          <div class="person-nation"><i data-lucide="map-pin" width="10" height="10" stroke-width="2" style="flex-shrink:0"></i>${p.nationality}</div>
          ${p.nowPlaying ? `<div class="person-film"><i data-lucide="clapperboard" width="11" height="11" stroke-width="2" style="flex-shrink:0;color:var(--pink-500)"></i><span>${p.nowPlaying}</span></div>` : ''}
        </div>
      </a>`).join('')}
    </div>`;
  lucide.createIcons();
}

renderFilters();
renderGrid();
</script>
