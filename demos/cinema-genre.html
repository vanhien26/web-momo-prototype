*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink-500:#EB2F96;--pink-50:#fdf2f8;--pink-100:#fce7f3;
  --gray-900:#111827;--gray-800:#1f2937;--gray-700:#374151;--gray-600:#4b5563;
  --gray-500:#6b7280;--gray-400:#9ca3af;--gray-300:#d1d5db;--gray-200:#e5e7eb;
  --gray-100:#f3f4f6;--gray-50:#f9fafb;--white:#fff;
  --amber-500:#f59e0b;--green-500:#22c55e;--blue-500:#3b82f6;
  --shadow-s:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-m:0 4px 12px rgba(0,0,0,.1);
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;--r-2xl:24px;
}
body{font-family:'Be Vietnam Pro','Helvetica Neue',sans-serif;background:var(--gray-50);color:var(--gray-900);min-height:100vh}

/* NAV */
.nav{background:#fff;border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:100}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;gap:24px}
.nav-logo{display:flex;align-items:center;cursor:pointer;text-decoration:none}
.nav-logo img{height:28px}
.nav-links{display:flex;gap:4px}
.nav-link{font-family:inherit;font-size:14px;font-weight:700;color:var(--gray-600);background:none;border:none;cursor:pointer;padding:6px 12px;border-radius:var(--r-sm);transition:.15s}
.nav-link:hover{background:var(--gray-100);color:var(--gray-900)}
.nav-link.on{color:var(--pink-500)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav-search{font-size:13px;color:var(--gray-400);background:var(--gray-100);border-radius:var(--r-xl);padding:7px 14px;cursor:pointer;white-space:nowrap}
.nav-city{font-family:inherit;font-size:12px;font-weight:600;color:var(--gray-600);background:none;border:none;cursor:pointer}
.nav-login{font-family:inherit;font-size:13px;font-weight:800;color:#fff;background:var(--pink-500);border:none;border-radius:var(--r-xl);padding:7px 18px;cursor:pointer}
@media(max-width:768px){.nav-links,.nav-search{display:none}}

/* BREADCRUMB */
.breadcrumb-bar{background:#fff;border-bottom:1px solid var(--gray-100);padding:0 20px}
.breadcrumb-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:6px;height:37px;font-size:12px}
.bc-item{color:var(--gray-500);text-decoration:none;cursor:pointer}
.bc-item:hover{color:var(--pink-500)}
.bc-sep{color:var(--gray-300)}
.bc-current{color:var(--gray-900);font-weight:700}

/* GENRE HEADER */
.genre-header{background:#fff;padding:28px 20px 0;border-bottom:1px solid var(--gray-200)}
.genre-header-inner{max-width:1100px;margin:0 auto}
.genre-icon-row{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.genre-icon-wrap{width:68px;height:68px;border-radius:var(--r-xl);display:flex;align-items:center;justify-content:center;font-size:32px;background:var(--genre-bg,var(--gray-100));flex-shrink:0}
.genre-title-group h1{font-size:26px;font-weight:900;color:var(--gray-900);line-height:1.2;margin-bottom:4px}
.genre-count{font-size:13px;color:var(--gray-500)}
.genre-count strong{color:var(--pink-500)}
.genre-desc{font-size:13px;color:var(--gray-600);line-height:1.6;max-width:640px;margin-bottom:18px}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 0}
.filter-label{font-size:12px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap}
.fpill{font-family:inherit;font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-600);cursor:pointer;transition:.15s}
.fpill.on{background:var(--gray-900);color:#fff;border-color:var(--gray-900)}
.fpill:hover:not(.on){background:var(--gray-100)}
.filter-sep{color:var(--gray-200);font-size:16px}

/* GENRE TABS */
.genre-tabs{display:flex;gap:0;margin-top:4px;border-top:1px solid var(--gray-100)}
.genre-tab{font-family:inherit;font-size:14px;font-weight:700;color:var(--gray-400);background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;padding:13px 20px;transition:.15s;margin-bottom:-1px;display:flex;align-items:center;gap:6px}
.genre-tab.on{color:var(--pink-500);border-bottom-color:var(--pink-500)}
.genre-tab:hover:not(.on){color:var(--gray-700)}
.tab-count{font-size:11px;font-weight:800;background:var(--gray-100);color:var(--gray-500);border-radius:20px;padding:1px 7px}
.genre-tab.on .tab-count{background:var(--pink-50);color:var(--pink-500)}

/* CONTENT */
.content{max-width:1100px;margin:0 auto;padding:28px 20px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.section-title{font-size:16px;font-weight:900;color:var(--gray-900)}
.section-sub{font-size:12px;color:var(--gray-400)}

.film-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}

.film-card{background:#fff;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-s);cursor:pointer;transition:.2s}
.film-card:hover{box-shadow:var(--shadow-m);transform:translateY(-3px)}
.film-poster{position:relative;aspect-ratio:2/3;overflow:hidden;background:var(--gray-200)}
.film-poster img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.film-card:hover .film-poster img{transform:scale(1.04)}
.film-age{position:absolute;top:8px;left:8px;font-size:10px;font-weight:900;padding:3px 7px;border-radius:5px;color:#fff}
.film-age.p{background:#16a34a}.film-age.t13{background:#ca8a04}.film-age.t16{background:#ea580c}.film-age.c18{background:#dc2626}
.film-badge{position:absolute;top:8px;right:8px;font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;color:#fff}
.film-badge.now{background:var(--pink-500)}
.film-badge.soon{background:#6366f1}
.film-badge.past{background:var(--gray-400)}
.film-score{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.7);color:#fff;font-size:10px;font-weight:800;padding:3px 7px;border-radius:20px;backdrop-filter:blur(4px)}
.film-body{padding:12px}
.film-title{font-size:13px;font-weight:800;color:var(--gray-900);margin-bottom:4px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.film-meta{font-size:11px;color:var(--gray-400);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.film-dot{color:var(--gray-200)}
.film-genre-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.film-genre-tag{font-size:10px;font-weight:700;color:var(--gray-500);background:var(--gray-100);padding:2px 7px;border-radius:4px}
.film-cta{width:100%;font-family:inherit;font-size:12px;font-weight:800;color:var(--pink-500);background:var(--pink-50);border:1.5px solid var(--pink-100);border-radius:var(--r-sm);padding:7px;cursor:pointer;transition:.15s}
.film-cta:hover{background:var(--pink-100)}
.film-cta.soon{color:var(--gray-500);background:var(--gray-100);border-color:var(--gray-200)}
.film-cta.past{color:var(--gray-400);background:var(--gray-50);border-color:var(--gray-200);cursor:default}

/* TOP 10 */

.top10-section .sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.top10-section .sh-title{font-size:18px;font-weight:900;color:var(--gray-900)}
.top10-section .sh-sub{font-size:12px;color:var(--gray-400)}
.rank-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.rank-item{display:flex;align-items:center;gap:0;background:#fff;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-s);cursor:pointer;transition:.2s;position:relative}

.rank-item[data-rank="1"] .rank-num{color:#fef3c7}
.rank-item[data-rank="2"] .rank-num{color:#f1f5f9}
.rank-item[data-rank="3"] .rank-num{color:#fed7aa}

.rank-poster img{width:100%;height:100%;object-fit:cover}

.rank-title{font-size:13px;font-weight:800;color:var(--gray-900);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-meta{font-size:11px;color:var(--gray-400);margin-bottom:6px}
.rank-score{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;color:#92400e;background:#fef3c7;border-radius:6px;padding:2px 7px;margin-bottom:6px}
.rank-badge{position:absolute;top:8px;right:8px;font-size:9px;font-weight:800;padding:2px 6px;border-radius:20px;color:#fff}
.rank-badge.now{background:var(--pink-500)}
.rank-badge.soon{background:#6366f1}
.rank-cta{font-family:inherit;font-size:11px;font-weight:800;color:var(--pink-500);background:var(--pink-50);border:1.5px solid var(--pink-100);border-radius:var(--r-sm);padding:4px 10px;cursor:pointer;transition:.15s;white-space:nowrap}
.rank-cta:hover{background:var(--pink-100)}
.rank-medal{font-size:14px}

/* COLLECTIONS */
.collections-section{margin-top:44px}
.collections-section .sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.collections-section .sh-title{font-size:18px;font-weight:900;color:var(--gray-900)}
.coll-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
@media(max-width:600px){.coll-grid{grid-template-columns:1fr 1fr}.coll-grid .coll-card{min-height:0}}
.coll-card{border-radius:var(--r-xl);overflow:hidden;position:relative;cursor:pointer;aspect-ratio:16/9;min-height:130px;box-shadow:var(--shadow-s);transition:.2s}
.coll-card:hover{box-shadow:var(--shadow-m);transform:translateY(-2px)}
.coll-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.45)}
.coll-gradient{position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,0,0,.6) 0%,rgba(0,0,0,.2) 100%)}
.coll-overlay-color{position:absolute;inset:0;opacity:.5}
.coll-body{position:relative;z-index:2;padding:16px;height:100%;display:flex;flex-direction:column;justify-content:flex-end}
.coll-icon{font-size:22px;margin-bottom:6px}
.coll-name{font-size:14px;font-weight:900;color:#fff;line-height:1.25;margin-bottom:4px}
.coll-desc{font-size:11px;color:rgba(255,255,255,.7);margin-bottom:8px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.coll-footer{display:flex;align-items:center;justify-content:space-between}
.coll-count{font-size:11px;font-weight:700;color:rgba(255,255,255,.8);background:rgba(255,255,255,.15);border-radius:20px;padding:2px 9px}
.coll-arrow{font-size:12px;font-weight:800;color:rgba(255,255,255,.8)}

/* RELATED GENRES */
.related-genres{margin-top:40px}
.related-genres h2{font-size:16px;font-weight:900;color:var(--gray-900);margin-bottom:14px}
.genre-chip-grid{display:flex;flex-wrap:wrap;gap:10px}
.genre-chip{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--gray-200);border-radius:var(--r-xl);padding:8px 16px;cursor:pointer;transition:.15s;text-decoration:none}
.genre-chip:hover{border-color:var(--pink-300);background:var(--pink-50)}
.genre-chip-icon{font-size:18px}
.genre-chip-name{font-size:13px;font-weight:700;color:var(--gray-800)}
.genre-chip-count{font-size:11px;color:var(--gray-400)}

.empty-state{padding:48px 0;text-align:center;color:var(--gray-400);font-size:14px}
.empty-icon{font-size:36px;margin-bottom:12px}
.footer{background:var(--gray-900);color:var(--gray-400);font-size:12px;padding:20px;text-align:center;margin-top:48px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gray-900);color:#fff;font-size:13px;font-weight:700;padding:10px 20px;border-radius:var(--r-xl);opacity:0;pointer-events:none;transition:.25s;white-space:nowrap;z-index:9999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MOBILE BOTTOM NAV */
.mobile-bnav{display:none}
@media(max-width:768px){
  .mobile-bnav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:#fff;border-top:1px solid var(--gray-200);

  }

  .mbn-item.on{color:var(--pink-500)}
  .mbn-item svg{display:block}
  body{padding-bottom:72px}
  .nav-lab-link{display:none!important}
  .breadcrumb-bar{display:none}
}
</style>

    {name:'Cuối tuần cùng nhà',icon:'🏠',desc:'Phim phù hợp xem cùng bố mẹ và con cái',cover:'https://cinema.momocdn.net/convert-webp/img/107954068933179447-postertoystory5.jpg?size=SM',color:'#92400e',count:12},
    {name:'Chuyện bố mẹ & con',icon:'👨‍👧',desc:'Tình thân vượt thời gian, bài học yêu thương',cover:'https://cinema.momocdn.net/convert-webp/img/22106669547309318-nhsnh.png?size=SM',color:'#065f46',count:8},
    {name:'Phim Việt cho cả nhà',icon:'🇻🇳',desc:'Câu chuyện gia đình Việt đầy ắp tình cảm',cover:'https://cinema.momocdn.net/convert-webp/img/116033739346174952-lch.png?size=SM',color:'#7f1d1d',count:6},
  ],
};

const slug = location.pathname.replace(/\/$/, '').split('/').pop();
const genre = ALL_GENRES[slug] || ALL_GENRES['hanh-dong'];
let activeTab = 'now';
let activeFormat = 'all';
let activeSort = 'popular';

function init(){
  document.getElementById('pageTitle').textContent = `Phim ${genre.name} - MoMo Cinema`;
  document.getElementById('bcName').textContent = genre.name;
  document.getElementById('genreTitle').textContent = genre.name;
  document.getElementById('genreIconEmoji').textContent = genre.emoji;
  document.getElementById('genreIconWrap').style.setProperty('background', genre.color);
  document.getElementById('genreDesc').textContent = genre.desc;
  document.getElementById('top10GenreName').textContent = genre.name;

  updateCounts();
  renderFilms();
  renderTop10();
  renderCollections();
  renderRelated();
}

function updateCounts(){
  const now = filterFilms(genre.now||[]);
  const soon = filterFilms(genre.soon||[]);
  const all = filterFilms([...(genre.now||[]),...(genre.soon||[]),...(genre.past||[])]);
  document.getElementById('countNow').textContent = now.length;
  document.getElementById('countSoon').textContent = soon.length;
  document.getElementById('countAll').textContent = all.length;

  const total = (genre.now||[]).length + (genre.soon||[]).length;
  document.getElementById('genreCount').innerHTML = `<strong>${(genre.now||[]).length}</strong> phim đang chiếu · <strong>${(genre.soon||[]).length}</strong> phim sắp chiếu`;
}

function filterFilms(films){
  if(activeFormat === 'all') return films;
  return films.filter(f=>(f.tags||[]).includes(activeFormat));
}

function sortFilms(films){
  if(activeSort === 'rating') return [...films].sort((a,b)=>parseFloat(b.score||0)-parseFloat(a.score||0));
  if(activeSort === 'newest') return [...films].reverse();
  return films;
}

function showTab(tab, el){
  activeTab = tab;
  document.querySelectorAll('.genre-tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  renderFilms();
}

function setFormat(fmt, el){
  activeFormat = fmt;
  document.querySelectorAll('#formatPills .fpill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  updateCounts();
  renderFilms();
}

function setSort(sort, el){
  activeSort = sort;
  el.closest('.filter-bar').querySelectorAll('.filter-pills:last-of-type .fpill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  renderFilms();
}

function renderFilms(){
  let films;
  let label, sub;
  if(activeTab==='now'){
    films = sortFilms(filterFilms(genre.now||[]));
    label = `Đang chiếu - ${genre.name}`;
    sub = `${films.length} phim`;
  } else if(activeTab==='soon'){
    films = sortFilms(filterFilms(genre.soon||[]));
    label = `Sắp chiếu - ${genre.name}`;
    sub = `${films.length} phim`;
  } else {
    const all = [...(genre.now||[]).map(f=>({...f,status:'now'})), ...(genre.soon||[]).map(f=>({...f,status:'soon'})), ...(genre.past||[]).map(f=>({...f,status:'past'}))];
    films = sortFilms(filterFilms(all));
    label = `Tất cả phim - ${genre.name}`;
    sub = `${films.length} phim`;
  }

  document.getElementById('sectionTitle').textContent = label;
  document.getElementById('sectionSub').textContent = sub;

  if(!films.length){
    document.getElementById('filmGrid').innerHTML = `<div class="empty-state"><div class="empty-icon">🎬</div>Không có phim phù hợp với bộ lọc</div>`;
    return;
  }

  document.getElementById('filmGrid').innerHTML = `<div class="film-grid">${films.map(f=>{
    const ageCls = f.age.toLowerCase().replace(' ','');
    const status = f.status || activeTab;
    const isPast = status==='past';
    const isSoon = status==='soon';
    const tags = (f.tags||[]).map(t=>`<span class="film-genre-tag">${t}</span>`).join('');
    const badgeText = isPast?'Đã chiếu':isSoon?'Sắp chiếu':'Đang chiếu';
    const badgeCls = isPast?'past':isSoon?'soon':'now';
    const ctaClass = isSoon?'soon':isPast?'past':'';
    const ctaText = isSoon?'Đặt vé trước →':isPast?'Xem lại':'Đặt vé →';
    return `<div class="film-card" onclick="${isPast?`toast('${f.title} đã kết thúc lịch chiếu')`:`window.location.href='/cinema/${f.id}'`}">
      <div class="film-poster">
        <img src="${f.img}" alt="${f.title}" loading="lazy" onerror="this.style.background='var(--gray-200)'">
        <span class="film-age ${ageCls}">${f.age}</span>
        <span class="film-badge ${badgeCls}">${badgeText}</span>
        ${f.score&&f.score!=='—'?`<span class="film-score">⭐ ${f.score}</span>`:''}
      </div>
      <div class="film-body">
        <div class="film-title">${f.title}</div>
        <div class="film-meta"><span>${f.dur}</span><span class="film-dot">·</span><span>${f.subGenre||''}</span></div>
        <div class="film-genre-tags">${tags}</div>
        <button class="film-cta ${ctaClass}" onclick="event.stopPropagation();${isPast?`toast('${f.title} đã kết thúc lịch chiếu')`:`window.location.href='/cinema/${f.id}'`}">${ctaText}</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderTop10(){
  const allFilms = [
    ...(genre.now||[]).map(f=>({...f,status:'now'})),
    ...(genre.soon||[]).map(f=>({...f,status:'soon'})),
    ...(genre.past||[]).map(f=>({...f,status:'past'})),
  ];
  const sorted = [...allFilms].sort((a,b)=>{
    const sa = parseFloat(a.score)||0, sb = parseFloat(b.score)||0;
    return sb - sa;
  });
  const top = sorted.slice(0,10);
  if(!top.length){ document.getElementById('top10Section').style.display='none'; return; }
  const medals = ['🥇','🥈','🥉'];
  document.getElementById('rankList').innerHTML = `<div class="rank-grid">${top.map((f,i)=>{
    const rank = i+1;
    const isPast = f.status==='past', isSoon = f.status==='soon';
    const ageCls = f.age.toLowerCase().replace(' ','');
    const badgeText = isPast?'Đã chiếu':isSoon?'Sắp chiếu':'Đang chiếu';
    const badgeCls = isPast?'past':isSoon?'soon':'now';
    return `<div class="rank-item" data-rank="${rank}" onclick="${isPast?`toast('${f.title} đã kết thúc lịch chiếu')`:`window.location.href='/cinema/${f.id}'`}">
      <div class="rank-num">${rank}</div>
      <div class="rank-poster"><img src="${f.img}" alt="${f.title}" loading="lazy" onerror="this.style.background='var(--gray-200)'"></div>
      <div class="rank-info">
        ${rank<=3?`<div class="rank-medal">${medals[rank-1]}</div>`:''}
        <div class="rank-title">${f.title}</div>
        <div class="rank-meta">${f.dur} · ${f.subGenre||f.genre||''}</div>
        ${f.score&&f.score!=='—'?`<div class="rank-score">⭐ ${f.score}/10</div>`:''}
        <button class="rank-cta" onclick="event.stopPropagation();${isPast?`toast('${f.title} đã kết thúc lịch chiếu')`:`window.location.href='/cinema/${f.id}'`}">${isPast?'Xem lại':isSoon?'Đặt vé trước →':'Đặt vé →'}</button>
      </div>
      <span class="rank-badge ${badgeCls}">${badgeText}</span>
    </div>`;
  }).join('')}</div>`;
}

function renderCollections(){
  const colls = GENRE_COLLECTIONS[slug] || [];
  if(!colls.length){ document.getElementById('collectionsSection').style.display='none'; return; }
  document.getElementById('collectionGrid').innerHTML = colls.map(c=>`
    <div class="coll-card" onclick="toast('Bộ sưu tập: ${c.name}')">
      <div class="coll-bg" style="background-image:url('${c.cover}')"></div>
      <div class="coll-overlay-color" style="background:${c.color}"></div>
      <div class="coll-gradient"></div>
      <div class="coll-body">
        <div class="coll-icon">${c.icon}</div>
        <div class="coll-name">${c.name}</div>
        <div class="coll-desc">${c.desc}</div>
        <div class="coll-footer">
          <span class="coll-count">${c.count} phim</span>
          <span class="coll-arrow">Xem tất cả →</span>
        </div>
      </div>
    </div>`).join('');
}

function renderRelated(){
  const others = Object.entries(ALL_GENRES).filter(([k])=>k!==slug).slice(0,6);
  document.getElementById('relatedChips').innerHTML = others.map(([k,g])=>`
    <a class="genre-chip" href="/cinema/genre/${k}">
      <span class="genre-chip-icon">${g.emoji}</span>
      <div>
        <div class="genre-chip-name">${g.name}</div>
        <div class="genre-chip-count">${(g.now||[]).length} đang chiếu</div>
      </div>
    </a>`).join('');
}

let toastTimer;
function toast(msg){ const el=document.getElementById('toastEl'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2200); }

init();
</script>
