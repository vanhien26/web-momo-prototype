body{font-family:'Be Vietnam Pro','Helvetica Neue',sans-serif;background:var(--gray-50);color:var(--gray-900);min-height:100vh}

/* NAV */

.nav-logo{display:flex;align-items:center;cursor:pointer;text-decoration:none}
.nav-logo img{height:28px}
.nav-links{display:flex;gap:4px}
.nav-link{font-family:inherit;font-size:14px;font-weight:700;color:var(--gray-600);background:none;border:none;cursor:pointer;padding:6px 12px;border-radius:var(--r-sm);transition:.15s}
.nav-link:hover{background:var(--gray-100);color:var(--gray-900)}
.nav-link.on{color:var(--pink-500)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav-search{font-size:13px;color:var(--gray-400);background:var(--gray-100);border-radius:var(--r-xl);padding:7px 14px;cursor:pointer;white-space:nowrap}
.nav-city{font-family:inherit;font-size:12px;font-weight:600;color:var(--gray-600);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px}
.nav-login{font-family:inherit;font-size:13px;font-weight:800;color:#fff;background:var(--pink-500);border:none;border-radius:var(--r-xl);padding:7px 18px;cursor:pointer}

/* BREADCRUMB */
.breadcrumb-bar{background:#fff;border-bottom:1px solid var(--gray-100);padding:0 20px}
.breadcrumb-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:6px;height:37px;font-size:12px}
.bc-item{color:var(--gray-500);text-decoration:none;cursor:pointer}
.bc-item:hover{color:var(--pink-500)}
.bc-sep{color:var(--gray-300)}
.bc-current{color:var(--gray-900);font-weight:700}

/* HERO */
.hero{background:#fff;padding:32px 20px 0;border-bottom:1px solid var(--gray-200)}
.hero-inner{max-width:1100px;margin:0 auto;display:flex;gap:28px;align-items:flex-start}
.person-avatar{width:120px;height:120px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;color:#fff;background:var(--person-color,#1e3a5f);box-shadow:var(--shadow-m)}
.person-info{flex:1}
.person-type-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;color:var(--pink-500);background:var(--pink-50);border:1px solid var(--pink-100);border-radius:20px;padding:3px 10px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em}
.person-name{font-size:28px;font-weight:900;color:var(--gray-900);line-height:1.15;margin-bottom:6px}
.person-meta{font-size:13px;color:var(--gray-500);margin-bottom:12px;display:flex;flex-wrap:wrap;gap:12px}
.person-meta span{display:flex;align-items:center;gap:4px}
.person-bio{font-size:14px;color:var(--gray-600);line-height:1.65;max-width:640px;margin-bottom:18px}
.person-stats{display:flex;gap:24px;flex-wrap:wrap}
.pstat{text-align:center}
.pstat-num{font-size:22px;font-weight:900;color:var(--gray-900);display:block}
.pstat-lbl{font-size:11px;color:var(--gray-400);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.hero-tabs{display:flex;gap:0;margin-top:24px;border-top:1px solid var(--gray-100)}
.hero-tab{font-family:inherit;font-size:14px;font-weight:700;color:var(--gray-400);background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;padding:13px 20px;transition:.15s;margin-bottom:-1px}
.hero-tab.on{color:var(--pink-500);border-bottom-color:var(--pink-500)}
.hero-tab:hover:not(.on){color:var(--gray-700)}

/* CONTENT */
.content{max-width:1100px;margin:0 auto;padding:28px 20px}

/* AWARDS */
.awards-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.award-tag{font-size:12px;font-weight:700;color:var(--amber-500);background:var(--amber-50);border:1px solid #fde68a;border-radius:var(--r-sm);padding:5px 12px;display:flex;align-items:center;gap:5px}

/* FILM GRID */
.film-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}

.film-card{background:#fff;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-s);cursor:pointer;transition:.2s}
.film-card:hover{box-shadow:var(--shadow-m);transform:translateY(-3px)}
.film-poster{position:relative;aspect-ratio:2/3;overflow:hidden;background:var(--gray-200)}
.film-poster img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.film-card:hover .film-poster img{transform:scale(1.04)}
.film-age{position:absolute;top:8px;left:8px;font-size:10px;font-weight:900;padding:3px 7px;border-radius:5px;color:#fff}
.film-age.p{background:#16a34a}.film-age.t13{background:#ca8a04}.film-age.t16{background:#ea580c}.film-age.c18{background:#dc2626}
.film-badge{position:absolute;top:8px;right:8px;font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;background:var(--pink-500);color:#fff}
.film-body{padding:12px}
.film-title{font-size:13px;font-weight:800;color:var(--gray-900);margin-bottom:5px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.film-sub{font-size:11px;color:var(--gray-400);margin-bottom:8px}
.film-role{font-size:11px;font-weight:700;color:var(--pink-500);background:var(--pink-50);border-radius:4px;padding:2px 7px;display:inline-block;margin-bottom:6px}
.film-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.film-tag{font-size:10px;font-weight:700;color:var(--gray-500);background:var(--gray-100);padding:2px 7px;border-radius:4px}
.film-tag.imax{background:#0f172a;color:#e2e8f0}
.film-tag.fourDx{background:#7c2d12;color:#fed7aa}
.film-cta{width:100%;font-family:inherit;font-size:12px;font-weight:800;color:var(--pink-500);background:var(--pink-50);border:1.5px solid var(--pink-100);border-radius:var(--r-sm);padding:7px;cursor:pointer;transition:.15s}
.film-cta:hover{background:var(--pink-100)}
.film-cta.soon{color:var(--gray-500);background:var(--gray-100);border-color:var(--gray-200)}
.film-cta.past{color:var(--gray-400);background:var(--gray-50);border-color:var(--gray-200);cursor:default}

/* EMPTY */
.empty-state{padding:48px 0;text-align:center;color:var(--gray-400);font-size:14px}
.empty-icon{font-size:36px;margin-bottom:12px}

.sec-title{font-size:18px;font-weight:900;color:var(--gray-900);margin-bottom:6px}
.sec-sub{font-size:13px;color:var(--gray-400);margin-bottom:20px}

/* FOOTER */
.footer{background:var(--gray-900);color:var(--gray-400);font-size:12px;padding:20px;text-align:center;margin-top:48px}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gray-900);color:#fff;font-size:13px;font-weight:700;padding:10px 20px;border-radius:var(--r-xl);opacity:0;pointer-events:none;transition:.25s;white-space:nowrap;z-index:9999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

    ],
    past: [
      {id:'mat-biec',title:'Mắt Biếc',age:'P',dur:'115 phút',genre:'Tình cảm',img:'https://image.tmdb.org/t/p/w500/wcahBISlczoYqcakatu2uyX8kGQ.jpg',tags:['2D']},
      {id:'chi-chi-em-em',title:'Chị Chị Em Em',age:'T16',dur:'105 phút',genre:'Hành động - Tình cảm',img:'https://image.tmdb.org/t/p/w500/cFOnIqPNyVqmU1ZtXSsaztCebul.jpg',tags:['2D']},
    ],
  },
};

const slug = location.pathname.replace(/\/$/, '').split('/').pop();
const person = DIRECTORS[slug] || DIRECTORS['christopher-nolan'];
let activeTab = 'now';

function init(){
  document.getElementById('pageTitle').textContent = `${person.name} - Đạo diễn - MoMo Cinema`;
  document.getElementById('pageDesc').setAttribute('content', `Xem danh sách phim của đạo diễn ${person.name} trên MoMo Cinema.`);
  document.getElementById('bcName').textContent = person.name;
  document.getElementById('personName').textContent = person.name;
  document.getElementById('personBio').textContent = person.bio;

  const av = document.getElementById('personAvatar');
  av.textContent = person.initials;
  av.style.setProperty('--person-color', person.color);

  document.getElementById('personMeta').innerHTML = [
    `<span>🌍 ${person.nationality}</span>`,
    `<span>🎂 Sinh ${person.born}</span>`,
    `<span>🎬 Hoạt động: ${person.years}</span>`,
  ].join('');

  document.getElementById('personStats').innerHTML = person.stats.map(s=>`
    <div class="pstat">
      <span class="pstat-num">${s.num}</span>
      <span class="pstat-lbl">${s.lbl}</span>
    </div>`).join('');

  document.getElementById('awardsRow').innerHTML = person.awards.map(a=>`<span class="award-tag">${a}</span>`).join('');

  renderFilms();
}

function showTab(tab, el){
  activeTab = tab;
  document.querySelectorAll('.hero-tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  renderFilms();
}

function renderFilms(){
  const films = person[activeTab] || [];
  const panel = document.getElementById('filmPanel');
  if(!films.length){
    panel.innerHTML = `<div class="empty-state"><div class="empty-icon">🎬</div>Chưa có phim trong mục này</div>`;
    return;
  }
  const isSoon = activeTab === 'soon';
  const isPast = activeTab === 'past';
  panel.innerHTML = `<div class="film-grid">${films.map(f=>{
    const ageCls = f.age.toLowerCase().replace(' ','');
    const tags = (f.tags||[]).map(t=>`<span class="film-tag ${t==='IMAX'?'imax':t==='4DX'?'fourDx':''}">${t}</span>`).join('');
    const ctaClass = isSoon?'soon':isPast?'past':'';
    const ctaText = isSoon?'Đặt vé trước →':isPast?'Xem lại':' Đặt vé →';
    return `<div class="film-card" onclick="${isPast?`toast('${f.title} đã kết thúc lịch chiếu')`:`window.location.href='/cinema/${f.id}'`}">
      <div class="film-poster">
        <img src="${f.img}" alt="${f.title}" loading="lazy" onerror="this.style.background='var(--gray-200)'">
        <span class="film-age ${ageCls}">${f.age}</span>
        ${!isPast&&!isSoon?'<span class="film-badge">Đang chiếu</span>':''}
        ${isSoon?'<span class="film-badge" style="background:#6366f1">Sắp chiếu</span>':''}
      </div>
      <div class="film-body">
        <div class="film-title">${f.title}</div>
        <div class="film-sub">${f.genre} · ${f.dur}</div>
        <div class="film-tags">${tags}</div>
        <button class="film-cta ${ctaClass}" onclick="event.stopPropagation();${isPast?`toast('${f.title} đã kết thúc lịch chiếu')`:`window.location.href='/cinema/${f.id}'`}">${ctaText}</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

let toastTimer;
function toast(msg){ const el=document.getElementById('toastEl'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2200); }

init();
</script>
</body>
</html>
