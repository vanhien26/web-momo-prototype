<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cinema Series | MoMo Cinema</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08070E;--surf:#0F0D1C;--surf2:#16131F;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#F0EDF8;--dim:rgba(240,237,248,.6);--faint:rgba(240,237,248,.3);
  --pink:#EB2F96;--pink-dim:rgba(235,47,150,.12);--pink-border:rgba(235,47,150,.3);
  --gold:#F5C518;--green:#22C55E;
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;
  /* cinema.html nav vars */
  --white:#0F0D1C;
  --pink-500:#EB2F96;--pink-600:#C22181;--pink-50:rgba(235,47,150,.12);
  --gray-900:#F0ECF5;--gray-700:#D8D0E2;--gray-600:#BAB0C8;
  --gray-500:#9A8EAC;--gray-400:#7C7090;--gray-300:#5A5070;
  --gray-200:rgba(255,255,255,.1);--gray-100:rgba(255,255,255,.06);
  --shadow-m:0 4px 16px rgba(0,0,0,.5),0 2px 6px rgba(0,0,0,.3);
  --content:1240px;
}
html{scroll-behavior:smooth}
body{font-family:'Be Vietnam Pro',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
img{max-width:100%;display:block}
button{cursor:pointer;font-family:inherit;border:none;background:none}

/* grain + ambient */
body::after{content:'';position:fixed;inset:0;opacity:.045;pointer-events:none;z-index:500;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 30% 5%,rgba(100,40,220,.18) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 85%,rgba(235,47,150,.1) 0%,transparent 55%)}

/* NAV — identical to cinema.html */
.site-nav{position:sticky;top:0;z-index:200;background:rgba(11,9,18,.88);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid rgba(255,255,255,.08);box-shadow:0 1px 0 rgba(255,255,255,.04),var(--shadow-m)}
.nav-inner{max-width:var(--content);margin:0 auto;height:60px;padding:0 20px;display:flex;align-items:center;gap:24px}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.nav-links{display:flex;gap:2px}
.nav-link{font-size:13px;font-weight:600;color:var(--gray-500);background:none;border:none;cursor:pointer;padding:7px 14px;border-radius:var(--r-sm);transition:all .15s;font-family:inherit}
.nav-link:hover{background:var(--gray-100);color:var(--gray-900)}
.nav-link.on{background:var(--pink-50);color:var(--pink-500)}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.nav-search{display:flex;align-items:center;gap:8px;background:var(--gray-100);border:1px solid var(--gray-200);border-radius:var(--r-sm);padding:8px 14px;flex:1;max-width:260px}
.nav-search input{background:none;border:none;outline:none;color:var(--gray-900);font-family:inherit;font-size:13px;width:100%}
.nav-search input::placeholder{color:var(--gray-400)}
.nbtn{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r-md);font-size:13px;font-weight:600;transition:all .15s;font-family:inherit;cursor:pointer}
.nbtn-ghost{background:rgba(255,255,255,.07);color:var(--dim);border:1px solid var(--border)}
.nbtn-ghost:hover{color:var(--text);background:rgba(255,255,255,.12)}
.nbtn-primary{background:var(--pink);color:#fff;box-shadow:0 0 18px rgba(235,47,150,.28)}
.nbtn-primary:hover{background:#d42889}
@media(max-width:768px){.nav-links,.nav-search{display:none}}

/* HERO */
.hero{position:relative;min-height:520px;
  display:flex;flex-direction:column;justify-content:flex-end}
/* hero-bg: CSS ambient when no backdrop; replaced by real TMDB backdrop when API connected */
.hero-bg{position:absolute;inset:0}
.hero-bg.has-backdrop{overflow:hidden}
.hero-bg.has-backdrop img{width:100%;height:100%;object-fit:cover;object-position:center 30%;
  transform:scale(1.02);filter:brightness(.9) saturate(1.05)}
.hero-bg::after{content:'';position:absolute;inset:0;background:
  linear-gradient(to bottom,rgba(8,7,14,.1) 0%,rgba(8,7,14,0) 15%,rgba(8,7,14,.65) 65%,rgba(8,7,14,1) 100%),
  linear-gradient(to right,rgba(8,7,14,.88) 0%,rgba(8,7,14,.42) 45%,transparent 100%)}
.hero-inner{position:relative;z-index:2;padding:40px 20px 32px;
  max-width:1100px;width:100%;margin:0 auto;
  display:flex;align-items:flex-end;gap:24px}
.poster-stack{position:relative;flex-shrink:0;width:168px;display:none}
@media(min-width:560px){.poster-stack{display:block}}
@media(min-width:900px){.poster-stack{width:198px}.hero{min-height:600px}}
.hero-poster{position:relative;z-index:1;border-radius:var(--r-md);overflow:hidden;
  box-shadow:0 10px 34px rgba(0,0,0,.75);margin-top:0;margin-left:0}
.hero-poster img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
.hero-meta{flex:1;min-width:0}
.hero-title{font-size:clamp(22px,5vw,42px);font-weight:800;line-height:1.1;
  letter-spacing:-.5px;margin-bottom:4px}
.hero-orig{font-size:13px;color:var(--dim);margin-bottom:12px;font-style:italic}
.hero-info{display:flex;flex-wrap:wrap;align-items:center;gap:5px 12px;
  color:var(--dim);font-size:13px;margin-bottom:12px}
.dot{color:var(--faint)}
.age-badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:var(--text);font-size:11px;font-weight:600;padding:1px 6px;border-radius:4px}
/* info row */
.hero-facts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:16px}
@media(min-width:640px){.hero-facts{grid-template-columns:repeat(4,minmax(0,1fr))}}
.fact-card{border:1px solid var(--border);background:rgba(255,255,255,.03);border-radius:14px;padding:10px 12px;min-height:56px}
.fact-label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin-bottom:4px}
.fact-value{display:block;font-size:13px;font-weight:700;color:var(--text);line-height:1.25}
.ratings-row{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-bottom:16px}
.ratings-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);flex-shrink:0}
.ext-scores{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.ext-item{display:flex;align-items:center;gap:5px}
.badge{font-size:10px;font-weight:700;padding:2px 5px;border-radius:3px;letter-spacing:.2px}
.badge-imdb{background:#F5C518;color:#000}
.badge-rt{background:#FA320A;color:#fff}
.badge-meta{background:#005F6B;color:#fff}
.badge-tmdb{background:#0D253F;color:#01B4E4;border:1px solid #01B4E4}
.ext-val{font-size:13px;font-weight:600;color:var(--text)}

.genres{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.g-pill{background:rgba(255,255,255,.08);border:1px solid var(--border);
  color:var(--dim);font-size:12px;padding:3px 10px;border-radius:20px}

.ctas{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.btn-watch{display:flex;align-items:center;gap:8px;background:var(--pink);color:#fff;
  font-size:14px;font-weight:700;padding:11px 22px;border-radius:var(--r-md);
  border:none;cursor:pointer;font-family:inherit;transition:all .15s;
  box-shadow:0 10px 24px rgba(235,47,150,.22)}
.btn-watch:hover{background:#d42889;transform:translateY(-1px)}
.btn-trailer{display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.08);color:var(--text);font-size:14px;font-weight:600;
  padding:11px 18px;border-radius:var(--r-md);border:1px solid rgba(255,255,255,.2);
  cursor:pointer;font-family:inherit;transition:all .15s}
.btn-trailer:hover{background:rgba(255,255,255,.14)}
.btn-save{display:flex;align-items:center;gap:6px;background:transparent;
  color:var(--dim);font-size:14px;font-weight:500;padding:11px 14px;
  border-radius:var(--r-md);border:1px solid var(--border);
  cursor:pointer;font-family:inherit;transition:all .15s}
.btn-save:hover{color:var(--text);border-color:var(--border2)}
.btn-save.saved{color:var(--pink);border-color:var(--pink-border);background:var(--pink-dim)}

.hero-flow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.flow-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;
  border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--dim);font-size:12px;font-weight:600}
.flow-chip strong{color:var(--text)}

/* ── MOBILE HERO VIEW (IMDb-style) ── */
.hero-mobile-view{display:none}
@media(max-width:560px){
  /* hide desktop hero layout */
  .hero{min-height:0}
  .hero-inner{display:none}
  .hero-mobile-view{
    display:block;
    background:var(--bg);
    position:relative;z-index:2;
  }
  /* compact title bar above trailer */
  .hmv-header{padding:12px 14px 8px;background:var(--bg)}
  .hmv-eyebrow{font-size:11px;color:var(--faint);font-weight:600;letter-spacing:.04em;margin-bottom:4px}
  .hmv-title{font-size:22px;font-weight:800;line-height:1.1;letter-spacing:-.3px;color:var(--text);margin-bottom:4px}
  .hmv-sub{font-size:12px;color:var(--dim);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .hmv-dot{color:var(--faint)}
  .hmv-age{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);
    font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;color:var(--text)}
  /* inline trailer block */
  .hmv-trailer{
    aspect-ratio:16/9;background:#000;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;cursor:pointer;position:relative;overflow:hidden;
  }
  .hmv-trailer-bg{position:absolute;inset:0;background-size:cover;background-position:center;
    filter:brightness(.35) blur(2px);transform:scale(1.05)}
  .hmv-play-circle{
    width:52px;height:52px;border-radius:50%;
    border:2.5px solid rgba(255,255,255,.9);
    display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,.4);position:relative;z-index:1;
    transition:background .15s;
  }
  .hmv-trailer:hover .hmv-play-circle{background:rgba(235,47,150,.7)}
  .hmv-play-label{font-size:12px;font-weight:600;color:rgba(255,255,255,.8);position:relative;z-index:1}
  /* info row: poster + genres + overview */
  .hmv-info-row{display:flex;gap:12px;padding:14px 14px 0;align-items:flex-start}
  .hmv-poster{width:80px;flex-shrink:0;border-radius:8px;aspect-ratio:2/3;object-fit:cover;display:block;box-shadow:0 4px 16px rgba(0,0,0,.5)}
  .hmv-right{flex:1;min-width:0}
  .hmv-genres{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
  .hmv-genre-pill{font-size:11px;padding:3px 9px;border-radius:20px;
    background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--dim)}
  .hmv-overview{font-size:14px;line-height:1.55;color:var(--text);opacity:.88}
  /* rating row */
  .hmv-rating-row{padding:14px 14px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .hmv-momo-score{display:flex;align-items:center;gap:5px}
  .hmv-score-num{font-size:22px;font-weight:900;color:#FFD700}
  .hmv-score-denom{font-size:12px;color:var(--dim)}
  .hmv-score-count{font-size:11px;color:var(--faint)}
  /* rating details as inline flow on mobile */
  .hmv-ext-grid{
    display:flex;flex-wrap:wrap;gap:10px 14px;
    padding:10px 14px 0
  }
  .hmv-ext-item{display:flex;align-items:center;gap:6px;padding:0;background:none;border:none}
  .hmv-ext-val{font-size:13px;font-weight:700;color:var(--text)}
  /* CTAs */
  .hmv-ctas{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px}
  .hmv-btn-primary{
    display:flex;align-items:center;justify-content:center;gap:7px;
    background:var(--pink);color:#fff;font-size:14px;font-weight:700;
    padding:12px 10px;border-radius:var(--r-md);border:none;cursor:pointer;
    font-family:inherit;box-shadow:0 8px 20px rgba(235,47,150,.3)
  }
  .hmv-btn-secondary{
    display:flex;align-items:center;justify-content:center;gap:6px;
    background:rgba(255,255,255,.06);color:var(--text);font-size:13px;font-weight:600;
    padding:12px 10px;border-radius:var(--r-md);border:1px solid var(--border);
    cursor:pointer;font-family:inherit
  }
}

.mobile-actions{display:none}
@media(max-width:560px){
  .mobile-actions{
    display:grid;grid-template-columns:repeat(3,1fr);gap:8px;position:sticky;bottom:10px;
    z-index:120;margin-top:16px;padding:10px;background:rgba(8,7,14,.72);
    backdrop-filter:blur(18px);border:1px solid var(--border);border-radius:18px
  }
  .mobile-actions .mini-btn{
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    min-height:60px;border-radius:14px;padding:10px 8px;border:1px solid var(--border);
    background:rgba(255,255,255,.04);color:var(--text);font-size:11px;font-weight:700
  }
  .mobile-actions .mini-btn.primary{background:var(--pink);border-color:transparent}
  .mobile-actions .mini-btn svg{display:block}
}

/* MAIN */
.wrap{max-width:1100px;margin:0 auto;padding:0 20px 80px;position:relative;z-index:1}
.divider{height:1px;background:var(--border);margin:32px 0}

.about{padding:24px 0 0}
.tagline{font-size:15px;font-style:italic;color:var(--dim);margin-bottom:8px}
.overview{font-size:14px;color:var(--dim);line-height:1.75;max-width:680px}
.about,.sec-head,.ott-intro{scroll-margin-top:84px}

/* SEASON SECTION */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;
  flex-wrap:wrap;gap:10px}
.sec-title{font-size:16px;font-weight:700}

.season-tabs{display:flex;gap:8px;flex-wrap:wrap}
.s-tab{display:flex;flex-direction:column;align-items:flex-start;gap:1px;
  padding:8px 16px;border-radius:var(--r-md);border:1px solid var(--border);
  background:transparent;color:var(--dim);cursor:pointer;font-family:inherit;
  transition:all .15s;min-width:90px}
.s-tab:hover{border-color:var(--border2);color:var(--text)}
.s-tab.on{background:var(--pink-dim);border-color:var(--pink-border);color:var(--text)}
.s-tab-name{font-size:13px;font-weight:600}
.s-tab-meta{font-size:11px;color:var(--faint)}
.s-tab.on .s-tab-meta{color:rgba(235,47,150,.7)}

/* EPISODE LIST */
.ep-list{display:flex;flex-direction:column;gap:2px}
.ep{display:flex;align-items:flex-start;gap:14px;padding:13px 10px;
  border-radius:var(--r-md);border:1px solid transparent;
  cursor:pointer;transition:all .15s;text-align:left;width:100%;font-family:inherit;
  background:transparent}
.ep:hover{background:rgba(255,255,255,.04);border-color:var(--border)}
.ep.ep-latest{border-color:var(--pink-border);background:rgba(235,47,150,.05)}
.ep:disabled{cursor:default}
.ep:disabled:hover{background:transparent;border-color:transparent}
.ep-num{flex-shrink:0;font-size:14px;font-weight:600;color:var(--faint);
  min-width:22px;padding-top:2px;text-align:right}
.ep-thumb{flex-shrink:0;width:110px;aspect-ratio:16/9;border-radius:var(--r-sm);
  overflow:hidden;background:var(--surf2);position:relative}
@media(min-width:480px){.ep-thumb{width:136px}}
@media(min-width:768px){.ep-thumb{width:160px}}
.ep-thumb img{width:100%;height:100%;object-fit:cover}
.ep-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--faint)}
.ep-play-ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s;background:rgba(0,0,0,.4)}
.ep:hover .ep-play-ov{opacity:1}
.play-circle{width:32px;height:32px;background:rgba(255,255,255,.9);border-radius:50%;
  display:flex;align-items:center;justify-content:center;color:#000}
.ep-info{flex:1;min-width:0}
.ep-title-row{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.ep-title{font-size:14px;font-weight:600;color:var(--text);flex:1}
.ep-rt{font-size:12px;color:var(--faint);flex-shrink:0}
.ep-date{font-size:12px;color:var(--faint);margin-bottom:4px}
.ep-ov{font-size:13px;color:var(--dim);line-height:1.55;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden}
.ep-soon{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;
  color:var(--gold);background:rgba(245,166,35,.1);padding:2px 8px;border-radius:20px;margin-top:4px}

/* OTT PLATFORM SECTION */
.ott-intro{font-size:13px;color:var(--dim);margin-bottom:16px;max-width:560px}
.ott-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:640px){.ott-grid{grid-template-columns:1fr 1fr}}
@media(min-width:900px){.ott-grid{grid-template-columns:1fr 1fr 1fr}}

.ott-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:18px;display:flex;flex-direction:column;gap:14px;transition:border-color .15s}
.ott-card:hover{border-color:var(--border2)}
.ott-card.na{opacity:.5}

.ott-head{display:flex;align-items:center;gap:12px}
.ott-logo{width:42px;height:42px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;flex-shrink:0;letter-spacing:-.3px}
.ott-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px}
.ott-avail{display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px}
.ott-avail.yes{background:rgba(34,197,94,.1);color:#4ADE80;border:1px solid rgba(34,197,94,.2)}
.ott-avail.no{background:rgba(255,255,255,.06);color:var(--faint)}

.ott-content-tag{font-size:11px;color:var(--dim);margin-top:2px}

.ott-packages{display:flex;flex-direction:column;gap:6px}
.pkg-row{display:flex;align-items:center;justify-content:space-between;
  padding:8px 10px;border-radius:var(--r-sm);border:1px solid var(--border);
  background:rgba(255,255,255,.03);cursor:pointer;transition:all .15s}
.pkg-row:hover{border-color:var(--border2);background:rgba(255,255,255,.06)}
.pkg-row.featured{border-color:var(--pink-border);background:var(--pink-dim)}
.pkg-name{font-size:12px;font-weight:600;color:var(--text)}
.pkg-price{font-size:13px;font-weight:700;color:var(--text)}
.pkg-price-sub{font-size:10px;color:var(--faint);margin-left:2px}
.pkg-save{font-size:10px;font-weight:600;color:var(--pink);
  background:rgba(235,47,150,.1);border:1px solid rgba(235,47,150,.2);
  padding:1px 5px;border-radius:20px;margin-left:4px}

.ott-cta{display:flex;align-items:center;gap:8px}
.btn-ott-buy{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  background:var(--pink);color:#fff;font-size:13px;font-weight:600;
  padding:9px 14px;border-radius:var(--r-md);border:none;
  cursor:pointer;font-family:inherit;transition:all .15s}
.btn-ott-buy:hover{background:#d42889}
.btn-ott-buy.ghost{background:rgba(255,255,255,.07);color:var(--dim);border:1px solid var(--border)}
.btn-ott-buy.ghost:hover{color:var(--text);background:rgba(255,255,255,.12)}

/* MoMo benefit banner */
.momo-benefit{background:var(--pink-dim);border:1px solid var(--pink-border);
  border-radius:var(--r-lg);padding:18px 20px;margin-top:16px;
  display:flex;flex-wrap:wrap;align-items:center;gap:14px}
.momo-benefit-icon{width:44px;height:44px;border-radius:11px;overflow:hidden;flex-shrink:0}
.momo-benefit-icon img{width:100%;height:100%}

    } catch (e) {
      return '';
    }
  })(),
  USE_REAL: true,
  BASE: 'https://api.themoviedb.org/3',
  IMG: 'https://image.tmdb.org/t/p',
};
const tImg = (p, s = 'w500') => p ? `${TMDB.IMG}/${s}${p}` : '';

const TMDB_GENRES = {
  16: 'Hoạt hình',
  18: 'Kịch tính',
  27: 'Kinh dị',
  35: 'Hài',

  10766: 'Opera',
  10767: 'Talk Show',
  10768: 'Chiến tranh & Chính trị',
  10770: 'Phim truyền hình',
};

function tmdbHeaders() {
  return {
    Authorization: `Bearer ${TMDB.KEY}`,
    Accept: 'application/json',
    'Content-Type': 'application/json',
  };
}

function buildUrl(path, params = {}) {
  const qs = new URLSearchParams();
  Object.entries(params).forEach(([key, value]) => {
    if (value !== undefined && value !== null && value !== '') qs.set(key, value);
  });
  return `${TMDB.BASE}${path}${qs.toString() ? `?${qs.toString()}` : ''}`;
}

async function tmdbFetch(path, params = {}) {
  const res = await fetch(buildUrl(path, params), { headers: tmdbHeaders() });
  if (!res.ok) throw new Error(`TMDB ${res.status} ${res.statusText}`);
  return res.json();
}

function cloneSeries(seed) {
  if (!seed) return null;
  return JSON.parse(JSON.stringify(seed));
}

function normalizeGenres(list) {
  return (list || []).map(g => ({ id: g.id, name: g.name || TMDB_GENRES[g.id] || `Genre ${g.id}` }));
}

function getSeriesRoute() {
  const parts = location.pathname.split('/').filter(Boolean);
  const idx = parts.indexOf('series');
  const tail = idx >= 0 ? parts.slice(idx + 1).join('/') : '';
  const slug = tail.replace(/\/+$/, '');
  const match = slug.match(/^(.*?)-(\d+)$/);
  if (match) return { slug: match[1], id: Number(match[2]) };
  return { slug: slug || 'the-last-of-us', id: null };
}

const SERIES_ROUTE = getSeriesRoute();

async function resolveSeriesId(route) {
  if (route.id) return route.id;
  if (!(TMDB.USE_REAL && TMDB.KEY)) return FALLBACK_SERIES.id;

  try {
    const data = await tmdbFetch('/search/tv', {
      query: route.slug.replace(/-/g, ' '),
      language: 'vi-VN',
      page: 1,
      include_adult: 'false',
    });
    return data.results?.[0]?.id || FALLBACK_SERIES.id;
  } catch (e) {
    console.warn('TMDB series search failed', e);

    native_fptplay: { avail: true,  content: 'S1 + S2 đầy đủ · Phụ đề Việt · HBO' },
    native_vieon:   { avail: false, content: '' },
  },
};

/* ── LOAD WATCH PROVIDERS ── */
async function loadWatchProviders(seriesId) {
  let tmdbFlatrate = [];

  if (TMDB.USE_REAL && TMDB.KEY) {
    try {
      const data = await tmdbFetch(`/tv/${seriesId}/watch/providers`, { watch_region: 'VN' });
      tmdbFlatrate = data.results?.VN?.flatrate || [];
    } catch (e) { console.warn('Watch providers fetch failed', e); }
  } else {
    tmdbFlatrate = MOCK_WATCH_PROVIDERS[seriesId]?.results?.VN?.flatrate || [];
  }

  const nativeData = MOCK_NATIVE_AVAILABILITY[seriesId] || {};
  const platforms = [];

  // TMDB-confirmed providers → match to MoMo partners
  for (const p of tmdbFlatrate) {
    const partner = MOMO_OTT_PARTNERS[p.provider_id];
    if (partner) platforms.push({ ...partner, avail: true, content: 'Có sẵn · Phụ đề Việt', source: 'tmdb' });
  }

  // Native MoMo partners (FPT Play, VieON)
  for (const [key, avData] of Object.entries(nativeData)) {
    const partner = MOMO_OTT_PARTNERS[key];
    if (partner) platforms.push({ ...partner, avail: avData.avail, content: avData.content, source: 'native' });
  }

  // Available platforms first
  platforms.sort((a, b) => (b.avail ? 1 : 0) - (a.avail ? 1 : 0));
  return platforms;
}

function normalizeProviders(results, seriesId = SERIES_ROUTE.id || FALLBACK_SERIES.id) {
  const flatrate = results?.VN?.flatrate || [];
  const platforms = [];

  for (const p of flatrate) {
    const partner = MOMO_OTT_PARTNERS[p.provider_id];
    if (partner) platforms.push({ ...partner, avail: true, content: 'Có sẵn · Phụ đề Việt', source: 'tmdb' });
  }

  const nativeData = MOCK_NATIVE_AVAILABILITY[seriesId] || {};
  for (const [key, avData] of Object.entries(nativeData)) {
    const partner = MOMO_OTT_PARTNERS[key];
    if (partner) platforms.push({ ...partner, avail: avData.avail, content: avData.content, source: 'native' });
  }

  platforms.sort((a, b) => (b.avail ? 1 : 0) - (a.avail ? 1 : 0));
  return platforms;
}

function normalizeSeasonDetail(detail) {
  return {
    episodes: (detail?.episodes || []).map(ep => ({
      n: ep.episode_number,
      name: ep.name || `Episode ${ep.episode_number}`,
      date: ep.air_date || '',
      rt: Math.round((ep.vote_average || 0) * 10),
      still: ep.still_path || '',
      ov: ep.overview || 'Chưa có mô tả từ TMDB.',
    })),
  };
}

function pickBackdropPath(details, images) {
  const backdropCandidates = [
    details?.backdrop_path,
    images?.backdrops?.find(b => b.file_path)?.file_path,
  ].filter(Boolean);
  return backdropCandidates[0] || null;
}

function pickGalleryImages(images) {
  const seen = new Set();
  const source = [
    ...(images?.backdrops || []).slice(0, 6).map(img => ({
      path: img.file_path,
      label: 'Backdrop',
      ratio: '16/9',
    })),
    ...(images?.posters || []).slice(0, 4).map(img => ({
      path: img.file_path,
      label: 'Poster',
      ratio: '2/3',
    })),
  ];

  return source.filter(item => {
    if (!item.path || seen.has(item.path)) return false;
    seen.add(item.path);
    return true;
  });
}

const seasonCache = {};

async function loadSeason(seriesId, seasonNum) {
  if (seasonCache[seasonNum]) return seasonCache[seasonNum];
  if (!(TMDB.USE_REAL && TMDB.KEY)) return cloneSeries(FALLBACK_SEASONS[seasonNum] || null);

  try {
    const data = await tmdbFetch(`/tv/${seriesId}/season/${seasonNum}`, { language: 'vi-VN' });
    const normalized = normalizeSeasonDetail(data);
    seasonCache[seasonNum] = normalized;
    return normalized;
  } catch (e) {
    console.warn(`TMDB season ${seasonNum} fetch failed`, e);
    return cloneSeries(FALLBACK_SEASONS[seasonNum] || null);
  }
}

async function loadSeriesMeta(seriesId) {
  if (!(TMDB.USE_REAL && TMDB.KEY)) {
    const catalogEntry = MOCK_CATALOG[seriesId];
    return cloneSeries(catalogEntry ? { ...FALLBACK_SERIES, ...catalogEntry } : FALLBACK_SERIES);
  }

  try {
    const [details, aggregateCredits, similar, providers, seasonTwo, images] = await Promise.all([
      tmdbFetch(`/tv/${seriesId}`, {
        language: 'vi-VN',
        append_to_response: 'content_ratings,external_ids',
      }),
      tmdbFetch(`/tv/${seriesId}/aggregate_credits`, { language: 'vi-VN' }),
      tmdbFetch(`/tv/${seriesId}/similar`, { language: 'vi-VN', page: 1 }),
      tmdbFetch(`/tv/${seriesId}/watch/providers`, { watch_region: 'VN' }),
      tmdbFetch(`/tv/${seriesId}/season/2`, { language: 'vi-VN' }).catch(() => null),
      tmdbFetch(`/tv/${seriesId}/images`, { include_image_language: 'en,null' }).catch(() => null),
    ]);

    const vnRating = details.content_ratings?.results?.find(r => r.iso_3166_1 === 'VN')?.rating
      || details.content_ratings?.results?.find(r => r.iso_3166_1 === 'US')?.rating
      || FALLBACK_SERIES.content_ratings_display;

    const cast = (aggregateCredits.cast || []).slice(0, 12).map(p => ({
      id: p.id,
      name: p.name,
      char: (p.roles && p.roles[0] && p.roles[0].character) || p.character || '',
      img: p.profile_path,
    }));

    const seasons = (details.seasons || []).filter(s => s.season_number > 0).map(s => ({
      season_number: s.season_number,
      name: s.name || `Season ${s.season_number}`,
      episode_count: s.episode_count || 0,
      air_date: s.air_date || '',
    }));

    if (seasonTwo && seasonTwo.season_number === 2) {
      seasonCache[2] = normalizeSeasonDetail(seasonTwo);
    }

    return {
      ...cloneSeries(FALLBACK_SERIES),
      id: details.id || seriesId,
      name: details.name || details.original_name || FALLBACK_SERIES.name,
      original_name: details.original_name || details.name || FALLBACK_SERIES.original_name,
      tagline: details.tagline || FALLBACK_SERIES.tagline,
      overview: details.overview || FALLBACK_SERIES.overview,
      poster_path: details.poster_path || FALLBACK_SERIES.poster_path,
      backdrop_path: pickBackdropPath(details, images) || FALLBACK_SERIES.backdrop_path,
      hero_backdrop_path: pickBackdropPath(details, images) || FALLBACK_SERIES.backdrop_path,
      first_air_date: details.first_air_date || FALLBACK_SERIES.first_air_date,
      last_air_date: details.last_air_date || FALLBACK_SERIES.last_air_date,
      number_of_seasons: details.number_of_seasons || seasons.length || FALLBACK_SERIES.number_of_seasons,
      number_of_episodes: details.number_of_episodes || FALLBACK_SERIES.number_of_episodes,
      status: details.status || FALLBACK_SERIES.status,
      vote_average: details.vote_average || FALLBACK_SERIES.vote_average,
      vote_count: details.vote_count || FALLBACK_SERIES.vote_count,
      content_ratings_display: vnRating ? `TV-${vnRating}` : FALLBACK_SERIES.content_ratings_display,
      genres: normalizeGenres(details.genres || FALLBACK_SERIES.genres),
      networks: (details.networks || FALLBACK_SERIES.networks).map(n => ({ id: n.id, name: n.name })),
      ext_scores: {
        ...FALLBACK_SERIES.ext_scores,
        tmdb: `${Math.round((details.vote_average || FALLBACK_SERIES.vote_average) * 10)}%`,
      },
      seasons,
      cast: cast.length ? cast : FALLBACK_SERIES.cast,
      similar: (similar.results || []).slice(0, 6).map(item => ({
        id: item.id,
        name: item.name,
        poster: item.poster_path,
        year: (item.first_air_date || '').slice(0, 4) || '',
      })).filter(item => item.poster),
      gallery: pickGalleryImages(images),
      platforms: normalizeProviders(providers.results || {}, seriesId),
    };
  } catch (e) {
    console.warn('TMDB series fetch failed', e);
    return cloneSeries(FALLBACK_SERIES);
  }
}

/* ── HELPERS ── */
const fDate = s => s ? new Date(s).toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'}) : '';
const fYear = s => s ? s.slice(0,4) : '';
const fRT = m => { if(!m) return ''; const h=Math.floor(m/60),mn=m%60; return h ? `${h}g${mn?mn+'p':''}` : `${mn}p`; };
const aired = d => !d || new Date(d) <= new Date();

function icon(name, sz = 16) {
  if (typeof lucide === 'undefined') return '';
  const el = lucide.createElement(lucide.icons[name] || lucide.icons['film']);
  el.setAttribute('width', sz); el.setAttribute('height', sz);
  return el.outerHTML;
}

  const data = await loadSeason(S.id, seasonNum);

    return;
  }

  list.innerHTML = data.episodes.map((ep, i) => {
    const isAired = aired(ep.date);
    const stillUrl = ep.still ? tImg(ep.still, 'w300') : '';

function renderCast(s) {
  document.getElementById('cast-row').innerHTML = s.cast.map(p => {
    const url = p.img ? tImg(p.img, 'w185') : '';
    return `
      <div class="cast-card" onclick="goActor(${p.id},'${p.name}')">
        <div class="cast-av">
          ${url
            ? `<img src="${url}" alt="${p.name}" onerror="this.outerHTML='<div class=cast-init>${p.name[0]}</div>'">`
            : `<div class="cast-init">${p.name[0]}</div>`}
        </div>
        <div class="cast-name" title="${p.name}">${p.name}</div>
        <div class="cast-role" title="${p.char}">${p.char}</div>
      </div>
    `;
  }).join('');
}

function renderGallery(s) {
  document.getElementById('photo-grid').innerHTML = (s.gallery || []).map((img, idx) => `
    <div class="photo-card" onclick="openPhoto('${img.path}')">
      <img src="${tImg(img.path,'w780')}" alt="${s.name} ${img.label} ${idx + 1}" onerror="this.style.display='none'">
      <div class="photo-cap">${img.label}</div>
    </div>
  `).join('');
}

/* ── RENDER SIMILAR ── */
function renderSimilar(s) {
  document.getElementById('sim-grid').innerHTML = s.similar.map(item => `
    <div class="sim-card" onclick="goSeries(${item.id},'${item.name}')">
      <div class="sim-poster">
        <img src="${tImg(item.poster,'w342')}" alt="${item.name}" onerror="this.style.display='none'">
      </div>
      <div class="sim-name">${item.name}</div>
      <div class="sim-year">${item.year}</div>
    </div>
  `).join('');
}

/* ── SEASON SWITCH ── */
function switchSeason(n) {
  activeSeason = n;
  renderTabs(S);
  void renderEps(n);
}

/* ── ACTIONS ── */
function watchNow()  { jumpTo('plat-sec'); }
function playEp(n,s) { alert(`S${s}E${n} — Chuyển đến nền tảng xem ${S?.name || FALLBACK_SERIES.name}`); }
function openTrailer(){ document.getElementById('modal').classList.add('open'); }
function closeTrailer(){ document.getElementById('modal').classList.remove('open'); }
function buyOTT(id)      { alert(`Mở MoMo → Mua gói ${id.toUpperCase()}`); }
function buyPkg(id, pkg) { alert(`Mua "${pkg}" trên ${id.toUpperCase()} qua MoMo`); }
function previewOTT(id)  { alert(`Xem thử trên ${id.toUpperCase()}`); }
function viewAllOTT()    { alert('Chuyển đến trang OTT Hub của MoMo'); }
function goActor(id,name){ window.location.href = `/cinema/actor/${name.toLowerCase().replace(/\s+/g,'-')}-${id}`; }
function goSeries(id,name){ window.location.href = `/cinema/series/${name.toLowerCase().replace(/[^a-z0-9]+/g,'-')}-${id}`; }
function jumpTo(id){ document.getElementById(id)?.scrollIntoView({behavior:'smooth', block:'start'}); }
function openPhoto(path){ window.open(tImg(path, 'original'), '_blank', 'noopener,noreferrer'); }

function toggleSave() {
  saved = !saved;
  const btn = document.getElementById('save-btn');
  btn.className = 'btn-save' + (saved ? ' saved' : '');
  btn.innerHTML = icon('bookmark',15) + (saved ? ' Đã lưu' : ' Lưu');
}

/* ── INIT ── */
async function init() {
  const seriesId = await resolveSeriesId(SERIES_ROUTE);
  S = await loadSeriesMeta(seriesId);
  const seasonNums = (S.seasons || []).map(s => s.season_number).filter(Boolean);
  activeSeason = seasonNums.length ? Math.max(...seasonNums) : 1;
  renderHero(S);
  renderAbout(S);
  renderTabs(S);
  renderCast(S);
  renderSimilar(S);
  renderPlatforms(S.platforms || await loadWatchProviders(S.id));
  await renderEps(activeSeason);
  renderGallery(S);
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTrailer(); });
init();
</script>
