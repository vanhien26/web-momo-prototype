@font-face{font-family:'MoMoTrustSans';src:url('/assets/fonts/momo-trust/MoMoTrustSans-Medium.otf') format('opentype');font-weight:500 700;font-display:swap}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  --r-sm:8px;--r-md:12px;--r-lg:16px;

  --content:1100px;
}
html{scroll-behavior:smooth}
body{font-family:'MoMoTrustSans',-apple-system,sans-serif;background:var(--gray-100);color:var(--gray-900);min-height:100vh;font-size:15px;line-height:1.5}
img{max-width:100%;display:block}
button{cursor:pointer;font-family:inherit;border:none;background:none}
a{text-decoration:none;color:inherit}

/* NAV */
.site-nav{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--gray-200)}
.nav-inner{max-width:var(--content);margin:0 auto;height:60px;padding:0 20px;display:flex;align-items:center;gap:24px}
.nav-links{display:flex;gap:2px}
.nav-link{font-size:13px;font-weight:600;color:var(--gray-500);background:none;border:none;cursor:pointer;padding:7px 14px;border-radius:var(--r-sm);transition:all .15s}
.nav-link:hover{background:var(--gray-100);color:var(--gray-700)}
.nav-link.on{background:var(--pink-50);color:var(--pink-500)}
.nav-sp{flex:1}
.nav-search{display:flex;align-items:center;gap:8px;background:var(--gray-100);border:1px solid var(--gray-200);border-radius:var(--r-sm);padding:8px 14px;max-width:240px;flex:1}
.nav-search input{background:none;border:none;outline:none;color:var(--gray-900);font-family:'MoMoTrustSans',inherit;font-size:13px;width:100%}
.nav-search input::placeholder{color:var(--gray-400)}
@media(max-width:768px){.nav-links,.nav-search{display:none}}

/* PAGE HEADER */
.page-hd{background:#fff;border-bottom:1px solid var(--gray-200)}
.page-hd-inner{max-width:var(--content);margin:0 auto;padding:28px 20px 0}
.page-hd-top{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px}
.page-hd-title{font-size:24px;font-weight:800;letter-spacing:-.3px;color:var(--gray-900);display:flex;align-items:center;gap:8px}
.page-hd-count{font-size:14px;font-weight:500;color:var(--gray-400)}

/* FILTERS */
.filter-bar{display:flex;gap:8px;padding-bottom:0;overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap}
.filter-bar::-webkit-scrollbar{display:none}
.filter-group{display:flex;align-items:center;gap:6px;flex-shrink:0}
.filter-label{font-size:12px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.05em;flex-shrink:0}
.filter-chips{display:flex;gap:5px;flex-wrap:nowrap}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;border:1px solid var(--gray-200);background:#fff;color:var(--gray-500);cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:var(--pink-200);color:var(--pink-500)}
.chip.on{background:var(--pink-50);border-color:var(--pink-500);color:var(--pink-500)}
.filter-divider{width:1px;height:20px;background:var(--gray-200);flex-shrink:0;margin:0 4px}

.sort-row{display:flex;align-items:center;gap:8px;margin-top:14px;padding-bottom:16px}
.sort-label{font-size:12px;color:var(--gray-400);font-weight:600}
.sort-chips{display:flex;gap:4px}
.sort-chip{font-size:12px;font-weight:600;padding:4px 11px;border-radius:20px;border:1px solid var(--gray-200);background:#fff;color:var(--gray-500);cursor:pointer;transition:all .15s}
.sort-chip:hover{border-color:var(--gray-300);color:var(--gray-700)}
.sort-chip.on{background:var(--gray-900);color:#fff;border-color:var(--gray-900)}
.result-count{margin-left:auto;font-size:13px;color:var(--gray-400)}

/* GRID */
.page-body{max-width:var(--content);margin:0 auto;padding:24px 20px 60px}
.series-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:16px}
@media(min-width:640px){.series-grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:900px){.series-grid{grid-template-columns:repeat(5,1fr)}}
@media(min-width:1100px){.series-grid{grid-template-columns:repeat(6,1fr)}}

/* SERIES CARD */
.sc{background:#fff;border-radius:var(--r-lg);overflow:hidden;cursor:pointer;border:1px solid var(--gray-200);transition:all .2s;box-shadow:var(--shadow-s)}
.sc:hover{border-color:var(--pink-200);box-shadow:var(--shadow-m);transform:translateY(-2px)}
.sc-poster{position:relative;aspect-ratio:2/3;background:var(--gray-100);overflow:hidden}
.sc-poster img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.sc:hover .sc-poster img{transform:scale(1.04)}
.sc-status{position:absolute;top:8px;left:8px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:.2px}
.sc-status.airing{background:rgba(34,197,94,.9);color:#fff}
.sc-status.ended{background:rgba(0,0,0,.55);color:rgba(255,255,255,.8)}
.sc-status.upcoming{background:rgba(245,197,24,.92);color:#000}
.sc-platforms{position:absolute;bottom:8px;left:8px;display:flex;gap:4px}
.plat-dot{width:20px;height:20px;border-radius:5px;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.sc-body{padding:10px 12px 12px}
.sc-title{font-size:13px;font-weight:700;color:var(--gray-900);margin-bottom:3px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sc-meta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--gray-400);margin-bottom:6px}
.sc-dot{width:3px;height:3px;border-radius:50%;background:var(--gray-300)}
.sc-score{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:700;color:var(--gray-600)}
.sc-score svg{color:#F5C518}
.sc-genres{display:flex;gap:4px;flex-wrap:wrap}
.sc-genre{font-size:10px;padding:2px 7px;border-radius:8px;background:var(--gray-100);color:var(--gray-500);font-weight:600}

/* EMPTY STATE */
.empty{text-align:center;padding:80px 20px;color:var(--gray-400)}
.empty-icon{margin:0 auto 16px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:var(--gray-100);border-radius:50%}
.empty h3{font-size:16px;font-weight:700;color:var(--gray-600);margin-bottom:6px}
.empty p{font-size:14px}

/* MOBILE BOTTOM NAV */
.mobile-bnav{display:none}
@media(max-width:768px){

const ALL_PLATFORMS = [
  { id: 'fptplay', label: 'FPT Play', color: '#E5001C', tc: '#fff', lbl: 'FPT' },
  { id: 'netflix', label: 'Netflix',  color: '#141414', tc: '#E50914', lbl: 'N' },
  { id: 'vieon',   label: 'VieON',    color: '#0065BD', tc: '#fff', lbl: 'Vie' },
];
const STATUS_OPTIONS = [
  { id: 'airing',   label: 'Đang chiếu' },
  { id: 'upcoming', label: 'Sắp ra mắt' },
  { id: 'ended',    label: 'Đã kết thúc' },
];
const SORT_OPTIONS = [
  { id: 'score',  label: 'Điểm cao nhất' },
  { id: 'newest', label: 'Mới nhất' },
  { id: 'az',     label: 'A–Z' },
];

const state = {
  genres: [],
  platforms: [],
  statuses: [],
  sort: 'score',
  query: '',
};

function toggleFilter(key, val) {
  const arr = state[key];
  const idx = arr.indexOf(val);
  if (idx === -1) arr.push(val); else arr.splice(idx, 1);
  renderChips();
  renderGrid();
}
function setSort(val) {
  state.sort = val;
  renderChips();
  renderGrid();
}
function onSearch(v) {
  state.query = v.toLowerCase().trim();
  renderGrid();
}

function renderChips() {
  document.getElementById('genre-chips').innerHTML = ALL_GENRES.map(g => `
    <button class="chip ${state.genres.includes(g) ? 'on' : ''}" onclick="toggleFilter('genres','${g}')">${g}</button>
  `).join('');

  document.getElementById('platform-chips').innerHTML = ALL_PLATFORMS.map(p => `
    <button class="chip ${state.platforms.includes(p.id) ? 'on' : ''}" onclick="toggleFilter('platforms','${p.id}')">
      <span style="width:10px;height:10px;border-radius:3px;background:${p.color};flex-shrink:0;display:inline-block"></span>
      ${p.label}
    </button>
  `).join('');

  document.getElementById('status-chips').innerHTML = STATUS_OPTIONS.map(s => `
    <button class="chip ${state.statuses.includes(s.id) ? 'on' : ''}" onclick="toggleFilter('statuses','${s.id}')">${s.label}</button>
  `).join('');

  document.getElementById('sort-chips').innerHTML = SORT_OPTIONS.map(s => `
    <button class="sort-chip ${state.sort === s.id ? 'on' : ''}" onclick="setSort('${s.id}')">${s.label}</button>
  `).join('');
}

function filterData() {
  let data = [...SERIES];
  if (state.genres.length)    data = data.filter(s => state.genres.some(g => s.genres.includes(g)));
  if (state.platforms.length) data = data.filter(s => s.platforms.some(p => state.platforms.includes(p.id)));
  if (state.statuses.length)  data = data.filter(s => state.statuses.includes(s.status));
  if (state.query)            data = data.filter(s => s.title.toLowerCase().includes(state.query) || s.orig.toLowerCase().includes(state.query));
  if (state.sort === 'score')  data.sort((a,b) => b.score - a.score);
  if (state.sort === 'newest') data.sort((a,b) => b.year - a.year);
  if (state.sort === 'az')     data.sort((a,b) => a.title.localeCompare(b.title));
  return data;
}

const STATUS_LABEL = { airing: 'Đang chiếu', ended: 'Đã kết thúc', upcoming: 'Sắp ra mắt' };

function renderGrid() {
  const data = filterData();
  document.getElementById('result-count').textContent = `${data.length} series`;

  if (!data.length) {
    document.getElementById('series-grid').innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <div class="empty-icon"><i data-lucide="search-x" width="22" height="22" stroke-width="1.75"></i></div>
        <h3>Không tìm thấy kết quả</h3>
        <p>Thử thay đổi bộ lọc hoặc từ khóa tìm kiếm</p>
      </div>`;
    if (typeof lucide !== 'undefined') lucide.createIcons();
    return;
  }

  document.getElementById('series-grid').innerHTML = data.map(s => `
    <div class="sc" onclick="goSeries(${s.id},'${s.slug}')">
      <div class="sc-poster">
        <img src="${s.poster}" alt="${s.title}" onerror="this.style.background='var(--gray-200)';this.style.display='none'">
        <span class="sc-status ${s.status}">${STATUS_LABEL[s.status]}</span>
      </div>
      <div class="sc-body">
        <div class="sc-title">${s.title}</div>
        <div class="sc-meta">
          <span>${s.year}</span>
          <span class="sc-dot"></span>
          <span>${s.seasons} mùa</span>
          <span class="sc-dot"></span>
          <span class="sc-score">
            <i data-lucide="star" width="10" height="10" stroke-width="2" fill="currentColor"></i>
            ${s.score.toFixed(1)}
          </span>
        </div>
        <div class="sc-genres">${s.genres.slice(0,2).map(g => `<span class="sc-genre">${g}</span>`).join('')}</div>
      </div>
    </div>
  `).join('');
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

function goSeries(id, slug) {
  window.location.href = `/cinema/series/${slug}-${id}`;
}

renderChips();
renderGrid();
if (typeof lucide !== 'undefined') lucide.createIcons();
</script>
</body>
</html>
