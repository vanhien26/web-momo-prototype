<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SEO/GEO Content Plan — MoSpark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,400;1,9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ─────────────────────────────────────────────────────────────── */
:root{
  --sh-1:#0d0d13;--sh-2:#111118;--sh-3:#18181f;--sh-4:#20202a;
  --sh-line:rgba(255,255,255,.05);
  --sh-t1:#ededf4;--sh-t2:#80809a;--sh-t3:#36364a;
  --sf-1:#f9f9f7;--sf-2:#f3f3ef;--sf-3:#eaeae5;--sf-line:#e4e4de;
  --sf-ink:#14141e;--sf-t2:#5a5a72;--sf-t3:#9898a8;
  --pk:#a50064;--pk2:#c8007a;--pk-bg:#fff0f7;--pk-glow:rgba(165,0,100,.12);
  --green:#059669;--green-bg:#ecfdf5;
  --amber:#d97706;--amber-bg:#fffbeb;
  --red:#dc2626;--red-bg:#fef2f2;
  --blue:#2563eb;--blue-bg:#eff6ff;
  --r6:6px;--r8:8px;--r10:10px;--r12:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  background:var(--sh-1);color:var(--sf-ink);
  height:100vh;display:flex;flex-direction:column;
  overflow:hidden;-webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer}

/* ─── HEADER ─────────────────────────────────────────────────────────────── */
header{
  height:52px;background:var(--sh-2);border-bottom:1px solid var(--sh-line);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;flex-shrink:0;z-index:20;
}
.h-left{display:flex;align-items:center;gap:10px}
.h-back{font-size:10px;font-weight:600;color:var(--sh-t2);text-decoration:none;transition:color .15s}
.h-back:hover{color:var(--sh-t1)}
.h-div{width:1px;height:16px;background:var(--sh-line)}
.h-logo{
  width:28px;height:28px;border-radius:7px;background:var(--pk);color:#fff;
  display:grid;place-items:center;font-size:7px;font-weight:900;line-height:1.1;text-align:center;
}
.h-brand-name{font-size:12px;font-weight:800;color:var(--sh-t1)}
.h-brand-sub{font-size:9px;color:var(--sh-t2)}
.h-badge{
  font-size:9px;font-weight:700;letter-spacing:.5px;
  color:var(--pk);background:rgba(165,0,100,.08);
  padding:3px 10px;border-radius:20px;border:1px solid rgba(165,0,100,.18);
}
.h-avatar{
  width:28px;height:28px;border-radius:50%;
  background:rgba(165,0,100,.1);border:1.5px solid rgba(165,0,100,.25);
  display:grid;place-items:center;font-size:10px;font-weight:800;color:var(--pk);
}
.h-user-name{font-size:10px;color:var(--sh-t2)}
.h-user{display:flex;align-items:center;gap:8px}

/* ─── LAYOUT ─────────────────────────────────────────────────────────────── */
.layout{display:flex;flex:1;overflow:hidden}

/* ─── LEFT PANEL ─────────────────────────────────────────────────────────── */
.panel-left{
  width:284px;flex-shrink:0;background:var(--sh-2);
  border-right:1px solid var(--sh-line);
  display:flex;flex-direction:column;overflow:hidden;
}
.pl-head{padding:12px 12px 10px;border-bottom:1px solid var(--sh-line)}
.pl-title{
  font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  color:var(--sh-t2);margin-bottom:9px;
  display:flex;align-items:center;justify-content:space-between;
}
.pl-count{
  font-size:9px;font-weight:700;color:var(--sh-t3);
  background:rgba(255,255,255,.04);border:1px solid var(--sh-line);
  padding:1px 7px;border-radius:20px;
}
.pl-search{
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.04);border:1px solid var(--sh-line);
  border-radius:var(--r8);padding:7px 10px;margin-bottom:9px;
}
.pl-search-icon{font-size:14px;color:var(--sh-t2)}
.pl-search input{background:none;border:none;outline:none;font-size:11px;color:var(--sh-t1);width:100%}
.pl-search input::placeholder{color:var(--sh-t3)}
.pillar-filters{display:flex;flex-wrap:wrap;gap:4px}
.pf{
  font-size:9.5px;font-weight:600;padding:3px 9px;
  border-radius:20px;border:1px solid var(--sh-line);
  background:transparent;color:var(--sh-t2);transition:all .15s;
}
.pf.active,.pf:hover{background:var(--pk);color:#fff;border-color:var(--pk)}
.project-list{flex:1;overflow-y:auto;padding:6px}
.project-list::-webkit-scrollbar{width:3px}
.project-list::-webkit-scrollbar-thumb{background:var(--sh-3);border-radius:3px}
.pl-foot{padding:8px;border-top:1px solid var(--sh-line)}
.btn-new{
  width:100%;padding:8px;font-size:11px;font-weight:600;
  background:rgba(165,0,100,.08);color:var(--pk);
  border:1.5px dashed rgba(165,0,100,.2);border-radius:var(--r8);transition:all .15s;
}
.btn-new:hover{background:var(--pk-bg);border-color:var(--pk)}

/* ─── PROJECT CARD ───────────────────────────────────────────────────────── */
.pi{
  position:relative;padding:11px 12px;border-radius:var(--r8);margin-bottom:4px;
  cursor:pointer;transition:background .15s;border:1px solid transparent;overflow:hidden;
  animation:cardIn .22s ease both;
}
.pi:nth-child(1){animation-delay:.00s}.pi:nth-child(2){animation-delay:.04s}
.pi:nth-child(3){animation-delay:.08s}.pi:nth-child(4){animation-delay:.12s}
.pi:nth-child(5){animation-delay:.16s}.pi:nth-child(6){animation-delay:.20s}
.pi:nth-child(7){animation-delay:.24s}.pi:nth-child(8){animation-delay:.28s}
@keyframes cardIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
.pi:hover{background:var(--sh-4)}
.pi.sel{background:var(--sh-4);border-color:rgba(165,0,100,.22)}
.pi::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--pk);transform:scaleY(0);transform-origin:center;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1);
}
.pi:hover::before,.pi.sel::before{transform:scaleY(1)}
.pi-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.pi-name{font-family:'Fraunces',serif;font-size:13px;font-weight:600;color:var(--sh-t1);line-height:1.2}
.pi-badges{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end}
.badge{font-size:8.5px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap}
.b-p0{background:rgba(220,38,38,.15);color:#fca5a5;border:1px solid rgba(220,38,38,.2)}
.b-leader{background:rgba(5,150,105,.15);color:#6ee7b7;border:1px solid rgba(5,150,105,.2)}
.b-cao{background:rgba(165,0,100,.12);color:#f9a8d4;border:1px solid rgba(165,0,100,.18)}
.b-coming{background:rgba(128,128,154,.1);color:var(--sh-t2);border:1px solid var(--sh-line)}
.b-pill{background:rgba(255,255,255,.04);color:var(--sh-t2);border:1px solid var(--sh-line)}
.pi-vol{font-size:10px;color:var(--sh-t2);margin-bottom:6px}
.pi-vol b{color:var(--sh-t1)}
.sov-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.sov-track{flex:1;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.sov-fill{height:100%;border-radius:2px;transition:width .4s ease}
.sov-fill.f-low{background:linear-gradient(90deg,#dc2626,#ef4444)}
.sov-fill.f-mid{background:linear-gradient(90deg,#d97706,#f59e0b)}
.sov-fill.f-leader{background:linear-gradient(90deg,#059669,#10b981)}
.sov-lbl{font-size:9px;font-weight:700}
.sov-lbl.f-low{color:#fca5a5}.sov-lbl.f-mid{color:#fcd34d}.sov-lbl.f-leader{color:#6ee7b7}
.sov-na{font-size:9px;color:var(--sh-t3)}
.pi-stats{display:flex;gap:8px}
.pi-stat{font-size:9px;color:var(--sh-t3)}
.pi-stat b{color:var(--sh-t2)}
.pi-prog{
  margin-top:5px;display:flex;align-items:center;gap:6px;
}
.pi-prog-track{flex:1;height:2px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.pi-prog-fill{height:100%;background:var(--pk);border-radius:2px;transition:width .3s ease}
.pi-prog-lbl{font-size:8.5px;color:var(--sh-t3)}

/* ─── RIGHT PANEL ────────────────────────────────────────────────────────── */
.panel-right{flex:1;background:var(--sf-1);display:flex;flex-direction:column;overflow:hidden}

/* Empty state */
.empty-state{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  text-align:center;padding:40px;
}
.empty-icon{font-size:38px;opacity:.35}
.empty-state h3{
  font-family:'Fraunces',serif;font-size:20px;font-style:italic;font-weight:600;
  color:var(--sf-t2);
}
.empty-state p{font-size:12px;line-height:1.6;max-width:300px;color:var(--sf-t3)}

/* Detail wrapper */
.project-detail{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Detail header */
.dh{padding:18px 24px 14px;background:var(--sf-1);border-bottom:1px solid var(--sf-line);flex-shrink:0}
.dh-pillar{font-size:9.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--pk);margin-bottom:4px}
.dh-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.dh-title{
  font-family:'Fraunces',serif;font-size:24px;font-weight:700;font-style:italic;
  color:var(--sf-ink);line-height:1.1;
}
.dh-meta{display:flex;gap:0;flex-wrap:wrap}
.dh-mi{
  display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sf-t2);
  padding-right:14px;margin-right:14px;border-right:1px solid var(--sf-line);
}
.dh-mi:last-child{border-right:none;margin-right:0;padding-right:0}
.dh-mi b{color:var(--sf-ink)}
.dh-mi a{color:var(--pk);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:10px}
.dh-mi a:hover{text-decoration:underline}
.sov-chip{
  font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:20px;
  display:inline-block;
}
.sov-chip.f-low{background:var(--red-bg);color:var(--red)}
.sov-chip.f-mid{background:var(--amber-bg);color:var(--amber)}
.sov-chip.f-leader{background:var(--green-bg);color:var(--green)}
.sov-chip.f-none{background:var(--sf-3);color:var(--sf-t2)}

/* Progress bar */
.cp-prog{
  padding:12px 24px;background:var(--sf-2);border-bottom:1px solid var(--sf-line);
  display:flex;align-items:center;gap:28px;flex-shrink:0;
}
.prog-text{flex:1}
.prog-label{font-size:11px;color:var(--sf-t2);margin-bottom:5px}
.prog-label b{font-size:16px;font-weight:800;color:var(--sf-ink)}
.prog-track{height:5px;background:var(--sf-3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--pk),var(--pk2));border-radius:3px;transition:width .4s ease}
.prog-stats{display:flex;gap:20px;flex-shrink:0}
.ps{text-align:center}
.ps-n{display:block;font-size:15px;font-weight:800;color:var(--sf-ink);line-height:1}
.ps-l{display:block;font-size:9px;color:var(--sf-t3);margin-top:2px}

/* Content plan body */
.cp-body{flex:1;overflow-y:auto;padding:20px 24px}
.cp-body::-webkit-scrollbar{width:4px}
.cp-body::-webkit-scrollbar-thumb{background:var(--sf-3);border-radius:4px}

/* Funnel section */
.fn-section{margin-bottom:22px}
.fn-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.fn-tag{font-size:9px;font-weight:800;letter-spacing:.6px;padding:3px 10px;border-radius:20px}
.fn-tag.tofu{background:var(--blue-bg);color:var(--blue)}
.fn-tag.mofu{background:var(--amber-bg);color:var(--amber)}
.fn-tag.bofu{background:var(--green-bg);color:var(--green)}
.fn-meta{font-size:10px;color:var(--sf-t3);margin-left:auto}

/* Cluster table */
.cp-tbl{border:1px solid var(--sf-line);border-radius:var(--r10);overflow:hidden;background:#fff}
.cp-th,.cp-row{
  display:grid;
  grid-template-columns:1fr 72px minmax(150px,210px) 108px;
  padding:8px 16px;align-items:center;
}
.cp-th{
  background:var(--sf-2);border-bottom:1px solid var(--sf-line);
}
.cp-th span{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--sf-t3)}
.cp-row{border-bottom:1px solid var(--sf-line);transition:background .12s}
.cp-row:last-child{border-bottom:none}
.cp-row:hover{background:var(--sf-2)}
.cp-name{
  font-size:12px;font-weight:600;color:var(--sf-ink);
  display:flex;align-items:center;gap:8px;
}
.cp-dot{width:3px;height:14px;border-radius:2px;flex-shrink:0}
.cp-row.tofu .cp-dot{background:var(--blue)}
.cp-row.mofu .cp-dot{background:var(--amber)}
.cp-row.bofu .cp-dot{background:var(--green)}
.cp-vol{font-size:11px;font-weight:700;color:var(--sf-t2)}
.cp-pk{
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sf-ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.cp-btn{
  font-size:10px;font-weight:700;padding:4px 11px;border-radius:20px;
  border:none;cursor:pointer;transition:all .15s;white-space:nowrap;
  display:inline-flex;align-items:center;gap:4px;
}
.cp-btn.written{
  background:var(--green-bg);color:var(--green);
  box-shadow:0 1px 3px rgba(5,150,105,.12);
}
.cp-btn.written:hover{background:#d1fae5}
.cp-btn.unwritten{
  background:var(--sf-2);color:var(--sf-t2);
  border:1.5px dashed var(--sf-line);
}
.cp-btn.unwritten:hover{background:var(--pk-bg);color:var(--pk);border-color:rgba(165,0,100,.22)}

.cp-empty{text-align:center;padding:36px;color:var(--sf-t3);font-size:12px;line-height:1.6}

/* ─── TOAST ──────────────────────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:20px;right:20px;
  background:var(--sf-ink);color:#fff;
  border-radius:var(--r8);padding:11px 16px;font-size:11px;font-weight:600;
  display:flex;align-items:center;gap:8px;z-index:300;
  transform:translateY(70px) scale(.95);opacity:0;
  transition:all .32s cubic-bezier(.34,1.56,.64,1);
  max-width:340px;box-shadow:0 10px 32px rgba(0,0,0,.25);
}
.toast.show{transform:translateY(0) scale(1);opacity:1}
.toast.t-green{background:var(--green)}
.toast.t-amber{background:var(--amber)}
</style>
</head>
<body>

<header>
  <div class="h-left">
    <a href="../index.html" target="_top" class="h-back">← Store</a>
    <div class="h-div"></div>
    <div class="h-logo">mo<br>mo</div>
    <div>
      <div class="h-brand-name">MoSpark</div>
      <div class="h-brand-sub">SEO/GEO Content Plan</div>

  </div>

    <div class="h-avatar">VH</div>

<div class="layout">

<aside class="panel-left">
  <div class="pl-head">
    <div class="pl-title">

    <div class="pillar-filters">
      <button class="pf active" onclick="setPillar('all',this)">Tất cả</button>
      <button class="pf" onclick="setPillar('P1',this)">P1 Tài chính</button>
      <button class="pf" onclick="setPillar('P2',this)">P2 Bảo hiểm</button>
      <button class="pf" onclick="setPillar('P3',this)">P3 Tiện ích</button>

  </div>
  <div class="project-list" id="projectList"></div>
  <div class="pl-foot">
    <button class="btn-new" onclick="showToast('Tính năng tạo dự án mới đang phát triển','t-amber')">+ Dự án mới</button>

<div class="panel-right">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">📋</div>

  </div>
  <div class="project-detail" id="projectDetail" style="display:none"></div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ─── DATA ─────────────────────────────────────────────────────────────────── */
const PROJECTS = [
  {

  },
  {

    clusters:[
      {id:'bh-t1',name:'Kiến thức BHYT',funnel:'tofu',vol:780000,written:true,
       keywords:[{kw:'bảo hiểm y tế là gì',vol:145000},{kw:'quyền lợi BHYT 2026',vol:320000},{kw:'mức đóng BHYT tự nguyện',vol:315000}]},

/* ─── STATE ─────────────────────────────────────────────────────────────────── */
let selectedProject = null;
let activePillar = 'all';

/* ─── UTILS ─────────────────────────────────────────────────────────────────── */
function fmtVol(n){
  if(n>=1000000) return (n/1000000).toFixed(1)+'M';
  if(n>=1000) return Math.round(n/1000)+'K';
  return n.toString();
}
function getSovClass(sov){
  if(sov===null) return null;
  if(sov>=40) return 'f-leader';
  if(sov>=20) return 'f-mid';
  return 'f-low';
}
function writtenCount(p){return p.clusters.filter(c=>c.written).length}

/* ─── PROJECT LIST ───────────────────────────────────────────────────────────── */
function renderProjectList(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = PROJECTS.filter(p=>{
    const ok = activePillar==='all'||p.pillar===activePillar;
    return ok&&(!q||p.name.toLowerCase().includes(q));
  });
  document.getElementById('plCount').textContent = filtered.length;
  document.getElementById('projectList').innerHTML = filtered.map(p=>{
    const sc = getSovClass(p.sov);
    const sovPct = p.sov!==null ? Math.min(p.sov/p.targetSov*100,100) : 0;
    const bCls = {P0:'b-p0',LEADER:'b-leader',CAO:'b-cao',COMING:'b-coming'}[p.priority]||'b-pill';
    const bLbl = p.priority==='P0'?'P0 URGENT':p.priority==='COMING'?'SẮPRA':p.priority;
    const wc = writtenCount(p);
    const tot = p.clusters.length;
    const wpct = tot>0?Math.round(wc/tot*100):0;
    const totalKw = p.clusters.reduce((s,c)=>s+c.keywords.length,0);
    return `<div class="pi${selectedProject?.id===p.id?' sel':''}" onclick="selectProject('${p.id}')">
      <div class="pi-top">
        <div class="pi-name">${p.name}</div>
        <div class="pi-badges">
          <span class="badge ${bCls}">${bLbl}</span>
          <span class="badge b-pill">${p.pillar}</span>
        </div>
      </div>
      <div class="pi-vol">Market <b>${fmtVol(p.vol)}/tháng</b></div>
      <div class="sov-row">
        ${p.sov!==null
          ?`<div class="sov-track"><div class="sov-fill ${sc}" style="width:${sovPct}%"></div></div>
            <span class="sov-lbl ${sc}">${p.sov}% SoV</span>`
          :`<span class="sov-na">SoV: chưa đo</span>`}
      </div>
      <div class="pi-stats">
        <span class="pi-stat"><b>${tot}</b> clusters</span>
        <span class="pi-stat"><b>${totalKw}</b> keywords</span>
      </div>
      ${tot>0?`<div class="pi-prog">
        <div class="pi-prog-track"><div class="pi-prog-fill" style="width:${wpct}%"></div></div>
        <span class="pi-prog-lbl">${wc}/${tot} đã viết</span>
      </div>`:''}
    </div>`;
  }).join('');
}
function filterProjects(){renderProjectList()}
function setPillar(p,btn){
  activePillar=p;
  document.querySelectorAll('.pf').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderProjectList();
}

/* ─── SELECT PROJECT ──────────────────────────────────────────────────────────── */
function selectProject(id){
  selectedProject=PROJECTS.find(p=>p.id===id);
  renderProjectList();
  document.getElementById('emptyState').style.display='none';
  const det=document.getElementById('projectDetail');
  det.style.display='flex';
  det.innerHTML=buildDetail(selectedProject);
}

/* ─── BUILD DETAIL ──────────────────────────────────────────────────────────── */
function buildDetail(p){
  const wc=writtenCount(p);
  const tot=p.clusters.length;
  const pct=tot>0?Math.round(wc/tot*100):0;
  const totalVol=p.clusters.reduce((s,c)=>s+c.vol,0);
  const totalKw=p.clusters.reduce((s,c)=>s+c.keywords.length,0);
  const sc=getSovClass(p.sov);
  const bCls={P0:'b-p0',LEADER:'b-leader',CAO:'b-cao',COMING:'b-coming'}[p.priority]||'b-pill';
  const bLbl=p.priority==='P0'?'P0 URGENT':p.priority==='COMING'?'SẮPRA':p.priority;

  const groups={tofu:{label:'TOFU · Nhận biết',cs:[]},mofu:{label:'MOFU · Cân nhắc',cs:[]},bofu:{label:'BOFU · Chuyển đổi',cs:[]}};
  p.clusters.forEach(c=>{if(groups[c.funnel])groups[c.funnel].cs.push(c)});

  const renderGroup=(fk)=>{
    const g=groups[fk];
    if(!g.cs.length) return '';
    const gVol=g.cs.reduce((s,c)=>s+c.vol,0);
    const rows=g.cs.map(c=>{
      const pk=c.keywords.length?c.keywords[0].kw:'—';
      return `<div class="cp-row ${fk}">
        <div class="cp-name"><span class="cp-dot"></span>${c.name}</div>
        <div class="cp-vol">${fmtVol(c.vol)}</div>
        <div class="cp-pk" title="${pk}">${pk}</div>
        <button class="cp-btn ${c.written?'written':'unwritten'}"
          onclick="toggleWritten('${p.id}','${c.id}',this)">
          ${c.written?'✓ Đã viết':'+ Chưa viết'}
        </button>
      </div>`;
    }).join('');
    return `<div class="fn-section">
      <div class="fn-head">
        <span class="fn-tag ${fk}">${g.label}</span>
        <span class="fn-meta">${fmtVol(gVol)}/tháng &middot; ${g.cs.length} cluster${g.cs.length>1?'s':''}</span>
      </div>
      <div class="cp-tbl">
        <div class="cp-th">
          <span>Cluster</span><span>Volume</span><span>Primary Keyword</span><span>Status</span>
        </div>
        ${rows}
      </div>
    </div>`;
  };

  return `
    <div class="dh">
      <div class="dh-pillar">${p.pillar} &middot; ${p.pillarName}</div>
      <div class="dh-top">
        <h2 class="dh-title">${p.name}</h2>
        <span class="badge ${bCls}" style="margin-top:4px">${bLbl}</span>
      </div>
      <div class="dh-meta">
        <div class="dh-mi">Market <b>${fmtVol(p.vol)}/tháng</b></div>
        <div class="dh-mi">SoV MoMo
          ${p.sov!==null
            ?`<span class="sov-chip ${sc}">${p.sov}% / target ${p.targetSov}%</span>`
            :`<span class="sov-chip f-none">Chưa đo</span>`}
        </div>
        <div class="dh-mi"><a href="https://${p.microsite}" target="_blank">${p.microsite}</a></div>
      </div>
    </div>
    <div class="cp-prog">
      <div class="prog-text">
        <div class="prog-label"><b id="progFrac">${wc}/${tot}</b> clusters đã có content &mdash; <b id="progPct">${pct}%</b> hoàn thành</div>
        <div class="prog-track"><div class="prog-fill" id="progFill" style="width:${pct}%"></div></div>
      </div>
      <div class="prog-stats">
        <div class="ps"><span class="ps-n">${tot}</span><span class="ps-l">Clusters</span></div>
        <div class="ps"><span class="ps-n">${totalKw}</span><span class="ps-l">Keywords</span></div>
        <div class="ps"><span class="ps-n">${fmtVol(totalVol)}</span><span class="ps-l">Vol/tháng</span></div>
      </div>
    </div>
    <div class="cp-body">
      ${tot===0
        ?`<div class="cp-empty">Dự án này chưa có Cluster.<br>Bắt đầu bằng cách lên Content Plan cho giai đoạn TOFU.</div>`
        :['tofu','mofu','bofu'].map(renderGroup).join('')
      }
    </div>
  `;
}

/* ─── TOGGLE WRITTEN ─────────────────────────────────────────────────────────── */
function toggleWritten(projectId,clusterId,btn){
  const p=PROJECTS.find(p=>p.id===projectId);
  const c=p.clusters.find(c=>c.id===clusterId);
  c.written=!c.written;
  btn.className=`cp-btn ${c.written?'written':'unwritten'}`;
  btn.textContent=c.written?'✓ Đã viết':'+ Chưa viết';

  /* update progress */
  const wc=writtenCount(p);
  const tot=p.clusters.length;
  const pct=tot>0?Math.round(wc/tot*100):0;
  const fracEl=document.getElementById('progFrac');
  const pctEl=document.getElementById('progPct');
  const fillEl=document.getElementById('progFill');
  if(fracEl) fracEl.textContent=`${wc}/${tot}`;
  if(pctEl) pctEl.textContent=`${pct}%`;
  if(fillEl) fillEl.style.width=`${pct}%`;

  /* update sidebar mini-progress */
  renderProjectList();
  showToast(
    c.written?`✓ Đã đánh dấu "${c.name}" là đã viết`:`Bỏ đánh dấu "${c.name}"`,
    c.written?'t-green':''
  );
}

/* ─── TOAST ──────────────────────────────────────────────────────────────────── */
let toastTimer=null;
function showToast(msg,cls=''){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+(cls||'');
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

/* ─── INIT ───────────────────────────────────────────────────────────────────── */
renderProjectList();
</script>
