<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SEO/GEO Content Plan — MoSpark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,400;1,9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ─────────────────────────────────────────────────────────────── */
:root {
  --bg:#f0efeb; --panel-l:#f5f4f0; --line:#e2e1db;
  --ink:#14141e; --t2:#5a5a72; --t3:#9898a8;
  --sf-1:#f9f9f7; --sf-2:#f3f3ef; --sf-3:#eaeae5; --sf-line:#e4e4de;
  --sf-ink:#14141e; --sf-t2:#5a5a72; --sf-t3:#9898a8;
  --pk:#a50064; --pk2:#c8007a; --pk-bg:#fff0f7; --pk-glow:rgba(165,0,100,.12);
  --green:#059669; --green-bg:#ecfdf5;
  --amber:#d97706; --amber-bg:#fffbeb;
  --red:#dc2626; --red-bg:#fef2f2;
  --blue:#2563eb; --blue-bg:#eff6ff;
  --r6:6px; --r8:8px; --r10:10px; --r12:12px;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0 }
body {
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  background:var(--bg); color:var(--ink);
  height:100vh; display:flex; flex-direction:column;
  overflow:hidden; -webkit-font-smoothing:antialiased;
}
button { font-family:inherit; cursor:pointer }

/* ─── HEADER ─────────────────────────────────────────────────────────────── */
header {
  height:52px; background:#fff; border-bottom:1px solid var(--line);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; flex-shrink:0; z-index:20;
}
.h-left { display:flex; align-items:center; gap:10px }
.h-back { font-size:10px; font-weight:600; color:var(--t2); text-decoration:none; transition:color .15s }
.h-back:hover { color:var(--ink) }
.h-div { width:1px; height:16px; background:var(--line) }
.h-logo {
  width:28px; height:28px; border-radius:7px; background:var(--pk); color:#fff;
  display:grid; place-items:center; font-size:7px; font-weight:900; line-height:1.1; text-align:center;
}
.h-brand-name { font-size:12px; font-weight:800; color:var(--ink) }
.h-brand-sub { font-size:9px; color:var(--t2) }
.h-badge {
  font-size:9px; font-weight:700; letter-spacing:.5px;
  color:var(--pk); background:var(--pk-bg);
  padding:3px 10px; border-radius:20px; border:1px solid rgba(165,0,100,.18);
}
.h-user { display:flex; align-items:center; gap:8px }
.h-avatar {
  width:28px; height:28px; border-radius:50%;
  background:var(--pk-bg); border:1.5px solid rgba(165,0,100,.25);
  display:grid; place-items:center; font-size:10px; font-weight:800; color:var(--pk);
}
.h-user-name { font-size:10px; color:var(--t2) }

/* ─── LAYOUT ─────────────────────────────────────────────────────────────── */
.layout { display:flex; flex:1; overflow:hidden }

/* ─── LEFT PANEL ─────────────────────────────────────────────────────────── */
.panel-left {
  width:284px; flex-shrink:0; background:var(--panel-l);
  border-right:1px solid var(--line);
  display:flex; flex-direction:column; overflow:hidden;
}
.pl-head { padding:12px 12px 10px; border-bottom:1px solid var(--line) }
.pl-title {
  font-size:10px; font-weight:700; letter-spacing:.5px; text-transform:uppercase;
  color:var(--t2); margin-bottom:9px;
  display:flex; align-items:center; justify-content:space-between;
}
.pl-count {
  font-size:9px; font-weight:700; color:var(--t3);
  background:#fff; border:1px solid var(--line);
  padding:1px 7px; border-radius:20px;
}
.pl-search {
  display:flex; align-items:center; gap:7px;
  background:#fff; border:1px solid var(--line);
  border-radius:var(--r8); padding:7px 10px; margin-bottom:9px;
}
.pl-search-icon { font-size:14px; color:var(--t3) }
.pl-search input { background:none; border:none; outline:none; font-size:11px; color:var(--ink); width:100% }
.pl-search input::placeholder { color:var(--t3) }
.pillar-filters { display:flex; flex-wrap:wrap; gap:4px }
.pf {
  font-size:9.5px; font-weight:600; padding:3px 9px;
  border-radius:20px; border:1px solid var(--line);
  background:#fff; color:var(--t2); transition:all .15s;
}
.pf.active, .pf:hover { background:var(--pk); color:#fff; border-color:var(--pk) }
.project-list { flex:1; overflow-y:auto; padding:6px }
.project-list::-webkit-scrollbar { width:3px }
.project-list::-webkit-scrollbar-thumb { background:var(--line); border-radius:3px }
.pl-foot { padding:8px; border-top:1px solid var(--line) }
.btn-new {
  width:100%; padding:8px; font-size:11px; font-weight:600;
  background:#fff; color:var(--pk);
  border:1.5px dashed rgba(165,0,100,.3); border-radius:var(--r8); transition:all .15s;
}
.btn-new:hover { background:var(--pk-bg); border-color:var(--pk) }

/* ─── PROJECT CARD ───────────────────────────────────────────────────────── */
.pi {
  position:relative; padding:11px 12px; border-radius:var(--r8);
  margin-bottom:4px; cursor:pointer; background:#fff;
  transition:background .15s,box-shadow .15s; border:1px solid var(--line); overflow:hidden;
  animation:cardIn .22s ease both;
}
.pi:nth-child(1){animation-delay:.00s} .pi:nth-child(2){animation-delay:.04s}
.pi:nth-child(3){animation-delay:.08s} .pi:nth-child(4){animation-delay:.12s}
.pi:nth-child(5){animation-delay:.16s} .pi:nth-child(6){animation-delay:.20s}
.pi:nth-child(7){animation-delay:.24s} .pi:nth-child(8){animation-delay:.28s}
@keyframes cardIn { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:translateX(0)} }
.pi:hover { background:var(--sf-2); box-shadow:0 1px 4px rgba(0,0,0,.06) }
.pi.sel { background:var(--pk-bg); border-color:rgba(165,0,100,.28) }
.pi::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  background:var(--pk); transform:scaleY(0); transform-origin:center;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1);
}
.pi:hover::before, .pi.sel::before { transform:scaleY(1) }
.pi-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:4px }
.pi-name { font-family:'Fraunces',serif; font-size:13px; font-weight:600; color:var(--ink); line-height:1.2 }
.pi-badges { display:flex; gap:3px; flex-wrap:wrap; justify-content:flex-end }
.badge { font-size:8.5px; font-weight:700; padding:2px 7px; border-radius:20px; white-space:nowrap }
.b-p0 { background:var(--red-bg); color:var(--red); border:1px solid rgba(220,38,38,.2) }
.b-leader { background:var(--green-bg); color:var(--green); border:1px solid rgba(5,150,105,.2) }
.b-cao { background:var(--pk-bg); color:var(--pk); border:1px solid rgba(165,0,100,.18) }
.b-coming { background:var(--sf-3); color:var(--t2); border:1px solid var(--line) }
.b-pill { background:var(--sf-2); color:var(--t2); border:1px solid var(--line) }
.pi-vol { font-size:10px; color:var(--t2); margin-bottom:6px }
.pi-vol b { color:var(--ink) }
.sov-row { display:flex; align-items:center; gap:7px; margin-bottom:5px }
.sov-track { flex:1; height:3px; background:var(--sf-3); border-radius:2px; overflow:hidden }
.sov-fill { height:100%; border-radius:2px; transition:width .4s ease }
.sov-fill.f-low { background:linear-gradient(90deg,#dc2626,#ef4444) }
.sov-fill.f-mid { background:linear-gradient(90deg,#d97706,#f59e0b) }
.sov-fill.f-leader { background:linear-gradient(90deg,#059669,#10b981) }
.sov-lbl { font-size:9px; font-weight:700 }
.sov-lbl.f-low{color:var(--red)} .sov-lbl.f-mid{color:var(--amber)} .sov-lbl.f-leader{color:var(--green)}
.sov-na { font-size:9px; color:var(--t3) }
.pi-mini-prog { display:flex; align-items:center; gap:6px; margin-top:4px }
.pi-prog-track { flex:1; height:2px; background:var(--sf-3); border-radius:2px; overflow:hidden }
.pi-prog-fill { height:100%; background:var(--pk); border-radius:2px }
.pi-prog-lbl { font-size:8.5px; color:var(--t3); white-space:nowrap }

/* ─── RIGHT PANEL ────────────────────────────────────────────────────────── */
.panel-right { flex:1; background:var(--sf-1); display:flex; flex-direction:column; overflow:hidden }

.empty-state {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:12px;
  text-align:center; padding:40px;
}
.empty-icon { font-size:38px; opacity:.35 }
.empty-state h3 {
  font-family:'Fraunces',serif; font-size:20px;
  font-style:italic; font-weight:600; color:var(--sf-t2);
}
.empty-state p { font-size:12px; line-height:1.6; max-width:300px; color:var(--sf-t3) }

.project-detail { flex:1; display:flex; flex-direction:column; overflow:hidden }

/* Detail header */
.dh { padding:16px 24px 12px; background:var(--sf-1); border-bottom:1px solid var(--sf-line); flex-shrink:0 }
.dh-pillar { font-size:9.5px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--pk); margin-bottom:4px }
.dh-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:8px }
.dh-title { font-family:'Fraunces',serif; font-size:24px; font-weight:700; font-style:italic; color:var(--sf-ink); line-height:1.1 }
.dh-meta { display:flex; flex-wrap:wrap }
.dh-mi {
  display:flex; align-items:center; gap:5px; font-size:11px; color:var(--sf-t2);
  padding-right:14px; margin-right:14px; border-right:1px solid var(--sf-line);
}
.dh-mi:last-child { border-right:none; margin-right:0; padding-right:0 }
.dh-mi b { color:var(--sf-ink) }
.dh-mi a { color:var(--pk); text-decoration:none; font-family:'JetBrains Mono',monospace; font-size:10px }
.dh-mi a:hover { text-decoration:underline }
.sov-chip { font-size:9.5px; font-weight:700; padding:2px 8px; border-radius:20px; display:inline-block }
.sov-chip.f-low{background:var(--red-bg);color:var(--red)}
.sov-chip.f-mid{background:var(--amber-bg);color:var(--amber)}
.sov-chip.f-leader{background:var(--green-bg);color:var(--green)}
.sov-chip.f-none{background:var(--sf-3);color:var(--sf-t2)}

/* Progress bar */
.cp-prog {
  padding:10px 24px; background:var(--sf-2); border-bottom:1px solid var(--sf-line);
  display:flex; align-items:center; gap:24px; flex-shrink:0;
}
.prog-text { flex:1 }
.prog-label { font-size:11px; color:var(--sf-t2); margin-bottom:4px }
.prog-label b { font-size:15px; font-weight:800; color:var(--sf-ink) }
.prog-track { height:4px; background:var(--sf-3); border-radius:3px; overflow:hidden }
.prog-fill { height:100%; background:linear-gradient(90deg,var(--pk),var(--pk2)); border-radius:3px; transition:width .35s ease }
.prog-stats { display:flex; gap:20px; flex-shrink:0 }
.ps { text-align:center }
.ps-n { display:block; font-size:14px; font-weight:800; color:var(--sf-ink); line-height:1 }
.ps-l { display:block; font-size:9px; color:var(--sf-t3); margin-top:2px }

/* Content plan body */
.cp-body { flex:1; overflow-y:auto; padding:16px 24px 24px }
.cp-body::-webkit-scrollbar { width:4px }
.cp-body::-webkit-scrollbar-thumb { background:var(--sf-3); border-radius:4px }

/* Funnel section */
.fn-section { margin-bottom:18px }
.fn-head { display:flex; align-items:center; gap:8px; margin-bottom:8px; padding:0 2px }
.fn-tag { font-size:9px; font-weight:800; letter-spacing:.6px; padding:3px 10px; border-radius:20px }
.fn-tag.tofu { background:var(--blue-bg); color:var(--blue) }
.fn-tag.mofu { background:var(--amber-bg); color:var(--amber) }
.fn-tag.bofu { background:var(--green-bg); color:var(--green) }
.fn-meta { font-size:10px; color:var(--sf-t3); margin-left:auto }

/* ─── CLUSTER CARD (ACCORDION) ───────────────────────────────────────────── */
.cluster-card {
  border:1px solid var(--sf-line); border-radius:var(--r10);
  overflow:hidden; background:#fff; margin-bottom:6px;
}

/* cluster head — always visible, click to toggle */
.cluster-head {
  display:flex; align-items:center; gap:9px;
  padding:11px 14px; cursor:pointer;
  transition:background .12s; user-select:none;
}
.cluster-head:hover { background:var(--sf-2) }

.ch-arrow {
  width:16px; height:16px; flex-shrink:0;
  display:grid; place-items:center;
  color:var(--sf-t3); font-size:8px;
  transition:transform .22s cubic-bezier(.4,0,.2,1);
}
.cluster-card.open .ch-arrow { transform:rotate(90deg) }

.ch-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0 }
.cluster-card.tofu .ch-dot { background:var(--blue) }
.cluster-card.mofu .ch-dot { background:var(--amber) }
.cluster-card.bofu .ch-dot { background:var(--green) }

.ch-name { font-size:12px; font-weight:600; color:var(--sf-ink); flex:1; min-width:0 }
.ch-vol { font-size:11px; font-weight:700; color:var(--sf-t2); flex-shrink:0; width:54px; text-align:right }

.ch-prog { display:flex; align-items:center; gap:7px; flex-shrink:0 }
.ch-prog-track { width:44px; height:3px; background:var(--sf-3); border-radius:2px; overflow:hidden }
.ch-prog-fill { height:100%; border-radius:2px; transition:width .3s ease }
.cluster-card.tofu .ch-prog-fill { background:var(--blue) }
.cluster-card.mofu .ch-prog-fill { background:var(--amber) }
.cluster-card.bofu .ch-prog-fill { background:var(--green) }
.ch-count { font-size:9px; font-weight:700; color:var(--sf-t2); white-space:nowrap; min-width:60px; text-align:right }

/* cluster body — collapsed by default */
.cluster-body {
  max-height:0; overflow:hidden;
  transition:max-height .28s cubic-bezier(.4,0,.2,1);
}
.cluster-card.open .cluster-body { max-height:2000px }

/* keyword table inside cluster */
.kw-table { border-top:1px solid var(--sf-line) }
.kw-th, .kw-row {
  display:grid;
  grid-template-columns:1fr 58px 50px 108px;
  padding:7px 14px 7px 40px;
  align-items:center;
}
.kw-th {
  background:var(--sf-2); border-bottom:1px solid var(--sf-line);
  padding-top:6px; padding-bottom:6px;
}
.kw-th span { font-size:8.5px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--sf-t3) }
.kw-row { border-bottom:1px solid var(--sf-line); transition:background .1s }
.kw-row:last-child { border-bottom:none }
.kw-row:hover { background:var(--sf-2) }

.kw-name {
  font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--sf-ink);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.kw-vol { font-size:10.5px; font-weight:700; color:var(--sf-t2) }
.kw-intent { font-size:8.5px; font-weight:800; padding:2px 6px; border-radius:20px; width:fit-content }
.kw-intent.info { background:var(--blue-bg); color:var(--blue) }
.kw-intent.comm { background:var(--amber-bg); color:var(--amber) }
.kw-intent.trans { background:var(--green-bg); color:var(--green) }

.kw-btn {
  font-size:9.5px; font-weight:700; padding:3px 10px; border-radius:20px;
  border:none; cursor:pointer; transition:all .15s; white-space:nowrap; width:fit-content;
}
.kw-btn.written { background:var(--green-bg); color:var(--green) }
.kw-btn.written:hover { background:#d1fae5 }
.kw-btn.unwritten { background:var(--sf-2); color:var(--sf-t2); border:1.5px dashed var(--sf-line) }
.kw-btn.unwritten:hover { background:var(--pk-bg); color:var(--pk); border-color:rgba(165,0,100,.22) }

.cp-empty { text-align:center; padding:36px; color:var(--sf-t3); font-size:12px; line-height:1.6 }

/* ─── TOAST ──────────────────────────────────────────────────────────────── */
.toast {
  position:fixed; bottom:20px; right:20px;
  background:var(--sf-ink); color:#fff;
  border-radius:var(--r8); padding:11px 16px; font-size:11px; font-weight:600;
  display:flex; align-items:center; gap:8px; z-index:300;
  transform:translateY(70px) scale(.95); opacity:0;
  transition:all .32s cubic-bezier(.34,1.56,.64,1);
  max-width:360px; box-shadow:0 10px 32px rgba(0,0,0,.25);
}
.toast.show { transform:translateY(0) scale(1); opacity:1 }
.toast.t-green { background:var(--green) }
.toast.t-amber { background:var(--amber) }
</style>
</head>
<body>

<header>
  <div class="h-left">
    <a href="/lab.html" target="_top" class="h-back">← Lab</a>
    <div class="h-div"></div>
    <div class="h-logo"><img src="https://homepage.momocdn.net/fileuploads/svg/momo-file-240411162904.svg" alt="MoMo" style="width:80%;height:80%;object-fit:contain;display:block"></div>
    <div>
      <div class="h-brand-name">MoSpark</div>
      <div class="h-brand-sub">SEO/GEO Content Plan</div>
    </div>
  </div>
  <span class="h-badge">MOSPARK · CONTENT PLAN</span>
  <div class="h-user">
    <div class="h-avatar">VH</div>
    <span class="h-user-name">Văn Hiến · Web Product Lead</span>
  </div>
</header>

<div class="layout">

<aside class="panel-left">
  <div class="pl-head">
    <div class="pl-title">
      Dự án SEO/GEO
      <span class="pl-count" id="plCount">8</span>
    </div>
    <div class="pl-search">
      <span class="pl-search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Tìm dự án..." oninput="filterProjects()">
    </div>
    <div class="pillar-filters">
      <button class="pf active" onclick="setPillar('all',this)">Tất cả</button>
      <button class="pf" onclick="setPillar('P1',this)">P1 Tài chính</button>
      <button class="pf" onclick="setPillar('P2',this)">P2 Bảo hiểm</button>
      <button class="pf" onclick="setPillar('P3',this)">P3 Tiện ích</button>
    </div>
  </div>
  <div class="project-list" id="projectList"></div>
  <div class="pl-foot">
    <button class="btn-new" onclick="showToast('Tính năng tạo dự án mới đang phát triển','t-amber')">+ Dự án mới</button>
  </div>
</aside>

<div class="panel-right">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">📋</div>
    <h3>Chọn dự án để xem Content Plan</h3>
    <p>Click vào dự án bên trái để xem Pillar → Cluster → Keyword, volume tìm kiếm và trạng thái đã viết.</p>
  </div>
  <div class="project-detail" id="projectDetail" style="display:none"></div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ─── DATA ─────────────────────────────────────────────────────────────────── */
const PROJECTS = [
  {

        {kw:'kiểm tra phạt nguội biển số xe', vol:115000, intent:'trans', written:true}

  },
  {

    priority:'CAO', microsite:'momo.vn/vay-nhanh', vol:4375800, sov:6, targetSov:40,
    clusters:[
      { id:'vn-t1', name:'Kiến thức vay cơ bản', funnel:'tofu', vol:245000, keywords:[
        {kw:'vay tiền online là gì', vol:22100, intent:'info', written:true},
        {kw:'vay tín chấp là gì', vol:18400, intent:'info', written:true},
        {kw:'lãi suất vay tiêu dùng 2026', vol:76000, intent:'info', written:false},
        {kw:'cách tính lãi vay giảm dần', vol:52300, intent:'info', written:false},
        {kw:'vay online có an toàn không', vol:76200, intent:'info', written:true}

/* ─── STATE ─────────────────────────────────────────────────────────────────── */
let selectedProject = null;
let activePillar = 'all';
let openClusters = {};

/* ─── UTILS ─────────────────────────────────────────────────────────────────── */
function fmtVol(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return Math.round(n/1000)+'K';
  return n+'';
}
function getSovClass(sov) {
  if (sov === null) return null;
  return sov >= 40 ? 'f-leader' : sov >= 20 ? 'f-mid' : 'f-low';
}
function kwWritten(c) { return c.keywords.filter(k=>k.written).length }
function projKwWritten(p) { return p.clusters.reduce((s,c)=>s+kwWritten(c), 0) }
function projKwTotal(p) { return p.clusters.reduce((s,c)=>s+c.keywords.length, 0) }

/* ─── RENDER PROJECT LIST ────────────────────────────────────────────────────── */
function renderProjectList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = PROJECTS.filter(p =>
    (activePillar === 'all' || p.pillar === activePillar) && (!q || p.name.toLowerCase().includes(q))
  );
  document.getElementById('plCount').textContent = filtered.length;
  document.getElementById('projectList').innerHTML = filtered.map(p => {
    const sc = getSovClass(p.sov);
    const sovPct = p.sov !== null ? Math.min(p.sov/p.targetSov*100, 100) : 0;
    const bCls = {P0:'b-p0',LEADER:'b-leader',CAO:'b-cao',COMING:'b-coming'}[p.priority] || 'b-pill';
    const bLbl = p.priority==='P0' ? 'P0 URGENT' : p.priority==='COMING' ? 'SẮPRA' : p.priority;
    const wc = projKwWritten(p), tot = projKwTotal(p);
    const wpct = tot > 0 ? Math.round(wc/tot*100) : 0;
    return `<div class="pi${selectedProject?.id===p.id?' sel':''}" onclick="selectProject('${p.id}')">
      <div class="pi-top">
        <div class="pi-name">${p.name}</div>
        <div class="pi-badges">
          <span class="badge ${bCls}">${bLbl}</span>
          <span class="badge b-pill">${p.pillar}</span>
        </div>
      </div>
      <div class="pi-vol">Market <b>${fmtVol(p.vol)}/tháng</b></div>
      <div class="sov-row">
        ${p.sov !== null
          ? `<div class="sov-track"><div class="sov-fill ${sc}" style="width:${sovPct}%"></div></div>
             <span class="sov-lbl ${sc}">${p.sov}% SoV</span>`
          : `<span class="sov-na">SoV: chưa đo</span>`}
      </div>
      ${tot > 0 ? `<div class="pi-mini-prog">
        <div class="pi-prog-track"><div class="pi-prog-fill" style="width:${wpct}%"></div></div>
        <span class="pi-prog-lbl">${wc}/${tot} keywords</span>
      </div>` : ''}
    </div>`;
  }).join('');
}
function filterProjects() { renderProjectList() }
function setPillar(p, btn) {
  activePillar = p;
  document.querySelectorAll('.pf').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProjectList();
}

/* ─── SELECT PROJECT ─────────────────────────────────────────────────────────── */
function selectProject(id) {
  selectedProject = PROJECTS.find(p => p.id === id);
  openClusters = {};
  renderProjectList();
  document.getElementById('emptyState').style.display = 'none';
  const det = document.getElementById('projectDetail');
  det.style.display = 'flex';
  det.innerHTML = buildDetail(selectedProject);
}

/* ─── BUILD DETAIL ───────────────────────────────────────────────────────────── */
function buildDetail(p) {
  const wc = projKwWritten(p), tot = projKwTotal(p);
  const pct = tot > 0 ? Math.round(wc/tot*100) : 0;
  const sc = getSovClass(p.sov);
  const bCls = {P0:'b-p0',LEADER:'b-leader',CAO:'b-cao',COMING:'b-coming'}[p.priority] || 'b-pill';
  const bLbl = p.priority==='P0' ? 'P0 URGENT' : p.priority==='COMING' ? 'SẮPRA' : p.priority;
  const totalVol = p.clusters.reduce((s,c) => s+c.vol, 0);

  const groups = {
    tofu:{label:'TOFU · Nhận biết', cs:[]},
    mofu:{label:'MOFU · Cân nhắc', cs:[]},
    bofu:{label:'BOFU · Chuyển đổi', cs:[]}
  };
  p.clusters.forEach(c => { if (groups[c.funnel]) groups[c.funnel].cs.push(c) });

  const renderGroup = fk => {
    const g = groups[fk];
    if (!g.cs.length) return '';
    const gVol = g.cs.reduce((s,c) => s+c.vol, 0);
    const gKw = g.cs.reduce((s,c) => s+c.keywords.length, 0);

    const cards = g.cs.map((c, ci) => {
      const cwc = kwWritten(c), ctot = c.keywords.length;
      const cpct = ctot > 0 ? Math.round(cwc/ctot*100) : 0;
      const isOpen = !!openClusters[c.id];

      const kwRows = c.keywords.map((k, ki) =>
        `<div class="kw-row">
          <div class="kw-name" title="${k.kw}">${k.kw}</div>
          <div class="kw-vol">${fmtVol(k.vol)}</div>
          <span class="kw-intent ${k.intent}">${k.intent.toUpperCase()}</span>
          <button class="kw-btn ${k.written?'written':'unwritten'}"
            onclick="toggleKw('${p.id}','${c.id}',${ki},this)">
            ${k.written ? '✓ Đã viết' : '+ Chưa viết'}
          </button>
        </div>`
      ).join('');

      return `<div class="cluster-card ${fk}${isOpen?' open':''}" id="cc-${c.id}">
        <div class="cluster-head" onclick="toggleCluster('${c.id}')">
          <div class="ch-arrow">▶</div>
          <div class="ch-dot"></div>
          <div class="ch-name">${c.name}</div>
          <div class="ch-vol">${fmtVol(c.vol)}</div>
          <div class="ch-prog">
            <div class="ch-prog-track">
              <div class="ch-prog-fill" id="cpf-${c.id}" style="width:${cpct}%"></div>
            </div>
            <span class="ch-count" id="cpc-${c.id}">${cwc}/${ctot} đã viết</span>
          </div>
        </div>
        <div class="cluster-body">
          <div class="kw-table">
            <div class="kw-th">
              <span>Keyword</span><span>Volume</span><span>Intent</span><span>Status</span>
            </div>
            ${kwRows}
          </div>
        </div>
      </div>`;
    }).join('');

    return `<div class="fn-section">
      <div class="fn-head">
        <span class="fn-tag ${fk}">${g.label}</span>
        <span class="fn-meta">${fmtVol(gVol)}/tháng &middot; ${g.cs.length} clusters &middot; ${gKw} keywords</span>
      </div>
      ${cards}
    </div>`;
  };

  return `
    <div class="dh">
      <div class="dh-pillar">${p.pillar} &middot; ${p.pillarName}</div>
      <div class="dh-top">
        <h2 class="dh-title">${p.name}</h2>
        <span class="badge ${bCls}" style="margin-top:4px">${bLbl}</span>
      </div>
      <div class="dh-meta">
        <div class="dh-mi">Market <b>${fmtVol(p.vol)}/tháng</b></div>
        <div class="dh-mi">SoV MoMo ${p.sov !== null
          ? `<span class="sov-chip ${sc}">${p.sov}% / target ${p.targetSov}%</span>`
          : `<span class="sov-chip f-none">Chưa đo</span>`}</div>
        <div class="dh-mi"><a href="https://${p.microsite}" target="_blank">${p.microsite}</a></div>
      </div>
    </div>
    <div class="cp-prog">
      <div class="prog-text">
        <div class="prog-label">
          <b id="progFrac">${wc}/${tot}</b> keywords đã viết &mdash; <b id="progPct">${pct}%</b> hoàn thành
        </div>
        <div class="prog-track"><div class="prog-fill" id="progFill" style="width:${pct}%"></div></div>
      </div>
      <div class="prog-stats">
        <div class="ps"><span class="ps-n">${p.clusters.length}</span><span class="ps-l">Clusters</span></div>
        <div class="ps"><span class="ps-n">${tot}</span><span class="ps-l">Keywords</span></div>
        <div class="ps"><span class="ps-n">${fmtVol(totalVol)}</span><span class="ps-l">Vol/tháng</span></div>
      </div>
    </div>
    <div class="cp-body">
      ${p.clusters.length === 0
        ? `<div class="cp-empty">Dự án này chưa có Cluster nào.<br>Bắt đầu bằng cách lên Content Plan cho giai đoạn TOFU.</div>`
        : ['tofu','mofu','bofu'].map(renderGroup).join('')}
    </div>`;
}

/* ─── TOGGLE CLUSTER ─────────────────────────────────────────────────────────── */
function toggleCluster(cid) {
  openClusters[cid] = !openClusters[cid];
  const card = document.getElementById('cc-' + cid);
  if (card) card.classList.toggle('open', !!openClusters[cid]);
}

/* ─── TOGGLE KEYWORD ─────────────────────────────────────────────────────────── */
function toggleKw(pid, cid, ki, btn) {
  const p = PROJECTS.find(p => p.id === pid);
  const c = p.clusters.find(c => c.id === cid);
  const k = c.keywords[ki];
  k.written = !k.written;

  btn.className = `kw-btn ${k.written ? 'written' : 'unwritten'}`;
  btn.textContent = k.written ? '✓ Đã viết' : '+ Chưa viết';

  /* update cluster-level progress */
  const cwc = kwWritten(c), ctot = c.keywords.length;
  const cpct = ctot > 0 ? Math.round(cwc/ctot*100) : 0;
  const pfEl = document.getElementById('cpf-' + cid);
  const pcEl = document.getElementById('cpc-' + cid);
  if (pfEl) pfEl.style.width = `${cpct}%`;
  if (pcEl) pcEl.textContent = `${cwc}/${ctot} đã viết`;

  /* update project-level progress */
  const wc = projKwWritten(p), tot = projKwTotal(p);
  const pct = tot > 0 ? Math.round(wc/tot*100) : 0;
  const fracEl = document.getElementById('progFrac');
  const pctEl = document.getElementById('progPct');
  const fillEl = document.getElementById('progFill');
  if (fracEl) fracEl.textContent = `${wc}/${tot}`;
  if (pctEl) pctEl.textContent = `${pct}%`;
  if (fillEl) fillEl.style.width = `${pct}%`;

  /* update sidebar card mini-progress */
  renderProjectList();

  showToast(
    k.written ? `✓ "${k.kw}" đã viết` : `Bỏ đánh dấu "${k.kw}"`,
    k.written ? 't-green' : ''
  );
}

/* ─── TOAST ─────────────────────────────────────────────────────────────────── */
let toastTimer = null;
function showToast(msg, cls = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (cls || '');
  requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ─── INIT ───────────────────────────────────────────────────────────────────── */
renderProjectList();
</script>
