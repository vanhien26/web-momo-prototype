<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink-500:#EB2F96;--pink-50:#fdf2f8;--pink-100:#fce7f3;
  --gray-900:#111827;--gray-800:#1f2937;--gray-700:#374151;--gray-600:#4b5563;
  --gray-500:#6b7280;--gray-400:#9ca3af;--gray-300:#d1d5db;--gray-200:#e5e7eb;
  --gray-100:#f3f4f6;--gray-50:#f9fafb;--white:#fff;
  --shadow-s:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-m:0 4px 14px rgba(0,0,0,.12);
  --shadow-l:0 8px 32px rgba(0,0,0,.18);
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;--r-2xl:24px;
}
body{font-family:'Be Vietnam Pro','Helvetica Neue',sans-serif;background:var(--gray-50);color:var(--gray-900);min-height:100vh}

/* NAV */
.nav{background:#fff;border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:100}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;gap:20px}
.nav-logo{display:flex;align-items:center;text-decoration:none;flex-shrink:0}
.nav-links{display:flex;gap:4px}
.nav-link{font-family:inherit;font-size:14px;font-weight:700;color:var(--gray-600);background:none;border:none;cursor:pointer;padding:6px 12px;border-radius:var(--r-sm);transition:.15s}
.nav-link:hover{background:var(--gray-100);color:var(--gray-900)}
.nav-link.on{color:var(--pink-500)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav-search{display:flex;align-items:center;gap:8px;background:var(--gray-100);border:1px solid var(--gray-200);border-radius:var(--r-sm);padding:7px 14px;max-width:240px}
.nav-search input{background:none;border:none;outline:none;color:var(--gray-900);font-size:13px;width:100%;font-family:inherit}
.nav-city{font-family:inherit;font-size:12px;font-weight:600;color:var(--gray-600);background:none;border:none;cursor:pointer}
.nav-login{font-family:inherit;font-size:13px;font-weight:800;color:#fff;background:var(--pink-500);border:none;border-radius:var(--r-xl);padding:7px 18px;cursor:pointer}
@media(max-width:768px){.nav-links,.nav-search{display:none}}

/* BREADCRUMB */
.breadcrumb-bar{background:#fff;border-bottom:1px solid var(--gray-100);padding:0 20px}
.breadcrumb-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:6px;height:37px;font-size:12px}
.bc-item{color:var(--gray-500);text-decoration:none;cursor:pointer;transition:.15s}
.bc-item:hover{color:var(--pink-500)}
.bc-sep{color:var(--gray-300)}
.bc-current{color:var(--gray-900);font-weight:700}

/* PAGE HEADER */
.page-header{background:#fff;border-bottom:1px solid var(--gray-200);padding:28px 20px 24px}
.page-header-inner{max-width:1100px;margin:0 auto}
.page-title{font-size:28px;font-weight:900;color:var(--gray-900);margin-bottom:6px}
.page-sub{font-size:14px;color:var(--gray-500);margin-bottom:20px}
.stats-pills{display:flex;flex-wrap:wrap;gap:10px}
.stat-pill{display:flex;align-items:center;gap:6px;background:var(--gray-100);border-radius:var(--r-xl);padding:7px 14px;font-size:13px;font-weight:700;color:var(--gray-700)}
.stat-pill .sp-val{color:var(--gray-900);font-size:15px;font-weight:900}
.stat-pill.hot .sp-val{color:var(--pink-500)}

/* CONTROLS */
.controls{max-width:1100px;margin:0 auto;padding:20px 20px 0;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.ctrl-label{font-size:12px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.05em}
.sort-pills{display:flex;gap:6px}
.spill{font-family:inherit;font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-600);cursor:pointer;transition:.15s}
.spill.on{background:var(--gray-900);color:#fff;border-color:var(--gray-900)}
.spill:hover:not(.on){background:var(--gray-100)}
.ctrl-count{margin-left:auto;font-size:12px;color:var(--gray-400);font-weight:600}

/* GENRE GRID */
.genre-section{max-width:1100px;margin:0 auto;padding:20px}
.genre-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:1000px){.genre-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:680px){.genre-grid{grid-template-columns:repeat(2,1fr)}}

/* GENRE CARD */
.genre-card{border-radius:var(--r-2xl);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;background:#fff;box-shadow:var(--shadow-s)}
.genre-card:hover{box-shadow:var(--shadow-l);transform:translateY(-4px)}
.gc-poster-strip{position:relative;height:160px;overflow:hidden;background:var(--gc-dark,#111)}
.gc-poster-strip img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.genre-card:hover .gc-poster-strip img{transform:scale(1.06)}
.gc-fade{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 25%,var(--gc-dark,#111) 100%)}
.gc-hot-badge{position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:4px;font-size:10px;font-weight:800;background:var(--pink-500);color:#fff;padding:3px 9px 3px 7px;border-radius:20px;z-index:2}
.gc-body{padding:12px 14px 14px;background:#fff}
.gc-name{font-size:15px;font-weight:900;color:var(--gray-900);line-height:1.2;margin-bottom:3px}
.gc-count{font-size:12px;color:var(--gray-400);font-weight:600}

/* FEATURED ROW */
.featured-section{max-width:1100px;margin:0 auto;padding:28px 20px 4px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-hd-title{font-size:18px;font-weight:900;color:var(--gray-900)}
.sec-hd-sub{font-size:12px;color:var(--gray-400)}
.featured-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:680px){.featured-row{grid-template-columns:1fr 1fr}}

.feat-card{border-radius:var(--r-2xl);overflow:hidden;position:relative;cursor:pointer;transition:.25s;min-height:180px;box-shadow:var(--shadow-m)}
.feat-card:hover{box-shadow:var(--shadow-l);transform:translateY(-3px)}
.feat-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .4s}
.feat-card:hover .feat-bg{transform:scale(1.04)}
.feat-overlay{position:absolute;inset:0;background:linear-gradient(160deg,rgba(0,0,0,.1) 0%,rgba(0,0,0,.75) 100%)}
.feat-color-tint{position:absolute;inset:0;opacity:.35}
.feat-body{position:relative;z-index:2;padding:18px;height:100%;display:flex;flex-direction:column;justify-content:flex-end}
.feat-emoji{font-size:28px;margin-bottom:8px}
.feat-name{font-size:18px;font-weight:900;color:#fff;margin-bottom:4px;line-height:1.2}
.feat-count{font-size:12px;color:rgba(255,255,255,.8);margin-bottom:10px}
.feat-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.feat-tag{font-size:10px;font-weight:700;color:rgba(255,255,255,.9);background:rgba(255,255,255,.18);border-radius:20px;padding:2px 9px;backdrop-filter:blur(4px)}
.feat-cta{font-family:inherit;font-size:12px;font-weight:800;color:#fff;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);border-radius:var(--r-xl);padding:6px 16px;cursor:pointer;backdrop-filter:blur(4px);transition:.15s}
.feat-cta:hover{background:rgba(255,255,255,.35)}

/* ALL GENRES heading */
.all-genres-hd{max-width:1100px;margin:0 auto;padding:24px 20px 0;display:flex;align-items:center;justify-content:space-between}
.all-genres-hd h2{font-size:18px;font-weight:900;color:var(--gray-900)}

/* FOOTER */
.footer{background:var(--gray-900);color:var(--gray-400);font-size:12px;padding:20px;text-align:center;margin-top:48px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gray-900);color:#fff;font-size:13px;font-weight:700;padding:10px 20px;border-radius:var(--r-xl);opacity:0;pointer-events:none;transition:.25s;white-space:nowrap;z-index:9999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MOBILE BOTTOM NAV */
.mobile-bnav{display:none}
@media(max-width:768px){
  .mobile-bnav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:#fff;border-top:1px solid var(--gray-200);
    padding:6px 0 env(safe-area-inset-bottom,8px);
    z-index:200;box-shadow:0 -1px 8px rgba(0,0,0,.08)
  }
  .mbn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
    text-decoration:none;color:var(--gray-400);font-size:10px;font-weight:700;padding:4px 0;
    transition:.15s}
  .mbn-item.on{color:var(--pink-500)}
  .mbn-item svg{display:block}
  body{padding-bottom:72px}
  .nav-lab-link{display:none!important}
  .breadcrumb-bar{display:none}
}
</style>
</head>

<div class="featured-section">

    ],
  },
];

let sortMode = 'hot';

function sortedGenres(){
  if(sortMode === 'az') return [...GENRES].sort((a,b)=>a.name.localeCompare(b.name,'vi'));
  if(sortMode === 'count') return [...GENRES].sort((a,b)=>(b.nowCount+b.soonCount)-(a.nowCount+a.soonCount));
  // hot: hot first, then by nowCount
  return [...GENRES].sort((a,b)=>{
    if(a.hot && !b.hot) return -1;
    if(!a.hot && b.hot) return 1;
    return b.nowCount - a.nowCount;
  });
}

function setSort(mode, el){
  sortMode = mode;
  document.querySelectorAll('.spill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  renderGrid();
}

function init(){

  renderFeatured();
  renderGrid();
}

function renderFeatured(){
  const hot = GENRES.filter(g=>g.hot).slice(0,3);
  document.getElementById('featuredRow').innerHTML = hot.map(g=>`
    <div class="feat-card" onclick="window.location.href='/cinema/genres/${g.slug}'">
      <div class="feat-bg" style="background-image:url('${g.posters[0]}')"></div>
      <div class="feat-color-tint" style="background:${g.tint}"></div>
      <div class="feat-overlay"></div>
      <div class="feat-body">
        <div class="feat-emoji" style="display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.15);backdrop-filter:blur(4px);margin-bottom:10px"><i data-lucide="${g.lucideIcon}" width="22" height="22" stroke-width="2" style="color:#fff"></i></div>
        <div class="feat-name">${g.name}</div>
        <div class="feat-count">${g.nowCount} đang chiếu · ${g.soonCount} sắp chiếu</div>
        <div class="feat-tags">${g.subGenres.slice(0,3).map(s=>`<span class="feat-tag">${s}</span>`).join('')}</div>
        <button class="feat-cta" onclick="event.stopPropagation();window.location.href='/cinema/genres/${g.slug}'">Khám phá<i data-lucide="arrow-right" width="13" height="13" stroke-width="2.5" style="display:inline-block;vertical-align:middle;margin-left:4px"></i></button>
      </div>
    </div>`).join('');
}

function renderGrid(){
  const genres = sortedGenres();
  document.getElementById('ctrlCount').textContent = `${genres.length} thể loại`;
  document.getElementById('genreGrid').innerHTML = genres.map(g=>{
    const totalFilms = g.nowCount + g.soonCount + g.pastCount;
    return `<div class="genre-card" onclick="window.location.href='/cinema/genres/${g.slug}'" style="--gc-dark:${g.dark}">
      <div class="gc-poster-strip">
        <img src="${g.posters[0]}" loading="lazy" onerror="this.style.display='none'">
        <div class="gc-fade"></div>
        ${g.hot?`<span class="gc-hot-badge"><i data-lucide="flame" width="10" height="10" stroke-width="2.5"></i>Đang hot</span>`:''}
      </div>
      <div class="gc-body">
        <div class="gc-name">${g.name}</div>
        <div class="gc-count">${totalFilms} phim</div>
      </div>
    </div>`;
  }).join('');
  lucide.createIcons();
}

let toastTimer;
function toast(msg){ const el=document.getElementById('toastEl'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2200); }

init();
</script>
