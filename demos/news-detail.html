<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MoMo News Detail</title>
<link rel="icon" href="../assets/images/momo-logo.svg" type="image/svg+xml">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="../assets/mobase-tokens.css">
<style>
@font-face {
  font-family: 'MoMoTrustSans';
  src: url('../assets/fonts/momo-trust/MoMoTrustSans-Regular.otf') format('opentype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}

@font-face {
  font-family: 'MoMoTrustSans';
  src: url('../assets/fonts/momo-trust/MoMoTrustSans-Medium.otf') format('opentype');
  font-weight: 500 700;
  font-style: normal;
  font-display: swap;
}

@font-face {
  font-family: 'MoMoTrustDisplay';
  src: url('../assets/fonts/momo-trust/MoMoTrustDisplay.otf') format('opentype');
  font-weight: 400 900;
  font-style: normal;
  font-display: swap;
}

:root {
  --momo: #D72B8A;
  --momo-dark: #8B0057;
  --ink: #111111;
  --text: #333333;
  --muted: #71717A;
  --line: #E4E4E7;
  --bg: #FFFFFF;
  --bg-tint: #F4F4F5;
  --blush: #FFF0F7;
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --font-display: 'MoMoTrustDisplay', 'MoMoTrustSans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-body: 'MoMoTrustSans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

* { box-sizing: border-box; }
html { font-size: 16px; }
body {
  margin: 0;
  color: var(--text);
  background: var(--bg-tint);
  font-family: var(--font-body);
  line-height: 1.65;
  overflow-x: hidden;
}
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; }
a:focus-visible,
button:focus-visible {
  outline: 3px solid rgba(215, 43, 138, .3);
  outline-offset: 3px;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  height: 58px;
  padding: 0 clamp(16px, 4vw, 48px);
  background: rgba(255, 255, 255, .96);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(12px);
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-mark {
  width: 34px;
  height: 34px;
  display: grid;
  place-items: center;
  border-radius: 8px;
  background: #fff;
  border: 1px solid var(--line);
}

.brand-mark img { width: 24px; height: 24px; }

.brand-text strong {
  display: block;
  color: var(--ink);
  font-family: var(--font-display);
  font-size: 17px;
  line-height: 1;
  letter-spacing: -.01em;
}

.brand-text span {
  display: block;
  margin-top: 2px;
  color: var(--muted);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
}

.topbar-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.icon-btn,
.back-btn {
  height: 36px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border: 1px solid var(--line);
  background: transparent;
  color: var(--text);
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
}

.icon-btn { width: 36px; padding: 0; }
.back-btn { padding: 0 14px; }

.page {
  width: min(1220px, 100%);
  margin: 0 auto;
  background: transparent;
  box-shadow: 0 0 0 1px rgba(0,0,0,.06);
}

.hero {
  background: #fff;
  padding: 28px clamp(20px, 6vw, 80px) 24px;
  border-bottom: 1px solid var(--line);
}

.story {
  position: relative;
  max-width: 860px;
}

.kicker {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px;
  background: rgba(215, 43, 138, .08);
  border-radius: 999px;
  color: var(--momo);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-bottom: 18px;
}

.story-title {
  max-width: 820px;
  margin: 0 0 16px;
  color: var(--momo);
  font-family: var(--font-display);
  font-size: clamp(22px, 2.6vw, 36px);
  font-weight: 900;
  letter-spacing: -.01em;
  line-height: 1.08;
}

.deck {
  max-width: 64ch;
  margin: 0;
  color: var(--text);
  font-family: var(--font-body);
  font-size: clamp(15px, 1.4vw, 18px);
  line-height: 1.55;
}

.deck-copy {
  display: block;
}

.meta {
  display: flex;
  flex-wrap: wrap;
  gap: 0;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--line);
}

.meta span {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: 28px;
  padding: 4px 12px 4px 0;
  margin-right: 12px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
}

.article-rail {
  display: grid;
  gap: 20px;
  align-content: start;
  position: sticky;
  top: 78px;
  align-self: start;
}

.content-grid {
  display: grid;
  grid-template-columns: minmax(0, 720px) minmax(260px, 1fr);
  gap: clamp(24px, 4vw, 56px);
  max-width: 1220px;
  margin: 0 auto;
  padding: 40px clamp(20px, 6vw, 80px) 80px;
  background: #fff;
}

.article {
  max-width: 720px;
}

.article section + section { margin-top: 40px; }

.article h2,
.article-rail h2 {
  margin: 0 0 16px;
  color: var(--ink);
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 800;
  line-height: 1.2;
  letter-spacing: 0;
  text-transform: none;
}

.article p {
  margin: 0 0 14px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.75;
}

.article > section:first-child > p:first-of-type::first-letter {
  float: left;
  margin: 6px 8px 0 0;
  color: var(--momo);
  font-family: var(--font-display);
  font-size: 46px;
  line-height: .78;
  font-weight: 700;
}

.promo-banner {
  display: grid;
  gap: 14px;
  padding: 20px;
  background: var(--blush);
  border-radius: var(--radius-md);
  border: 0;
}

.promo-banner strong {
  color: var(--ink);
  font-size: 15px;
  font-weight: 800;
}

.promo-code {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

.code-pill {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-height: 50px;
  padding: 0 18px;
  border-radius: var(--radius-sm);
  border: 2px dashed var(--momo);
  background: #fff;
  color: var(--ink);
  font-weight: 900;
  font-size: 18px;
  letter-spacing: .12em;
  font-family: var(--font-display);
}

.copy-btn {
  height: 50px;
  padding: 0 18px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 0;
  border-radius: var(--radius-sm);
  background: var(--momo);
  color: #fff;
  font-weight: 800;
  font-size: 14px;
}

.promo-note {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.55;
}

.rail-offer {
  display: grid;
  gap: 14px;
  padding: 20px;
  background: var(--blush);
  border-radius: var(--radius-md);
  border: 0;
}

.rail-offer .code-pill {
  width: 100%;
  justify-content: center;
  font-size: 22px;
  min-height: 58px;
}

.rail-offer p {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.55;
}

.rail-copy-btn {
  width: 100%;
  justify-content: center;
  height: 50px;
  border-radius: var(--radius-sm);
}

/* === GUIDELINE LAYOUT === */
.guideline-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 40px;
  align-items: start;
}

.guideline-phone-col { position: sticky; top: 90px; }

.phone-frame {
  background: #1C1C1E;
  border-radius: 38px;
  padding: 10px;
  box-shadow: 0 24px 56px rgba(0,0,0,.28), 0 0 0 1px rgba(255,255,255,.06);
  overflow: hidden;
}

.phone-status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 14px 4px;
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  background: #1C1C1E;
}

.phone-display {
  border-radius: 28px;
  overflow: hidden;
  min-height: 480px;
  background: #fff;
}

/* Steps list */
.guideline-steps-col {
  display: grid;
  gap: 0;
  padding: 4px 0;
}

.step-row {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  position: relative;
  padding-bottom: 4px;
  cursor: pointer;
}

.step-row:not(:last-child)::after {
  content: '';
  position: absolute;
  left: 17px;
  top: 38px;
  bottom: 0;
  width: 2px;
  border-left: 2px dashed var(--line);
}

.step-num {
  flex-shrink: 0;
  width: 36px; height: 36px;
  border-radius: 999px;
  background: var(--blush);
  color: var(--momo);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800;
  font-size: 14px;
  position: relative;
  z-index: 1;
  transition: background .15s, color .15s;
}

.step-row.active .step-num {
  background: var(--momo);
  color: #fff;
}

.step-row-body {
  padding-top: 6px;
  padding-bottom: 20px;
}

.step-row-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--muted);
  line-height: 1.35;
}

.step-row.active .step-row-title {
  color: var(--momo);
  font-weight: 800;
}

.step-row-desc {
  display: none;
  margin-top: 10px;
  font-size: 14px;
  color: var(--text);
  line-height: 1.65;
}

.step-row.active .step-row-desc { display: block; }

/* phone screen content */
.pscreen-appbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  background: #fff;
  border-bottom: 1px solid var(--line);
  font-size: 13px; font-weight: 700; color: var(--ink);
  gap: 8px;
}
.pscreen-appbar .back-label { color: var(--momo); font-size: 13px; }

.pscreen-body {
  padding: 14px;
  display: grid;
  gap: 10px;
  background: #F8F8F8;
  min-height: 440px;
}

.pscreen-card {
  background: #fff;
  border-radius: 12px;
  padding: 14px;
  border: 1px solid var(--line);
}

.pscreen-label {
  font-size: 10px;
  font-weight: 800;
  color: var(--muted);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.pscreen-title {
  font-size: 16px;
  font-weight: 800;
  color: var(--ink);
  line-height: 1.3;
}

.pscreen-input {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 13px;
  color: var(--ink);
  font-weight: 600;
}

.pscreen-radio {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 0;
  border-bottom: 1px solid var(--line);
  font-size: 13px; color: var(--ink);
}
.pscreen-radio:last-child { border: 0; }
.pscreen-radio-dot {
  width: 16px; height: 16px; border-radius: 999px;
  border: 2px solid var(--momo);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.pscreen-radio-dot.checked::after {
  content: '';
  width: 8px; height: 8px;
  border-radius: 999px;
  background: var(--momo);
}

.pscreen-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.pscreen-chip {
  padding: 5px 10px;
  border-radius: 999px;
  background: var(--blush);
  color: var(--momo);
  font-size: 11px;
  font-weight: 700;
}

.pscreen-btn {
  background: var(--momo);
  color: #fff;
  border-radius: 10px;
  padding: 13px 14px;
  text-align: center;
  font-weight: 800;
  font-size: 14px;
}

.pscreen-highlight { background: #fff5f9; border: 1px solid rgba(215,43,138,.2); }

.step-no { display: none; }

.app-input,
.app-chip-row,
.app-id-card,
.app-bank-card,
.app-gift-ticket {
  border: 1px solid rgba(165, 0, 100, .12);
  background: #fff8fc;
}

.app-input {
  min-height: 32px;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 0 9px;
  border-radius: 8px;
  color: var(--ink);
  font-size: 11px;
  font-weight: 800;
}

.app-chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  padding: 7px 8px;
  border-radius: 8px;
}

.app-chip-row span {
  padding: 4px 7px;
  border-radius: 999px;
  background: #fff;
  color: var(--momo);
  font-size: 10px;
  font-weight: 900;
}

.app-id-card,
.app-bank-card,
.app-gift-ticket {
  display: grid;
  gap: 3px;
  padding: 9px;
  border-radius: 9px;
}

.app-id-card strong,
.app-bank-card strong,
.app-gift-ticket strong {
  color: var(--ink);
  font-size: 11px;
  font-weight: 800;
}

.app-id-card span,
.app-bank-card span,
.app-gift-ticket span {
  color: var(--muted);
  font-size: 10px;
  line-height: 1.4;
}

.app-progress {
  height: 5px;
  overflow: hidden;
  border-radius: 999px;
  background: var(--line);
}

.app-progress span {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: var(--momo);
}

.step-action {
  margin-top: 14px;
  min-height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  background: var(--momo);
  color: #fff;
  font-weight: 900;
}

.gift-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.gift-card {
  padding: 18px;
  border-radius: var(--radius-md);
  background: var(--bg-tint);
  border: 0;
  position: relative;
  overflow: hidden;
}

.gift-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--momo);
  border-radius: var(--radius-md) var(--radius-md) 0 0;
}

.gift-card:nth-child(2)::before { background: #10B981; }
.gift-card:nth-child(3)::before { background: #F59E0B; }
.gift-card:nth-child(4)::before { background: #6366F1; }

.gift-card strong {
  display: block;
  color: var(--ink);
  font-size: 14px;
  line-height: 1.3;
  font-weight: 800;
}

.gift-card span {
  display: block;
  margin-top: 6px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.55;
}

.faq-list {
  display: grid;
  gap: 8px;
}

.faq-item {
  border-radius: var(--radius-sm);
  border: 0;
  background: var(--bg-tint);
  overflow: hidden;
}

.faq-item.open {
  background: #fff;
  border: 1px solid var(--line);
}

.faq-q {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: transparent;
  border: 0;
  color: var(--ink);
  font-weight: 700;
  font-size: 15px;
  text-align: left;
}

.faq-a {
  display: none;
  padding: 0 16px 14px;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.65;
}

.faq-item.open .faq-a {
  display: block;
}

.terms {
  display: grid;
  gap: 10px;
  padding: 18px;
  border-radius: var(--radius-sm);
  background: var(--bg-tint);
  border: 0;
}

.terms li {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.6;
}

.callout {
  padding: 16px 20px;
  border-radius: var(--radius-md);
  background: var(--bg-tint);
  border-left: 4px solid var(--momo);
}

.callout strong {
  display: block;
  color: var(--ink);
  font-size: 14px;
  margin-bottom: 6px;
}

.list {
  display: grid;
  gap: 0;
}

.list-item {
  padding: 14px 0;
  border-bottom: 1px solid var(--line);
}

.list-item:first-child { padding-top: 0; }
.list-item:last-child { border-bottom: 0; }
.list-item strong {
  display: block;
  color: var(--ink);
  font-size: 16px;
}
.list-item span {
  display: block;
  margin-top: 4px;
  color: var(--muted);
  font-size: 13px;
}

.sidebar {
  padding: 0;
}

.related {
  display: grid;
  gap: 0;
}

.related a {
  display: block;
  padding: 14px 0;
  border-top: 1px solid var(--line);
}

.related a:first-child { border-top: 0; padding-top: 0; }

.related a strong {
  display: block;
  color: var(--ink);
  font-size: 14px;
  line-height: 1.3;
  margin-bottom: 3px;
}

.related a span {
  display: block;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}

.cta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 16px;
}

.cta {
  height: 46px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 0 22px;
  border-radius: 999px;
  font-weight: 800;
  font-size: 15px;
  background: #fff;
  color: var(--momo);
  border: 0;
}

.cta.secondary {
  background: rgba(255, 255, 255, .18);
  color: #fff;
}

.hero-img-wrap {
  width: 100%;
  overflow: hidden;
  background: var(--blush);
  border-bottom: 1px solid var(--line);
}

.hero-img {
  width: 100%;
  aspect-ratio: 770 / 370;
  object-fit: cover;
  object-position: center top;
  display: block;
}

@media (max-width: 980px) {
  .content-grid {
    grid-template-columns: 1fr;
  }

  .guideline-layout {
    grid-template-columns: 1fr;
  }
  .guideline-phone-col { position: static; }

  .article-rail {
    position: static;
    border-top: 1px solid var(--line);
    padding-top: 24px;
  }

  .article-rail .rail-offer {
    display: none;
  }
}

@media (max-width: 640px) {
  .brand-text span,
  .back-btn span { display: none; }
  .hero { padding: 32px 20px 36px; }
  .story-title { font-size: clamp(24px, 7vw, 38px); line-height: 1.1; }
  .content-grid { padding: 24px 20px 60px; }
  .gift-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#" id="brandLink" aria-label="Về News">
      <span class="brand-mark"><img src="../assets/images/momo-logo.svg" alt="MoMo"></span>
      <span class="brand-text">
        <strong>MoMo News</strong>
        <span>Daily edition</span>
      </span>
    </a>
    <div class="topbar-actions">
      <a class="icon-btn" href="./news.html" title="Mở trang News" aria-label="Mở trang News"><i class="ti ti-news"></i></a>
      <a class="back-btn" href="#" id="backLink" aria-label="Quay lại News"><i class="ti ti-arrow-left"></i><span>News</span></a>
    </div>
  </header>

  <main class="page">
    <div class="hero-img-wrap" id="heroImgWrap" hidden>
      <img class="hero-img" id="heroImg" src="" alt="">
    </div>

    <section class="hero" aria-label="News detail hero">
      <article class="story">
        <span class="kicker" id="category"></span>
        <h1 class="story-title" id="storyTitle"></h1>
        <p class="deck" id="deck"></p>
        <div class="meta" id="meta"></div>
        <div class="cta-row">
          <a class="cta" id="primaryCta" href="#article"></a>
        </div>
      </article>
    </section>

    <section class="content-grid" id="article">
      <article class="article">
        <section>
          <h2 id="sectionTitle">Tóm tắt</h2>
          <p id="sectionBody"></p>
          <div class="callout">
            <strong>Điểm đáng chú ý</strong>
            <span id="calloutText"></span>
          </div>
        </section>

        <section id="promoArea" hidden>
          <span class="code-pill" id="promoCode" hidden></span>
        </section>

        <section>
          <h2>Nội dung chính</h2>

    metaEl.innerHTML = story.meta.map(item => `<span>${item}</span>`).join('');
    const isPromo = story.kind === 'promo';
    primaryCta.textContent = isPromo ? 'Xem ưu đãi' : (story.category === 'Trust' ? 'Mở hướng dẫn an toàn' : 'Đọc bản tin');
    primaryCta.href = isPromo ? '#promoArea' : '#article';
    sectionTitleEl.textContent = story.sectionTitle;
    sectionBodyEl.textContent = story.sectionBody;
    calloutTextEl.textContent = story.calloutText;
    nextStepsEl.textContent = story.nextSteps;
    changeListEl.innerHTML = story.changes.map(([title, text]) => `
      <div class="list-item">
        <strong>${title}</strong>
        <span>${text}</span>
      </div>
    `).join('');

    promoAreaEl.hidden = true;
    promoGiftsEl.hidden = !isPromo;
    promoGuidelinesEl.hidden = !isPromo;
    promoFaqEl.hidden = !isPromo;
    promoTermsEl.hidden = !isPromo;

    function setCopyFeedback(button, label) {
      const original = button.innerHTML;
      button.innerHTML = `<i class="ti ti-check"></i>${label}`;
      setTimeout(() => {
        button.innerHTML = original;
      }, 1600);
    }

    async function copyPromoCode(button) {
      try {
        await navigator.clipboard.writeText(railPromoCodeEl.textContent.trim());
        setCopyFeedback(button, 'Đã sao chép');
      } catch (_) {
        const selection = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(railPromoCodeEl);
        selection.removeAllRanges();
        selection.addRange(range);
        setCopyFeedback(button, 'Đã chọn mã');
      }
    }

    if (isPromo) {
      let guidelineIndex = 0;
      function renderPhoneScreen(no) {
        const screens = {
          '1': `
            <div class="pscreen-appbar">
              <span class="back-label"><i class="ti ti-arrow-left"></i> Đăng ký MoMo</span>
              <i class="ti ti-home" style="color:var(--muted)"></i>
            </div>
            <div class="pscreen-body">
              <div class="pscreen-card">
                <div class="pscreen-label">Số điện thoại</div>
                <div class="pscreen-input">09xx xxx xxx</div>
              </div>
              <div class="pscreen-card">
                <div class="pscreen-label">Xác thực OTP</div>
                <div class="pscreen-chips">
                  <span class="pscreen-chip">OTP</span>
                  <span class="pscreen-chip">Số trùng ngân hàng</span>
                </div>
              </div>
              <div class="pscreen-btn">Tiếp tục</div>
            </div>`,
          '2': `
            <div class="pscreen-appbar">
              <span class="back-label"><i class="ti ti-arrow-left"></i> Nhập mã khuyến mãi</span>
              <i class="ti ti-home" style="color:var(--muted)"></i>
            </div>
            <div class="pscreen-body">
              <div class="pscreen-card pscreen-highlight">
                <div class="pscreen-label">Mã khuyến mãi</div>
                <div class="pscreen-title" style="color:var(--momo);letter-spacing:.08em">CHONMOMO</div>
              </div>
              <div class="pscreen-card">
                <div class="pscreen-chips">
                  <span class="pscreen-chip">Áp dụng mã</span>
                  <span class="pscreen-chip">Bộ quà 500.000đ</span>
                </div>
              </div>
              <div class="pscreen-btn">Áp dụng</div>
            </div>`,
          '3': `
            <div class="pscreen-appbar">
              <span class="back-label"><i class="ti ti-arrow-left"></i> Xác thực tài khoản</span>
              <i class="ti ti-home" style="color:var(--muted)"></i>
            </div>
            <div class="pscreen-body">
              <div class="pscreen-card">
                <div class="pscreen-label">Chọn phương thức</div>
                <div class="pscreen-radio"><div class="pscreen-radio-dot checked"></div> CCCD gắn chip</div>
                <div class="pscreen-radio"><div class="pscreen-radio-dot"></div> VNeID mức 2</div>
                <div class="pscreen-radio"><div class="pscreen-radio-dot"></div> Sinh trắc học</div>
              </div>
              <div class="pscreen-btn">Chụp CCCD</div>
            </div>`,
          '4': `
            <div class="pscreen-appbar">
              <span class="back-label"><i class="ti ti-arrow-left"></i> Liên kết ngân hàng</span>
              <i class="ti ti-home" style="color:var(--muted)"></i>
            </div>
            <div class="pscreen-body">
              <div class="pscreen-card">
                <div class="pscreen-label">Chọn ngân hàng</div>
                <div class="pscreen-input">Vietcombank ▾</div>
              </div>
              <div class="pscreen-card">
                <div class="pscreen-label">Nạp tiền tối thiểu</div>
                <div class="pscreen-title">10.000đ</div>
                <div style="font-size:11px;color:var(--muted);margin-top:4px">Riêng Agribank: 50.000đ</div>
              </div>
              <div class="pscreen-btn">Liên kết ngay</div>
            </div>`,
          '5': `
            <div class="pscreen-appbar">
              <span class="back-label"><i class="ti ti-arrow-left"></i> Quà của tôi</span>
              <i class="ti ti-home" style="color:var(--muted)"></i>
            </div>
            <div class="pscreen-body">
              <div class="pscreen-card pscreen-highlight">
                <div class="pscreen-label">Bộ quà CHONMOMO</div>
                <div class="pscreen-title">500.000đ giảm dịch vụ</div>
                <div class="pscreen-chips" style="margin-top:10px">
                  <span class="pscreen-chip">Voucher</span>
                  <span class="pscreen-chip">Túi Thần Tài</span>
                  <span class="pscreen-chip">Ví Trả Sau</span>
                </div>
              </div>
              <div class="pscreen-btn">Khám phá quà</div>
            </div>`,
        };
        return screens[no] || screens['1'];
      }

      function renderGuidelineCarousel() {
        const items = story.guidelines || [];
        if (!items.length) return;

        guidelineCarouselEl.innerHTML = renderPhoneScreen(items[guidelineIndex][0]);

        guidelineDotsEl.innerHTML = items.map(([no, title, text], index) => `
          <div class="step-row ${index === guidelineIndex ? 'active' : ''}" data-gi="${index}">
            <div class="step-num">${no}</div>
            <div class="step-row-body">
              <div class="step-row-title">${title}</div>
              <div class="step-row-desc">${text}</div>
            </div>
          </div>
        `).join('');

        guidelineDotsEl.querySelectorAll('.step-row').forEach(row => {
          row.addEventListener('click', () => {
            guidelineIndex = Number(row.dataset.gi);
            renderGuidelineCarousel();
          });
        });
      }

      promoCodeEl.textContent = story.promoCode || 'CHONMOMO';
      promoCodeNoteEl.textContent = story.promoCodeNote || '';
      railOfferEl.hidden = false;
      railPromoCodeEl.textContent = story.promoCode || 'CHONMOMO';
      railPromoNoteEl.textContent = story.promoCodeNote || 'Sao chép mã để nhập trong app MoMo.';
      giftGridEl.innerHTML = story.gifts.map(([title, text]) => `
        <div class="gift-card">
          <strong>${title}</strong>
          <span>${text}</span>
        </div>
      `).join('');
      renderGuidelineCarousel();
      faqListEl.innerHTML = story.faq.map(([q, a]) => `
        <article class="faq-item">
          <button class="faq-q" type="button" aria-expanded="false">
            <span>${q}</span>
            <i class="ti ti-plus"></i>
          </button>
          <div class="faq-a">${a}</div>
        </article>
      `).join('');
      termsListEl.innerHTML = story.terms.map(item => `<li>${item}</li>`).join('');

      const faqButtons = faqListEl.querySelectorAll('.faq-q');
      faqButtons.forEach(button => {
        button.addEventListener('click', () => {
          const item = button.closest('.faq-item');
          const open = item.classList.toggle('open');
          button.setAttribute('aria-expanded', open ? 'true' : 'false');
          const icon = button.querySelector('i');
          icon.className = open ? 'ti ti-minus' : 'ti ti-plus';
        });
      });

      railCopyCodeBtnEl.addEventListener('click', () => copyPromoCode(railCopyCodeBtnEl));

    }

    const defaultRelated = [
      ['cinema-update', 'MoMo Cinema cập nhật luồng chọn suất chiếu mới', 'Product update liên quan trải nghiệm đặt vé.'],
      ['summer-deals', 'Chuỗi ưu đãi hè mở rộng cho nhóm giải trí', 'Campaign update cho nhóm giải trí.'],
    ];
    const relatedItems = story.related.length ? story.related : defaultRelated;
    relatedEl.innerHTML = relatedItems.map(([key, title, text]) => `
      <a href="${buildNewsHref(key)}">
        <strong>${title}</strong>
        <span>${text}</span>
      </a>
    `).join('');
  </script>
</body>
</html>
