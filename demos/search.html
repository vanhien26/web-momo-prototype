<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MoMo Services - Search & Discovery</title>
  <style>
    :root{
      --momo:#a50064;--momo2:#d82d8b;--momo-light:#fff0f7;--momo-ring:#a5006420;
      --ink:#1d2939;--sub:#475467;--muted:#98a2b3;--line:#e4e7ec;--bg:#f2f4f7;--white:#fff;
      --green:#027a48;--green-bg:#d1fadf;
      --blue:#1d4ed8;--blue-bg:#eff6ff;
      --amber:#b45309;--amber-bg:#fef3c7;
      --red:#b42318;--red-bg:#fee4e2;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;min-height:100vh}

    /* ── Nav ── */
    .topbar{height:56px;background:var(--white);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 20px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px #0000000a}
    .brand{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--ink);flex-shrink:0}
    .brand-mark{width:30px;height:30px;background:var(--momo);border-radius:7px;display:grid;place-items:center;font-size:8px;font-weight:900;color:#fff;line-height:1.2;text-align:center}
    .brand strong{font-size:13px}
    .topbar-back{font-size:12px;color:var(--muted);text-decoration:none;flex-shrink:0}.topbar-back:hover{color:var(--momo)}

    /* ── Search bar ── */
    .search-bar-wrap{flex:1;position:relative;max-width:560px}
    .search-bar{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--line);border-radius:10px;padding:0 12px;height:38px;transition:.15s;cursor:text}
    .search-bar:focus-within,.search-bar.focus{border-color:var(--momo);background:#fff;box-shadow:0 0 0 3px var(--momo-ring)}
    .search-icon{font-size:15px;color:var(--muted);flex-shrink:0}
    .search-input{flex:1;border:none;outline:none;font-size:14px;background:transparent;font-family:inherit;color:var(--ink)}
    .search-input::placeholder{color:var(--muted)}
    .search-clear{font-size:12px;color:var(--muted);cursor:pointer;display:none;padding:2px 4px;border-radius:4px}
    .search-clear:hover{background:var(--line)}
    .search-clear.show{display:block}
    .search-kbd{font-size:10px;color:var(--muted);background:var(--bg);border:1px solid var(--line);border-radius:4px;padding:1px 5px;flex-shrink:0}

    /* ── Autocomplete dropdown ── */
    .autocomplete{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--white);border-radius:12px;box-shadow:0 4px 6px -1px #0000001a,0 10px 36px -4px #0000001a,0 0 0 1px var(--line);z-index:200;overflow:hidden;display:none}
    .autocomplete.show{display:block}
    .ac-section{padding:6px 0}
    .ac-label{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:4px 14px 2px}
    .ac-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:.1s}
    .ac-item:hover,.ac-item.highlighted{background:#f9fafb}
    .ac-item-icon{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-size:15px;flex-shrink:0}
    .ac-item-text{flex:1;min-width:0}
    .ac-item-name{font-size:13px;font-weight:600}
    .ac-item-name mark{background:transparent;color:var(--momo);font-weight:800}
    .ac-item-sub{font-size:11px;color:var(--muted);margin-top:1px}
    .ac-item-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:99px;flex-shrink:0}
    .ac-item-arrow{font-size:12px;color:var(--muted)}
    .ac-divider{height:1px;background:var(--line);margin:2px 0}
    .ac-footer{padding:9px 14px;font-size:12px;color:var(--momo);font-weight:700;cursor:pointer;border-top:1px solid var(--line)}
    .ac-footer:hover{background:#fafafa}
    .ac-recent-clear{font-size:10px;color:var(--muted);float:right;cursor:pointer}
    .ac-recent-clear:hover{color:var(--red)}

    /* ── Main layout ── */
    .layout{display:grid;grid-template-columns:220px 1fr;gap:0;max-width:1100px;margin:0 auto;padding:24px 20px;gap:20px}

    /* ── Filters sidebar ── */
    .filters{background:var(--white);border-radius:12px;border:1px solid var(--line);padding:16px;height:fit-content;position:sticky;top:80px}
    .filter-title{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px}
    .filter-group{margin-bottom:16px}
    .fg-label{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:7px}
    .filter-chip-row{display:flex;flex-wrap:wrap;gap:5px}
    .filter-chip{border:1.5px solid var(--line);border-radius:99px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;background:#fff;color:var(--sub);transition:.12s;font-family:inherit}
    .filter-chip:hover{border-color:var(--momo);color:var(--momo)}
    .filter-chip.active{border-color:var(--momo);background:var(--momo-light);color:var(--momo)}
    .filter-range{display:flex;flex-direction:column;gap:5px}
    .filter-range input[type="range"]{width:100%;accent-color:var(--momo)}
    .filter-range-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}
    .filter-reset{width:100%;border:none;background:#f9fafb;border-radius:8px;padding:8px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;margin-top:4px;transition:.1s}
    .filter-reset:hover{background:var(--red-bg);color:var(--red)}

    /* ── Results area ── */
    .results-area{}
    .results-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .results-count{font-size:13px;color:var(--sub)}
    .results-count b{color:var(--ink)}
    .sort-wrap{display:flex;align-items:center;gap:8px}
    .sort-label{font-size:12px;color:var(--muted)}
    .sort-select{border:1.5px solid var(--line);border-radius:8px;padding:5px 8px;font-size:12px;font-weight:700;background:#fff;cursor:pointer;outline:none;font-family:inherit;color:var(--ink)}
    .sort-select:focus{border-color:var(--momo)}

    /* ── Result cards ── */
    .results-grid{display:flex;flex-direction:column;gap:10px}
    .result-card{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:14px 16px;display:flex;align-items:flex-start;gap:13px;cursor:pointer;transition:.15s}
    .result-card:hover{border-color:var(--momo);box-shadow:0 2px 12px #a5006412}
    .result-card.featured{border-color:#fbbf24;background:#fffdf5}
    .rc-icon{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-size:24px;flex-shrink:0}
    .rc-body{flex:1;min-width:0}
    .rc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
    .rc-name{font-size:14px;font-weight:800}
    .rc-name mark{background:transparent;color:var(--momo)}
    .rc-badges{display:flex;align-items:center;gap:4px;flex-wrap:wrap;flex-shrink:0}
    .badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px}
    .b-green{background:var(--green-bg);color:var(--green)}
    .b-amber{background:var(--amber-bg);color:var(--amber)}
    .b-blue{background:var(--blue-bg);color:var(--blue)}
    .b-momo{background:var(--momo-light);color:var(--momo)}
    .rc-sub{font-size:12px;color:var(--muted);margin-top:2px}
    .rc-desc{font-size:12px;color:var(--sub);margin-top:5px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .rc-meta{display:flex;align-items:center;gap:12px;margin-top:7px}
    .rc-meta-item{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:3px}
    .rc-meta-item b{color:var(--ink);font-weight:700}
    .rc-cta{margin-left:auto;padding:7px 14px;background:var(--momo);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:.15s;flex-shrink:0}
    .rc-cta:hover{background:var(--momo2)}
    .rc-cta.ghost{background:#fff;color:var(--momo);border:1.5px solid var(--momo)}
    .rc-cta.ghost:hover{background:var(--momo-light)}
    .sponsored-label{font-size:9px;font-weight:800;color:var(--amber);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}

    /* ── Pagination ── */
    .pagination{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:20px}
    .pg-btn{width:34px;height:34px;border:1.5px solid var(--line);border-radius:8px;background:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:grid;place-items:center;transition:.1s}
    .pg-btn:hover{border-color:var(--momo);color:var(--momo)}
    .pg-btn.active{background:var(--momo);color:#fff;border-color:var(--momo)}
    .pg-btn:disabled{opacity:.4;cursor:not-allowed}

    /* ── Empty / loading ── */
    .empty-state{text-align:center;padding:48px 24px;display:flex;flex-direction:column;align-items:center;gap:10px}
    .empty-icon{font-size:48px}
    .empty-title{font-size:16px;font-weight:800}
    .empty-sub{font-size:13px;color:var(--muted);max-width:300px;line-height:1.6}
    .empty-suggest{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:6px}
    .suggest-chip{padding:5px 12px;border:1.5px solid var(--line);border-radius:99px;font-size:12px;cursor:pointer;background:#fff;transition:.1s}
    .suggest-chip:hover{border-color:var(--momo);color:var(--momo)}

    /* ── Quick shortcuts ── */
    .quick-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
    .quick-chip{display:flex;align-items:center;gap:5px;padding:6px 12px;border:1.5px solid var(--line);border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;background:#fff;color:var(--sub);transition:.12s}
    .quick-chip:hover{border-color:var(--momo);color:var(--momo);background:var(--momo-light)}
    .quick-chip.active{border-color:var(--momo);background:var(--momo-light);color:var(--momo)}

    .view-toggle{display:flex;border:1.5px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
    .vt-btn{width:32px;height:30px;border:none;background:transparent;cursor:pointer;font-size:14px;display:grid;place-items:center;transition:.1s}
    .vt-btn.active{background:var(--momo-light)}
  </style>
</head>
<body>

<!-- ── Topbar with search ── -->
<div class="topbar">
  <a class="brand" href="/lab.html">
    <div class="brand-mark">M<br>o</div>
    <strong>MoMo</strong>
  </a>

  <div class="search-bar-wrap">
    <div class="search-bar" id="searchBar" onclick="focusSearch()">
      <span class="search-icon">🔍</span>
      <input
        class="search-input" id="searchInput"
        type="text" placeholder="Tìm kiếm dịch vụ, use case, tính năng..."
        autocomplete="off"
        oninput="onInput(this.value)"
        onfocus="onFocus()"
        onblur="onBlur()"
        onkeydown="onKeydown(event)"
      >
      <span class="search-clear" id="searchClear" onclick="clearSearch()">✕</span>
      <span class="search-kbd" id="searchKbd">⌘K</span>
    </div>
    <div class="autocomplete" id="autocomplete"></div>
  </div>

  <a class="topbar-back" href="/lab.html">← Lab</a>
</div>

<!-- ── Main content ── -->
<div class="layout">
  <!-- Sidebar filters -->
  <aside class="filters">
    <div class="filter-title">Bộ lọc dịch vụ</div>

    <div class="filter-group">
      <div class="fg-label">Loại dịch vụ</div>
      <div class="filter-chip-row" id="fcCategory">
        <button class="filter-chip active" data-v="all" onclick="setFilter('category','all',this)">Tất cả</button>
        <button class="filter-chip" data-v="payment" onclick="setFilter('category','payment',this)">Thanh toán</button>
        <button class="filter-chip" data-v="finance" onclick="setFilter('category','finance',this)">Tài chính</button>
        <button class="filter-chip" data-v="merchant" onclick="setFilter('category','merchant',this)">Merchant</button>
        <button class="filter-chip" data-v="lifestyle" onclick="setFilter('category','lifestyle',this)">Lifestyle</button>
        <button class="filter-chip" data-v="insurance" onclick="setFilter('category','insurance',this)">Bảo hiểm</button>
      </div>
    </div>

    <div class="filter-group">
      <div class="fg-label">Ưu đãi</div>
      <div class="filter-chip-row" id="fcPromo">
        <button class="filter-chip active" data-v="all" onclick="setFilter('promo','all',this)">Tất cả</button>
        <button class="filter-chip" data-v="cashback" onclick="setFilter('promo','cashback',this)">Cashback</button>
        <button class="filter-chip" data-v="discount" onclick="setFilter('promo','discount',this)">Giảm giá</button>
        <button class="filter-chip" data-v="free" onclick="setFilter('promo','free',this)">Miễn phí</button>
      </div>
    </div>

    <div class="filter-group">
      <div class="fg-label">Đánh giá tối thiểu</div>
      <div class="filter-range">
        <input type="range" min="0" max="5" step="0.5" value="0" id="ratingRange" oninput="setRatingFilter(this.value)">
        <div class="filter-range-labels"><span>Bất kỳ</span><span id="ratingVal">5★</span></div>
      </div>
    </div>

    <div class="filter-group">
      <div class="fg-label">Tính năng</div>
      <div class="filter-chip-row">
        <button class="filter-chip" onclick="this.classList.toggle('active')">Miễn phí</button>
        <button class="filter-chip" onclick="this.classList.toggle('active')">Mới</button>
        <button class="filter-chip" onclick="this.classList.toggle('active')">Phổ biến</button>
        <button class="filter-chip" onclick="this.classList.toggle('active')">MoMo Xu</button>
      </div>
    </div>

      <button class="filter-reset" onclick="resetFilters()">✕ Xoá bộ lọc</button>
  </aside>

  <!-- Results -->
  <div class="results-area">
    <!-- Quick filter chips -->
    <div class="quick-row" id="quickRow">
      <button class="quick-chip active" onclick="setQuick('all',this)">🔥 Tất cả</button>
      <button class="quick-chip" onclick="setQuick('trending',this)">📈 Đang hot</button>
      <button class="quick-chip" onclick="setQuick('new',this)">✨ Mới ra mắt</button>
      <button class="quick-chip" onclick="setQuick('promo',this)">🏷️ Đang ưu đãi</button>
      <button class="quick-chip" onclick="setQuick('nearby',this)">📍 Gần đây</button>
    </div>

    <div class="results-meta">
      <div class="results-count" id="resultsCount">Hiển thị <b>12</b> dịch vụ</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="sort-wrap">
          <span class="sort-label">Sắp xếp:</span>
          <select class="sort-select" id="sortSelect" onchange="resort(this.value)">
            <option value="relevance">Liên quan nhất</option>
            <option value="popular">Phổ biến nhất</option>
            <option value="rating">Đánh giá cao nhất</option>
            <option value="newest">Mới nhất</option>
          </select>
        </div>
        <div class="view-toggle">
          <button class="vt-btn active" id="vt-list" onclick="setView('list',this)" title="Danh sách">☰</button>
          <button class="vt-btn" id="vt-grid" onclick="setView('grid',this)" title="Lưới">⊞</button>
        </div>
      </div>
    </div>

    <div class="results-grid" id="resultsGrid"></div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<script>
  // ── Data
  const ITEMS = [
    { id:1,  name:'Chuyển tiền nhanh', icon:'💸', bg:'#d1fadf', cat:'payment',   promo:'free',     rating:4.9, users:'40M',  tags:['Miễn phí','Phổ biến'],  desc:'Chuyển tiền 24/7 đến mọi ngân hàng, không phí, không giới hạn số lần giao dịch.',  cta:'Chuyển ngay',  new:false, trending:true },
    { id:2,  name:'Tiết kiệm MoMo',   icon:'🏦', bg:'#eff6ff', cat:'finance',   promo:'cashback', rating:4.7, users:'5M',   tags:['Lãi 7.2%/năm'],          desc:'Gửi tiết kiệm trực tuyến với lãi suất lên đến 7.2%/năm, linh hoạt kỳ hạn 1–36 tháng.',  cta:'Gửi tiết kiệm', new:false, trending:false },
    { id:3,  name:'Vay Nhanh',         icon:'💳', bg:'#fff0f7', cat:'finance',   promo:'discount', rating:4.5, users:'2M',   tags:['Duyệt 5 phút'],          desc:'Vay từ 500K đến 10 triệu, duyệt tự động trong 5 phút, nhận tiền ngay vào ví.',  cta:'Vay ngay',     new:false, trending:true },
    { id:4,  name:'Bảo hiểm sức khoẻ', icon:'🏥', bg:'#f0fdf4', cat:'insurance', promo:'discount', rating:4.6, users:'1.2M', tags:['Mới','MoMo Xu'],         desc:'Bảo hiểm sức khoẻ toàn diện từ 20.000đ/tháng, bồi thường tối đa 100 triệu.',     cta:'Mua ngay',     new:true,  trending:false },
    { id:5,  name:'Đặt đồ ăn Grab',   icon:'🍔', bg:'#fef3c7', cat:'lifestyle', promo:'cashback', rating:4.8, users:'8M',   tags:['Hoàn 15%','Phổ biến'],   desc:'Đặt đồ ăn từ hàng ngàn nhà hàng, hoàn tiền 15% vào MoMo Xu với mỗi đơn hàng.',  cta:'Đặt ngay',     new:false, trending:true, sponsored:true },
    { id:6,  name:'Nạp điện thoại',    icon:'📱', bg:'#f5f3ff', cat:'payment',   promo:'free',     rating:4.9, users:'25M',  tags:['Tức thì','Miễn phí'],    desc:'Nạp tiền điện thoại tất cả nhà mạng, nhận ngay, không phí giao dịch, có khuyến mại.',  cta:'Nạp ngay',   new:false, trending:false },
    { id:7,  name:'Thanh toán điện',   icon:'⚡', bg:'#fffbeb', cat:'payment',   promo:'cashback', rating:4.7, users:'15M',  tags:['Hoàn 5K Xu'],            desc:'Thanh toán hoá đơn điện EVN, nước, internet, truyền hình — nhắc hẹn tự động hàng tháng.', cta:'Thanh toán', new:false, trending:false },
    { id:8,  name:'Mua vé xem phim',   icon:'🎬', bg:'#fce7f3', cat:'lifestyle', promo:'discount', rating:4.6, users:'3M',   tags:['Giảm 30%','Mới'],        desc:'Đặt vé CGV, Lotte, BHD — giảm 30K mỗi vé khi thanh toán MoMo, không phí đặt chỗ.', cta:'Đặt vé',      new:true,  trending:false },
    { id:9,  name:'Chứng chỉ quỹ',     icon:'📈', bg:'#f5f3ff', cat:'finance',   promo:null,       rating:4.4, users:'500K', tags:['Từ 10.000đ'],            desc:'Đầu tư chứng chỉ quỹ mở từ 10.000đ, lợi suất lịch sử 12–15%/năm, rút tiền linh hoạt.', cta:'Đầu tư ngay', new:false, trending:false },
    { id:10, name:'Bảo hiểm xe máy',   icon:'🛵', bg:'#f0f9ff', cat:'insurance', promo:'discount', rating:4.5, users:'800K', tags:['Bắt buộc','Nhanh 1 phút'], desc:'Mua bảo hiểm xe máy bắt buộc + tự nguyện, cấp giấy tờ điện tử ngay lập tức.',  cta:'Mua ngay',     new:false, trending:false },
    { id:11, name:'Đặt khách sạn',     icon:'🏨', bg:'#fff7ed', cat:'lifestyle', promo:'cashback', rating:4.7, users:'2.5M', tags:['Cashback 10%'],          desc:'Đặt khách sạn toàn quốc qua Agoda, Booking — hoàn tiền 10% vào ví MoMo.',          cta:'Đặt phòng',    new:false, trending:true  },
    { id:12, name:'Mua thẻ game',       icon:'🎮', bg:'#fdf4ff', cat:'lifestyle', promo:'discount', rating:4.8, users:'4M',   tags:['Giảm 5%'],               desc:'Mua thẻ nạp game, thẻ iTunes, Google Play — giao hàng tức thì, giảm 5% mọi loại thẻ.', cta:'Mua ngay',   new:false, trending:false },
  ];

  const RECENT = ['chuyển tiền', 'tiết kiệm', 'vay nhanh', 'nạp điện thoại'];
  const SUGGESTIONS = {
    'c': ['chuyển tiền', 'chứng chỉ quỹ', 'cashback'],
    't': ['tiết kiệm', 'thanh toán điện', 'thẻ game'],
    'v': ['vay nhanh', 'vé xem phim'],
    'n': ['nạp điện thoại', 'nạp game'],
    'b': ['bảo hiểm sức khoẻ', 'bảo hiểm xe máy'],
    'd': ['đặt đồ ăn', 'đặt khách sạn', 'đặt vé'],
  };

  let filters = { category: 'all', promo: 'all', rating: 0 };
  let quick = 'all';
  let query = '';
  let sortBy = 'relevance';
  let acIdx = -1;
  let currentPage = 1;
  const PER_PAGE = 8;

  // ── Search logic
  function getResults() {
    let items = ITEMS.filter(item => {
      if (query) {
        const q = query.toLowerCase();
        if (!item.name.toLowerCase().includes(q) && !item.desc.toLowerCase().includes(q)) return false;
      }
      if (filters.category !== 'all' && item.cat !== filters.category) return false;
      if (filters.promo !== 'all' && item.promo !== filters.promo) return false;
      if (item.rating < filters.rating) return false;
      if (quick === 'trending' && !item.trending) return false;
      if (quick === 'new' && !item.new) return false;
      if (quick === 'promo' && !item.promo) return false;
      return true;
    });
    if (sortBy === 'popular') items.sort((a,b) => parseInt(b.users) - parseInt(a.users));
    else if (sortBy === 'rating') items.sort((a,b) => b.rating - a.rating);
    else if (sortBy === 'newest') items.sort((a,b) => (b.new?1:0) - (a.new?1:0));
    return items;
  }

  function highlight(text, q) {
    if (!q) return text;
    return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');
  }

  function renderResults() {
    const results = getResults();
    const start = (currentPage - 1) * PER_PAGE;
    const page = results.slice(start, start + PER_PAGE);

    document.getElementById('resultsCount').innerHTML = `Hiển thị <b>${results.length}</b> dịch vụ${query ? ` cho "<b>${query}</b>"` : ''}`;

    const grid = document.getElementById('resultsGrid');
    if (results.length === 0) {
      grid.innerHTML = `<div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">Không tìm thấy dịch vụ</div>
        <div class="empty-sub">Thử tìm với từ khoá khác hoặc xoá bộ lọc</div>
        <div class="empty-suggest">
          <div class="suggest-chip" onclick="applySearch('chuyển tiền')">chuyển tiền</div>
          <div class="suggest-chip" onclick="applySearch('tiết kiệm')">tiết kiệm</div>
          <div class="suggest-chip" onclick="applySearch('vay nhanh')">vay nhanh</div>
        </div>
      </div>`;
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    grid.innerHTML = page.map(item => `
      <div class="result-card${item.sponsored?' featured':''}">
        <div class="rc-icon" style="background:${item.bg}">${item.icon}</div>
        <div class="rc-body">
          <div class="rc-top">
            <div>
              <div class="rc-name">${highlight(item.name, query)}</div>
              ${item.sponsored ? '<div class="sponsored-label">Tài trợ</div>' : ''}
            </div>
            <div class="rc-badges">
              ${item.tags.map(t => `<span class="badge b-${t.includes('Miễn')||t.includes('Tức')?'green':t.includes('Mới')||t.includes('Duyệt')||t.includes('phút')?'blue':t.includes('Phổ')||t.includes('Lãi')||t.includes('Cashback')||t.includes('Hoàn')||t.includes('Giảm')?'amber':'momo'}">${t}</span>`).join('')}
            </div>
          </div>
          <div class="rc-desc">${highlight(item.desc, query)}</div>
          <div class="rc-meta">
            <div class="rc-meta-item">⭐ <b>${item.rating}</b></div>
            <div class="rc-meta-item">👤 <b>${item.users}</b> người dùng</div>
          </div>
        </div>
        <button class="rc-cta${item.sponsored?'':' ghost'}">${item.cta}</button>
      </div>`).join('');

    // Pagination
    const totalPages = Math.ceil(results.length / PER_PAGE);
    let pgHtml = `<button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>←</button>`;
    for (let i = 1; i <= totalPages; i++) {
      pgHtml += `<button class="pg-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
    }
    pgHtml += `<button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>→</button>`;
    document.getElementById('pagination').innerHTML = pgHtml;
  }

  function goPage(n) {
    const max = Math.ceil(getResults().length / PER_PAGE);
    if (n < 1 || n > max) return;
    currentPage = n;
    renderResults();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Input handlers
  function onInput(val) {
    query = val;
    currentPage = 1;
    document.getElementById('searchClear').classList.toggle('show', val.length > 0);
    document.getElementById('searchKbd').style.display = val ? 'none' : '';
    renderResults();
    renderAutocomplete(val);
  }

  function clearSearch() {
    document.getElementById('searchInput').value = '';
    query = '';
    onInput('');
    document.getElementById('searchInput').focus();
  }

  function onFocus() {
    document.getElementById('searchBar').classList.add('focus');
    renderAutocomplete(document.getElementById('searchInput').value);
  }

  function onBlur() {
    document.getElementById('searchBar').classList.remove('focus');
    setTimeout(() => { document.getElementById('autocomplete').classList.remove('show'); }, 200);
  }

  function focusSearch() { document.getElementById('searchInput').focus(); }

  // ⌘K shortcut
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); focusSearch(); }
  });

  // ── Autocomplete
  function renderAutocomplete(val) {
    const ac = document.getElementById('autocomplete');
    if (!val) {
      // Show recent + trending
      ac.innerHTML = `
        <div class="ac-section">
          <div class="ac-label">Tìm kiếm gần đây <span class="ac-recent-clear" onclick="clearRecent()">Xoá</span></div>
          ${RECENT.map(r => `<div class="ac-item" onclick="applySearch('${r}')">
            <div class="ac-item-icon" style="background:#f3f4f6">🕐</div>
            <div class="ac-item-text"><div class="ac-item-name">${r}</div></div>
            <div class="ac-item-arrow">↗</div>
          </div>`).join('')}
        </div>
        <div class="ac-divider"></div>
        <div class="ac-section">
          <div class="ac-label">Đang hot 🔥</div>
          ${ITEMS.filter(i=>i.trending).slice(0,3).map(item => `<div class="ac-item" onclick="applySearch('${item.name}')">
            <div class="ac-item-icon" style="background:${item.bg}">${item.icon}</div>
            <div class="ac-item-text">
              <div class="ac-item-name">${item.name}</div>
              <div class="ac-item-sub">${item.tags[0]}</div>
            </div>
            <span class="ac-item-tag b-amber badge">Hot</span>
          </div>`).join('')}
        </div>`;
      ac.classList.add('show');
      return;
    }

    const q = val.toLowerCase();
    const matched = ITEMS.filter(i => i.name.toLowerCase().includes(q) || i.desc.toLowerCase().includes(q));
    const keySuggests = SUGGESTIONS[q[0]] || [];

    if (matched.length === 0 && keySuggests.length === 0) {
      ac.innerHTML = `<div class="ac-item" style="pointer-events:none"><div class="ac-item-text"><div class="ac-item-name" style="color:var(--muted)">Không tìm thấy gợi ý cho "${val}"</div></div></div>`;
      ac.classList.add('show');
      return;
    }

    let html = '';
    if (keySuggests.length) {
      html += `<div class="ac-section"><div class="ac-label">Gợi ý</div>`;
      html += keySuggests.filter(s => s.includes(q)).slice(0,3).map(s =>
        `<div class="ac-item" onclick="applySearch('${s}')">
          <div class="ac-item-icon" style="background:#f3f4f6">🔍</div>
          <div class="ac-item-text"><div class="ac-item-name">${highlight(s, q)}</div></div>
          <div class="ac-item-arrow">↗</div>
        </div>`).join('');
      html += `</div><div class="ac-divider"></div>`;
    }
    if (matched.length) {
      html += `<div class="ac-section"><div class="ac-label">Dịch vụ</div>`;
      html += matched.slice(0,4).map(item =>
        `<div class="ac-item" onclick="applySearch('${item.name}')">
          <div class="ac-item-icon" style="background:${item.bg}">${item.icon}</div>
          <div class="ac-item-text">
            <div class="ac-item-name">${highlight(item.name, q)}</div>
            <div class="ac-item-sub">${item.tags[0]}</div>
          </div>
        </div>`).join('');
      html += `</div>`;
    }
    html += `<div class="ac-footer" onclick="applySearch('${val}')">🔍 Tìm kiếm "<b>${val}</b>"</div>`;
    ac.innerHTML = html;
    ac.classList.add('show');
  }

  function clearRecent() {
    RECENT.length = 0;
    renderAutocomplete('');
  }

  function applySearch(val) {
    document.getElementById('searchInput').value = val;
    query = val;
    currentPage = 1;
    document.getElementById('searchClear').classList.add('show');
    document.getElementById('searchKbd').style.display = 'none';
    document.getElementById('autocomplete').classList.remove('show');
    renderResults();
  }

  function onKeydown(e) {
    const items = document.querySelectorAll('.ac-item');
    if (e.key === 'ArrowDown') { acIdx = Math.min(acIdx+1, items.length-1); highlightAcItem(items); e.preventDefault(); }
    else if (e.key === 'ArrowUp') { acIdx = Math.max(acIdx-1, -1); highlightAcItem(items); e.preventDefault(); }
    else if (e.key === 'Enter' && acIdx >= 0) { items[acIdx]?.click(); acIdx = -1; }
    else if (e.key === 'Escape') { document.getElementById('autocomplete').classList.remove('show'); }
  }

  function highlightAcItem(items) {
    items.forEach((el,i) => el.classList.toggle('highlighted', i === acIdx));
  }

  // ── Filters
  function setFilter(type, val, el) {
    filters[type] = val;
    currentPage = 1;
    el.closest('.filter-chip-row').querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderResults();
  }

  function setRatingFilter(val) {
    filters.rating = +val;
    document.getElementById('ratingVal').textContent = val > 0 ? `${val}★+` : 'Bất kỳ';
    currentPage = 1;
    renderResults();
  }

  function resetFilters() {
    filters = { category: 'all', promo: 'all', rating: 0 };
    document.getElementById('ratingRange').value = 0;
    document.getElementById('ratingVal').textContent = '5★';
    document.querySelectorAll('.filter-chip').forEach(c => { c.classList.toggle('active', c.dataset.v === 'all'); });
    currentPage = 1;
    renderResults();
  }

  function setQuick(val, el) {
    quick = val;
    currentPage = 1;
    document.querySelectorAll('.quick-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderResults();
  }

  function resort(val) {
    sortBy = val;
    currentPage = 1;
    renderResults();
  }

  function setView(v, el) {
    document.querySelectorAll('.vt-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    // Grid view toggle (visual only for demo)
    const grid = document.getElementById('resultsGrid');
    grid.style.display = v === 'grid' ? 'grid' : '';
    if (v === 'grid') { grid.style.gridTemplateColumns = '1fr 1fr'; grid.style.gap = '10px'; }
  }

  // ── Init
  renderResults();
</script>
</body>
</html>
