<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>Cửa hàng ở Crescent Mall, TP. Hồ Chí Minh | Ví Trả Sau MoMo</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <style>
    @font-face{font-family:"MoMo Trust Sans";src:url("../assets/fonts/momo-trust/MoMoTrustSans-Regular.otf") format("opentype");font-weight:400;font-display:swap}
    @font-face{font-family:"MoMo Trust Sans";src:url("../assets/fonts/momo-trust/MoMoTrustSans-Medium.otf") format("opentype");font-weight:500 900;font-display:swap}

    :root{
      --momo:#d82d8b; --momo-dark:#a50064;
      --pink-soft:#fff0f7; --pink-rim:#ffd6ec;
      --ink:#171b24; --muted:#667085;
      --grey-200:#e4e7ec; --line:#e8e9ed;
      --surface:#fff; --page:#f6f7f9;
      --green:#16803d; --green-bg:#ecfdf3;
      --shadow-sm:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04);
      --shadow:0 12px 40px rgba(16,24,40,.07);
      --shadow-lg:0 20px 50px rgba(16,24,40,.12);
      --ease:cubic-bezier(.4,0,.2,1);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{color:var(--ink);background:var(--page);font-family:"MoMo Trust Sans",-apple-system,sans-serif;font-synthesis:none}
    a{color:inherit;text-decoration:none}
    button,input,select{font:inherit;cursor:pointer;border:none;background:none;padding:0}

    /* ── PAGE HEAD (matches real MoMo UI) */
    .page-head{
      background:rgba(255,255,255,.95);
      backdrop-filter:saturate(180%) blur(14px);
      -webkit-backdrop-filter:saturate(180%) blur(14px);
      border-bottom:1px solid var(--line);
      position:sticky;top:0;z-index:30;
    }
    .page-head-inner{
      display:flex;align-items:flex-start;justify-content:space-between;
      gap:16px;padding:14px 20px 0;max-width:1440px;margin:0 auto;
    }
    .page-head-text h1{font-size:17px;font-weight:800;line-height:1.2;margin:0;color:var(--ink)}
    .page-head-text p{font-size:11px;color:var(--muted);margin:3px 0 0}
    .close-btn{
      display:flex;align-items:center;gap:6px;
      font-size:12px;font-weight:700;color:var(--muted);
      border:1px solid var(--line);border-radius:999px;
      padding:6px 12px;background:#fff;flex:none;margin-top:2px;
      transition:all .15s;
    }
    .close-btn:hover{color:var(--ink);border-color:var(--grey-200)}

    /* ── FILTER ROW */
    .filter-row{
      display:flex;align-items:center;gap:8px;
      padding:0 20px 12px;max-width:1440px;margin:0 auto;
      overflow-x:auto;scrollbar-width:none;
    }
    .filter-row::-webkit-scrollbar{display:none}
    .filter-chip{
      display:inline-flex;align-items:center;gap:6px;
      padding:8px 14px;border-radius:999px;
      background:#fff;border:1px solid var(--line);
      font-size:12px;font-weight:600;color:var(--ink);
      white-space:nowrap;flex:none;
      transition:border-color .15s,background .15s,color .15s;
    }
    .filter-chip:hover{border-color:var(--grey-200)}
    .filter-chip.active{background:var(--ink);border-color:var(--ink);color:#fff}
    .filter-chip .icon{font-size:14px}
    .filter-more{
      display:inline-flex;align-items:center;justify-content:center;
      width:34px;height:34px;border-radius:999px;
      background:#fff;border:1px solid var(--line);
      font-size:14px;color:var(--muted);flex:none;
    }

    /* ── SPLIT */
    .split{
      display:grid;
      grid-template-columns:minmax(300px,380px) 1fr;
      min-height:calc(100vh - 130px);
    }
    body.has-detail .split{
      grid-template-columns:minmax(300px,360px) minmax(280px,340px) 1fr;
    }

    /* ── LIST PANE */
    .list-pane{padding:14px 14px 40px;overflow:visible}
    .list-meta{
      display:flex;align-items:baseline;justify-content:space-between;
      margin-bottom:12px;flex-wrap:wrap;gap:8px;
    }
    .list-title{font-size:16px;font-weight:800;margin:0;color:var(--ink)}
    .list-sub{font-size:11px;color:var(--muted);margin:3px 0 0}
    .sort-wrap{
      display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:600;
      padding:6px 11px;border-radius:999px;background:#fff;border:1px solid var(--line);flex:none;
    }
    .sort-wrap select{border:0;outline:0;background:transparent;font-size:11px;font-weight:700;color:var(--ink)}

    /* ── MERCHANT CARDS (real MoMo style) */
    .merchant-list{display:flex;flex-direction:column;gap:8px}
    .m-card{
      display:flex;align-items:center;gap:12px;
      padding:12px;border-radius:12px;
      background:#fff;border:1px solid var(--line);
      cursor:pointer;
      transition:border-color .15s,box-shadow .15s;
    }
    .m-card:hover{border-color:var(--grey-200);box-shadow:var(--shadow-sm)}
    .m-card.active{border-color:var(--momo);box-shadow:0 0 0 1.5px var(--momo)}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    .m-logo{
      width:52px;height:52px;border-radius:10px;flex:none;overflow:hidden;
      background:linear-gradient(90deg,#f0f2f5 0%,#e6e9ee 50%,#f0f2f5 100%);
      background-size:200%;animation:shimmer 1.6s ease-in-out infinite;
      position:relative;
    }
    .m-logo-fallback{
      position:absolute;inset:0;display:grid;place-items:center;font-size:24px;
      background:linear-gradient(135deg,var(--bc,var(--momo)) 0%,var(--bc2,var(--momo-dark)) 100%);
    }
    .m-body{flex:1;min-width:0}
    .m-name{
      font-size:12.5px;font-weight:800;line-height:1.3;
      color:var(--ink);text-transform:uppercase;letter-spacing:.02em;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .m-addr{
      font-size:10.5px;color:var(--muted);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      margin-top:2px;
    }
    .m-badges{display:flex;align-items:center;gap:5px;margin-top:5px;flex-wrap:wrap}
    .badge-vts{
      display:inline-flex;align-items:center;gap:3px;
      font-size:9px;font-weight:800;color:var(--momo);
      background:var(--pink-soft);border:1px solid var(--pink-rim);
      padding:2px 6px;border-radius:4px;
    }
    .badge-cashback{font-size:9px;font-weight:800;color:var(--green);background:var(--green-bg);padding:2px 6px;border-radius:4px}
    .m-rating{
      display:flex;align-items:center;gap:2px;
      font-size:10px;font-weight:700;color:var(--ink);flex:none;
    }
    .m-rating .star{color:#f5a400}

    /* ── DETAIL MODAL (middle panel, same pattern as merchants.html) */
    .detail-modal{
      display:none;
      background:#fff;
      border-left:1px solid var(--line);border-right:1px solid var(--line);
      box-shadow:6px 0 20px rgba(16,24,40,.06);
      flex-direction:column;
      position:sticky;top:0;
      height:100vh;
      align-self:start;
      overflow:hidden;
    }
    body.has-detail .detail-modal{display:flex}
    .detail-close{
      position:absolute;top:12px;right:12px;z-index:5;
      width:30px;height:30px;border-radius:999px;
      background:rgba(255,255,255,.9);border:1px solid var(--line);
      display:grid;place-items:center;
      box-shadow:var(--shadow-sm);transition:all .15s;
    }
    .detail-close:hover{background:#fff;box-shadow:var(--shadow)}
    .detail-hero{
      height:220px;position:relative;overflow:hidden;flex:none;
      background:linear-gradient(90deg,#f0f2f5 0%,#e6e9ee 50%,#f0f2f5 100%);
      background-size:200%;animation:shimmer 1.6s ease-in-out infinite;
    }
    .detail-hero img{
      position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
      transition:opacity .3s;
    }
    .detail-hero img:not(.loaded){opacity:0}
    /* VTS banner overlay (matches real MoMo screenshot) */
    .vts-overlay{
      position:absolute;bottom:0;left:0;right:0;
      background:linear-gradient(0deg,rgba(0,0,0,.72) 0%,transparent 100%);
      padding:14px 14px 12px;
      display:flex;align-items:center;gap:10px;
    }
    .vts-overlay-badge{
      display:inline-flex;align-items:center;gap:5px;
      background:var(--momo);color:#fff;
      border-radius:6px;padding:5px 10px;
      font-size:10px;font-weight:800;white-space:nowrap;flex:none;
    }
    .vts-overlay-badge img{width:14px;height:14px;border-radius:3px;object-fit:contain;background:#fff}
    .vts-overlay-text{font-size:10.5px;color:rgba(255,255,255,.88);line-height:1.35}
    .vts-overlay-text strong{color:#fff;display:block;font-size:11px}

    .detail-thumbs{
      display:flex;gap:6px;padding:10px 14px;flex:none;
      overflow-x:auto;border-bottom:1px solid var(--line);scrollbar-width:none;
    }
    .detail-thumbs::-webkit-scrollbar{display:none}
    .detail-thumb{
      width:48px;height:48px;border-radius:8px;flex:none;overflow:hidden;
      border:2px solid transparent;cursor:pointer;transition:border-color .15s;
      background:#f0f2f5;display:grid;place-items:center;font-size:20px;
    }
    .detail-thumb.active{border-color:var(--momo)}
    .detail-thumb img{width:100%;height:100%;object-fit:cover;display:block}

    .detail-scroll{flex:1;overflow-y:auto;padding:14px}
    .detail-name{font-size:15px;font-weight:900;color:var(--ink);margin:0 0 10px;text-transform:uppercase;letter-spacing:.02em;line-height:1.2}
    .detail-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:12px;color:var(--muted)}
    .detail-row svg{flex:none;margin-top:1px;color:var(--momo)}
    .detail-row a{color:var(--muted)}
    .detail-row a:hover{color:var(--momo)}
    .detail-hours-link{color:var(--green)!important;font-weight:600}
    .detail-desc{font-size:12px;color:var(--muted);line-height:1.6;margin:8px 0 14px}
    .detail-actions{display:flex;flex-direction:column;gap:8px;padding-top:4px}
    .btn-primary{
      display:flex;align-items:center;justify-content:center;gap:6px;
      background:var(--momo);color:#fff;border-radius:10px;
      padding:13px;font-size:14px;font-weight:800;
      transition:background .15s,transform .15s;
    }
    .btn-primary:hover{background:var(--momo-dark);transform:translateY(-1px)}
    .btn-secondary{
      display:flex;align-items:center;justify-content:center;gap:6px;
      background:#fff;color:var(--ink);border:1px solid var(--line);border-radius:10px;
      padding:11px;font-size:13px;font-weight:700;
      transition:border-color .15s;
    }
    .btn-secondary svg{color:var(--momo)}
    .btn-secondary:hover{border-color:var(--momo)}

    /* ── MAP PANE */
    .map-pane{position:sticky;top:0;height:calc(100vh - 0px);align-self:start;border-left:1px solid var(--line)}
    #map{height:100%;width:100%;background:#e9eef3}
    .leaflet-container{background:#f5f4f1;font-family:inherit}
    .leaflet-control-zoom{display:none!important}
    .leaflet-control-attribution{font-size:9px!important;background:rgba(255,255,255,.85)!important;padding:2px 7px!important;border-radius:6px 0 0 0!important}
    .map-overlay{
      position:absolute;top:14px;left:14px;z-index:400;
      background:rgba(255,255,255,.95);backdrop-filter:blur(10px);
      border-radius:999px;padding:8px 14px;
      font-size:11px;font-weight:700;color:var(--ink);
      box-shadow:0 2px 10px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04);
      display:flex;align-items:center;gap:7px;
    }
    .map-overlay i{width:7px;height:7px;border-radius:50%;background:var(--momo);display:inline-block;animation:pulse 1.6s infinite}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.6);opacity:.5}}
    .map-ctrl-stack{position:absolute;top:14px;right:14px;z-index:400;display:flex;flex-direction:column;gap:6px}
    .map-ctrl-group{background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.10),0 0 0 1px rgba(0,0,0,.04);display:flex;flex-direction:column;overflow:hidden}
    .map-ctrl-btn{width:38px;height:38px;border-radius:0;background:transparent;display:grid;place-items:center;color:var(--ink);font-size:18px;font-weight:700;box-shadow:none;transition:background .12s}
    .map-ctrl-btn:hover{background:rgba(0,0,0,.04)}
    .map-ctrl-divider{height:1px;background:rgba(0,0,0,.06);margin:0 4px}

    /* Marker cluster */
    .marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background:rgba(216,45,139,.15)!important}
    .marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{background:linear-gradient(135deg,var(--momo) 0%,#a50064 100%)!important;color:#fff!important;font-weight:800!important;box-shadow:0 4px 14px rgba(216,45,139,.4)!important;border:2px solid #fff!important}

    /* ── RESPONSIVE */
    @media(max-width:1280px){
      body.has-detail .split{grid-template-columns:minmax(300px,380px) 1fr}
      body.has-detail .list-pane{display:none}
    }
    @media(max-width:900px){
      .split{grid-template-columns:1fr}
      .map-pane{display:none}
      body.has-detail .detail-modal{
        position:fixed;left:0;right:0;bottom:0;top:auto;
        height:80vh;width:100vw;
        border-left:0;border-right:0;border-radius:16px 16px 0 0;
        box-shadow:0 -8px 30px rgba(0,0,0,.18);
      }
      body.has-detail .split{grid-template-columns:1fr}
      body.has-detail .list-pane{display:block}
    }
    @media(max-width:700px){
      .page-head-inner{padding:12px 16px 0}
      .province-bar,.filter-row{padding-left:14px;padding-right:14px}
      .list-pane{padding:12px 12px 40px}
    }
  </style>
</head>
<body>

<!-- PAGE HEAD -->
<header class="page-head">
  <div class="page-head-inner">
    <div class="page-head-text">
      <h1 id="pageTitle">Cửa hàng ở Crescent Mall, TP. Hồ Chí Minh</h1>
      <p>Cửa hàng · Hồ Chí Minh</p>
    </div>
    <a class="close-btn" href="/lab.html">× Đóng</a>
  </div>

  <!-- Category filter -->
  <div class="filter-row" id="filterRow"></div>
</header>

<!-- SPLIT LAYOUT -->
<div class="split">

  <!-- LIST -->
  <section class="list-pane">
    <div class="list-meta">
      <div>
        <h2 class="list-title" id="listTitle">25 cửa hàng</h2>
        <p class="list-sub" id="listSub">Crescent Mall · Tất cả</p>
      </div>
      <label class="sort-wrap">
        <select id="sortSelect" onchange="render()">
          <option value="floor">Theo tầng</option>
          <option value="cashback">Hoàn tiền cao nhất</option>
          <option value="az">A → Z</option>
        </select>
      </label>
    </div>
    <div class="merchant-list" id="merchantList"></div>
  </section>

  <!-- DETAIL -->
  <aside class="detail-modal" id="detailModal">
    <button class="detail-close" id="detailClose">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="detail-hero">
      <img id="detailHeroImg" src="" alt="" referrerpolicy="no-referrer">
      <div class="vts-overlay" id="vtsOverlay">
        <div class="vts-overlay-badge">
          <img src="https://homepage.momocdn.net/fileuploads/svg/momo-file-240411162904.svg" alt="MoMo">
          Ví Trả Sau
        </div>
        <div class="vts-overlay-text">
          <strong>Nay đã có Ví Trả Sau</strong>
          Mô nhanh, đừng đế!
        </div>
      </div>
    </div>
    <div class="detail-thumbs" id="detailThumbs"></div>
    <div class="detail-scroll">
      <h2 class="detail-name" id="detailName"></h2>
      <div class="detail-row">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span id="detailAddr"></span>
      </div>
      <div class="detail-row">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <a class="detail-hours-link" href="#">Xem giờ mở cửa</a>
      </div>
      <p class="detail-desc" id="detailDesc"></p>
      <div class="detail-actions">
        <button class="btn-primary" id="detailCTA">Xem chi tiết ↗</button>
        <button class="btn-secondary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
          Chỉ đường
        </button>
      </div>
    </div>
  </aside>

  <!-- MAP -->
  <aside class="map-pane">
    <div class="map-overlay"><i></i><span id="mapCount">25 cửa hàng</span> tại Crescent Mall</div>
    <div class="map-ctrl-stack">
      <div class="map-ctrl-group">
        <button class="map-ctrl-btn" id="ctrlZoomIn">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <div class="map-ctrl-divider"></div>
        <button class="map-ctrl-btn" id="ctrlZoomOut">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </div>
    <div id="map"></div>
  </aside>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

const MERCHANTS = [
  // B1
  {id:1,  name:'LOTTE MART',        cat:'Siêu thị',              group:'market',       floor:'B1', floorLabel:'Tầng B1', icon:'🛒', color:'#d82d8b',color2:'#a50064', cashback:5,  rating:4.3, lat:10.7297,lng:106.7128,

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const S = {cat:'all', province:'79', selected:null};

// ─────────────────────────────────────────────
// PROVINCE SELECT
// ─────────────────────────────────────────────
function initProvinceSelect() {
  document.getElementById('provinceSelect').innerHTML = VN_PROVINCES.map(p =>
    `<option value="${p.code}" ${p.code===S.province?'selected':''}>${p.name}</option>`
  ).join('');
}
function onProvinceChange(code) { S.province = code; }

// ─────────────────────────────────────────────
// FILTER CHIPS
// ─────────────────────────────────────────────
function renderFilters() {
  document.getElementById('filterRow').innerHTML =
    CATEGORIES.map(c => `
      <button class="filter-chip ${S.cat===c.id?'active':''}" onclick="setCat('${c.id}')">
        ${c.icon ? `<span class="icon">${c.icon}</span>` : ''}${c.label}
      </button>`).join('') +
    `<button class="filter-more">›</button>`;
}

// ─────────────────────────────────────────────
// MERCHANT LIST
// ─────────────────────────────────────────────
function filtered() {
  let list = MERCHANTS.filter(m => S.cat === 'all' || m.group === S.cat);
  const sort = document.getElementById('sortSelect')?.value || 'floor';
  if (sort === 'cashback') list = [...list].sort((a,b) => b.cashback - a.cashback);
  else if (sort === 'az') list = [...list].sort((a,b) => a.name.localeCompare(b.name,'vi'));
  else list = [...list].sort((a,b) => FLOORS.findIndex(f=>f.id===a.floor) - FLOORS.findIndex(f=>f.id===b.floor));
  return list;
}

function renderList() {
  const list = filtered();
  document.getElementById('listTitle').textContent = `${list.length} cửa hàng`;
  document.getElementById('listSub').textContent = 'Crescent Mall · ' + (S.cat === 'all' ? 'Tất cả' : CATEGORIES.find(c=>c.id===S.cat)?.label);
  document.getElementById('mapCount').textContent = list.length;

  document.getElementById('merchantList').innerHTML = list.map(m => `
    <div class="m-card ${S.selected===m.id?'active':''}"
         onclick="selectMerchant(${m.id})"
         onmouseenter="hoverMerchant(${m.id})"
         onmouseleave="hoverMerchant(null)">
      <div class="m-logo">
        <div class="m-logo-fallback" style="--bc:${m.color};--bc2:${m.color2}">${m.icon}</div>
      </div>
      <div class="m-body">
        <div class="m-name">${m.name}</div>
        <div class="m-addr">${m.floorLabel}, TTTM Crescent Mall, 101 Tôn Dật Tiên, Tân Phú, Quận 7</div>
        ${m.cashback ? `<div class="m-badges"><span class="badge-cashback">Hoàn ${m.cashback}%</span></div>` : ''}
      </div>
      ${m.rating ? `<div class="m-rating"><span class="star">★</span>${m.rating}</div>` : ''}
    </div>`).join('');

  updateMapMarkers(list);
}

// ─────────────────────────────────────────────
// DETAIL MODAL
// ─────────────────────────────────────────────
function selectMerchant(id) {
  S.selected = S.selected === id ? null : id;
  renderList();
  if (!S.selected) {
    document.body.classList.remove('has-detail');
    return;
  }
  const m = MERCHANTS.find(x => x.id === id);
  if (!m) return;

  document.getElementById('detailName').textContent = m.name;
  document.getElementById('detailAddr').textContent = m.addr;
  document.getElementById('detailDesc').textContent = m.desc;
  const img = document.getElementById('detailHeroImg');
  img.src = m.photo;
  img.onload = () => img.classList.add('loaded');
  img.onerror = () => img.style.display = 'none';

  document.getElementById('vtsOverlay').querySelector('.vts-overlay-text').innerHTML =
    `<strong>Nay đã có Ví Trả Sau</strong>${m.cashback ? `Hoàn ngay <b>${m.cashback}%</b> cho đơn này` : 'Mua trước, trả sau 30 ngày'}`;

  document.getElementById('detailThumbs').innerHTML = `
    <div class="detail-thumb active" style="background:linear-gradient(135deg,${m.color},${m.color2})">
      <span style="font-size:22px">${m.icon}</span>
    </div>
    <div class="detail-thumb" style="background:#f0f2f5"><span style="font-size:20px">📍</span></div>
    <div class="detail-thumb" style="background:#f0f2f5"><span style="font-size:20px">🕐</span></div>
  `;

  document.getElementById('detailCTA').textContent = `Xem ưu đãi tại ${m.name} ↗`;

  document.body.classList.add('has-detail');

  // Re-render all markers so active pin is highlighted
  updateMapMarkers(filtered());

  if (map) {
    setTimeout(() => {
      map.invalidateSize();
      map.setView([m.lat, m.lng], 17);
    }, 60);
  }
}

document.getElementById('detailClose').onclick = () => {
  S.selected = null;
  document.body.classList.remove('has-detail');
  renderList();
  if (map) setTimeout(() => { map.invalidateSize(); map.fitBounds(markers.getBounds(), {padding:[40,40]}); }, 50);
};

// ─────────────────────────────────────────────
// MAP (Leaflet, centered on Crescent Mall)
// ─────────────────────────────────────────────
let map, markers;

function initMap() {
  map = L.map('map', {zoomControl:false, attributionControl:true}).setView([10.7295, 106.7128], 16);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
    subdomains:'abcd', maxZoom:20
  }).addTo(map);

  markers = L.markerClusterGroup({
    showCoverageOnHover:false,
    maxClusterRadius:40,
    iconCreateFunction(cluster){
      return L.divIcon({
        html:`<div style="background:linear-gradient(135deg,#d82d8b,#a50064);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;border:2px solid #fff;box-shadow:0 4px 14px rgba(216,45,139,.4)">${cluster.getChildCount()}</div>`,
        className:'',iconSize:[32,32]
      });
    }
  });
  map.addLayer(markers);

  document.getElementById('ctrlZoomIn').onclick = () => map.zoomIn();
  document.getElementById('ctrlZoomOut').onclick = () => map.zoomOut();

  updateMapMarkers(MERCHANTS);
}

// markerMap: id → Leaflet marker ref (for hover sync)
const markerMap = {};

function makeIcon(m, state='default') {
  // state: 'default' | 'hover' | 'active'
  const isActive = state === 'active';
  const isHover  = state === 'hover';

  if (m.cashback > 0) {
    // Groupon-style: pill showing cashback %
    const bg     = isActive ? '#d82d8b' : '#fff';
    const border = isActive ? '#a50064' : '#d82d8b';
    const color  = isActive ? '#fff'    : '#d82d8b';
    const scale  = isActive ? 'scale(1.15)' : isHover ? 'scale(1.08)' : 'scale(1)';
    const shadow = isActive
      ? '0 4px 16px rgba(216,45,139,.45),0 0 0 2px #fff'
      : isHover
        ? '0 4px 12px rgba(216,45,139,.25),0 0 0 1.5px #fff'
        : '0 2px 8px rgba(0,0,0,.14),0 0 0 1.5px #fff';
    return L.divIcon({
      html:`<div style="transform:${scale};background:${bg};border:1.5px solid ${border};border-radius:999px;padding:4px 9px;color:${color};font-size:11px;font-weight:800;white-space:nowrap;box-shadow:${shadow};font-family:-apple-system,sans-serif;transition:all .15s">Hoàn ${m.cashback}%</div>`,
      className:'',iconSize:[76,26],iconAnchor:[38,13]
    });
  } else {
    // Plain dot for merchants with no cashback
    const size   = isActive ? 14 : 10;
    const shadow = isActive
      ? '0 0 0 4px rgba(216,45,139,.2),0 2px 6px rgba(0,0,0,.18)'
      : isHover
        ? '0 0 0 3px rgba(216,45,139,.15),0 2px 6px rgba(0,0,0,.14)'
        : '0 2px 6px rgba(0,0,0,.18)';
    return L.divIcon({
      html:`<div style="width:${size}px;height:${size}px;border-radius:50%;background:#d82d8b;border:2px solid #fff;box-shadow:${shadow}"></div>`,
      className:'',iconSize:[size,size],iconAnchor:[size/2,size/2]
    });
  }
}

function updateMapMarkers(list) {
  markers.clearLayers();
  Object.keys(markerMap).forEach(k => delete markerMap[k]);
  list.forEach(m => {
    const state = S.selected === m.id ? 'active' : 'default';
    const marker = L.marker([m.lat, m.lng], {icon: makeIcon(m, state)});
    marker.on('click', () => selectMerchant(m.id));
    markers.addLayer(marker);
    markerMap[m.id] = marker;
  });
}

// Hover card → highlight pin bidirectionally (Groupon pattern)
function hoverMerchant(id) {
  filtered().forEach(m => {
    const mk = markerMap[m.id];
    if (!mk) return;
    const state = S.selected === m.id ? 'active' : m.id === id ? 'hover' : 'default';
    mk.setIcon(makeIcon(m, state));
  });
}

// ─────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────
function setCat(id) { S.cat = id; S.selected = null; document.body.classList.remove('has-detail'); renderFilters(); renderList(); }
function render() { renderList(); }

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
renderFilters();
initMap();
renderList();
</script>
