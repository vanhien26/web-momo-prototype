<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MoMo News - Cập nhật mới nhất</title>
<link rel="icon" href="../assets/images/momo-logo.svg" type="image/svg+xml">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="../assets/mobase-tokens.css">
<style>
:root {
  --momo: var(--pink-600);
  --momo-mid: var(--pink-500);
  --ink: var(--grey-900);
  --text: var(--grey-800);
  --muted: var(--grey-500);
  --line: var(--grey-200);
  --canvas: #f7f8fb;
  --surface: #fff;
  --soft: #fff0f7;
  --blue: #1d4ed8;
  --green: #047857;
  --orange: #b45309;
  --violet: #6d28d9;
  --radius: 8px;
  --shadow: 0 16px 50px rgba(16, 24, 40, .08);
  --font-display: 'MoMoTrustDisplay', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-body: 'MoMoTrustSans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

* {
  box-sizing: border-box;
}

html {
  font-size: 15px;
}

body {
  margin: 0;
  color: var(--text);
  background: var(--canvas);
  font-family: var(--font-body);
  line-height: 1.55;
}

a {
  color: inherit;
  text-decoration: none;
}

button {
  font: inherit;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  min-height: 64px;
  padding: 12px clamp(18px, 4vw, 48px);
  background: rgba(255, 255, 255, .94);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(16px);
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}

.brand-mark {
  width: 36px;
  height: 36px;
  display: grid;
  place-items: center;
  border-radius: 8px;
  background: var(--soft);
  border: 1px solid rgba(165, 0, 100, .12);
}

.brand-mark img {
  width: 24px;
  height: 24px;
}

.brand-text {
  min-width: 0;
}

.brand-text strong {
  display: block;
  color: var(--ink);
  font-family: var(--font-display);
  font-size: 17px;
  line-height: 1.1;
}

.brand-text span {
  display: block;
  color: var(--muted);
  font-size: 12px;
}

.topbar-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.icon-btn,
.back-btn {
  height: 36px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--text);
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}

.icon-btn {
  width: 36px;
  padding: 0;
}

.back-btn {
  padding: 0 12px;
}

.page {
  width: min(1180px, 100%);
  margin: 0 auto;
  padding: 28px clamp(16px, 4vw, 36px) 56px;
}

.news-hero {
  margin-bottom: 22px;
}

.lead-story {
  overflow: hidden;
  min-height: 360px;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 250px;
  gap: 0;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.lead-copy {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 26px;
  padding: clamp(22px, 4vw, 36px);
}

.kicker {
  display: inline-flex;
  width: fit-content;
  align-items: center;
  gap: 7px;
  padding: 6px 10px;
  color: var(--momo);
  background: var(--soft);
  border: 1px solid rgba(165, 0, 100, .14);
  border-radius: 999px;
  font-size: 12px;
  font-weight: 800;
}

.lead-title {
  max-width: 680px;
  margin: 16px 0 12px;
  color: var(--ink);
  font-family: var(--font-display);
  font-size: 52px;
  line-height: .98;
  letter-spacing: 0;
}

.lead-summary {
  max-width: 620px;
  margin: 0;
  color: var(--muted);
  font-size: 16px;
}

.story-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 20px;
}

.hero-cta {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 20px;
  padding: 10px 20px;
  background: var(--momo);
  color: #fff;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 800;
  cursor: pointer;
  transition: background .15s;
}

.hero-cta:hover { background: #8a0050; }

.story-meta span {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: 30px;
  padding: 5px 10px;
  background: #fff;
  color: var(--text);
  border: 1px solid var(--line);
  border-radius: 999px;
  font-size: 12px;
  font-weight: 750;
}

.lead-visual {
  min-height: 100%;
  display: grid;
  align-content: center;
  gap: 18px;
  padding: 28px;
  color: #fff;
  background: linear-gradient(145deg, #a50064, #d4006e 48%, #7a004b);
}

.signal-card {
  padding: 16px;
  background: rgba(255, 255, 255, .14);
  border: 1px solid rgba(255, 255, 255, .22);
  border-radius: 8px;
}

.signal-card strong {
  display: block;
  font-family: var(--font-display);
  font-size: 34px;
  line-height: 1;
}

.signal-card span {
  display: block;
  margin-top: 6px;
  color: rgba(255, 255, 255, .82);
  font-size: 12px;
  font-weight: 750;
}

.section-head h2 {
  margin: 0;
  color: var(--ink);
  font-family: var(--font-display);
  font-size: 19px;
  letter-spacing: 0;
}

.filters {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 2px 0 16px;
  scrollbar-width: none;
}

.filters::-webkit-scrollbar {
  display: none;
}

.filter-btn {
  flex: 0 0 auto;
  min-height: 34px;
  padding: 0 12px;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #fff;
  color: var(--text);
  font-size: 13px;
  font-weight: 800;
  cursor: pointer;
}

.filter-btn.active {
  border-color: rgba(165, 0, 100, .2);
  background: var(--momo);
  color: #fff;
}

.section-head {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 16px;
  margin: 10px 0 14px;
}

.section-head p {
  margin: 4px 0 0;
  color: var(--muted);
  font-size: 13px;
}

.news-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}

.news-card {
  overflow: hidden;
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: 0 2px 8px rgba(16, 24, 40, .06);
  transition: box-shadow .18s, transform .18s;
  cursor: pointer;
}

.news-card:hover {
  box-shadow: 0 8px 28px rgba(16, 24, 40, .12);
  transform: translateY(-2px);
}

.news-banner {
  position: relative;
  height: 160px;
  overflow: hidden;
  display: flex;
  align-items: flex-end;
  padding: 12px 14px;
}

.news-banner .banner-icon {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-60%);
  font-size: 72px;
  opacity: .13;
  color: #fff;
  pointer-events: none;
}

.banner-cat {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 999px;
  background: rgba(255,255,255,.22);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,.35);
  color: #fff;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .02em;
  text-transform: uppercase;
}

.banner-cat i { font-size: 12px; }

.thumb-product  { background: linear-gradient(135deg, #a50064 0%, #db2777 100%); }
.thumb-campaign { background: linear-gradient(135deg, #b45309 0%, #f59e0b 100%); }
.thumb-partner  { background: linear-gradient(135deg, #065f46 0%, #059669 100%); }
.thumb-policy   { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
.thumb-platform { background: linear-gradient(135deg, #4c1d95 0%, #8b5cf6 100%); }
.thumb-event    { background: linear-gradient(135deg, #0e7490 0%, #22d3ee 100%); }

.news-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 14px 16px 16px;
}

.news-body h3 {
  margin: 0;
  color: var(--ink);
  font-family: var(--font-display);
  font-size: 16px;
  line-height: 1.3;
  letter-spacing: 0;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.news-body p {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  flex-wrap: wrap;
}

.card-meta .sep { color: var(--line); }

.card-meta i { font-size: 13px; vertical-align: -2px; }

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-top: auto;
  padding-top: 10px;
  border-top: 1px solid var(--line);
}

.author-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: var(--muted);
  font-size: 11.5px;
  font-weight: 700;
}

.author-tag i { font-size: 13px; color: var(--momo); }

.card-cta {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: var(--momo);
  font-size: 12px;
  font-weight: 800;
  white-space: nowrap;
  transition: gap .15s;
}

.news-card:hover .card-cta { gap: 7px; }

.tag {
  display: inline-flex;
  width: fit-content;
  min-height: 22px;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  border-radius: 999px;
  background: var(--soft);
  color: var(--momo);
  font-size: 11px;
  font-weight: 850;
}

.ops-band {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  margin-top: 22px;
}

.ops-item {
  min-height: 112px;
  padding: 16px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--radius);
}

.ops-item span {
  display: inline-flex;
  width: 32px;
  height: 32px;
  align-items: center;
  justify-content: center;
  color: var(--momo);
  background: var(--soft);
  border-radius: 8px;
}

.ops-item strong {
  display: block;
  margin-top: 12px;
  color: var(--ink);
  font-size: 14px;
}

.ops-item p {
  margin: 4px 0 0;
  color: var(--muted);
  font-size: 12.5px;
}

@media (max-width: 980px) {
  .lead-story {
    grid-template-columns: 1fr;
  }

  .lead-visual {
    grid-template-columns: repeat(3, minmax(0, 1fr));
    min-height: auto;
  }

  .news-grid,
  .ops-band {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 640px) {
  .topbar {
    align-items: flex-start;
  }

  .brand-text span {
    display: none;
  }

  .back-btn span {
    display: none;
  }

  .page {
    padding-top: 18px;
  }

  .lead-copy {
    padding: 22px;
  }

  .lead-title {
    font-size: 34px;
  }

  .lead-visual,
  .news-grid,
  .ops-band {
    grid-template-columns: 1fr;
  }

  .section-head {
    align-items: flex-start;
    flex-direction: column;
  }
}
</style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/lab.html" target="_top" aria-label="Về Lab">
      <span class="brand-mark"><img src="../assets/images/momo-logo.svg" alt="MoMo"></span>
      <span class="brand-text">
        <strong>MoMo News</strong>
        <span>PLG Project của Web Platform</span>
      </span>
    </a>
    <div class="topbar-actions">
      <button class="icon-btn" type="button" title="Tìm kiếm"><i class="ti ti-search"></i></button>
      <a class="back-btn" href="/lab.html" target="_top"><i class="ti ti-arrow-left"></i><span>Lab</span></a>
    </div>
  </header>

  <main class="page">
    <section class="news-hero" aria-label="Tin nổi bật" id="heroSection"></section>

    <div class="filters" aria-label="Lọc chủ đề" id="filterBar"></div>

    <section aria-label="Danh sách tin">
      <div class="section-head">
        <div>
          <h2 id="gridTitle">Bản tin mới nhất</h2>
          <p id="gridCount"></p>
        </div>
      </div>
      <div class="news-grid" id="newsGrid"></div>
    </section>

    <section class="ops-band" aria-label="News operating model">
      <article class="ops-item"><span><i class="ti ti-news"></i></span><strong>News</strong><p>Thông tin mới, có ngày giờ và CTA theo sự kiện.</p></article>
      <article class="ops-item"><span><i class="ti ti-article"></i></span><strong>Blog</strong><p>Evergreen content, SEO/GEO và article depth.</p></article>
      <article class="ops-item"><span><i class="ti ti-target-arrow"></i></span><strong>PLG</strong><p>Mỗi bản tin phải dẫn đến một hành động đo được.</p></article>
      <article class="ops-item"><span><i class="ti ti-shield-check"></i></span><strong>Trust</strong><p>Source, timestamp và owner rõ trước khi publish.</p></article>
    </section>
  </main>

<script>
const CATEGORIES = {
  product:  { label: 'Tính năng',  icon: 'ti-sparkles',        thumb: 'thumb-product'  },
  campaign: { label: 'Khuyến mãi', icon: 'ti-tag',             thumb: 'thumb-campaign' },
  partner:  { label: 'Đối tác',    icon: 'ti-building-store',  thumb: 'thumb-partner'  },
  event:    { label: 'Sự kiện',    icon: 'ti-calendar-event',  thumb: 'thumb-event'    },
  policy:   { label: 'An toàn',    icon: 'ti-shield-check',    thumb: 'thumb-policy'   },
};

const ARTICLES = [
  {
    id: 1,
    featured: true,
    topic: 'event',
    icon: 'ti-calendar-event',
    title: 'MoMo Day 7/2026 - Ngày hội thanh toán không tiền mặt toàn quốc',
    excerpt: 'Sự kiện offline và online kết hợp với hàng trăm merchant tham gia, diễn ra ngày 15/07/2026 tại Hà Nội và TP.HCM.',
    date: '04/07/2026',
    views: '56.3K',
    readTime: '3 phút đọc',
    cta: 'Đăng ký →',
  },
  {
    id: 2,
    topic: 'product',
    icon: 'ti-ticket',
    title: 'MoMo Cinema cập nhật luồng chọn suất chiếu mới',
    excerpt: 'Film detail tách rõ rating, rạp, định dạng chiếu và các bước từ ghế đến thanh toán trong flow mới.',
    date: '28/06/2026',
    views: '18.2K',
    readTime: '3 phút đọc',
    cta: 'Đọc ngay →',
  },
  {
    id: 3,
    topic: 'campaign',
    icon: 'ti-confetti',
    title: 'Chuỗi ưu đãi hè mở rộng cho nhóm giải trí và ăn uống',
    excerpt: 'Ưu đãi hoàn tiền lên đến 50% áp dụng cho rạp phim, đặt bàn nhà hàng và đơn đặt xe hè 2026.',
    date: '27/06/2026',
    views: '42.7K',
    readTime: '2 phút đọc',
    cta: 'Xem ưu đãi →',
  },
  {
    id: 4,
    topic: 'partner',
    icon: 'ti-building-store',
    title: 'Merchant Hub thêm danh sách quán nổi bật theo khu vực',
    excerpt: 'Hơn 2.000 merchant mới cập nhật tháng 7, phân loại theo ngành hàng và khu vực Hà Nội, TP.HCM.',
    date: '26/06/2026',
    views: '9.8K',
    readTime: '4 phút đọc',
    cta: 'Khám phá →',
  },
  {
    id: 5,
    topic: 'policy',
    icon: 'ti-shield-check',
    title: 'Khuyến nghị bảo vệ tài khoản khi thanh toán online',
    excerpt: 'Checklist 5 bước xác minh giao dịch và đường dẫn trực tiếp về công cụ Scam Check của MoMo.',
    date: '25/06/2026',
    views: '31.5K',
    readTime: '3 phút đọc',
    cta: 'Tìm hiểu thêm →',
  },
  {
    id: 6,
    topic: 'product',
    icon: 'ti-search',
    title: 'Universal Search gom dịch vụ, bài viết và merchant vào một ô tìm kiếm',
    excerpt: 'Update ngắn thông báo năng lực mới và điều hướng người dùng đến đúng surface chính xác.',
    date: '24/06/2026',
    views: '7.1K',
    readTime: '2 phút đọc',
    cta: 'Đọc ngay →',
  },
];

let activeFilter = 'all';

function renderHero() {
  const featured = ARTICLES.find(a => a.featured) || ARTICLES[0];
  const cat = CATEGORIES[featured.topic];
  document.getElementById('heroSection').innerHTML = `
    <article class="lead-story">
      <div class="lead-copy">
        <div>
          <span class="kicker"><i class="ti ${cat.icon}"></i>${cat.label}</span>
          <h1 class="lead-title">${featured.title}</h1>
          <p class="lead-summary">${featured.excerpt}</p>
          <div class="story-meta">
            <span><i class="ti ti-clock"></i>${featured.date}</span>
            <span><i class="ti ti-eye"></i>${featured.views} lượt xem</span>
            <span><i class="ti ti-book"></i>${featured.readTime}</span>
          </div>
          <a class="hero-cta">${featured.cta}</a>
        </div>
      </div>
    </article>
  `;
}

function renderFilters() {
  const filters = [
    { key: 'all', label: 'Tất cả', icon: 'ti-layout-grid' },
    ...Object.entries(CATEGORIES).map(([key, c]) => ({ key, label: c.label, icon: c.icon })),
  ];
  document.getElementById('filterBar').innerHTML = filters.map(f => `
    <button class="filter-btn${f.key === activeFilter ? ' active' : ''}" type="button" data-filter="${f.key}">
      <i class="ti ${f.icon}"></i>${f.label}
    </button>
  `).join('');

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.filter;
      renderFilters();
      renderGrid();
    });
  });
}

function renderGrid() {
  const featured = ARTICLES.find(a => a.featured) || ARTICLES[0];
  const list = ARTICLES.filter(a => a.id !== featured.id);
  const filtered = activeFilter === 'all' ? list : list.filter(a => a.topic === activeFilter);

  const catName = activeFilter === 'all' ? 'tất cả chủ đề' : CATEGORIES[activeFilter]?.label.toLowerCase();
  document.getElementById('gridTitle').textContent = activeFilter === 'all' ? 'Bản tin mới nhất' : CATEGORIES[activeFilter].label;
  document.getElementById('gridCount').textContent = `${filtered.length} bài - ${catName}`;

  if (filtered.length === 0) {
    document.getElementById('newsGrid').innerHTML = `<p style="grid-column:1/-1;color:var(--muted);padding:24px 0">Không có bài nào trong chủ đề này.</p>`;
    return;
  }

  document.getElementById('newsGrid').innerHTML = filtered.map(a => {
    const cat = CATEGORIES[a.topic];
    return `
      <article class="news-card" data-topic="${a.topic}">
        <div class="news-banner ${cat.thumb}">
          <i class="ti ${a.icon} banner-icon"></i>
          <span class="banner-cat"><i class="ti ${cat.icon}"></i>${cat.label}</span>
        </div>
        <div class="news-body">
          <h3>${a.title}</h3>
          <p>${a.excerpt}</p>
          <div class="card-meta">
            <i class="ti ti-eye"></i>${a.views}
            <span class="sep">·</span>
            ${a.date}
            <span class="sep">·</span>
            ${a.readTime}
          </div>
          <div class="card-footer">
            <span class="author-tag"><i class="ti ti-rosette-discount-check"></i>MoMo Official</span>
            <span class="card-cta">${a.cta}</span>
          </div>
        </div>
      </article>
    `;
  }).join('');
}

renderHero();
renderFilters();
renderGrid();
</script>
</body>
</html>
