      setTimeout(()=>{
        const data=SAMPLE_M4B[id];
        state.synced=true;state.verified=false;state.draftSaved=false;state.aiApplied=false;state.aiContent=null;state.gmapCrawled=false;
        if(data){
          state.merchant={...data};
          state.merchant.name=data.name||source.name;
        }else{
          state.merchant={name:'',category:'',address:'',lng:'',lat:'',phone:'',oa:false,oaId:''};
        }
        render();
        toast(data?'Da dong bo Merchant data tu M4B':'M4B khong co du lieu - nhap thu cong');
      },600);
    }

          faq:`${state.merchant.name||'Merchant'} o dau?\n${state.merchant.name||'Merchant'} mo cua may gio?\n${state.merchant.name||'Merchant'} co ho tro thanh toan MoMo khong?\n${state.merchant.name||'Merchant'} co nhung tien ich gi?`,

      if(state.editorTab==='content')return `<h2>GenAI Content</h2><p>Noi dung da duoc review va apply tu GenAI modal.</p>${state.aiApplied?'<span class="ai-applied">✓ Applied from GenAI Review</span>':'<span style="font-size:9px;color:var(--t3)">Chua generate - quay lai Overview de Generate AI Content.</span>'}<div class="field" style="margin-top:11px"><label>Description</label><textarea>${esc(ai.description)}</textarea></div><div class="field" style="margin-top:8px"><label>Introduction</label><textarea>${esc(ai.intro)}</textarea></div><div class="field" style="margin-top:8px"><label>FAQ</label><textarea>${esc(ai.faq)}</textarea></div><div class="meta-grid" style="margin-top:8px"><div class="field"><label>Meta Title</label><input value="${esc(ai.metaTitle)}"></div><div class="field"><label>Meta Description</label><textarea>${esc(ai.metaDescription)}</textarea></div></div>`;
      if(state.editorTab==='banner')return `<h2>Banner AI</h2><p>Sinh banner theo template Merchant Page va brand guardrail.</p><div class="ai-box"><div class="ai-head"><strong>✦ Banner prompt</strong><button class="btn primary" id="genBanner" onclick="generateBanner()">Generate Banner</button></div><div class="field"><textarea>Hero banner cho ${esc(state.merchant.name)}, ${esc(state.merchant.category)}, uu tien safe zone cho headline.</textarea></div></div>${state.bannerGenerated?`<div class="banner"><strong>${esc(state.merchant.name)}</strong></div>`:''}`;
      if(state.editorTab==='links')return `<h2>Internal Links</h2><p>Ket noi Merchant voi Hub va Topic Cluster lien quan.</p>${state.links.map((l,i)=>`<div class="link-row"><input value="${esc(l.label)}" oninput="updateLink(${i},'label',this.value)"><input value="${esc(l.url)}" oninput="updateLink(${i},'url',this.value)"><button onclick="removeLink(${i})">×</button></div>`).join('')}<button class="btn" style="margin-top:9px" onclick="addLink()">+ Internal Link</button>`;
      const options=[['address','Address'],['phone','Phone'],['map','Map'],['payment','Payment'],['oa','Official Account'],['hours','Opening Hours'],['amenities','Amenities'],['menu','Featured Menu']];
      return `<h2>Information Display</h2><p>Chon thong tin duoc phep hien thi tren Merchant Page.</p><div class="show-grid">${options.map(([k,l])=>`<label class="show-item"><input type="checkbox" ${state.show.includes(k)?'checked':''} ${k==='oa'&&!state.merchant.oa?'disabled':''} onchange="toggleShow('${k}',this.checked)"><div><strong>${l}</strong><span>${k==='oa'?(state.merchant.oa?'OA-ID linked':'No OA-ID'):k==='amenities'?(ai.amenities||[]).join(' · '):''}</span></div></label>`).join('')}</div>`;
    }
    function renderEditor(){
      document.getElementById('screen').innerHTML=`<div class="editor-shell"><nav class="editor-nav">${editorTabs.map(([id,label])=>`<button class="${state.editorTab===id?'active':''}" onclick="setEditorTab('${id}')">${label}</button>`).join('')}</nav><section class="editor-main">${editorPanel()}<div class="save-row"><button class="btn" onclick="closeEditor()">Cancel</button><button class="btn primary" onclick="saveAll()">Save All</button></div></section><aside class="editor-preview"><h2>Page Preview</h2><p>${esc(source.primary)} · ${source.secondaries.length} Secondary Keywords</p><div class="page-mock"><div class="mock-banner"></div><div class="mock-content"><div class="mock-logo">${state.logo?`<img src="${state.logo}" alt="Logo">`:'M'}</div><h3>${esc(state.merchant.name)}</h3><p>${esc(state.merchant.category)} · ${esc(state.merchant.address)}</p></div></div></aside></div>`;
    }

    /* ── Main render ────────────────────────────── */
    function render(){
      document.getElementById('recordTitle').textContent=state.merchant.name||source.name;
      document.getElementById('editContentBtn').disabled=!state.draftSaved;
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      if(state.editorOpen){renderEditor();return}
      if(state.tab==='settings'){renderSettings();return}
      if(state.tab==='scraper'){renderScraper();return}
      renderOverview();
    }
    render();
  </script>
</body>
</html>
