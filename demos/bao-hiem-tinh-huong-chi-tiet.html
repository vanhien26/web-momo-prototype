<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title id="page-title">Tình Huống Bồi Thường | Bảo Hiểm Ô Tô MoMo</title>
  <link rel="shortcut icon" type="image/svg+xml" href="https://homepage.momocdn.net/fileuploads/svg/momo-file-240411162904.svg">
  <script src="https://unpkg.com/lucide@0.511.0/dist/umd/lucide.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --pink:#af0171; --pink-light:rgba(175,1,113,.18); --pink-bg:rgba(175,1,113,.06);
      --green:#16a34a; --green-bg:#f0fdf4; --amber:#d97706; --amber-bg:#fffbeb;
      --red:#dc2626;
      --ink:#1a0f17; --muted:#6b5768; --soft:#f5f0f4; --line:#e8dfe6;
      --card:#fff; --bg:#faf8f9;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Be Vietnam Pro','Segoe UI',sans-serif;color:var(--ink);background:var(--bg);line-height:1.5}
    a{color:inherit;text-decoration:none}
    button{cursor:pointer;font-family:inherit}

    /* ── Shell ── */
    .shell{width:min(1100px,calc(100% - 40px));margin:0 auto}

    /* ── Header ── */
    .topbar{height:64px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.97);backdrop-filter:blur(14px);position:sticky;top:0;z-index:200}
    .topbar-inner{height:100%;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .brand{display:flex;align-items:center;gap:10px;text-decoration:none}
    .brand img{width:36px;height:36px;border-radius:10px}
    .brand-copy strong{display:block;font-size:15px;font-weight:800}
    .brand-copy small{color:var(--muted);font-size:11px}
    .bh-nav{display:flex;align-items:center;gap:2px;margin:0 auto}
    .bh-nav-link{color:var(--muted);font-size:14px;font-weight:600;padding:6px 14px;border-radius:8px;cursor:pointer;transition:.15s;border:none;background:none;font-family:inherit;text-decoration:none;display:inline-block}
    .bh-nav-link:hover{color:var(--ink);background:var(--soft)}
    .bh-nav-link.active{color:var(--pink);font-weight:700}
    .back-link{color:var(--muted);font-size:13px;font-weight:700;text-decoration:none}

    /* ── Breadcrumb ── */
    .bh-breadcrumb-bar{padding:10px 0;border-bottom:1px solid var(--line);background:#fff;position:sticky;top:64px;z-index:100}
    .bh-bc-inner{display:flex;align-items:center;gap:4px}
    .bh-bc-btn{color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;padding:0;font-family:inherit;display:inline-flex;align-items:center;gap:3px;text-decoration:none}
    .bh-bc-btn:hover{color:var(--pink)}
    .bh-bc-sep{color:var(--line);font-size:12px;margin:0 2px}
    .bh-bc-current{color:var(--ink);font-size:13px;font-weight:700}

    /* ── Buttons ── */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;cursor:pointer;font-family:inherit;font-weight:700;border-radius:12px;transition:.15s;text-decoration:none}
    .btn-primary{background:var(--pink);color:#fff;padding:10px 20px;font-size:14px}
    .btn-primary:hover{background:#8f015d}
    .btn-lg{padding:14px 28px;font-size:15px;border-radius:14px}
    .btn-full{width:100%;justify-content:center}

    /* ── Situation Detail ── */
    .sit-detail-hero{display:flex;align-items:flex-start;gap:20px;margin-bottom:32px;padding:28px;background:var(--card);border:1px solid var(--line);border-radius:20px}
    .sit-detail-icon{width:72px;height:72px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--pink-bg);border:1.5px solid var(--pink-light);border-radius:18px;color:var(--pink)}
    .sit-detail-meta{flex:1}
    .sit-detail-title{font-size:clamp(22px,3vw,30px);font-weight:900;line-height:1.15;letter-spacing:-.3px;margin-bottom:10px}
    .sit-detail-desc{font-size:15px;color:var(--muted);line-height:1.7}
    .sit-badge{display:inline-block;font-size:11px;font-weight:800;padding:4px 10px;border-radius:6px;margin-bottom:10px}
    .sit-badge.green{background:var(--green-bg);color:var(--green)}
    .sit-badge.amber{background:var(--amber-bg);color:var(--amber)}

    /* ── Detail sections ── */
    .sit-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .sit-detail-section{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px}
    .sit-detail-section-label{font-size:11px;font-weight:800;color:var(--pink);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
    .sit-detail-section-title{font-size:17px;font-weight:800;margin-bottom:18px;line-height:1.25}

    /* ── Insurer rows ── */
    .sit-insurer-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
    .sit-insurer-row:last-child{border-bottom:none}
    .sit-insurer-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .sit-insurer-name{font-size:14px;font-weight:700}
    .sit-insurer-note{font-size:12px;color:var(--muted);margin-top:2px}
    .sit-insurer-cost{font-size:12px;color:var(--pink);font-weight:700;margin-top:2px}
    .sit-insurer-status{font-size:11px;font-weight:800;padding:4px 9px;border-radius:6px;white-space:nowrap}
    .sit-insurer-status.base{background:var(--green-bg);color:var(--green)}
    .sit-insurer-status.addon{background:var(--amber-bg);color:var(--amber)}
    .sit-insurer-status.no{background:#fef2f2;color:#dc2626}

    /* ── Claim steps ── */
    .claim-steps{display:flex;flex-direction:column;gap:16px}
    .claim-step{display:flex;gap:14px;align-items:flex-start}
    .claim-step-num{width:28px;height:28px;border-radius:50%;background:var(--pink);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
    .claim-step-body{flex:1}
    .claim-step-title{font-size:13px;font-weight:800;margin-bottom:4px}
    .claim-step-desc{font-size:12px;color:var(--muted);line-height:1.55}
    .claim-step-time{font-size:11px;color:var(--pink);font-weight:700;margin-top:5px;display:flex;align-items:center;gap:4px}

    /* ── Exclusions ── */
    .sit-excl-list{list-style:none;display:flex;flex-direction:column;gap:10px}
    .sit-excl-list li{display:flex;gap:8px;font-size:13px;color:var(--muted);line-height:1.45;align-items:flex-start}
    .sit-excl-list li svg{flex-shrink:0;color:#dc2626;margin-top:2px}
    .sit-tip-box{background:var(--amber-bg);border:1px solid rgba(217,119,6,.2);border-radius:12px;padding:14px 16px;font-size:13px;color:#92400e;line-height:1.6}
    .sit-warn{background:#fef2f2;border:1px solid rgba(220,38,38,.15);border-radius:10px;padding:12px 14px;font-size:12.5px;color:#b91c1c;line-height:1.55;display:flex;gap:8px;align-items:flex-start;margin-top:12px}

    /* ── Quote form ── */
    .car-form-box{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:24px;max-width:520px}
    .car-form-label{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
    .car-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .form-field-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px}
    .form-select-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--soft);border:1.5px solid var(--line);border-radius:10px;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;transition:.15s}
    .form-select-btn:hover{border-color:var(--pink)}
    .form-select-btn.filled{border-color:var(--pink);background:var(--pink-bg)}
    .form-select-btn .placeholder{color:var(--muted)}
    .chevron{font-size:10px;color:var(--muted)}
    .price-anchor{display:flex;align-items:center;justify-content:space-between;background:rgba(22,163,74,.06);border:1px solid rgba(22,163,74,.2);border-radius:10px;padding:10px 14px;margin:12px 0}
    .price-anchor-label{font-size:12px;color:var(--green);font-weight:600;flex:1;line-height:1.4}
    .price-anchor-value{font-size:15px;font-weight:900;color:var(--green);white-space:nowrap}
    .brand-hint{display:none;background:rgba(175,1,113,.06);border:1px solid rgba(175,1,113,.15);border-radius:10px;padding:9px 12px;margin-top:10px;font-size:12px;color:var(--muted);line-height:1.5}
    .brand-hint.show{display:block}
    .brand-hint strong{color:var(--pink);font-weight:800}

    /* ── Modal ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:900;display:none;align-items:flex-end;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:80vh;display:flex;flex-direction:column}
    .modal-header{display:flex;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line);gap:8px}
    .modal-title{flex:1;font-size:16px;font-weight:800}
    .modal-close{border:none;background:none;font-size:20px;color:var(--muted);cursor:pointer;padding:4px}
    .modal-back{border:none;background:none;font-size:20px;color:var(--muted);cursor:pointer;padding:4px}
    .modal-search{padding:12px 16px;border-bottom:1px solid var(--line)}
    .search-box{display:flex;align-items:center;gap:8px;background:var(--soft);border-radius:10px;padding:8px 12px}
    .search-box input{border:none;background:none;font-size:14px;flex:1;outline:none;font-family:inherit}
    .modal-body{flex:1;overflow-y:auto}
    .brand-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 16px}
    .brand-card{display:flex;flex-direction:column;align-items:center;padding:12px 8px;border:1.5px solid var(--line);border-radius:10px;cursor:pointer;transition:.15s;gap:4px}
    .brand-card:hover,.brand-card.selected{border-color:var(--pink);background:var(--pink-bg)}
    .brand-card-name{font-size:11px;font-weight:800;text-align:center}
    .brand-list-item{padding:13px 16px;border-bottom:1px solid var(--line);cursor:pointer;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;transition:.12s}
    .brand-list-item:hover{background:var(--soft)}
    .brand-list-item.selected{background:var(--pink-bg);color:var(--pink);font-weight:800}
    .year-item{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line);cursor:pointer;font-size:15px;font-weight:600;transition:.12s}
    .year-item:hover{background:var(--soft)}
    .year-item.selected{background:var(--pink-bg);color:var(--pink);font-weight:800}

    /* ── Toast ── */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);opacity:0;background:#1a0f17;color:#fff;border-radius:999px;padding:11px 20px;font-size:13px;font-weight:700;z-index:999;transition:.25s;pointer-events:none;white-space:nowrap}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}

    /* ── Error ── */
    .error-page{text-align:center;padding:80px 20px}
    .error-page h2{font-size:24px;font-weight:900;margin-bottom:12px}
    .error-page p{color:var(--muted);margin-bottom:24px}

    /* ── Responsive ── */
    @media(max-width:760px){
      .sit-detail-grid{grid-template-columns:1fr}
      .sit-detail-hero{flex-direction:column}
      .car-form-grid{grid-template-columns:1fr}
      .bh-nav{display:none}
    }
  </style>
</head>

<script>
/* ── Lucide helper ── */
function licon(name, size=20, sw=1.75, cls='') {
  if (!window.lucide || !window.lucide[name]) return '';
  const children = window.lucide[name].map(([tag, attrs]) => {
    const attrStr = Object.entries(attrs).map(([k,v])=>`${k}="${v}"`).join(' ');
    return `<${tag} ${attrStr}/>`;
  }).join('');
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"${cls?' class="'+cls+'"':''}>${children}</svg>`;
}
const SIT_ICONS = { collision:'Zap', thuykick:'Waves', fire:'Flame', theft:'LockOpen', parttheft:'Wrench', natural:'CloudLightning', glass:'PanelTop', parked:'Car' };
const STEP_ICONS = { '📸':'Camera','📞':'Phone','📋':'ClipboardList','🔍':'Search','🔧':'Wrench','💰':'Banknote','🚫':'Ban','🚗':'Car','🔒':'Lock','🚔':'ShieldAlert','📄':'FileText','📊':'BarChart2','🚒':'Truck','📹':'Video','✅':'CheckCircle','⚠️':'AlertTriangle','🪟':'RectangleHorizontal' };
function sitIcon(id, size=36) { return licon(SIT_ICONS[id]||'Shield', size, 1.5); }
function stepIcon(emoji, size=15) { return licon(STEP_ICONS[emoji]||'Circle', size, 2); }
function fmt(n){ return new Intl.NumberFormat('vi-VN').format(Math.round(n)); }

const SITUATIONS = [

  { id:'fire',      name:'Cháy nổ xe',                   baseCover:true,  badge:'Gói cơ bản', short:'Xe bốc cháy do chập điện, rò rỉ nhiên liệu, tai nạn hoặc tác nhân bên ngoài.' },

function getCarValue(brandId, model, variant, year) {
  const baseMap = {toyota:600,honda:550,hyundai:500,kia:480,mazda:550,ford:650,mitsubishi:520,vinfast:450,mercedes:1800,bmw:2000,audi:1500,chevrolet:450,isuzu:580,lexus:1800,nissan:550,subaru:650,suzuki:380,default:500};
  let base = baseMap[brandId] || baseMap.default;
  if(model&&model.toLowerCase().includes('fortuner')) base = 980;
  if(model&&model.toLowerCase().includes('land cruiser')) base = 3200;
  if(model&&model.toLowerCase().includes('ranger')) base = 850;
  if(year){ const age = 2025 - parseInt(year); base = Math.round(base * Math.pow(0.88, Math.min(age,10))); }
  return base;
}

        <div class="sit-tip-box"><p>${d.tip}</p></div>
      </div>
    </div>

    <!-- Inline quote form -->
    <div class="sit-detail-section" style="margin-bottom:24px">
      <div class="sit-detail-section-label">Báo giá bảo hiểm</div>
      <div class="sit-detail-section-title" style="margin-bottom:20px">Nhập thông tin xe — xem ngay giá từ 9 nhà bảo hiểm</div>
      <div class="car-form-box" style="max-width:640px">
        <div class="car-form-label">Thông tin xe</div>
        <div class="car-form-grid">
          <div class="form-field">
            <div class="form-field-label">Nhãn hiệu &amp; Dòng xe</div>
            <button class="form-select-btn" id="car-info-btn" onclick="openModal('brand')">
              <span id="car-info-label" class="placeholder">Chọn hãng &amp; dòng xe</span>
              <span class="chevron">&#9660;</span>
            </button>
          </div>
          <div class="form-field">
            <div class="form-field-label">Năm sản xuất</div>
            <button class="form-select-btn" id="year-btn" onclick="openModal('year')">
              <span id="year-label" class="placeholder">Chọn năm</span>
              <span class="chevron">&#9660;</span>
            </button>
          </div>
        </div>
        <div class="brand-hint" id="brand-hint"></div>
        <div class="price-anchor">
          <div class="price-anchor-label" id="price-anchor-label">Chọn xe để xem ước tính phí riêng cho bạn</div>
          <div class="price-anchor-value" id="price-anchor-value">5.6 - 13tr/năm</div>
        </div>
        <a class="btn btn-primary btn-lg btn-full" id="quote-cta" href="bao-hiem-o-to.html">Xem báo giá đầy đủ &nbsp;›</a>
      </div>
    </div>

    <!-- Related situations -->
    <div class="sit-detail-section">
      <div class="sit-detail-section-label">Tình huống liên quan</div>
      <div class="sit-detail-section-title" style="margin-bottom:16px">Các tình huống khác cần biết</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">${relatedCards}</div>
    </div>
  `;

  // Hover effect for related cards
  document.querySelectorAll('.sit-related-card').forEach(c => {
    c.addEventListener('mouseenter', () => c.style.borderColor = 'var(--pink)');
    c.addEventListener('mouseleave', () => c.style.borderColor = 'var(--line)');
  });
}

function renderSituationList() {
  const cards = SITUATIONS.map(s => {
    const badgeCls = s.baseCover ? 'green' : 'amber';
    return `<a href="?id=${s.id}" style="display:block;padding:20px;background:var(--card);border:1px solid var(--line);border-radius:16px;text-decoration:none;transition:.15s" onmouseenter="this.style.borderColor='var(--pink)'" onmouseleave="this.style.borderColor='var(--line)'">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        <div style="width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:var(--pink-bg);border:1.5px solid var(--pink-light);border-radius:12px;color:var(--pink);flex-shrink:0">${sitIcon(s.id, 26)}</div>
        <span class="sit-badge ${badgeCls}">${s.badge}</span>
      </div>
      <div style="font-size:15px;font-weight:800;margin-bottom:5px;color:var(--ink)">${s.name}</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.5">${s.short}</div>
      <div style="margin-top:10px;font-size:12px;font-weight:700;color:var(--pink);display:flex;align-items:center;gap:4px">Xem chi tiết ${licon('ArrowRight',12,2.5)}</div>
    </a>`;
  }).join('');

  return `
    <div style="max-width:680px;margin-bottom:40px">
      <div style="font-size:12px;font-weight:800;color:var(--pink);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Tình huống bảo hiểm</div>
      <h1 style="font-size:clamp(26px,4vw,38px);font-weight:900;line-height:1.1;letter-spacing:-.5px;margin-bottom:12px">Bảo hiểm thân vỏ bồi thường<br>những tình huống nào?</h1>
      <p style="font-size:15px;color:var(--muted);line-height:1.7">8 tình huống phổ biến nhất người dùng hay hiểu sai. Biết rõ trước khi chọn gói để không thiệt khi xảy ra sự cố.</p>
    </div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:28px">
      <div style="display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700"><span style="width:10px;height:10px;border-radius:50%;background:var(--green);display:block"></span>Gói cơ bản có sẵn</div>
      <div style="display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700"><span style="width:10px;height:10px;border-radius:50%;background:#f59e0b;display:block"></span>Cần chọn thêm quyền lợi nâng cao</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:48px">${cards}</div>
    <div style="padding:28px;background:var(--pink-bg);border:1.5px solid var(--pink-light);border-radius:20px;display:flex;align-items:center;gap:24px;flex-wrap:wrap">
      <div style="flex:1;min-width:260px">
        <div style="font-size:16px;font-weight:900;margin-bottom:6px">Đã hiểu rõ phạm vi bồi thường?</div>
        <div style="font-size:13px;color:var(--muted)">So sánh báo giá từ 9 nhà bảo hiểm. Gói nâng cao bao gồm thủy kích, mất cắp bộ phận và garage chính hãng.</div>
      </div>
      <a href="bao-hiem-o-to.html" class="btn btn-primary btn-lg">Xem báo giá bảo hiểm &nbsp;›</a>
    </div>`;
}

/* ── Modal ── */
function openModal(step) {
  state.modalStep = step;
  state.search = '';
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('open');
  document.getElementById('modal-search-input').value = '';
  if (step === 'brand') {
    document.getElementById('modal-title').textContent = 'Chọn nhãn hiệu';
    document.getElementById('modal-search').style.display = 'block';
    document.getElementById('modal-back-btn').style.display = 'none';
    renderBrandGrid('');
  } else if (step === 'model') {
    document.getElementById('modal-title').textContent = 'Chọn dòng xe';
    document.getElementById('modal-search').style.display = 'block';
    document.getElementById('modal-back-btn').style.display = 'block';
    renderModelList('');
  } else if (step === 'year') {
    document.getElementById('modal-title').textContent = 'Chọn năm sản xuất';
    document.getElementById('modal-search').style.display = 'none';
    document.getElementById('modal-back-btn').style.display = 'none';
    renderYearList();
  }
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }
function goBackModal() { if (state.modalStep === 'model') openModal('brand'); }

function onSearch(q) {
  state.search = q;
  if (state.modalStep === 'brand') renderBrandGrid(q);
  else if (state.modalStep === 'model') renderModelList(q);
}

function renderBrandGrid(q) {
  const body = document.getElementById('modal-body');
  const filtered = BRANDS.filter(b => b.name.toLowerCase().includes(q.toLowerCase()));
  const popular = filtered.filter(b => b.popular);
  const others = filtered.filter(b => !b.popular);
  let html = '';
  if (popular.length && !q) html += `<div style="padding:10px 16px 4px;font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase">Phổ biến</div>`;
  html += `<div class="brand-grid">${[...popular,...(q?[]:others)].map(b=>`
    <div class="brand-card ${state.car.brandId===b.id?'selected':''}" onclick="selectBrand('${b.id}','${b.name}')">
      <div class="brand-card-name">${b.name}</div>
    </div>`).join('')}</div>`;
  if (!q && others.length) html += `<div style="padding:4px 16px 4px;font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase">Khác</div>
    <div class="brand-grid">${others.map(b=>`<div class="brand-card ${state.car.brandId===b.id?'selected':''}" onclick="selectBrand('${b.id}','${b.name}')"><div class="brand-card-name">${b.name}</div></div>`).join('')}</div>`;
  body.innerHTML = html;
}

function renderModelList(q) {
  const models = (MODELS[state.car.brandId] || []).filter(m => m.toLowerCase().includes(q.toLowerCase()));
  document.getElementById('modal-body').innerHTML = models.map(m => `
    <div class="brand-list-item ${state.car.model===m?'selected':''}" onclick="selectModel('${m}')">
      ${m} ${state.car.model===m?'<span class="check" style="margin-left:auto;color:var(--pink)">✓</span>':''}
    </div>`).join('') || '<div style="padding:20px;text-align:center;color:var(--muted)">Không tìm thấy</div>';
}

function renderYearList() {
  const years = Array.from({length:16}, (_,i)=>2025-i);
  document.getElementById('modal-body').innerHTML = years.map(y => `
    <div class="year-item ${state.car.year==y?'selected':''}" onclick="selectYear(${y})">${y}</div>`).join('');
}

function selectBrand(id, name) {
  state.car.brandId = id; state.car.brandName = name;
  state.car.model = null; state.car.variant = null;
  if (MODELS[id]?.length) { state.modalStep = 'model'; openModal('model'); }
  else { closeModal(); updateCarBtn(); }
}

function selectModel(m) {
  state.car.model = m;
  closeModal();
  updateCarBtn();
  updatePriceAnchor();
}

function selectYear(y) {
  state.car.year = y;
  closeModal();
  updateYearBtn();
  updatePriceAnchor();
}

function updateCarBtn() {
  const btn = document.getElementById('car-info-btn');
  const label = document.getElementById('car-info-label');
  const c = state.car;
  if (!btn || !label) return;
  if (c.brandName) {
    const txt = [c.brandName, c.model].filter(Boolean).join(' - ');
    label.textContent = txt.length > 32 ? txt.slice(0,32)+'…' : txt;
    label.classList.remove('placeholder');
    btn.classList.add('filled');
  } else {
    label.textContent = 'Chọn hãng & dòng xe';
    label.classList.add('placeholder');
    btn.classList.remove('filled');
  }
}

function updateYearBtn() {
  const btn = document.getElementById('year-btn');
  const label = document.getElementById('year-label');
  if (!btn || !label) return;
  if (state.car.year) {
    label.textContent = state.car.year;
    label.classList.remove('placeholder');
    btn.classList.add('filled');
  } else {
    label.textContent = 'Chọn năm';
    label.classList.add('placeholder');
    btn.classList.remove('filled');
  }
}

function updatePriceAnchor() {
  const c = state.car;
  if (!c.brandId) return;
  const val = getCarValue(c.brandId, c.model, null, c.year);
  const lo = Math.round(val * 1e6 * 0.0140);
  const hi = Math.round(val * 1e6 * 0.0162);
  const anchorLabel = c.model ? `Ước tính cho ${c.brandName} ${c.model} (~${val}tr)` : `Ước tính cho xe ${c.brandName} (~${val}tr)`;
  const anchorValue = `${fmt(lo)} - ${fmt(hi)}đ/năm`;
  const lbl = document.getElementById('price-anchor-label');
  const val2 = document.getElementById('price-anchor-value');
  if (lbl) { lbl.textContent = anchorLabel; val2.textContent = anchorValue; }
  // Update CTA to pass car info
  const cta = document.getElementById('quote-cta');
  if (cta) cta.href = `bao-hiem-o-to.html`;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ── Init ── */
document.addEventListener('DOMContentLoaded', () => {
  renderPage();
  // Inject Lucide into breadcrumb home icon
  const bcHome = document.getElementById('bc-home-icon');
  if (bcHome) bcHome.innerHTML = licon('ChevronLeft', 14, 2.5);
});
</script>
</body>
</html>
