<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Table Editor | MoSpark Supabase</title>
  <link rel="shortcut icon" type="image/svg+xml" href="../assets/images/momo-logo.svg">
  <style>
    @font-face{font-family:MoMo;src:url('../assets/fonts/momo-trust/MoMoTrustSans-Regular.otf')}
    @font-face{font-family:MoMo;src:url('../assets/fonts/momo-trust/MoMoTrustSans-Medium.otf');font-weight:700}
    :root{--bg:#fff;--sidebar:#f8f8f8;--sidebar-hover:#f0f0f0;--sidebar-active:#e8f5f0;--border:#e5e5e5;--border-light:#ddd;--ink:#1a1a1a;--t2:#555;--t3:#999;--green:#16a34a;--green-bg:rgba(22,163,74,.08);--orange:#ea580c;--orange-bg:rgba(234,88,12,.08);--blue:#2563eb;--red:#dc2626;--header-bg:#f8f8f8;--row-hover:#fafafa;--sel:#f0fdf4;--ease:cubic-bezier(.4,0,.2,1)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--ink);font-family:MoMo,'SF Mono','Cascadia Code',monospace;font-size:12px;height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}
    @keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}

    /* ── Topbar ─────────────────────────── */
    .topbar{height:58px;display:flex;align-items:center;gap:13px;border-bottom:1px solid var(--border);background:#fff;flex:none;padding:0 24px}
    .back{font-size:10px;color:var(--t2);font-weight:800;text-decoration:none;transition:color .15s;white-space:nowrap}
    .back:hover{color:var(--green)}
    .bar-divider{width:1px;height:22px;background:var(--border);flex:none}
    .brand{display:flex;align-items:center;gap:8px}
    .brand img{width:31px;height:31px;border-radius:9px;object-fit:contain}
    .brand strong{font-size:14px;font-weight:800}
    .brand small{display:block;color:var(--t2);font-size:8.5px;margin-top:1px}
    .sb-chip{margin-left:auto;display:inline-flex;align-items:center;gap:5px;background:#ebfff6;color:#147b57;border:1px solid #c7e3d8;border-radius:99px;padding:5px 10px;font-size:8.5px;font-weight:800}
    .sb-dot{width:6px;height:6px;border-radius:50%;background:#147b57;box-shadow:0 0 0 2px rgba(20,123,87,.2)}

    /* ── Layout ─────────────────────────── */
    .layout{display:flex;flex:1;overflow:hidden}

    /* ── Sidebar ────────────────────────── */
    .sidebar{width:240px;border-right:1px solid var(--border);background:var(--sidebar);display:flex;flex-direction:column;flex:none;overflow:hidden}
    .sidebar-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .sidebar-head strong{font-size:11px;color:var(--t2);font-weight:800;text-transform:uppercase;letter-spacing:.5px}
    .sidebar-search{padding:8px 10px;border-bottom:1px solid var(--border)}
    .sidebar-search input{width:100%;background:#fff;border:1px solid var(--border-light);border-radius:6px;padding:6px 9px;color:var(--ink);font-size:11px;outline:none;font-family:inherit}
    .sidebar-search input:focus{border-color:#aaa}
    .table-list{flex:1;overflow-y:auto;padding:6px}
    .table-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;transition:background .15s;margin-bottom:2px}
    .table-item:hover{background:var(--sidebar-hover)}.table-item.active{background:var(--sidebar-active)}
    .table-icon{width:18px;height:18px;background:#e8e8e8;border:1px solid var(--border-light);border-radius:4px;display:grid;place-items:center;font-size:9px;flex:none;color:var(--t2)}
    .table-item.active .table-icon{background:#d1fae5;border-color:#6ee7b7;color:var(--green)}
    .table-name{font-size:11px;font-weight:700;flex:1;color:var(--t2)}.table-item.active .table-name{color:var(--ink)}
    .unrestricted-badge{font-size:7.5px;font-weight:800;letter-spacing:.2px;color:var(--orange);background:var(--orange-bg);border:1px solid rgba(249,115,22,.2);border-radius:3px;padding:1px 5px;white-space:nowrap}
    .sidebar-footer{padding:12px 14px;border-top:1px solid var(--border)}
    .new-table-btn{width:100%;background:transparent;border:1px dashed var(--border-light);border-radius:6px;padding:7px;color:var(--t3);font-size:10px;cursor:pointer;transition:all .15s;font-family:inherit}
    .new-table-btn:hover{border-color:#999;color:var(--t2)}

    /* ── Main ───────────────────────────── */
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
    .main-header{display:flex;align-items:center;gap:0;padding:0 16px;height:44px;border-bottom:1px solid var(--border);background:#fcfcfc;flex:none}
    .table-tabs{display:flex;align-items:stretch;gap:0;height:100%}
    .table-tab{display:flex;align-items:center;gap:7px;padding:0 14px;font-size:11px;color:var(--t2);border-right:1px solid var(--border);cursor:pointer;position:relative;white-space:nowrap}
    .table-tab.active{color:var(--ink);background:var(--bg)}.table-tab.active::after{content:'';position:absolute;left:0;right:0;bottom:0;height:2px;background:var(--green)}
    .table-tab-icon{font-size:12px}
    .main-actions{display:flex;align-items:center;gap:6px;margin-left:auto}
    .action-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:5px;font-size:10px;font-weight:700;border:1px solid var(--border-light);background:#fff;color:var(--t2);cursor:pointer;transition:all .15s;font-family:inherit}
    .action-btn:hover{background:#f0f0f0;color:var(--ink)}
    .rls-badge{font-size:9px;font-weight:800;color:var(--orange);background:var(--orange-bg);border:1px solid rgba(249,115,22,.2);border-radius:4px;padding:3px 8px}
    .role-badge{font-size:9px;color:var(--t2);background:#f0f0f0;border:1px solid var(--border-light);border-radius:4px;padding:3px 8px}
    .insert-btn{background:var(--green);color:#000;border:0;border-radius:5px;padding:5px 12px;font-size:10px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit}
    .insert-btn:hover{background:#34c07a}

    /* ── Filter bar ─────────────────────── */
    .filter-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--border);background:#fff;flex:none}
    .filter-input{flex:1;max-width:380px;background:#fff;border:1px solid var(--border-light);border-radius:6px;padding:6px 10px;color:var(--ink);font-size:11px;outline:none;font-family:inherit}
    .filter-input:focus{border-color:#aaa}
    .filter-input::placeholder{color:var(--t3)}
    .filter-btn{display:flex;align-items:center;gap:4px;padding:5px 9px;border-radius:5px;font-size:10px;font-weight:700;border:1px solid var(--border-light);background:transparent;color:var(--t2);cursor:pointer;font-family:inherit}
    .filter-btn:hover{background:#f0f0f0;color:var(--ink)}
    .row-count{margin-left:auto;font-size:10px;color:var(--t3)}

    /* ── Grid ───────────────────────────── */
    .grid-wrap{flex:1;overflow:auto;position:relative}
    table{width:100%;border-collapse:collapse;table-layout:fixed}
    thead{position:sticky;top:0;z-index:5}
    th{background:var(--header-bg);border-bottom:1px solid var(--border);border-right:1px solid var(--border);padding:0;height:34px;text-align:left;white-space:nowrap;font-weight:500;user-select:none}
    th:last-child{border-right:0}
    .th-inner{display:flex;align-items:center;gap:6px;padding:0 10px;height:100%}
    .th-inner:hover{background:#ededee}
    .col-icon{font-size:10px;color:var(--t3);flex:none}
    .col-name{font-size:10.5px;color:var(--t2);font-weight:700}
    .col-type{font-size:8.5px;color:var(--t3);font-weight:400;margin-left:2px}
    .col-pk{width:16px;height:16px;background:#fef9c3;border:1px solid #fde047;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:8px;color:#a16207;flex:none}
    .col-fk{width:16px;height:16px;background:#dbeafe;border:1px solid #93c5fd;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;color:#2563eb;flex:none}

    .th-check{width:36px;flex:none}
    .th-num{width:52px;background:var(--header-bg);border-right:1px solid var(--border);text-align:right;padding:0 10px;font-size:10px;color:var(--t3);font-weight:400}

    tbody tr{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer}
    tbody tr:hover{background:var(--row-hover)}
    tbody tr.selected{background:var(--sel)}
    td{border-right:1px solid var(--border);padding:0 10px;height:36px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:0;color:var(--ink);vertical-align:middle}
    td:last-child{border-right:0}
    td.td-num{text-align:right;color:var(--t3);font-size:10px;background:var(--header-bg)}
    td.td-check{text-align:center}

    .cell-uuid{font-size:9.5px;color:var(--t3)}
    .cell-null{color:var(--t3);font-style:italic;font-size:10px}
    .cell-bool-t{color:var(--green)}.cell-bool-f{color:var(--t3)}
    .cell-fk{display:inline-flex;align-items:center;gap:5px}
    .cell-fk .fk-link{font-size:9px;color:#2563eb;text-decoration:none;opacity:0;transition:opacity .15s}
    tbody tr:hover .cell-fk .fk-link{opacity:1}

    /* Status badges */
    .badge-live{color:var(--green);background:var(--green-bg);padding:2px 7px;border-radius:3px;font-size:9px;font-weight:800}
    .badge-staging{color:var(--orange);background:var(--orange-bg);padding:2px 7px;border-radius:3px;font-size:9px;font-weight:800}

    /* Loading */
    .loading-row td{padding:0}
    .skel{height:36px;background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:400px 100%;animation:shimmer 1.3s infinite}

    /* Empty */
    .empty-row td{text-align:center;padding:52px;color:var(--t3)}
    .empty-row strong{display:block;font-size:13px;color:var(--t2);margin-bottom:6px}

    /* Statusbar */
    .statusbar{height:28px;display:flex;align-items:center;gap:14px;padding:0 16px;border-top:1px solid var(--border);background:#f8f8f8;flex:none;font-size:10px;color:var(--t3)}
    .statusbar .dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
    .statusbar strong{color:var(--t2)}

    input[type=checkbox]{accent-color:var(--green);width:13px;height:13px}
  </style>
</head>
<body>

<!-- Topbar -->
<header class="topbar">
  <a class="back" href="../lab.html">← Prototype Store</a>
  <span class="bar-divider"></span>
  <div class="brand">
    <img src="https://homepage.momocdn.net/fileuploads/svg/momo-file-240411162904.svg" alt="MoMo">
    <img src="https://homepage.momocdn.net/img/4f2fa6b0-9f96-4077-b210-6e848b7d7104-1-260622153405.png" alt="Web Platform" style="width:22px;height:22px;border-radius:5px;border:1px solid rgba(0,0,0,.08)">
    <div><strong>Supabase Table Editor</strong><small>MoSpark · Database</small></div>
  </div>
  <span class="sb-chip"><span class="sb-dot"></span>Supabase Live</span>
</header>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-head">
      <strong>Table Editor</strong>
      <button class="icon-btn" title="Schema">⊞</button>
    </div>
    <div class="sidebar-search">
      <input placeholder="Search tables..." id="tableSearch" oninput="filterTables(this.value)">
    </div>
    <div class="table-list" id="tableList"></div>
    <div class="sidebar-footer">
      <button class="new-table-btn">+ New table</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="main-header">
      <div class="table-tabs" id="tableTabs"></div>
      <div class="main-actions">
        <span class="rls-badge">RLS disabled</span>
        <span class="role-badge">Role: postgres</span>
        <button class="action-btn" onclick="loadTable(currentTable)">↺</button>
        <button class="action-btn">⇅ Sort</button>
        <button class="action-btn" id="filterToggle">⊞ Filter</button>
        <button class="insert-btn" onclick="showInsertHint()">+ Insert</button>
      </div>
    </div>

    <div class="filter-bar">
      <input class="filter-input" id="filterInput" placeholder="Filter by id, merchant_id, day... or ask AI" oninput="applyFilter()">
      <button class="filter-btn">⊞ Columns</button>
      <span class="row-count" id="rowCount"></span>
    </div>

    <div class="grid-wrap" id="gridWrap">
      <div style="padding:52px;text-align:center;color:var(--t3)">Đang kết nối Supabase...</div>
    </div>

    <div class="statusbar">
      <span class="dot"></span>
      <span>Supabase · <strong id="sbProject">kstrfoycebvxntpgepjb</strong></span>
      <span id="sbStatus">Đang tải...</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/supabase-client.js"></script>
<script>
  const TABLES = [
    { name: 'merchants',           icon: '▤', cols: ['id','merchant_id','name','category','address','address_new','lng','lat','phone','has_oa','oa_id','status','created_at','updated_at'] },
    { name: 'merchant_hours',      icon: '⏰', cols: ['id','merchant_id','day','open_time','close_time','is_closed'] },
    { name: 'merchant_promotions', icon: '🏷', cols: ['id','merchant_id','type','value','description','min_order','max_cashback','start_date','end_date','is_active'] },
  ];

  const COL_META = {
    id:           { type:'uuid', pk:true },
    merchant_id:  { type:'text', fk:true },
    name:         { type:'text' },
    category:     { type:'text' },
    address:      { type:'text' },
    address_new:  { type:'text' },
    lng:          { type:'numeric' },
    lat:          { type:'numeric' },
    phone:        { type:'text' },
    has_oa:       { type:'bool' },
    oa_id:        { type:'text' },
    status:       { type:'text' },
    created_at:   { type:'timestamptz' },
    updated_at:   { type:'timestamptz' },
    day:          { type:'text' },
    open_time:    { type:'text' },
    close_time:   { type:'text' },
    is_closed:    { type:'bool' },
    type:         { type:'text' },
    value:        { type:'text' },
    description:  { type:'text' },
    min_order:    { type:'int4' },
    max_cashback: { type:'int4' },
    start_date:   { type:'date' },
    end_date:     { type:'date' },
    is_active:    { type:'bool' },
  };

  let currentTable = 'merchants';
  let allRows = [];
  let selectedRows = new Set();

  function renderSidebar(filter='') {
    const list = TABLES.filter(t => t.name.includes(filter.toLowerCase()));
    document.getElementById('tableList').innerHTML = list.map(t => `
      <div class="table-item ${t.name===currentTable?'active':''}" onclick="switchTable('${t.name}')">
        <span class="table-icon">${t.icon}</span>
        <span class="table-name">${t.name}</span>
        <span class="unrestricted-badge">UNRESTRICTED</span>
      </div>`).join('');
  }

  function renderTabs() {
    document.getElementById('tableTabs').innerHTML = TABLES.map(t => `
      <div class="table-tab ${t.name===currentTable?'active':''}" onclick="switchTable('${t.name}')">
        <span class="table-tab-icon">${t.icon}</span>${t.name}
      </div>`).join('');
  }

  function filterTables(v) { renderSidebar(v); }

  async function switchTable(name) {
    currentTable = name;
    selectedRows.clear();
    document.getElementById('filterInput').value = '';
    renderSidebar(document.getElementById('tableSearch').value);
    renderTabs();
    await loadTable(name);
  }

  async function loadTable(name) {
    document.getElementById('rowCount').textContent = '';
    document.getElementById('sbStatus').textContent = `Querying ${name}...`;

    const tbl = TABLES.find(t => t.name === name);
    renderSkeleton(tbl.cols);

    const { data, error } = await window.supabase.from(name).select('*');
    if (error) {
      document.getElementById('gridWrap').innerHTML = `<div style="padding:40px;text-align:center;color:#ef4444">${error.message}</div>`;
      return;
    }
    allRows = data || [];
    document.getElementById('sbStatus').textContent = `${allRows.length} rows · SELECT * FROM ${name}`;
    applyFilter();
  }

  function renderSkeleton(cols) {
    const headers = colHeaders(cols);
    const skels = Array(6).fill(0).map((_, i) => `<tr class="loading-row"><td class="td-num"></td><td class="td-check"></td>${cols.map(()=>`<td><div class="skel" style="width:${60+Math.random()*80}%;margin:8px 10px;height:16px;border-radius:3px"></div></td>`).join('')}</tr>`).join('');
    document.getElementById('gridWrap').innerHTML = `<table><thead><tr>${headers}</tr></thead><tbody>${skels}</tbody></table>`;
  }

  function colHeaders(cols) {
    const numTh = `<th class="th-num" style="width:52px"><div class="th-inner"></div></th>`;
    const chkTh = `<th class="th-check" style="width:36px"><div class="th-inner" style="justify-content:center"><input type="checkbox" onchange="toggleAll(this.checked)"></div></th>`;
    const colThs = cols.map(c => {
      const m = COL_META[c] || { type:'text' };
      const icon = m.pk ? '<span class="col-pk">P</span>' : m.fk ? '<span class="col-fk">↗</span>' : `<span class="col-icon">${typeIcon(m.type)}</span>`;
      return `<th><div class="th-inner">${icon}<span class="col-name">${c}</span><span class="col-type">${m.type}</span></div></th>`;
    }).join('');
    return numTh + chkTh + colThs;
  }

  function typeIcon(t) {
    if(t==='uuid') return '⬡';
    if(t==='bool') return '◎';
    if(t==='int4'||t==='numeric') return '#';
    if(t==='timestamptz'||t==='date') return '⏱';
    return '▢';
  }

  function applyFilter() {
    const q = (document.getElementById('filterInput').value || '').toLowerCase();
    const tbl = TABLES.find(t => t.name === currentTable);
    let rows = allRows;
    if (q) rows = rows.filter(row => Object.values(row).some(v => String(v ?? '').toLowerCase().includes(q)));
    document.getElementById('rowCount').textContent = rows.length !== allRows.length ? `${rows.length} / ${allRows.length} rows` : `${allRows.length} rows`;
    renderGrid(tbl.cols, rows);
  }

  function renderGrid(cols, rows) {
    const headers = colHeaders(cols);
    const bodyRows = rows.length === 0
      ? `<tr class="empty-row"><td colspan="${cols.length+2}"><strong>No rows found</strong>Click "Insert" to add the first row.</td></tr>`
      : rows.map((row, i) => {
          const cells = cols.map(c => `<td title="${esc(row[c])}">${cellHtml(c, row[c])}</td>`).join('');
          const checked = selectedRows.has(row.id);
          return `<tr class="${checked?'selected':''}" onclick="toggleRow('${row.id}')"><td class="td-num">${i+1}</td><td class="td-check"><input type="checkbox" ${checked?'checked':''} onclick="event.stopPropagation();toggleRow('${row.id}')"></td>${cells}</tr>`;
        }).join('');
    document.getElementById('gridWrap').innerHTML = `<table><thead><tr>${headers}</tr></thead><tbody>${bodyRows}</tbody></table>`;
  }

  function cellHtml(col, val) {
    if (val === null || val === undefined || val === '') return `<span class="cell-null">NULL</span>`;
    const m = COL_META[col] || {};
    if (m.pk) return `<span class="cell-uuid">${String(val).slice(0,8)}...</span>`;
    if (m.type === 'bool') return val ? `<span class="cell-bool-t">TRUE</span>` : `<span class="cell-bool-f">FALSE</span>`;
    if (m.type === 'timestamptz') return `<span style="color:var(--t2)">${new Date(val).toLocaleString('vi-VN',{dateStyle:'short',timeStyle:'short'})}</span>`;
    if (col === 'status') return val === 'live' ? `<span class="badge-live">● live</span>` : `<span class="badge-staging">● staging</span>`;
    if (m.fk && col === 'merchant_id') return `<span class="cell-fk">${esc(val)}<a class="fk-link" href="#" onclick="event.preventDefault();switchTable('merchants');setTimeout(()=>{document.getElementById('filterInput').value='${val}';applyFilter()},300)">↗</a></span>`;
    const s = String(val);
    return `<span>${esc(s.length > 50 ? s.slice(0,50)+'…' : s)}</span>`;
  }

  function esc(v=''){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}

  function toggleRow(id) {
    if (selectedRows.has(id)) selectedRows.delete(id);
    else selectedRows.add(id);
    applyFilter();
  }

  function toggleAll(checked) {
    if (checked) allRows.forEach(r => selectedRows.add(r.id));
    else selectedRows.clear();
    applyFilter();
  }

  function showInsertHint() {
    alert(`Để insert row:\n→ Dùng Supabase Dashboard tại supabase.com\n→ Hoặc dùng SQL Editor chạy INSERT INTO ${currentTable} (...)`);
  }

  // Init
  renderSidebar();
  renderTabs();
  loadTable('merchants');
</script>
</body>
</html>
