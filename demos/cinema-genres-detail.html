<!DOCTYPE html>
<html lang="vi">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink-500:#EB2F96;--pink-50:#fdf2f8;--pink-100:#fce7f3;
  --gray-900:#111827;--gray-800:#1f2937;--gray-700:#374151;--gray-600:#4b5563;
  --gray-500:#6b7280;--gray-400:#9ca3af;--gray-300:#d1d5db;--gray-200:#e5e7eb;
  --gray-100:#f3f4f6;--gray-50:#f9fafb;--white:#fff;
  --amber-500:#f59e0b;
  --shadow-s:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-m:0 4px 12px rgba(0,0,0,.1);
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;--r-2xl:24px;
}
body{font-family:'Be Vietnam Pro','Helvetica Neue',sans-serif;background:var(--gray-50);color:var(--gray-900);min-height:100vh}

/* NAV */
.nav{background:#fff;border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:100}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;gap:24px}
.nav-logo{display:flex;align-items:center;cursor:pointer;text-decoration:none}
.nav-links{display:flex;gap:4px}
.nav-link{font-family:inherit;font-size:14px;font-weight:700;color:var(--gray-600);background:none;border:none;cursor:pointer;padding:6px 12px;border-radius:var(--r-sm);transition:.15s}
.nav-link:hover{background:var(--gray-100);color:var(--gray-900)}
.nav-link.on{color:var(--pink-500)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav-search{font-size:13px;color:var(--gray-400);background:var(--gray-100);border-radius:var(--r-xl);padding:7px 14px;cursor:pointer}
@media(max-width:768px){.nav-links,.nav-search{display:none}}

/* BREADCRUMB */
.breadcrumb-bar{background:#fff;border-bottom:1px solid var(--gray-100);padding:0 20px}
.breadcrumb-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:6px;height:37px;font-size:12px}
.bc-item{color:var(--gray-500);text-decoration:none;cursor:pointer}
.bc-item:hover{color:var(--pink-500)}
.bc-sep{color:var(--gray-300)}
.bc-current{color:var(--gray-900);font-weight:700}

/* GENRE HEADER */
.genre-header{background:#fff;padding:24px 20px 20px;border-bottom:1px solid var(--gray-200)}
.genre-header-inner{max-width:1100px;margin:0 auto}
.genre-title-row{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.genre-icon{width:44px;height:44px;border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.genre-title-row h1{font-size:26px;font-weight:900;color:var(--gray-900);line-height:1.2}
.genre-count{font-size:13px;color:var(--gray-500);margin-bottom:8px}
.genre-count strong{color:var(--pink-500)}
.genre-desc{font-size:13px;color:var(--gray-600);line-height:1.6;max-width:640px}

/* CONTENT */
.content{max-width:1100px;margin:0 auto;padding:32px 20px}

/* SECTION HEADER */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.sec-title{font-size:18px;font-weight:900;color:var(--gray-900);display:flex;align-items:center;gap:8px}
.sec-title i{flex-shrink:0}
.sec-sub{font-size:12px;color:var(--gray-400)}

/* ── SECTION 1: ĐANG CHIẾU ── */
.showing-wrap{position:relative}
.showing-grid{display:flex;gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding-bottom:8px}
.showing-grid::-webkit-scrollbar{display:none}
.showing-grid .film-card{flex:0 0 160px;scroll-snap-align:start}
@media(min-width:600px){.showing-grid .film-card{flex:0 0 180px}}
.scroll-btn{position:absolute;top:50%;transform:translateY(-60%);width:36px;height:36px;border-radius:50%;background:#fff;border:none;box-shadow:0 2px 10px rgba(0,0,0,.18);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:.15s;color:var(--gray-700)}
.scroll-btn:hover{box-shadow:0 4px 16px rgba(0,0,0,.22);transform:translateY(-60%) scale(1.08)}
.scroll-btn.prev{left:-14px}.scroll-btn.next{right:-14px}
.scroll-btn.hidden{opacity:0;pointer-events:none}
@media(max-width:600px){.scroll-btn{display:none}}

.film-card{background:#1a1a2e;border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:.2s;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.film-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.28)}
.film-poster{position:relative;aspect-ratio:2/3;overflow:hidden;background:#2a2a3e}
.film-poster img{width:100%;height:100%;object-fit:cover;transition:transform .35s}
.film-card:hover .film-poster img{transform:scale(1.05)}
.film-poster-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 50%)}
.film-age{position:absolute;top:8px;left:8px;font-size:10px;font-weight:900;padding:2px 7px;border-radius:5px;color:#fff;z-index:2}
.film-age.p{background:#16a34a}.film-age.t13{background:#ca8a04}.film-age.t16{background:#ea580c}.film-age.c18{background:#dc2626}
.film-score{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.65);color:#fff;font-size:10px;font-weight:800;padding:3px 7px;border-radius:20px;backdrop-filter:blur(4px);display:flex;align-items:center;gap:3px;z-index:2}
.film-badge{position:absolute;bottom:8px;left:8px;font-size:9px;font-weight:900;padding:2px 8px;border-radius:20px;letter-spacing:.4px;z-index:2}
.film-badge.hot{background:#ef4444;color:#fff}
.film-badge.new{background:#22c55e;color:#fff}
.film-body{padding:9px 11px 11px;background:#1a1a2e}
.film-title{font-size:12px;font-weight:800;color:#fff;margin-bottom:4px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.film-meta{font-size:10px;color:rgba(255,255,255,.45);margin-bottom:8px}
.btn-book{width:100%;font-family:inherit;font-size:12px;font-weight:800;color:#fff;background:var(--pink-500);border:none;border-radius:var(--r-sm);padding:7px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-book:hover{background:#c9178c}

/* ── SECTION 2: TẤT CẢ PHIM & SERIES ── */
.catalog-filters{display:flex;gap:6px;margin-bottom:20px}
.cfl{font-family:inherit;font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-600);cursor:pointer;transition:.15s}
.cfl.on{background:var(--gray-900);color:#fff;border-color:var(--gray-900)}
.cfl:hover:not(.on){background:var(--gray-100)}

.catalog-list{display:flex;flex-direction:column;background:#fff;border-radius:var(--r-xl);box-shadow:var(--shadow-s);overflow:hidden}

.catalog-card{display:flex;gap:0;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--gray-100);position:relative}
.catalog-card:last-child{border-bottom:none}
.catalog-card:hover{background:var(--gray-50)}

/* Rank */
.cc-rank{width:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:var(--gray-300);padding:20px 0}

/* Poster */
.cc-poster{width:72px;flex-shrink:0;position:relative;overflow:hidden;background:var(--gray-200);align-self:stretch}
.cc-poster img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.catalog-card:hover .cc-poster img{transform:scale(1.05)}
.cc-age{position:absolute;bottom:5px;left:5px;font-size:9px;font-weight:900;padding:1px 5px;border-radius:3px;color:#fff;line-height:1.4}
.cc-age.p{background:#16a34a}.cc-age.t13{background:#ca8a04}.cc-age.t16{background:#ea580c}.cc-age.c18{background:#dc2626}

/* Body */
.cc-body{flex:1;padding:16px 16px 16px 14px;min-width:0;display:flex;flex-direction:column;gap:6px}
.cc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.cc-title{font-size:15px;font-weight:800;color:var(--gray-900);line-height:1.3}
.cc-score{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:800;color:#78350f;white-space:nowrap;flex-shrink:0}
.cc-score i{flex-shrink:0}
.cc-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-size:11px;color:var(--gray-400)}
.cc-meta-dot{color:var(--gray-200)}
.cc-type-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;color:#fff;display:inline-flex}
.cc-type-badge.film{background:var(--pink-500)}.cc-type-badge.series{background:#6366f1}
.cc-desc{font-size:12px;color:var(--gray-500);line-height:1.65;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cc-crew{font-size:11px;color:var(--gray-400);display:flex;flex-wrap:wrap;gap:3px 14px}
.cc-crew span{display:flex;align-items:center;gap:4px}
.cc-crew strong{color:var(--gray-600)}
.cc-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:2px}
.cc-status{font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px}
.cc-status.soon{color:#6366f1}.cc-status.past{color:var(--gray-400)}.cc-status.ongoing{color:#16a34a}
.btn-cc{font-family:inherit;font-size:11px;font-weight:800;border:none;border-radius:var(--r-sm);padding:5px 12px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:4px;white-space:nowrap}
.btn-cc.pink{color:#fff;background:var(--pink-500)}.btn-cc.pink:hover{background:#c9178c}
.btn-cc.indigo{color:#6366f1;background:#eef2ff;border:1.5px solid #c7d2fe}
.btn-cc.gray{color:var(--gray-400);background:var(--gray-100);cursor:default;border:1.5px solid var(--gray-200)}

/* RELATED */
.related-section{margin-top:44px}
.related-section h2{font-size:16px;font-weight:900;color:var(--gray-900);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.related-section h2 i{color:var(--gray-400)}
.chip-grid{display:flex;flex-wrap:wrap;gap:10px}
.chip{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--gray-200);border-radius:var(--r-xl);padding:8px 16px;cursor:pointer;transition:.15s;text-decoration:none}
.chip:hover{border-color:var(--pink-100);background:var(--pink-50)}
.chip i{color:var(--gray-500)}
.chip-name{font-size:13px;font-weight:700;color:var(--gray-800)}
.chip-count{font-size:11px;color:var(--gray-400)}

.empty{padding:40px 0;text-align:center;color:var(--gray-400);font-size:14px}
.pager{display:flex;align-items:center;justify-content:space-between;margin-top:20px;gap:8px}
.pager-info{font-size:12px;color:var(--gray-400)}
.pager-btns{display:flex;align-items:center;gap:6px}
.pg-btn{font-family:inherit;font-size:13px;font-weight:700;padding:6px 14px;border-radius:var(--r-md);border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-700);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:5px}
.pg-btn:hover:not(:disabled){background:var(--gray-100);border-color:var(--gray-300)}
.pg-btn:disabled{opacity:.35;cursor:default}
.pg-nums{display:flex;gap:4px}
.pg-n{font-family:inherit;font-size:13px;font-weight:700;width:34px;height:34px;border-radius:var(--r-md);border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-600);cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center}
.pg-n:hover{background:var(--gray-100)}
.pg-n.on{background:var(--gray-900);color:#fff;border-color:var(--gray-900)}
.footer{background:var(--gray-900);color:var(--gray-400);font-size:12px;padding:20px;text-align:center;margin-top:48px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gray-900);color:#fff;font-size:13px;font-weight:700;padding:10px 20px;border-radius:var(--r-xl);opacity:0;pointer-events:none;transition:.25s;white-space:nowrap;z-index:9999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.mobile-bnav{display:none}
@media(max-width:768px){
  .mobile-bnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--gray-200);padding:6px 0 env(safe-area-inset-bottom,8px);z-index:200;box-shadow:0 -1px 8px rgba(0,0,0,.08)}
  .mbn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:var(--gray-400);font-size:10px;font-weight:700;padding:4px 0;transition:.15s}
  .mbn-item.on{color:var(--pink-500)}
  body{padding-bottom:72px}
  .nav-lab-link{display:none!important}
  .breadcrumb-bar{display:none}
  .cc-poster{width:80px}
  .cc-desc{-webkit-line-clamp:2}
}
</style>
</head>

// ── STATE ─────────────────────────────────────────────────────────────────────
const slug = location.pathname.replace(/\/$/, '').split('/').pop();
const genre = ALL_GENRES[slug] || ALL_GENRES['kinh-di'];
let catalogFilter = 'all';

// ── INIT ──────────────────────────────────────────────────────────────────────
function init(){
  document.getElementById('pageTitle').textContent = `Phim ${genre.name} - MoMo Cinema`;
  document.getElementById('bcName').textContent = genre.name;
  document.getElementById('genreTitle').textContent = genre.name;
  document.getElementById('genreDesc').textContent = genre.desc;

  const iconEl = document.getElementById('genreIconEl');
  iconEl.setAttribute('data-lucide', genre.lucideIcon);
  iconEl.setAttribute('width','22');
  iconEl.setAttribute('height','22');
  iconEl.setAttribute('stroke-width','2');
  iconEl.style.color = genre.iconColor;
  document.getElementById('genreIcon').style.background = genre.iconBg;

  const nowCount = (genre.showing||[]).length;
  const catCount = (genre.catalog||[]).length;

  renderShowing();
  renderCatalog();
  renderRelated();
  lucide.createIcons();
}

// ── SECTION 1 ─────────────────────────────────────────────────────────────────
function renderShowing(){
  const films = genre.showing || [];
  document.getElementById('showingCount').textContent = `${films.length} phim`;

  if(!films.length){
    document.getElementById('showingGrid').innerHTML =
      `<div class="empty"><i data-lucide="clapperboard" width="32" height="32" style="display:block;margin:0 auto 10px;color:var(--gray-300)"></i>Chưa có phim đang chiếu</div>`;
    lucide.createIcons(); return;
  }

  document.getElementById('showingGrid').innerHTML =
    `<div class="showing-grid">${films.map((f,i)=>{
      const ageCls = f.age.toLowerCase().replace(' ','');
      const scoreHtml = f.score&&f.score!=='—'
        ? `<div class="film-score"><i data-lucide="star" width="10" height="10" style="fill:#f59e0b;color:#f59e0b"></i>${f.score}</div>` : '';
      const badgeCls = i < 2 ? 'hot' : 'new';
      const badgeTxt = i < 2 ? 'HOT' : 'MỚI';
      return `<div class="film-card" onclick="location.href='/cinema/${f.id}'">
        <div class="film-poster">
          <img src="${f.img}" alt="${f.title}" loading="lazy">
          <div class="film-poster-overlay"></div>
          <span class="film-age ${ageCls}">${f.age}</span>
          ${scoreHtml}
          <span class="film-badge ${badgeCls}">${badgeTxt}</span>
        </div>
        <div class="film-body">
          <div class="film-title">${f.title}</div>
          <div class="film-meta">${f.dur}</div>
          <button class="btn-book" onclick="event.stopPropagation();location.href='/cinema/${f.id}'">
            <i data-lucide="ticket" width="13" height="13"></i>Đặt vé
          </button>
        </div>
      </div>`;
    }).join('')}</div>`;
  lucide.createIcons();
  const grid = document.querySelector('.showing-grid');
  if(grid) grid.addEventListener('scroll', updateScrollBtns, {passive:true});
}

// ── SECTION 2 ─────────────────────────────────────────────────────────────────
const PAGE_SIZE = 3;
let catalogPage = 1;

function setCatalogFilter(f, el){
  catalogFilter = f;
  catalogPage = 1;
  document.querySelectorAll('.cfl').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  renderCatalog();
}

function goPage(p){
  catalogPage = p;
  renderCatalog();
  document.querySelector('.catalog-filters')?.scrollIntoView({behavior:'smooth', block:'start'});
}

function renderCatalog(){
  const all = (genre.catalog || []).filter(i=>i.status !== 'now');
  const items = catalogFilter === 'all' ? all : all.filter(i=>i.type===catalogFilter);
  const total = items.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  catalogPage = Math.min(catalogPage, totalPages);
  const start = (catalogPage - 1) * PAGE_SIZE;
  const pageItems = items.slice(start, start + PAGE_SIZE);

  document.getElementById('catalogCount').textContent = `${total} mục`;

  if(!total){
    document.getElementById('catalogList').innerHTML = `<div class="empty">Không có kết quả</div>`;
    document.getElementById('catalogPager').innerHTML = '';
    lucide.createIcons(); return;
  }

  document.getElementById('catalogList').innerHTML = pageItems.map((item,idx)=>{
    const isFilm = item.type === 'film';
    const isSoon = item.status === 'soon';
    const isPast = item.status === 'past';
    const isOngoing = item.status === 'ongoing';
    const ageCls = item.age.toLowerCase().replace(' ','');

    const statusText = isPast ? 'Đã chiếu' : isSoon ? 'Sắp chiếu' : isOngoing ? 'Đang phát' : 'Đang chiếu';
    const statusCls = isPast ? 'past' : isSoon ? 'soon' : isOngoing ? 'ongoing' : 'now';

    const meta = isFilm
      ? `${item.dur} · ${item.year}`
      : `${item.eps} · ${item.year}`;

    const scoreHtml = item.score && item.score !== '—'
      ? `<span class="cc-score"><i data-lucide="star" width="10" height="10" style="fill:#f59e0b;color:#f59e0b"></i>${item.score}</span>` : '';

    let btnCls, btnIcon, btnText;
    if(isPast){        btnCls='gray';   btnIcon='clock';  btnText='Đã kết thúc'; }
    else if(isSoon){   btnCls='gray';   btnIcon='calendar'; btnText='Sắp chiếu'; }
    else if(isOngoing){btnCls='indigo'; btnIcon='play';    btnText='Xem ngay'; }
    else {             btnCls='pink';   btnIcon='ticket';  btnText='Đặt vé'; }

    const crewParts = [
      item.director ? `<span><i data-lucide="video" width="10" height="10"></i><strong>Đạo diễn:</strong> ${item.director}</span>` : '',
      item.cast     ? `<span><i data-lucide="users" width="10" height="10"></i><strong>Diễn viên:</strong> ${item.cast}</span>` : '',
    ].filter(Boolean).join('');

    const rank = start + idx + 1;

    return `<div class="catalog-card" onclick="${isPast?`toast('${item.title.replace(/'/g,"\\'")} đã kết thúc')`:`location.href='/cinema/${item.id}'`}">
      <div class="cc-rank">${rank}</div>
      <div class="cc-poster">
        <img src="${item.img}" alt="${item.title}" loading="lazy" onerror="this.style.background='var(--gray-200)'">
        <span class="cc-age ${ageCls}">${item.age}</span>
      </div>
      <div class="cc-body">
        <div class="cc-top">
          <div class="cc-title">${item.title}</div>
          ${item.score && item.score!=='—' ? `<div class="cc-score"><i data-lucide="star" width="14" height="14" style="fill:#f59e0b;color:#f59e0b"></i>${item.score}</div>` : ''}
        </div>
        <div class="cc-meta">
          <span class="cc-type-badge ${item.type}">${isFilm?'Phim lẻ':'Phim bộ'}</span>
          <span class="cc-meta-dot">·</span>
          <span>${meta}</span>
          <span class="cc-meta-dot">·</span>
          <span>${item.subGenre}</span>
          ${item.country ? `<span class="cc-meta-dot">·</span><span>${item.country}</span>` : ''}
        </div>
        <div class="cc-desc">${item.desc}</div>
        <div class="cc-bottom">
          ${isPast ? '' : `<span class="cc-status ${statusCls}"><i data-lucide="${isSoon?'calendar':isOngoing?'play-circle':'ticket'}" width="11" height="11"></i>${statusText}</span>`}
          ${!isPast ? `<button class="btn-cc ${btnCls}" onclick="event.stopPropagation();location.href='/cinema/${item.id}'"><i data-lucide="${btnIcon}" width="11" height="11"></i>${btnText}</button>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');

  // Render pager
  if(totalPages <= 1){
    document.getElementById('catalogPager').innerHTML = '';
  } else {
    const maxVisible = 5;
    let pgStart = Math.max(1, catalogPage - 2);
    let pgEnd = Math.min(totalPages, pgStart + maxVisible - 1);
    if(pgEnd - pgStart < maxVisible - 1) pgStart = Math.max(1, pgEnd - maxVisible + 1);
    let nums = '';
    if(pgStart > 1) nums += `<button class="pg-n" onclick="goPage(1)">1</button>${pgStart > 2 ? '<span style="padding:0 2px;color:var(--gray-300)">…</span>' : ''}`;
    for(let i=pgStart;i<=pgEnd;i++) nums += `<button class="pg-n${i===catalogPage?' on':''}" onclick="goPage(${i})">${i}</button>`;
    if(pgEnd < totalPages) nums += `${pgEnd < totalPages-1 ? '<span style="padding:0 2px;color:var(--gray-300)">…</span>' : ''}<button class="pg-n" onclick="goPage(${totalPages})">${totalPages}</button>`;
    document.getElementById('catalogPager').innerHTML = `<div class="pager">
      <span class="pager-info">${start+1}–${Math.min(start+PAGE_SIZE,total)} / ${total} mục</span>
      <div class="pager-btns">
        <button class="pg-btn" onclick="goPage(${catalogPage-1})" ${catalogPage===1?'disabled':''}><i data-lucide="chevron-left" width="14" height="14"></i> Trước</button>
        <div class="pg-nums">${nums}</div>
        <button class="pg-btn" onclick="goPage(${catalogPage+1})" ${catalogPage===totalPages?'disabled':''}> Sau <i data-lucide="chevron-right" width="14" height="14"></i></button>
      </div>
    </div>`;
  }

  lucide.createIcons();
}

// ── RELATED ───────────────────────────────────────────────────────────────────
function renderRelated(){
  const others = Object.entries(ALL_GENRES).filter(([k])=>k!==slug).slice(0,6);
  document.getElementById('relatedChips').innerHTML = others.map(([k,g])=>`
    <a class="chip" href="/cinema/genres/${k}">
      <i data-lucide="${g.lucideIcon}" width="16" height="16"></i>
      <div>
        <div class="chip-name">${g.name}</div>
        <div class="chip-count">${(g.showing||[]).length} đang chiếu</div>
      </div>
    </a>`).join('');
  lucide.createIcons();
}

function scrollShowing(dir){
  const grid = document.querySelector('.showing-grid');
  if(!grid) return;
  grid.scrollBy({left: dir * 360, behavior:'smooth'});
  setTimeout(updateScrollBtns, 350);
}
function updateScrollBtns(){
  const grid = document.querySelector('.showing-grid');
  if(!grid) return;
  const prev = document.getElementById('showPrev');
  const next = document.getElementById('showNext');
  if(prev) prev.classList.toggle('hidden', grid.scrollLeft < 10);
  if(next) next.classList.toggle('hidden', grid.scrollLeft + grid.clientWidth >= grid.scrollWidth - 10);
}

let toastTimer;
function toast(msg){const el=document.getElementById('toastEl');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2200);}

init();
</script>
