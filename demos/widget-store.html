<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget Store — MoSpark</title>
<style>
@font-face{font-family:'MoMoTrustSans';src:url('../assets/fonts/momo-trust/MoMoTrustSans-Regular.otf') format('opentype');font-weight:400;font-display:swap}
@font-face{font-family:'MoMoTrustSans';src:url('../assets/fonts/momo-trust/MoMoTrustSans-Medium.otf') format('opentype');font-weight:500 700;font-display:swap}
@font-face{font-family:'MoMoTrustDisplay';src:url('../assets/fonts/momo-trust/MoMoTrustDisplay.otf') format('opentype');font-display:swap}
:root{
  --pink:#a50064;--pink-light:#f9e8f4;--pink-mid:#e8a0cc;
  --ink:#111827;--muted:#6b7280;--muted2:#9ca3af;--line:#e5e7eb;--canvas:#f4faf5;--white:#fff;
  --r:18px;--r-sm:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'MoMoTrustSans',-apple-system,sans-serif;background:var(--canvas);color:var(--ink);min-height:100vh}

/* NAV */
.nav{position:sticky;top:0;z-index:50;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.nav-left{display:flex;align-items:center;gap:12px}
.back-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--r-sm);font-size:12px;font-weight:700;color:var(--muted);text-decoration:none;border:1.5px solid var(--line);background:var(--white);transition:all .15s}
.back-btn:hover{color:var(--ink);border-color:var(--muted2)}
.nav-brand{font-size:13px;font-weight:800;color:var(--ink)}
.nav-tag{font-size:10px;font-weight:700;color:var(--pink);background:var(--pink-light);border-radius:4px;padding:2px 7px}

/* HERO */
.hero{background:linear-gradient(160deg,#e6f5ea 0%,#f9fdf9 60%,var(--canvas) 100%);padding:48px 24px 36px;border-bottom:1px solid #d3ead8}
.hero-inner{max-width:1160px;margin:0 auto}
.hero-eyebrow{font-size:11px;font-weight:800;color:#2d7a3a;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.hero h1{font-family:'MoMoTrustDisplay','MoMoTrustSans',sans-serif;font-size:clamp(32px,5vw,52px);font-weight:900;line-height:1;letter-spacing:-.03em;color:var(--ink);margin-bottom:12px}
.hero-sub{font-size:14px;line-height:1.8;color:var(--muted);max-width:560px;margin-bottom:28px}
.hero-stats{display:flex;gap:32px;flex-wrap:wrap}
.hero-stat{display:flex;flex-direction:column;gap:3px}
.hero-stat-n{font-size:28px;font-weight:900;letter-spacing:-.02em;color:var(--ink)}
.hero-stat-l{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#5a8a62}

/* CONTROLS */
.controls{max-width:1160px;margin:0 auto;padding:22px 24px 16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.search-wrap{position:relative;width:240px;flex-shrink:0}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted2)}
.search-input{width:100%;height:38px;padding:0 12px 0 34px;border:1.5px solid var(--line);border-radius:20px;font-family:inherit;font-size:13px;color:var(--ink);background:var(--white);outline:none;transition:border-color .15s}
.search-input:focus{border-color:#3d9e50}
.filter-row{display:flex;gap:6px;flex-wrap:wrap}
.pill{font-family:inherit;font-size:12px;font-weight:700;padding:6px 16px;border-radius:20px;border:1.5px solid var(--line);background:var(--white);color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.pill:hover{border-color:#3d9e50;color:#2d7a3a}
.pill.on{background:#2d7a3a;border-color:#2d7a3a;color:#fff}
.count-badge{margin-left:auto;font-size:12px;font-weight:600;color:var(--muted2)}

/* GRID */
.grid-wrap{max-width:1160px;margin:0 auto;padding:8px 24px 72px}
.widget-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.empty{padding:72px;text-align:center;color:var(--muted2);font-size:14px;font-weight:600}

/* CARD — NerdWallet style */
.w-card{position:relative;background:var(--white);border:1.5px solid #d9edd9;border-radius:var(--r);padding:22px 20px 20px;text-decoration:none;color:inherit;display:flex;flex-direction:column;align-items:center;text-align:center;gap:0;transition:border-color .2s,box-shadow .2s,transform .15s;cursor:pointer;min-height:210px}
.w-card:hover{border-color:#3d9e50;box-shadow:0 6px 24px rgba(45,122,58,.12),0 2px 6px rgba(0,0,0,.05);transform:translateY(-2px)}
.w-arrow{position:absolute;top:14px;right:16px;color:#9ca3af;transition:color .15s,transform .15s}
.w-card:hover .w-arrow{color:#2d7a3a;transform:translate(2px,-2px)}
.w-img{width:88px;height:88px;object-fit:contain;margin:4px auto 14px;display:block;flex-shrink:0}
.w-img-svg{width:88px;height:88px;margin:4px auto 14px;display:block;flex-shrink:0}
.w-img-svg svg{width:100%;height:100%;display:block}
.w-img-emoji{width:88px;height:88px;display:flex;align-items:center;justify-content:center;font-size:52px;margin:4px auto 14px;flex-shrink:0}
.w-name{font-size:15px;font-weight:800;color:var(--ink);line-height:1.3;margin-bottom:8px}
.w-desc{font-size:12px;line-height:1.7;color:var(--muted);flex:1}

/* Section label */
.sec-label{max-width:1160px;margin:0 auto;padding:20px 24px 10px;font-size:18px;font-weight:800;color:var(--ink)}

@media(max-width:1000px){.widget-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:760px){.widget-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:520px){
  .widget-grid{grid-template-columns:repeat(2,1fr)}
  .hero{padding:32px 16px 28px}
  .controls,.grid-wrap{padding-left:16px;padding-right:16px}
}
</style>
</head>

const WIDGET_ICON_BY_ID = Object.fromEntries(WIDGETS.map(w => [w.id, w.icon]));

const SVG_EXTS = ['svg'];
function isFile(s){ return s && !s.includes(' ') && (s.endsWith('.png')||s.endsWith('.svg')||s.endsWith('.jpg')); }

function iconHtml(icon){
  const key = Object.keys(WIDGET_ICON_BY_ID).find(k => WIDGET_ICON_BY_ID[k] === icon);
  if (key && ICONS[key]) return `<div class="w-img-svg">${ICONS[key]}</div>`;
  if(isFile(icon)) return `<img class="w-img" src="${ICON_BASE}${icon}" alt="" loading="lazy">`;
  return `<div class="w-img-emoji">${icon}</div>`;
}

const ARROW_SVG = `<svg class="w-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>`;

let activeCat = 'all';
let query = '';

function norm(s){ return String(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/đ/g,'d').replace(/Đ/g,'D').toLowerCase(); }

function renderPills(){
  document.getElementById('filterRow').innerHTML = CATS.map(c =>
    `<button class="pill${activeCat===c.id?' on':''}" onclick="setCat('${c.id}')">${c.label}</button>`
  ).join('');
}

function setCat(id){ activeCat=id; renderPills(); renderGrid(); }

function renderGrid(){
  const q = norm(query);
  const list = WIDGETS.filter(w => {
    if(activeCat !== 'all' && w.cat !== activeCat) return false;
    if(q) return norm(w.name+' '+w.desc).includes(q);
    return true;
  });

  document.getElementById('statTotal').textContent = WIDGETS.length;
  const catCount = new Set(WIDGETS.map(w=>w.cat)).size;
  document.getElementById('statCats').textContent = catCount;
  document.getElementById('countBadge').textContent = list.length + ' widget';

  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyMsg');
  if(!list.length){ grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';

  grid.innerHTML = list.map(w => `
    <a class="w-card" href="${w.href}" target="_blank" rel="noopener">
      ${ARROW_SVG}
      ${iconHtml(w.icon)}
      <div class="w-name">${w.name}</div>
      <div class="w-desc">${w.desc}</div>
    </a>
  `).join('');
}

document.getElementById('searchQ').addEventListener('input', e => { query=e.target.value.trim(); renderGrid(); });

renderPills();
renderGrid();
</script>
