@font-face{font-family:'MoMoTrustSans';src:url('../assets/fonts/momo-trust/MoMoTrustSans-Regular.otf') format('opentype');font-weight:400;font-display:swap}
@font-face{font-family:'MoMoTrustSans';src:url('../assets/fonts/momo-trust/MoMoTrustSans-Medium.otf') format('opentype');font-weight:500 800;font-display:swap}
@font-face{font-family:'MoMoTrustDisplay';src:url('../assets/fonts/momo-trust/MoMoTrustDisplay.otf') format('opentype');font-display:swap}

:root{
  --momo:#a50064;
  --ink:#1d2939;
  --muted:#667085;
  --line:#e4e7ec;
  --canvas:#f2f4f7;
  --white:#fff;
  --rounded-lg:8px;
}
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--canvas);color:var(--ink);font-family:'MoMoTrustSans',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;line-height:1.5}
h1,h2,h3{font-family:'MoMoTrustDisplay','MoMoTrustSans',sans-serif}
a{color:inherit;text-decoration:none}
button,input{font:inherit;cursor:pointer}

/* ── Site Header */
.site-header{background:var(--white);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 28px}
.brand{display:flex;align-items:center;gap:10px;color:var(--ink)}
.back-link{font-size:11px;font-weight:600;color:var(--muted);text-decoration:none;transition:color .12s;white-space:nowrap}
.back-link:hover{color:var(--ink)}
.bar-sep{width:1px;height:18px;background:var(--line);flex-shrink:0}
.brand-mark{width:34px;height:34px;border-radius:var(--rounded-lg);background:var(--momo);color:#fff;display:grid;place-items:center;font-size:10px;font-weight:800;line-height:.75;text-align:center;overflow:hidden}
.brand strong{display:block;font-size:13px}
.brand small{display:block;font-size:10px;color:var(--muted)}
.site-header nav{display:flex;align-items:center;gap:20px}
.site-header nav a{font-size:12px;font-weight:600;color:var(--muted);text-decoration:none}
.site-header nav a:hover{color:var(--momo)}
.status{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#15803d}
.status i{display:inline-block;width:7px;height:7px;border-radius:50%;background:#12b76a;box-shadow:0 0 0 3px #d1fadf}

/* ── Hero */
.mlc-hero{background:linear-gradient(135deg,#1a0a14 0%,#3d0a28 60%,#6b0f3d 100%);padding:56px 24px 48px;text-align:center;color:#fff}
.mlc-hero-inner{max-width:700px;margin:0 auto}
.mlc-kicker{display:inline-block;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 14px;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.85);margin-bottom:16px}
.mlc-title{font-size:clamp(32px,6vw,52px);font-weight:800;margin:0 0 12px;line-height:1.1}
.mlc-sub{font-size:15px;color:rgba(255,255,255,.7);margin:0 0 28px;line-height:1.6}

/* ── Search */
.mlc-search{max-width:560px;margin:0 auto 22px;text-align:left}
.mlc-search-label{display:inline-block;margin-bottom:8px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:rgba(255,255,255,.74)}
.mlc-search-field{display:flex;align-items:center;gap:10px;min-height:54px;padding:0 16px;border-radius:999px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.12);box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
.mlc-search-field:focus-within{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.16);box-shadow:0 0 0 4px rgba(255,255,255,.08)}
.mlc-search-icon{flex:none;color:rgba(255,255,255,.68)}
.mlc-search-field input{flex:1;min-width:0;border:0;background:transparent;color:#fff;font-size:14px;outline:0}
.mlc-search-field input::placeholder{color:rgba(255,255,255,.48)}
.mlc-search-clear{width:28px;height:28px;flex:none;border:0;border-radius:999px;background:rgba(255,255,255,.14);color:#fff;font-size:20px;line-height:1;display:grid;place-items:center;padding:0}
.mlc-search-clear:hover{background:rgba(255,255,255,.22)}
.mlc-search-meta{margin:10px 0 0;font-size:12px;color:rgba(255,255,255,.68);line-height:1.5}

/* ── Pills */
.mlc-pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.mlc-pill{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);border-radius:20px;padding:6px 16px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.mlc-pill:hover{background:rgba(255,255,255,.2)}
.mlc-pill.active{background:#fff;color:#AF0171;border-color:#fff;font-weight:600}
.mlc-pill-icon{width:15px;height:15px;flex:none}

/* ── Grid */
.mlc-grid-wrap{max-width:1120px;margin:0 auto;padding:32px 24px 64px}
.mlc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
@media(max-width:1100px){.mlc-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:820px){.mlc-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:560px){.mlc-grid{grid-template-columns:repeat(2,1fr);gap:12px}}
@media(max-width:360px){.mlc-grid{grid-template-columns:1fr}}

/* ── Card */
.mlc-card{position:relative;background:#fff;border-radius:16px;padding:20px 16px 18px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;border:1.5px solid transparent;box-shadow:0 1px 4px rgba(0,0,0,.07);transition:box-shadow .15s,border-color .15s,transform .12s;text-decoration:none;color:inherit}
.mlc-card:hover{box-shadow:0 6px 20px rgba(175,1,113,.12);border-color:rgba(175,1,113,.25);transform:translateY(-2px)}
.mlc-arrow{position:absolute;top:14px;right:14px;color:#ccc;transition:color .15s}
.mlc-card:hover .mlc-arrow{color:#AF0171}
.mlc-icon{width:72px;height:72px;object-fit:contain;display:block}
.mlc-icon-emoji{width:72px;height:72px;font-size:42px;display:flex;align-items:center;justify-content:center}
.mlc-name{font-size:13px;font-weight:700;color:#1a1a2e;text-align:center;line-height:1.3}
.mlc-desc{font-size:11.5px;color:#666;text-align:center;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.mlc-empty{grid-column:1/-1;padding:32px 24px;border-radius:20px;border:1px dashed rgba(175,1,113,.22);background:linear-gradient(180deg,#fff 0%,#fff7fb 100%);text-align:center;color:#475467}
.mlc-empty strong{display:block;margin-bottom:6px;font-size:16px;color:#1a1a2e}
.mlc-empty p{margin:0;font-size:13px;line-height:1.6}

@media(max-width:560px){
  .site-header{height:auto;padding:14px 16px;flex-direction:column;align-items:flex-start;gap:10px}
  .site-header nav{flex-wrap:wrap;gap:12px}
  .mlc-search{margin-bottom:18px}
  .mlc-search-field{min-height:50px;padding:0 14px}
  .mlc-search-field input{font-size:13px}
}

    {id:'dti',                  name:'Tỷ Lệ Nợ/Thu Nhập',      cat:'Financial Health',icon:'financial-sharp.svg#dti',              href:'/utilities-tool#dti',                  desc:'Tính tỷ lệ thu nhập gộp hàng tháng đang dùng để thanh toán nợ.'},
    {id:'debt-payoff',          name:'Kế Hoạch Trả Nợ',        cat:'Financial Health',icon:'financial-sharp.svg#debt-payoff',      href:'/utilities-tool#debt-payoff',          desc:'So sánh chiến lược Avalanche và Snowball khi trả nhiều khoản nợ cùng lúc.'},
    {id:'quy-du-phong',         name:'Quỹ Dự Phòng',           cat:'Financial Health',icon:'financial-sharp.svg#emergency-fund',   href:'/utilities-tool#quy-du-phong',         desc:'Lập mục tiêu quỹ khẩn cấp theo chi tiêu, thời gian và lạm phát dự kiến.'},
    // Planning
    {id:'tu-do-tai-chinh',      name:'Tự Do Tài Chính',        cat:'Planning',        icon:'financial-sharp.svg#fire',             href:'/utilities-tool#tu-do-tai-chinh',      desc:'Lập kế hoạch FIRE với lạm phát, lợi suất đầu tư và dòng tiền góp hàng tháng.'},
    {id:'dam-cuoi',             name:'Kế Hoạch Đám Cưới',      cat:'Planning',        icon:'financial-sharp.svg#wedding',          href:'/utilities-tool#dam-cuoi',             desc:'Lập ngân sách cưới: số khách, tiệc, chi phí cố định, tiền mừng và dự phòng.'},
    {id:'hoc-phi',              name:'Học Phí Tương Lai',       cat:'Planning',        icon:'financial-sharp.svg#tuition',          href:'/utilities-tool#hoc-phi',              desc:'Ước tính học phí thực tế theo lạm phát và số tiền cần chuẩn bị từ hôm nay.'},
  ];

  // Update header count dynamically from registry
  document.getElementById('navCount').textContent = WIDGETS.length;
  document.getElementById('heroKicker').textContent = WIDGETS.length + ' MoMo Utilities';

  let activeCat   = 'all';
  let activeQuery = '';

  const pillsEl     = document.getElementById('mlcPills');
  const gridEl      = document.getElementById('mlcGrid');
  const searchInput = document.getElementById('mlcSearchInput');
  const searchClear = document.getElementById('mlcSearchClear');
  const searchMeta  = document.getElementById('mlcSearchMeta');

  function isSpriteIcon(s){ return /\.svg#[\w-]+$/i.test(s); }
  function isFileIcon(s){ return /\.(png|svg|jpg|webp)$/i.test(s); }
  function normalize(v){
    return String(v||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().trim();
  }
  function iconHtml(icon){
    if(isSpriteIcon(icon)) return `<svg class="mlc-icon" aria-hidden="true" focusable="false"><use href="${ICON_BASE}${icon}"></use></svg>`;
    if(isFileIcon(icon))   return `<img class="mlc-icon" src="${ICON_BASE}${icon}" alt="" loading="lazy">`;
    return `<div class="mlc-icon-emoji">${icon}</div>`;
  }
  function getList(){
    const q = normalize(activeQuery);
    return WIDGETS.filter(w => {
      if(activeCat !== 'all' && w.cat !== activeCat) return false;
      if(!q) return true;
      return normalize([w.name, w.desc, w.cat].join(' ')).includes(q);
    });
  }
  function updateMeta(list){
    const parts = [`${list.length}/${WIDGETS.length} utility`];
    if(activeCat !== 'all'){
      const cat = CATS.find(c => c.id === activeCat);
      if(cat) parts.push(cat.label);
    }
    if(activeQuery) parts.push(`khớp "${activeQuery}"`);
    searchMeta.textContent = list.length
      ? `Hiển thị ${parts.join(' · ')}.`
      : `Không có utility khớp "${activeQuery}"${activeCat !== 'all' ? ' trong nhóm hiện tại' : ''}.`;
    searchClear.hidden = !activeQuery;
  }
  function renderPills(){
    pillsEl.innerHTML = CATS.map(c =>
      `<button class="mlc-pill${c.id===activeCat?' active':''}" data-cat="${c.id}">
        <svg class="mlc-pill-icon" aria-hidden="true" focusable="false"><use href="${ICON_BASE}financial-sharp.svg#${c.icon}"></use></svg>${c.label}
      </button>`
    ).join('');
  }
  function renderGrid(){
    const list = getList();
    updateMeta(list);
    gridEl.innerHTML = list.length ? list.map(w =>
      `<a class="mlc-card" href="${w.href}">
        ${ARROW_SVG}
        ${iconHtml(w.icon)}
        <div class="mlc-name">${w.name}</div>
        <div class="mlc-desc">${w.desc}</div>
      </a>`
    ).join('') : `
      <div class="mlc-empty">
        <strong>Chưa có utility phù hợp</strong>
        <p>Thử đổi từ khóa hoặc chọn lại nhóm để mở rộng kết quả tìm kiếm.</p>
      </div>`;
  }

  pillsEl.addEventListener('click', e => {
    const btn = e.target.closest('.mlc-pill');
    if(!btn) return;
    activeCat = btn.dataset.cat;
    renderPills();
    renderGrid();
  });
  searchInput.addEventListener('input', e => {
    activeQuery = e.target.value.trim();
    renderGrid();
  });
  searchClear.addEventListener('click', () => {
    activeQuery = '';
    searchInput.value = '';
    searchInput.focus();
    renderGrid();
  });

  renderPills();
  renderGrid();
})();
</script>
</body>
</html>
