<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink-500:#EB2F96;--pink-50:#fdf2f8;--pink-100:#fce7f3;--pink-300:#f9a8d4;
  --gray-900:#111827;--gray-800:#1f2937;--gray-700:#374151;--gray-600:#4b5563;
  --gray-500:#6b7280;--gray-400:#9ca3af;--gray-300:#d1d5db;--gray-200:#e5e7eb;
  --gray-100:#f3f4f6;--gray-50:#f9fafb;--white:#fff;
  --amber-500:#f59e0b;--amber-50:#fffbeb;
  --purple-500:#8b5cf6;--purple-50:#f5f3ff;--purple-100:#ede9fe;
  --blue-500:#3b82f6;--blue-50:#eff6ff;
  --red-500:#ef4444;--red-50:#fef2f2;
  --green-500:#22c55e;--green-50:#f0fdf4;
  --shadow-s:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-m:0 4px 12px rgba(0,0,0,.1);
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;--r-2xl:24px;
}
body{font-family:'Be Vietnam Pro','Helvetica Neue',sans-serif;background:var(--gray-50);color:var(--gray-900);min-height:100vh}

/* NAV */
.nav{background:#fff;border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:100}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;gap:24px}
.nav-logo{display:flex;align-items:center;cursor:pointer;text-decoration:none}
.nav-logo img{height:28px}
.nav-links{display:flex;gap:4px}
.nav-link{font-family:inherit;font-size:14px;font-weight:700;color:var(--gray-600);background:none;border:none;cursor:pointer;padding:6px 12px;border-radius:var(--r-sm);transition:.15s}
.nav-link:hover{background:var(--gray-100);color:var(--gray-900)}
.nav-link.on{color:var(--pink-500)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav-search{font-size:13px;color:var(--gray-400);background:var(--gray-100);border-radius:var(--r-xl);padding:7px 14px;cursor:pointer;white-space:nowrap}
.nav-city{font-family:inherit;font-size:12px;font-weight:600;color:var(--gray-600);background:none;border:none;cursor:pointer}
.nav-login{font-family:inherit;font-size:13px;font-weight:800;color:#fff;background:var(--pink-500);border:none;border-radius:var(--r-xl);padding:7px 18px;cursor:pointer}
@media(max-width:768px){.nav-links,.nav-search{display:none}}

/* BREADCRUMB */
.breadcrumb-bar{background:#fff;border-bottom:1px solid var(--gray-100);padding:0 20px}
.breadcrumb-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:6px;height:37px;font-size:12px}
.bc-item{color:var(--gray-500);text-decoration:none;cursor:pointer}
.bc-item:hover{color:var(--pink-500)}
.bc-sep{color:var(--gray-300)}
.bc-current{color:var(--gray-900);font-weight:700}

/* HERO */
.hero{background:#fff;padding:32px 20px 0;border-bottom:1px solid var(--gray-200)}
.hero-inner{max-width:1100px;margin:0 auto;display:flex;gap:28px;align-items:flex-start}
.person-avatar{width:120px;height:120px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;color:#fff;background:var(--person-color,#5b21b6);box-shadow:var(--shadow-m)}
.person-info{flex:1}
.person-type-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;color:var(--purple-500);background:var(--purple-50);border:1px solid var(--purple-100);border-radius:20px;padding:3px 10px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em}
.person-name{font-size:28px;font-weight:900;color:var(--gray-900);line-height:1.15;margin-bottom:4px}
.person-known-as{font-size:14px;color:var(--gray-500);font-style:italic;margin-bottom:8px}
.person-meta{font-size:13px;color:var(--gray-500);margin-bottom:12px;display:flex;flex-wrap:wrap;gap:12px}
.person-meta span{display:flex;align-items:center;gap:4px}
.person-bio{font-size:14px;color:var(--gray-600);line-height:1.65;max-width:640px;margin-bottom:18px}
.person-stats{display:flex;gap:24px;flex-wrap:wrap}
.pstat{text-align:center}
.pstat-num{font-size:32px;font-weight:900;color:var(--gray-900);display:block;letter-spacing:-.02em;line-height:1}
.pstat-lbl{font-size:11px;color:var(--gray-400);font-weight:600;text-transform:uppercase;letter-spacing:.04em}

/* KNOWN FOR */
.known-for{background:#fff;border-top:1px solid var(--gray-100);padding:20px}
.kf-inner{max-width:1100px;margin:0 auto}
.kf-label{font-size:12px;font-weight:800;color:var(--gray-400);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.kf-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.kf-scroll::-webkit-scrollbar{display:none}
.kf-item{flex-shrink:0;width:90px;cursor:pointer}
.kf-poster{width:90px;height:132px;border-radius:var(--r-md);overflow:hidden;background:var(--gray-200);margin-bottom:6px;box-shadow:var(--shadow-s);transition:.2s}
.kf-poster:hover{transform:translateY(-2px);box-shadow:var(--shadow-m)}
.kf-poster img{width:100%;height:100%;object-fit:cover}
.kf-title{font-size:11px;font-weight:700;color:var(--gray-700);text-align:center;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* TABS */
.hero-tabs{display:flex;gap:0;margin-top:20px;border-top:1px solid var(--gray-100)}
.hero-tab{font-family:inherit;font-size:14px;font-weight:700;color:var(--gray-400);background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;padding:13px 20px;transition:.15s;margin-bottom:-1px;display:flex;align-items:center;gap:6px}
.hero-tab.on{color:var(--pink-500);border-bottom-color:var(--pink-500)}
.hero-tabs::-webkit-scrollbar{display:none}
@media(max-width:768px){
  .hero-tab{flex:1;padding:13px 8px;font-size:12px;justify-content:center;text-align:center}
  .hero{padding:20px 16px 0}
  .hero-inner{flex-direction:row;gap:16px;align-items:flex-start}
  .person-avatar{width:80px;height:80px;font-size:24px;flex-shrink:0}
  .person-name{font-size:20px}
  .person-known-as{font-size:12px;margin-bottom:6px}
  .person-meta{gap:6px;margin-bottom:8px;font-size:12px}
  .person-bio{font-size:13px;margin-bottom:12px;-webkit-line-clamp:3;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden}
  .person-stats{gap:12px;flex-wrap:nowrap}
  .pstat-num{font-size:26px}
  .pstat-lbl{font-size:9px;word-break:keep-all}
}
.hero-tab:hover:not(.on){color:var(--gray-700)}
.tab-count{font-size:10px;background:var(--gray-100);color:var(--gray-500);border-radius:10px;padding:1px 6px;font-weight:700}
.hero-tab.on .tab-count{background:var(--pink-50);color:var(--pink-500)}

/* CONTENT */
.content{max-width:1100px;margin:0 auto;padding:28px 20px}

/* AWARDS */
.awards-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.award-tag{font-size:12px;font-weight:700;color:var(--amber-500);background:var(--amber-50);border:1px solid #fde68a;border-radius:var(--r-sm);padding:5px 12px;display:flex;align-items:center;gap:5px}

/* FILM GRID */
.film-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}
@media(min-width:600px){.film-grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}}
.film-card{background:#fff;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-s);cursor:pointer;transition:.2s}
.film-card:hover{box-shadow:var(--shadow-m);transform:translateY(-3px)}
.film-poster{position:relative;aspect-ratio:2/3;overflow:hidden;background:var(--gray-200)}
.film-poster img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.film-card:hover .film-poster img{transform:scale(1.04)}
.film-age{position:absolute;top:8px;left:8px;font-size:10px;font-weight:900;padding:3px 7px;border-radius:5px;color:#fff}
.film-age.p{background:#16a34a}.film-age.t13{background:#ca8a04}.film-age.t16{background:#ea580c}.film-age.c18{background:#dc2626}
.film-badge{position:absolute;top:8px;right:8px;font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;background:var(--pink-500);color:#fff}
.film-body{padding:12px}
.film-title{font-size:13px;font-weight:800;color:var(--gray-900);margin-bottom:6px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.film-char-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.char-type{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;display:inline-block}
.char-type.main{color:#be185d;background:#fdf2f8}
.char-type.support{color:var(--gray-500);background:var(--gray-100)}
.char-type.villain{color:#dc2626;background:var(--red-50)}
.char-type.voice{color:#1d4ed8;background:var(--blue-50)}
.film-role{font-size:11px;font-weight:700;color:var(--purple-500);background:var(--purple-50);border-radius:4px;padding:2px 7px;display:inline-block}
.film-score-row{display:flex;align-items:center;gap:4px;margin-bottom:4px}
.film-score-star{font-size:11px}
.film-score-val{font-size:11px;font-weight:800;color:var(--amber-500)}
.film-sub{font-size:11px;color:var(--gray-400);margin-bottom:8px}
.film-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.film-tag{font-size:10px;font-weight:700;color:var(--gray-500);background:var(--gray-100);padding:2px 7px;border-radius:4px}
.film-tag.imax{background:#0f172a;color:#e2e8f0}
.film-tag.fourDx{background:#7c2d12;color:#fed7aa}
.film-cta{width:100%;font-family:inherit;font-size:12px;font-weight:800;color:var(--pink-500);background:var(--pink-50);border:1.5px solid var(--pink-100);border-radius:var(--r-sm);padding:7px;cursor:pointer;transition:.15s}
.film-cta:hover{background:var(--pink-100)}
.film-cta.soon{color:var(--gray-500);background:var(--gray-100);border-color:var(--gray-200)}
.film-cta.past{color:var(--gray-400);background:var(--gray-50);border-color:var(--gray-200);cursor:default}

/* EMPTY STATE */
.empty-state{padding:48px 0;text-align:center;color:var(--gray-400);font-size:14px}
.empty-icon{font-size:36px;margin-bottom:12px}

/* REVIEWS */
.rating-overview{background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:20px;margin-bottom:20px;display:flex;gap:28px;align-items:center;flex-wrap:wrap}
.rating-big{text-align:center;flex-shrink:0;min-width:90px}
.rating-big-num{font-size:48px;font-weight:900;color:var(--gray-900);line-height:1}
.rating-big-stars{font-size:18px;margin:4px 0}
.rating-big-count{font-size:12px;color:var(--gray-400)}
.rating-bars{flex:1;min-width:160px}
.rating-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.rbar-label{font-size:11px;font-weight:700;color:var(--gray-500);width:12px;text-align:right;flex-shrink:0}
.rbar-track{flex:1;height:6px;background:var(--gray-100);border-radius:4px;overflow:hidden}
.rbar-fill{height:100%;background:var(--amber-500);border-radius:4px;transition:.4s}
.rbar-pct{font-size:11px;color:var(--gray-400);width:30px;flex-shrink:0}
.write-review-cta{width:100%;font-family:inherit;font-size:14px;font-weight:800;color:var(--pink-500);background:var(--pink-50);border:1.5px solid var(--pink-100);border-radius:var(--r-md);padding:12px;cursor:pointer;margin-bottom:20px;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.write-review-cta:hover{background:var(--pink-100)}
.review-card{background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:16px;margin-bottom:12px}
.review-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.review-av{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff}
.review-meta{flex:1}
.review-user{font-size:13px;font-weight:800;color:var(--gray-900)}
.review-sub{font-size:11px;color:var(--gray-400);display:flex;align-items:center;gap:6px;margin-top:2px}
.review-film-ref{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--purple-500);background:var(--purple-50);border-radius:4px;padding:2px 8px;margin-bottom:8px}
.review-text{font-size:13px;color:var(--gray-700);line-height:1.6;margin-bottom:10px}
.review-foot{display:flex;align-items:center;gap:12px}
.review-like{font-size:12px;color:var(--gray-400);cursor:pointer;display:flex;align-items:center;gap:4px;background:none;border:none;font-family:inherit}
.review-like:hover{color:var(--pink-500)}
.reviews-section-title{font-size:15px;font-weight:800;color:var(--gray-900);margin-bottom:14px}

.footer{background:var(--gray-900);color:var(--gray-400);font-size:12px;padding:20px;text-align:center;margin-top:48px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gray-900);color:#fff;font-size:13px;font-weight:700;padding:10px 20px;border-radius:var(--r-xl);opacity:0;pointer-events:none;transition:.25s;white-space:nowrap;z-index:9999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MOBILE BOTTOM NAV */
.mobile-bnav{display:none}
@media(max-width:768px){
  .mobile-bnav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:#fff;border-top:1px solid var(--gray-200);
    padding:6px 0 env(safe-area-inset-bottom,8px);
    z-index:200;box-shadow:0 -1px 8px rgba(0,0,0,.08)
  }
  .mbn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
    text-decoration:none;color:var(--gray-400);font-size:10px;font-weight:700;padding:4px 0;
    transition:.15s}
  .mbn-item.on{color:var(--pink-500)}
  .mbn-item svg{display:block}
  body{padding-bottom:72px}
  .nav-lab-link{display:none!important}
  .breadcrumb-bar{display:none}
}
</style>

function icon(name, size=16) {
  const key = name.split('-').map(s=>s.charAt(0).toUpperCase()+s.slice(1)).join('');
  if (!window.lucide || !lucide[key]) return '';
  return lucide.createElement(lucide[key], {width:size,height:size,'stroke-width':2,style:'display:inline-block;vertical-align:middle;flex-shrink:0'}).outerHTML;
}

const slug = location.pathname.replace(/\/$/, '').split('/').pop();
const person = ACTORS[slug] || ACTORS['tran-thanh'];
let activeTab = 'now';

function init(){
  const typeLabel = person.type==='director' ? 'Đạo diễn' : person.type==='both' ? 'Diễn viên & Đạo diễn' : 'Diễn viên';
  const typeIconName = person.type==='director' ? 'clapperboard' : 'star';
  document.querySelector('.person-type-badge').innerHTML = `${icon(typeIconName,12)} ${typeLabel}`;
  document.getElementById('pageTitle').textContent = `${person.name} - ${typeLabel} - MoMo Cinema`;
  document.getElementById('bcName').textContent = person.name;
  document.getElementById('personName').textContent = person.name;
  document.getElementById('personBio').textContent = person.bio;

  const kaEl = document.getElementById('personKnownAs');
  if(person.knownAs){ kaEl.textContent = person.knownAs; } else { kaEl.style.display='none'; }

  const av = document.getElementById('personAvatar');
  if(person.photo){
    av.innerHTML = `<img src="${person.photo}" alt="${person.name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    av.style.background = 'var(--gray-200)';
  } else {
    av.textContent = person.initials;
    av.style.setProperty('--person-color', person.color);
  }

  document.getElementById('personMeta').innerHTML = [
    `<span>${icon('globe',13)} ${person.nationality}</span>`,
    `<span>${icon('cake',13)} Sinh ${person.born}</span>`,
    `<span>${icon('film',13)} Hoạt động: ${person.years}</span>`,
  ].join('');

  document.getElementById('personStats').innerHTML = person.stats.slice(0,2).map(s=>`
    <div class="pstat">
      <span class="pstat-num">${s.num}</span>
      <span class="pstat-lbl">${s.lbl}</span>
    </div>`).join('');

  document.getElementById('awardsRow').innerHTML = person.awards.map(a=>`<span class="award-tag">${a}</span>`).join('');

  if(person.knownFor && person.knownFor.length){
    document.getElementById('knownForSection').style.display = '';
    document.getElementById('knownForScroll').innerHTML = person.knownFor.map(f=>`
      <div class="kf-item">
        <div class="kf-poster"><img src="${f.img}" alt="${f.title}" onerror="this.style.display='none'"></div>
        <div class="kf-title">${f.title}</div>
      </div>`).join('');
  }

  document.getElementById('countNow').textContent = (person.now||[]).length;
  document.getElementById('countSoon').textContent = (person.soon||[]).length;
  document.getElementById('countPast').textContent = (person.past||[]).length;
  document.getElementById('countReviews').textContent = person.reviewCount ? (person.reviewCount >= 1000 ? (person.reviewCount/1000).toFixed(1)+'k' : person.reviewCount) : '';

  renderFilms();
}

function showTab(tab, el){
  activeTab = tab;
  document.querySelectorAll('.hero-tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  const awardRow = document.getElementById('awardsRow');
  awardRow.style.display = tab === 'reviews' ? 'none' : '';
  tab === 'reviews' ? renderReviews() : renderFilms();
}

function renderFilms(){
  const films = person[activeTab] || [];
  const panel = document.getElementById('filmPanel');
  if(!films.length){
    panel.innerHTML = `<div class="empty-state"><div class="empty-icon">🎬</div>Chưa có phim trong mục này</div>`;
    return;
  }
  const isSoon = activeTab === 'soon';
  const isPast = activeTab === 'past';
  panel.innerHTML = `<div class="film-grid">${films.map(f=>{
    const ageCls = f.age.toLowerCase().replace(' ','');
    const tags = (f.tags||[]).map(t=>`<span class="film-tag ${t==='IMAX'?'imax':t==='4DX'?'fourDx':''}">${t}</span>`).join('');
    const ctaClass = isSoon?'soon':isPast?'past':'';
    const ctaText = isSoon?'Đặt vé trước →':isPast?'Xem lại':'Đặt vé →';
    const charBadge = f.charType ? `<span class="char-type ${f.charType}">${f.charTypeLabel}</span>` : '';
    const scoreBadge = f.momoScore ? `<div class="film-score-row"><span class="film-score-star">⭐</span><span class="film-score-val">${f.momoScore}</span></div>` : '';
    return `<div class="film-card" onclick="${isPast?`toast('${f.title} đã kết thúc lịch chiếu')`:`window.location.href='/cinema/${f.id}'`}">
      <div class="film-poster">
        <img src="${f.img}" alt="${f.title}" loading="lazy" onerror="this.style.background='var(--gray-200)'">
        <span class="film-age ${ageCls}">${f.age}</span>
        ${!isPast&&!isSoon?'<span class="film-badge">Đang chiếu</span>':''}
        ${isSoon?'<span class="film-badge" style="background:#6366f1">Sắp chiếu</span>':''}
      </div>
      <div class="film-body">
        <div class="film-title">${f.title}</div>
        <div class="film-char-row">${charBadge}${f.role?`<span class="film-role">${f.role}</span>`:''}</div>
        ${scoreBadge}
        <div class="film-sub">${f.genre} · ${f.dur}</div>
        <div class="film-tags">${tags}</div>
        <button class="film-cta ${ctaClass}" onclick="event.stopPropagation();${isPast?`toast('${f.title} đã kết thúc lịch chiếu')`:`window.location.href='/cinema/${f.id}'`}">${ctaText}</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderReviews(){
  const panel = document.getElementById('filmPanel');
  const score = person.score || 0;
  const count = person.reviewCount || 0;
  const breakdown = person.ratingBreakdown || [0,0,0,0,0];
  const reviews = person.reviews || [];

  const starsHtml = arr => {
    const n = Math.round(arr);
    return '★'.repeat(n) + '☆'.repeat(5-n);
  };

  const barsHtml = breakdown.map((pct,i)=>`
    <div class="rating-bar-row">
      <span class="rbar-label">${5-i}</span>
      <div class="rbar-track"><div class="rbar-fill" style="width:${pct}%"></div></div>
      <span class="rbar-pct">${pct}%</span>
    </div>`).join('');

  const reviewsHtml = reviews.map(r=>`
    <div class="review-card">
      <div class="review-head">
        <div class="review-av" style="background:${r.color}">${r.initials}</div>
        <div class="review-meta">
          <div class="review-user">${r.user}</div>
          <div class="review-sub">
            <span style="color:var(--amber-500);font-size:12px">${starsHtml(r.rating)}</span>
            <span>${r.date}</span>
          </div>
        </div>
      </div>
      ${r.film?`<div class="review-film-ref">🎬 ${r.film}</div>`:''}
      <div class="review-text">${r.text}</div>
      <div class="review-foot">
        <button class="review-like" onclick="this.innerHTML='❤️ '+parseInt(this.textContent.replace(/\D/g,''))+1">👍 ${r.likes}</button>
        <button class="review-like" onclick="toast('Đã báo cáo đánh giá')">⚑ Báo cáo</button>
      </div>
    </div>`).join('');

  panel.innerHTML = `
    <div class="rating-overview">
      <div class="rating-big">
        <div class="rating-big-num">${score.toFixed(1)}</div>
        <div class="rating-big-stars" style="color:var(--amber-500)">${starsHtml(score)}</div>
        <div class="rating-big-count">${count.toLocaleString()} đánh giá</div>
      </div>
      <div class="rating-bars">${barsHtml}</div>
    </div>
    <button class="write-review-cta" onclick="toast('Tính năng viết đánh giá sẽ ra mắt sớm!')">✏️ Viết đánh giá về ${person.name}</button>
    <div class="reviews-section-title">Đánh giá từ khán giả</div>
    ${reviewsHtml}`;
}

let toastTimer;
function toast(msg){ const el=document.getElementById('toastEl'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2200); }

init();
if (window.lucide) lucide.createIcons();
</script>
