];

function nextEntityId(prefix) {
  entitySequence += 1;
  return `${prefix}-${Date.now().toString(36)}-${entitySequence}`;
}

function createEmptyAdContent(index = 1) {
  return {
    id:nextEntityId('ad'), adName:`Ads Content ${index}`,
    projectId:'', placementId:'', format:'', adType:'universal',
    creativeHeadline:'', creativeBody:'Ưu đãi độc quyền dành riêng cho bạn',
    ctaLabel:'Tìm hiểu ngay', ctaUrl:'', urlPatterns:[], cmsTags:[],
  };
}

function getActiveGroup() {
  return builderState.groups?.find(group => group.id === builderState.selectedGroupId) || builderState.groups?.[0] || null;
}

function getActiveAd() {
  const group = getActiveGroup();
  return group?.ads.find(ad => ad.id === builderState.selectedAdId) || null;
}

function persistActiveEntities() {
  const group = getActiveGroup();
  if (group) {
    group.name = builderState.groupName || '';
    group.startDate = builderState.startDate;
    group.endDate = builderState.endDate;
  }
  const ad = getActiveAd();
  if (ad) {
    AD_FIELD_KEYS.forEach(key => {
      ad[key] = Array.isArray(builderState[key]) ? [...builderState[key]] : builderState[key];
    });
  }
}

function loadAdIntoEditor(ad) {
  const fallback = {
    adName:'', projectId:'', placementId:'', format:'', adType:'universal',
    creativeHeadline:'', creativeBody:'Ưu đãi độc quyền dành riêng cho bạn',
    ctaLabel:'Tìm hiểu ngay', ctaUrl:'', urlPatterns:[], cmsTags:[]
  };
  AD_FIELD_KEYS.forEach(key => {
    const value = ad ? ad[key] : fallback[key];
    builderState[key] = Array.isArray(value) ? [...value] : value;
  });
}

function ensureFirstAdContent() {
  const group = getActiveGroup();
  if (!group) return null;
  if (!group.ads.length) group.ads.push(createEmptyAdContent(1));
  if (!builderState.selectedAdId || !group.ads.some(ad => ad.id === builderState.selectedAdId)) {
    builderState.selectedAdId = group.ads[0].id;
  }
  const ad = getActiveAd();
  loadAdIntoEditor(ad);
  return ad;
}

function updateGroupName(value) {
  builderState.groupName = value;
  const group = getActiveGroup();
  if (group) group.name = value;
  const label = document.getElementById('treeGroupName');
  if (label) label.textContent = value || 'Nhóm quảng cáo chưa đặt tên';
}

function updateCampaignName(value) {
  builderState.name = value;
  const label = document.getElementById('treeCampaignName');
  if (label) label.textContent = value || 'Chiến dịch chưa đặt tên';
}

function updateActiveAdName(value) {
  builderState.adName = value;
  const ad = getActiveAd();
  if (ad) ad.adName = value;
  const label = document.getElementById(`treeAdName-${builderState.selectedAdId}`);
  if (label) label.textContent = value || 'Ads Content chưa đặt tên';
}

function selectAdContent(id) {
  persistActiveEntities();
  const group = getActiveGroup();
  const ad = group?.ads.find(item => item.id === id);
  if (!ad) return;
  builderState.selectedAdId = id;
  loadAdIntoEditor(ad);
  builderStep = 2;
  renderBuilder();
}

  persistActiveEntities();
  const group = getActiveGroup();
  if (!group) return;
  const ad = createEmptyAdContent(group.ads.length + 1);
  group.ads.push(ad);
  builderState.selectedAdId = ad.id;
  loadAdIntoEditor(ad);
  builderStep = 2;
  renderBuilder();
}

function duplicateAdContent(id) {
  persistActiveEntities();
  const group = getActiveGroup();
  const source = group?.ads.find(ad => ad.id === id);
  if (!group || !source) return;
  const clone = {
    ...source,
    id:nextEntityId('ad'),
    adName:`${source.adName || 'Ads Content'} - Bản sao`,
    urlPatterns:[...(source.urlPatterns || [])],
    cmsTags:[...(source.cmsTags || [])],
  };
  group.ads.push(clone);
  builderState.selectedAdId = clone.id;
  loadAdIntoEditor(clone);
  builderStep = 2;
  renderBuilder();
}

function deleteAdContent(id) {
  persistActiveEntities();
  const group = getActiveGroup();
  if (!group) return;
  group.ads = group.ads.filter(ad => ad.id !== id);
  if (builderState.selectedAdId === id) {
    builderState.selectedAdId = group.ads[0]?.id || null;
    loadAdIntoEditor(group.ads[0] || null);
  }
  builderStep = 2;
  renderBuilder();
}

function showMod(mod) {
  currentMod = mod;
  document.querySelectorAll('.mod-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mbtn-'+mod).classList.add('active');
  const nav = document.getElementById('stepNav');

  }
  syncGlobals();
}

function renderBuilder() {
  persistActiveEntities();
  const wrap = document.getElementById('modContent');
  const meta = STEP_LABELS[builderStep] || STEP_LABELS[0];
  wrap.innerHTML = `
    <div class="builder-layout">
      <aside class="wizard-sidebar">
        <div class="wizard-sidebar-title">Tiến trình</div>
        <div class="wizard-track">
          ${STEP_LABELS.map((s,i) => `
            <button type="button" class="wt-step${i===builderStep?' active':i<builderStep?' done':''}" id="wts-${i}" onclick="jumpStep(${i})">
              <div class="wt-num">${String(i+1).padStart(2,'0')}</div>
              <div class="wt-step-body">
                <div class="wt-name">${s.name}</div>
                <div class="wt-sub">${s.sub}</div>
              </div>

          `).join('')}
        </div>
        ${builderStep >= 1 ? renderEntityTree() : ''}

      <div class="builder-main editorial${builderStep===3?' preview-wide':''}">
        <div class="step-eyebrow">${meta.eyebrow}</div>
        <h1 class="step-title">${meta.title}</h1>

        <div class="error-bar" id="errorBar" role="alert" aria-live="assertive"></div>
        <div id="stepBody"></div>
      </div>
    </div>
  `;
  renderStep(builderStep);
  updateBuilderNav();
  syncGlobals();
}

function jumpStep(target) {
  /* allow jumping back to any done step, but not forward without validation */
  if (target < builderStep) { builderStep = target; renderBuilder(); }
}

/* ── BUILDER FLOW ─────────────────────────────────────────────────────── */
function renderStep(n) {
  const sb = document.getElementById('stepBody');
  if (!sb) return;
  const steps = [buildCampaignStepHtml, buildAdsGroupStepHtml, buildAdsContentStepHtml, buildPreviewStepHtml, buildReviewPublishStepHtml];
  const html = steps[n] ? steps[n]() : '';
  sb.innerHTML = html || `<div class="builder-note">Không render được nội dung bước này. Vui lòng reload trang.</div>`;
  setTimeout(() => {
    document.querySelectorAll('.obj-btn').forEach(b => b.classList.toggle('active', b.dataset.obj === builderState.objective));
    updateUtm();
    if (builderStep === 3) mountPreviewIntoStep4();
  }, 10);
}

function mountPreviewIntoStep4() {
  const mount = document.getElementById('previewMount');
  if (!mount) return;
  if (!builderState.format) {
    mount.innerHTML = '<div style="padding:60px 20px;text-align:center;color:var(--gray-500);font-size:13px">Chưa có Format/Project để render preview. Quay lại bước Ads Content để chọn.</div>';
    return;
  }
  /* Generate ad mockup directly into surface scroll */
  const mockCamp = {
    name: builderState.name || 'Draft campaign',
    format: builderState.format,
    division: builderState.division,
    ctaUrl: builderState.ctaUrl || 'momo.vn',
    contentTitle: isEditableContentFormat(builderState.format) ? builderState.adName : getWidgetSourceName(builderState.format),
    creativeHeadline: builderState.creativeHeadline,
    creativeBody: builderState.creativeBody,
    ctaLabel: builderState.ctaLabel,
    adType: builderState.adType,
    projectId: builderState.projectId,
  };
  const pageCtx = slotToPage(getSelectedPlacement());
  const pageHtml = buildPageMockup(pageCtx);
  const adHtml   = buildAdOverlay(builderState.format, mockCamp);
  mount.innerHTML = `<div class="pm-scope pm-${device}" style="position:relative;min-height:520px">${pageHtml}${adHtml}</div>`;
}

/* Slot card V2 — for slot-first picker (format chips embedded) */
function slotCardV2(slot, isSelected, currentFormat, isUsedBySibling = false) {
  const isOccupied = slot.status !== 'empty' || isUsedBySibling;
  const fmts = slot.formats || [];
  const fmtChips = fmts.map(fid => {
    const f = FORMAT_DEFS[fid];
    if (!f) return '';
    const isActive = isSelected && currentFormat === fid;
    return `<span class="slot-fmt-chip${isActive?' active':''}">${f.icon} ${f.name}</span>`;
  }).join('');
  const clickHandler = isOccupied ? '' : `onclick="pickSlot('${slot.id}')"`;
  return `<button type="button" class="slot-card-v2${isSelected?' selected':''}${isOccupied?' occupied':''}" ${clickHandler} ${isOccupied?'disabled aria-disabled="true"':''} aria-pressed="${isSelected}">
    <div class="slot-card-v2-main">
      <div class="slot-card-v2-name">${slot.name}</div>
      <div class="slot-card-v2-ui">${slot.ui}</div>
      <div class="slot-card-v2-fmts">${fmtChips}</div>
    </div>
    <div class="slot-card-v2-stats">
      <div class="slot-stat"><div class="slot-stat-k">Lượt hiển thị</div><div class="slot-stat-v">${slot.impressions}</div></div>
      <div class="slot-stat"><div class="slot-stat-k">CTR</div><div class="slot-stat-v">${slot.ctr}</div></div>
      <span class="slot-status status-${isUsedBySibling?'reserved':slot.status}">${isUsedBySibling ? 'Đã dùng' : slot.status === 'empty' ? 'Có thể chọn' : slot.status === 'reserved' ? 'Đặt giữ' : 'Đang chạy'}</span>
    </div>
  </button>`;
}

function pickSlot(slotId) {
  const slot = placements.find(p => p.id === slotId);
  if (!slot) return;
  builderState.placementId = slotId;
  builderState.format = slot.formats.length === 1 ? slot.formats[0] : '';
  builderState.adType = builderState.format ? (FORMAT_DEFS[builderState.format]?.type || 'universal') : 'universal';
  if (!builderState.projectId && slot.projectIds.length) {
    builderState.projectId = slot.projectIds[0];
  }
  persistActiveEntities();
  renderBuilder();
}

function chooseFormatForActiveAd(formatId) {
  const slot = getSelectedPlacement();
  if (!slot || !slot.formats.includes(formatId)) return;
  builderState.format = formatId;
  builderState.adType = FORMAT_DEFS[formatId]?.type || 'universal';
  persistActiveEntities();
  renderBuilder();
}

/* ── STEP 4: Xem trước — context summary + device toggle + frame ── */

  return `

      <div>
        <div class="k-label" style="margin-bottom:8px">Thiết bị</div>
        <div class="device-tabs">

      <div>
        <div class="k-label" style="margin-bottom:8px">Vị trí hiển thị</div>

          ${slots.map(s => `
            <button type="button" class="placement-nav-card${activeSlot && activeSlot.id === s.id ? ' active' : ''}" onclick="builderState.placementId='${s.id}';renderBuilder()">
              <span class="placement-nav-icon">${surfaceIcon(s)}</span>
              <span style="flex:1;min-width:0">
                <span class="placement-nav-label">${s.name}</span>
                <span class="placement-nav-desc">${s.ui || s.surface}</span>
              </span>
            </button>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="preview-stage">
      <div class="preview-stage-label">${activeSlot ? activeSlot.name : format.name} · ${device === 'desktop' ? 'Desktop' : 'Mobile'}</div>
      <div class="preview-frame ${device}">

          </div>
        ` : `<div class="phone-notch"><div class="phone-notch-bar"></div></div>`}
        <div class="surface-scroll" id="previewMount" style="min-height:520px"></div>
      </div>
    </div>
  </div>
  `;
}

function slotToPage(slot) {
  if (!slot) return previewPage;
  const sf = (slot.surface || '') + (slot.urlScope || '');
  if (/blog|article/i.test(sf)) return 'blog';
  if (slot.urlScope === '/') return 'home';
  return 'hub';
}

/* ── STEP 5: Xem lại & xuất bản — review cards ──────────────────── */
function buildReviewPublishStepHtml() {
  persistActiveEntities();
  const group = getActiveGroup();

function selectBuilderProject(id) {
  const proj = PROJECT_REGISTRY.find(p => p.id === id);
  builderState.projectId = id;
  builderState.placementId = '';
  builderState.format = '';
  builderState.adType = 'universal';
  if (!proj) {
    builderState.ctaUrl = '';
    builderState.cmsTags = [];
    builderState.urlPatterns = [];
    persistActiveEntities();
    renderBuilder();
    syncGlobals();
    return;
  }
  builderState.ctaUrl = proj.url;
  builderState.cmsTags = [...proj.cmsTags];
  builderState.urlPatterns = [...proj.urlPatterns];
  const ctaEl = document.getElementById('ctaUrl');
  if (ctaEl) ctaEl.value = proj.url;
  previewPage = proj.page;
  persistActiveEntities();
  renderBuilder();
  syncGlobals();
}

function selectPlacement(id) {
  const slot = placements.find(p => p.id === id);
  if (!slot) return;
  if (slot.status !== 'empty') {
    showError(`Slot ${slot.name} không còn khả dụng`);
    return;
  }
  builderState.placementId = id;
  if (!slot.formats.includes(builderState.format)) builderState.format = slot.formats[0];
  renderBuilder();
  syncGlobals();
}

function setAdType(t) {
  if (!AD_TYPE_DEFS[t]) return;
  builderState.adType = t;
  const currentFmtType = FORMAT_DEFS[builderState.format]?.type;
  if (currentFmtType !== t) {
    const project = getBuilderProject();
    const candidates = Object.entries(FORMAT_DEFS).filter(([,v]) => v.type === t).map(([k]) => k);
    const validFormat = project
      ? (candidates.find(k => getFormatSlotCount(k, project) > 0) || candidates[0])
      : candidates[0];
    if (validFormat) {
      builderState.format = validFormat;
      if (builderState.placementId && !allowedFormatsForSelectedSlot().includes(validFormat)) {
        builderState.placementId = '';
      }
    }
  }
  renderStep(builderStep);
  if (builderStep >= 1) updateAdsPreview();
  const project = getBuilderProject();
  if (project && FORMAT_DEFS[builderState.format] && getFormatSlotCount(builderState.format, project) === 0) {
    showToast(`⚠ ${project.name} không có inventory cho loại ${AD_TYPE_DEFS[t].name}`, 't-pk');
  }
  syncGlobals();
}

function setFormat(f) {
  const project = getBuilderProject();
  if (project && getFormatSlotCount(f, project) === 0) {
    showError(`Format ${FORMAT_DEFS[f].name} chưa có slot trong Project ${project.name}`);
    return;
  }
  builderState.format = f;
  if (!isEditableContentFormat(f)) {
    builderState.ctaUrl = '';
  } else if (!builderState.adName) {
    builderState.adName = getDefaultContentTitle(f, project);
  }
  if (builderState.placementId && !allowedFormatsForSelectedSlot().includes(f)) {
    builderState.placementId = '';
  }
  document.querySelectorAll('.fmt-card').forEach(el => el.classList.toggle('sel', el.dataset.f === f));
  document.querySelectorAll('.fg-card').forEach(el => el.classList.toggle('sel', el.dataset.f === f));
  if (builderStep >= 1) updateAdsPreview();
  syncGlobals();
}

/* ── NAV ───────────────────────────────────────────────────────────────── */
function updateBuilderNav() {
  const prev = document.getElementById('btnPrev');
  const next = document.getElementById('btnNext');
  const ind  = document.getElementById('stepIndicator');
  if (!prev) return;
  prev.disabled = builderStep === 0;
  if (builderStep === STEP_LABELS.length - 1) {
    next.textContent = 'Gửi duyệt chiến dịch';
    next.className = 'btn btn-green';
    next.onclick = saveCampaign;
  } else {
    next.textContent = `Tiếp tục → ${STEP_LABELS[builderStep + 1].name}`;
    next.className = 'btn btn-pk';
    next.onclick = nextStep;
  }
  ind.textContent = `Bước ${builderStep + 1} / ${STEP_LABELS.length}`;
}

function nextStep() {
  persistActiveEntities();
  const err = document.getElementById('errorBar');
  if (err) { err.classList.remove('show'); err.textContent = ''; }
  const validation = validateStep(builderStep);
  if (!validation.ok) {
    if (validation.adId && validation.adId !== builderState.selectedAdId) {
      const ad = getActiveGroup()?.ads.find(item => item.id === validation.adId);
      if (ad) {
        builderState.selectedAdId = ad.id;
        loadAdIntoEditor(ad);
        renderBuilder();
      }
    }
    showError(validation.msg);
    return;
  }
  if (builderStep === 1) ensureFirstAdContent();
  if (builderStep < STEP_LABELS.length - 1) { builderStep++; renderBuilder(); syncGlobals(); }
}
function prevStep() {
  if (builderStep > 0) { builderStep--; renderBuilder(); syncGlobals(); }
}
function showError(msg) {
  const bar = document.getElementById('errorBar');
  if (bar) { bar.textContent = '⚠ ' + msg; bar.classList.add('show'); }
}

function saveCampaign() {
  persistActiveEntities();
  const validation = validateStep(2);
  if (!validation.ok) {
    if (validation.adId) {
      const ad = getActiveGroup()?.ads.find(item => item.id === validation.adId);
      if (ad) {
        builderState.selectedAdId = ad.id;
        loadAdIntoEditor(ad);
      }
    }
    builderStep = 2;
    renderBuilder();
    showError(validation.msg);
    return;
  }
  const group = getActiveGroup();
  const ads = group?.ads || [];
  const staleAd = ads.find(ad => {
    const slot = placements.find(item => item.id === ad.placementId);
    return !slot || slot.status !== 'empty';
  });
  if (staleAd) {
    const staleSlot = placements.find(slot => slot.id === staleAd.placementId);
    builderStep = 2;
    renderBuilder();
    showError(`Slot ${staleSlot?.name || staleAd.adName} không còn khả dụng. Vui lòng chọn lại.`);
    return;
  }
  const id = 'c' + Date.now();
  const status = 'pending';
  const firstAd = ads[0];
  campaigns.push({
    id, name: builderState.name,
    division: builderState.division, format: firstAd?.format || '',
    urlPatterns: [...(firstAd?.urlPatterns || [])], cmsTags: [...(firstAd?.cmsTags || [])],
    ctaUrl: firstAd?.ctaUrl || '',
    active:false, isRetargeting:false,
    status, owner: builderState.owner, objective: builderState.objective,
    placementId:firstAd?.placementId || '',
    audience:'web-all', frequencyCap:builderState.frequencyCap, suppression:'none',
    contentTitle:firstAd?.adName || '',
    creativeHeadline:firstAd?.creativeHeadline || '',
    creativeBody:firstAd?.creativeBody || '',
    ctaLabel:firstAd?.ctaLabel || '',
    contentMode:firstAd?.format ? getContentModeLabel(firstAd.format) : '',
    adType:firstAd?.adType || 'universal',
    projectId:firstAd?.projectId || '',
    groups:builderState.groups.map(item => ({
      ...item,
      ads:item.ads.map(ad => ({...ad,urlPatterns:[...(ad.urlPatterns||[])],cmsTags:[...(ad.cmsTags||[])]}))
    }))
  });
  const reservedSlotIds = new Set(ads.map(ad => ad.placementId));
  placements = placements.map(slot => reservedSlotIds.has(slot.id) ? {...slot,status:'reserved',campaignId:id} : slot);
  builderState = getDefaultBuilderState();
  builderStep = 0;
  syncGlobals();
  showToast('✓ Campaign đã gửi duyệt và các Slot đã được giữ', 't-green');
  updateMetrics();
  renderBuilder();
}

    adName:'', projectId:'', placementId:'', format:'', adType:'universal',
    creativeHeadline:'', creativeBody:'Ưu đãi độc quyền dành riêng cho bạn', ctaLabel:'Tìm hiểu ngay',
    urlPatterns:[], cmsTags:[], ctaUrl:'',
    audience:'web-all', frequencyCap:'1_per_day', suppression:'none',
    isRetargeting:false, requiresApproval:true
  };
}

function getBuilderProject() {
  return PROJECT_REGISTRY.find(p => p.id === builderState.projectId);
}

function getSelectedPlacement() {
  return placements.find(p => p.id === builderState.placementId);
}

function scopeMatchesProject(slot, project) {
  if (!project) return false;
  if (slot.projectIds?.length) return slot.projectIds.includes(project.id);
  if (slot.urlScope === '/' && project.page === 'home') return true;
  if (slot.urlScope.includes('blog') && project.page === 'blog') return true;
  if (slot.urlScope.includes('vay-nhanh') && project.id === 'vay-nhanh') return true;
  if (slot.urlScope.includes('bao-hiem') && ['bao-hiem','bhyt'].includes(project.id)) return true;
  if (slot.urlScope.includes('merchant') && ['bnpl'].includes(project.id)) return true;
  return project.urlPatterns.some(pattern => {
    const cleanPattern = pattern.replace('*','');
    const cleanScope = slot.urlScope.replace('*','');
    return cleanPattern && cleanScope && (cleanPattern.startsWith(cleanScope) || cleanScope.startsWith(cleanPattern));
  });
}

function eligiblePlacements() {
  const project = getBuilderProject();
  if (!project) return [];
  return placements.filter(p => p.status === 'empty' && scopeMatchesProject(p, project) && p.formats.includes(builderState.format));
}

function getFormatSlotCount(format, project = getBuilderProject()) {
  if (!project) return 0;
  return placements.filter(p => p.status === 'empty' && scopeMatchesProject(p, project) && p.formats.includes(format)).length;
}

function getAvailableFormatsForProject(project = getBuilderProject()) {
  if (!project) return Object.keys(FORMAT_DEFS);
  return Object.keys(FORMAT_DEFS).filter(format => getFormatSlotCount(format, project) > 0);
}

function allowedFormatsForSelectedSlot() {
  const slot = getSelectedPlacement();
  return slot ? slot.formats : Object.keys(FORMAT_DEFS);
}

function slotStatusLabel(status) {
  if (status === 'empty') return 'Trống';
  if (status === 'reserved') return 'Đang giữ';
  if (status === 'occupied') return 'Đang chạy';
  return 'Blocked';
}

function slotCard(slot) {

  const selected = builderState.placementId === slot.id;
  return `<div class="slot-card${selected?' sel':''}" onclick="selectPlacement('${slot.id}')">
    <span class="slot-status ${slot.status}"></span>
    <div style="flex:1;min-width:0">
      <div class="slot-name">${slot.name}</div>
      <div class="slot-meta">${slot.surface} · ${slot.ui}<br>${slot.urlScope} · ${slotStatusLabel(slot.status)}${campaign ? ' bởi ' + campaign.name : ''}</div>
      <div class="slot-tags">${slot.formats.map(f=>`<span class="mini-chip">${FORMAT_DEFS[f].icon} ${FORMAT_DEFS[f].name}</span>`).join('')}</div>
      <div class="slot-est">
        <div class="slot-est-item"><div class="slot-est-key">Impression</div><div class="slot-est-val">${slot.impressions}</div></div>
        <div class="slot-est-item"><div class="slot-est-key">~CTR</div><div class="slot-est-val">${slot.ctr}</div></div>
      </div>
    </div>
  </div>`;
}

function validateStep(step) {
  // Step 0: Chiến dịch — metadata (objective + name + division)
  if (step === 0) {
    if (!builderState.name.trim()) return {ok:false,msg:'Vui lòng nhập tên chiến dịch'};
    if (!builderState.division) return {ok:false,msg:'Vui lòng chọn Division phụ trách'};
  }
  // Step 1: Nhóm QC chỉ giữ tên và lịch. Web không định danh user để targeting.
  if (step === 1) {
    if (!builderState.groupName?.trim()) return {ok:false,msg:'Vui lòng nhập tên Nhóm Quảng cáo'};
    if (builderState.endDate < builderState.startDate) return {ok:false,msg:'Ngày kết thúc phải sau ngày bắt đầu'};
  }
  // Step 2: kiểm tra toàn bộ Ads Content trong Group.
  if (step === 2) {
    persistActiveEntities();
    const ads = getActiveGroup()?.ads || [];
    if (!ads.length) return {ok:false,msg:'Nhóm cần ít nhất một Ads Content'};
    const usedSlots = new Set();
    for (const ad of ads) {
      const label = ad.adName?.trim() || 'Ads Content chưa đặt tên';
      const project = PROJECT_REGISTRY.find(item => item.id === ad.projectId);
      const slot = placements.find(item => item.id === ad.placementId);
      if (!ad.adName?.trim()) return {ok:false,adId:ad.id,msg:'Vui lòng nhập tên Ads Content'};
      if (!project) return {ok:false,adId:ad.id,msg:`${label}: chưa chọn Project`};
      if (!slot) return {ok:false,adId:ad.id,msg:`${label}: chưa chọn Slot inventory`};
      if (usedSlots.has(ad.placementId)) return {ok:false,adId:ad.id,msg:`${label}: Slot đã được một Ads Content khác trong Nhóm sử dụng`};
      usedSlots.add(ad.placementId);
      if (!ad.format) return {ok:false,adId:ad.id,msg:`${label}: hãy xác nhận Format`};
      if (!slot.formats.includes(ad.format)) return {ok:false,adId:ad.id,msg:`${label}: Format không khớp Slot`};
      if (isEditableContentFormat(ad.format)) {
        if (!ad.creativeHeadline?.trim()) return {ok:false,adId:ad.id,msg:`${label}: thiếu tiêu đề ads`};
        if (!ad.ctaUrl?.trim()) return {ok:false,adId:ad.id,msg:`${label}: thiếu URL đích`};
        if (!ad.ctaLabel?.trim()) return {ok:false,adId:ad.id,msg:`${label}: thiếu CTA`};
      }
    }
  }
  // Step 3: Xem trước — no validation, just preview
  // Step 4: Xem lại & Xuất bản — readiness gate (validation handled in saveCampaign)
  return {ok:true,msg:''};
}

function getBuilderCandidate() {
  return {
    id:'draft',
    name:builderState.name || 'Draft campaign',
    division:builderState.division,
    format:builderState.format,
    urlPatterns:[...builderState.urlPatterns],
    cmsTags:[...builderState.cmsTags],
    ctaUrl:builderState.ctaUrl,
    active:true,
    isRetargeting:builderState.isRetargeting,
    contentTitle:isEditableContentFormat(builderState.format) ? builderState.adName : getWidgetSourceName(builderState.format),
    creativeBody:builderState.creativeBody,
    ctaLabel:builderState.ctaLabel,
    contentMode:getContentModeLabel(builderState.format),
  };
}

function getConflictPreview() {
  const project = getBuilderProject();
  if (!project) return {winner:null, results:[]};
  const url = project.urlPatterns[0]?.replace('*','') || '/';
  const tags = [...builderState.cmsTags];
  const candidate = getBuilderCandidate();
  const activeCampaigns = campaigns.filter(c => c.active || c.status === 'pending');
  const matches = [...activeCampaigns, candidate]
    .filter(c => c.urlPatterns.some(p => matchUrl(p, url)))
    .map(c => ({...c, ...calcScore(c, url, tags)}))
    .sort((a,b) => b.score - a.score);
  let popupUsed = false;
  const results = matches.map(c => {
    let blocked = false;
    if (c.format === 'popup') {
      if (popupUsed) blocked = true;
      else popupUsed = true;
    }
    return {...c, blocked};
  });
  return {winner:results.find(r => !r.blocked), results};
}

function getReadiness() {
  const blockers = [];
  const warnings = [];
  const passes = [];
  const project = getBuilderProject();
  const slot = getSelectedPlacement();
  if (!builderState.name.trim()) blockers.push('Thiếu tên campaign');
  else passes.push('Campaign đã có tên');
  if (!builderState.owner.trim()) blockers.push('Thiếu owner');
  else passes.push('Đã có owner phụ trách');
  if (!project) blockers.push('Chưa chọn Project');
  else passes.push('Đã map với Project');
  if (!slot) blockers.push('Chưa chọn inventory slot');
  else {
    passes.push('Đã chọn inventory slot');
    if (slot.status !== 'empty') blockers.push('Inventory slot không còn khả dụng');
  }
  if (isEditableContentFormat(builderState.format)) {
    if (!builderState.adName.trim()) blockers.push('Thiếu content title');
    else passes.push('Ads content đã có tên');
    if (!builderState.ctaUrl.trim()) blockers.push('Thiếu CTA URL');
    else passes.push('CTA URL đã sẵn sàng');
  } else {
    passes.push(`Content locked by ${getWidgetSourceName(builderState.format)}`);
  }
  if (slot && !slot.formats.includes(builderState.format)) blockers.push('Format không khớp inventory slot');
  else passes.push('Format khớp slot');
  if (builderState.endDate < builderState.startDate) blockers.push('Thời gian chạy không hợp lệ');
  if (builderState.frequencyCap === 'always') warnings.push('Frequency cap đang mở quá rộng');
  const conflict = getConflictPreview();
  if (conflict.winner && conflict.winner.id !== 'draft') warnings.push('Conflict Engine đang ưu tiên campaign khác');
  else if (conflict.winner) passes.push('Draft đang thắng conflict check');
  if (builderState.requiresApproval) warnings.push('Cần approval trước khi active');
  const score = Math.max(0, Math.min(100, 100 - blockers.length * 18 - warnings.length * 8));
  return {score, blockers, warnings, passes, conflict};
}

let manageFilter = 'all';

/* deterministic PRNG so numbers are stable per campaign */
function seedHash(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function mulberry(seed){return function(){let t=seed+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296;};}
function parseMid(range){ // "120K - 180K" -> 150000
  const nums=String(range).split('-').map(s=>{const m=s.trim().match(/([\d.]+)\s*K?/i);if(!m)return 0;let v=parseFloat(m[1]);if(/k/i.test(s))v*=1000;return v;});
  return nums.length===2?Math.round((nums[0]+nums[1])/2):(nums[0]||0);
}
function parsePctMid(range){const nums=String(range).split('-').map(s=>parseFloat(s));return nums.length===2?(nums[0]+nums[1])/2:(nums[0]||0);}
function fmtVND(n){ // 12400000 -> "12.4Tr" ; 940000 -> "940K"
  if(n>=1e9)return (n/1e9).toFixed(2).replace(/\.?0+$/,'')+' tỷ';
  if(n>=1e6)return (n/1e6).toFixed(1).replace(/\.0$/,'')+' Tr';
  if(n>=1e3)return Math.round(n/1e3)+'K';
  return String(n);
}
function sparkSVG(vals,color){
  const w=78,h=26,max=Math.max(...vals),min=Math.min(...vals),rng=(max-min)||1;
  const pts=vals.map((v,i)=>`${(i/(vals.length-1)*w).toFixed(1)},${(h-2-((v-min)/rng)*(h-4)).toFixed(1)}`);
  const last=pts[pts.length-1].split(',');
  return `<svg class="mng-spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <polyline fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round" points="${pts.join(' ')}"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="2.2" fill="${color}"/></svg>`;
}

/* build stable stats per campaign, derived from assigned placements where possible */
function buildCampaignStats(c){
  const rnd=mulberry(seedHash(c.id+c.name));
  const assigned=PLACEMENTS.filter(p=>p.campaignId===c.id);
  let impr, ctr;
  if(assigned.length){
    impr=assigned.reduce((s,p)=>s+parseMid(p.impressions),0);
    ctr=assigned.reduce((s,p)=>s+parsePctMid(p.ctr),0)/assigned.length;
  }else{
    impr=Math.round(40000+rnd()*180000);
    ctr=1.4+rnd()*3.2;
  }
  const clicks=Math.round(impr*ctr/100);
  const cpc=1700+Math.round(rnd()*2600);            // 1.7K - 4.3K đ
  const spend=clicks*cpc;
  const convRate=0.05+rnd()*0.10;                    // 5% - 15%
  const conv=Math.max(1,Math.round(clicks*convRate));
  const cpa=Math.round(spend/conv);
  const budget=Math.ceil(spend/(0.6+rnd()*0.32)/1e6)*1e6; // pacing 60-92%
  const pacing=Math.min(99,Math.round(spend/budget*100));
  const delta=Math.round((rnd()*45-15)*10)/10;       // -15% .. +30%
  /* 7-day trend, mildly trending toward delta sign */
  const spark=[];let base=0.5;
  for(let i=0;i<7;i++){base+=(rnd()-0.45)*0.25+(delta>0?0.04:-0.03);spark.push(Math.max(0.1,base));}
  /* status: most active, deterministic variety */
  let status='active';
  if(!c.active)status='ended';
  else{const r=rnd();if(r<0.14)status='paused';else if(r<0.22)status='ended';}
  /* remaining run-time (today = 2026-06-20) */
  const today=new Date(2026,5,20);
  const totalDays=14+Math.floor(rnd()*46);           // 14-60 ngày tổng lịch chạy
  const daysLeft=status==='ended'?0:Math.max(1,1+Math.floor(rnd()*43)); // 1-44 ngày
  const endDate=new Date(today.getTime()+daysLeft*864e5);
  const endStr=String(endDate.getDate()).padStart(2,'0')+'/'+String(endDate.getMonth()+1).padStart(2,'0');
  const elapsedPct=Math.min(100,Math.round((totalDays-daysLeft)/totalDays*100));
  return {impr,ctr,clicks,spend,conv,cpa,budget,pacing,delta,spark,status,daysLeft,endStr,elapsedPct};
}

function renderEngine() {
  const wrap = document.getElementById('modContent');
  wrap.innerHTML = `
    <div class="url-tester-box">
      <div class="section-head">🔍 URL Tester — nhập URL để giả lập phân xử</div>
      <div class="url-input-row">
        <input class="fi url-fi" id="engineUrl" placeholder="VD: /blog/bao-hiem-xe-may-2026" onkeydown="if(event.key==='Enter')checkUrl()">
        <button class="btn-check" onclick="checkUrl()">Kiểm tra</button>
      </div>
      <div class="section-head" style="margin-top:4px">Thử nhanh</div>
      <div class="preset-urls">
        ${['/blog/bao-hiem-xe-may-2026','/vay-nhanh','/blog/tai-chinh-ca-nhan','/','/merchant/abc','/bao-hiem'].map(u=>`<span class="pu" onclick="setPresetUrl('${u}')">${u}</span>`).join('')}
      </div>
    </div>
    <div id="conflictResults"></div>
  `;

function setPresetUrl(u) {
  document.getElementById('engineUrl').value = u;
  checkUrl();
}

function matchUrl(pattern, url) {
  const p = pattern.trim();
  if (p === '/') return url === '/' || url === '';
  if (p.endsWith('*')) return url.startsWith(p.slice(0,-1));
  return url === p;
}

function calcScore(campaign, url, testTags) {
  let score = 60;
  const factors = [{label:'Base match', cls:'cff-base', val: score}];
  const urlMatch = campaign.urlPatterns.some(p=>matchUrl(p,url));
  if (urlMatch) { score+=10; factors.push({label:'+10 URL Match',cls:'cff-url',val:10}); }
  const tagMatches = campaign.cmsTags.filter(t=>testTags.includes(t));
  if (tagMatches.length) { score+=30; factors.push({label:'+30 Tag: '+tagMatches[0],cls:'cff-tag',val:30}); }
  if (campaign.isRetargeting) { score+=50; factors.push({label:'+50 Retargeting',cls:'cff-retarget',val:50}); }
  return {score, factors, urlMatch};
}

function checkUrl() {
  const raw = (document.getElementById('engineUrl')?.value||'').trim();
  if (!raw) return;
  // normalize: strip domain
  const url = raw.startsWith('http') ? '/'+raw.split('/').slice(3).join('/') : (raw.startsWith('/')?raw:'/'+raw);

  // infer CMS tags from URL
  const inferredTags = [];
  if (url.includes('bao-hiem')) { inferredTags.push('bao-hiem'); if (url.includes('xe-may')) inferredTags.push('bao-hiem-xe-may'); }
  if (url.includes('vay')||url.includes('tai-chinh')) { inferredTags.push('vay-tieu-dung','tai-chinh'); }
  if (url.includes('merchant')) inferredTags.push('merchant','bnpl');

  const matches = campaigns.filter(c=>c.active && c.urlPatterns.some(p=>matchUrl(p,url)));
  if (!matches.length) {
    document.getElementById('conflictResults').innerHTML = `<div class="no-match">🚫 Không có campaign nào khớp URL này.<br><span style="font-size:10px;color:var(--t3)">Thử: /blog/bao-hiem-xe-may-2026</span></div>`;
    return;
  }

  const scored = matches.map(c=>({...c,...calcScore(c,url,inferredTags)})).sort((a,b)=>b.score-a.score);

  // Apply guardrails: max 1 popup per render
  let popupUsed = false;
  const guardrailMessages = [];
  const results = scored.map((c,i) => {
    let blocked = false, reason = '';
    if (c.format==='popup') {
      if (popupUsed) { blocked=true; reason='Guardrail: đã có 1 Popup — chặn để tránh UX friction'; guardrailMessages.push(reason+` (fallback: ${c.name})`); }
      else popupUsed = true;
    }
    return {...c, blocked, reason, rank:i+1};
  });

  const winner = results.find(r=>!r.blocked);
  if (winner) {
    // update preview with winner
    previewCampaign = campaigns.find(c=>c.id===winner.id);
    updateLivePreview();
    document.getElementById('mCampaign').textContent = winner.name;
    document.getElementById('mFormat').textContent = FORMAT_DEFS[winner.format].icon+' '+FORMAT_DEFS[winner.format].name;
  }

  // Update URL in toolbar
  document.getElementById('ptUrlText').textContent = 'momo.vn'+url;

  document.getElementById('conflictResults').innerHTML = `
    <div class="section-head">📊 Kết quả phân xử — ${results.length} candidates</div>
    ${guardrailMessages.length?`<div class="guardrail-box">⚠️ <strong>Guardrail kích hoạt:</strong> ${guardrailMessages.join('<br>')}</div>`:''}
    <div class="conflict-list">
      ${results.map(r=>`
        <div class="cf-item${r.id===winner?.id?' winner':r.blocked?' blocked':''}">
          ${r.id===winner?.id?'<div class="cf-winner-tag">WINNER</div>':''}
          ${r.blocked?'<div class="cf-blocked-tag">BLOCKED</div>':''}
          <div class="cf-score"><span class="num">${r.score}</span><span class="unit">pts</span></div>
          <div class="cf-name">${r.name} <span style="font-size:10px;color:var(--t2)">· ${r.division}</span></div>
          <div class="cf-factors">
            ${r.factors.map(f=>`<span class="cff ${f.cls}">${f.label}</span>`).join('')}
          </div>
          ${r.blocked?`<div style="font-size:9px;color:var(--red);margin-top:6px">🚫 ${r.reason}</div>`:''}
        </div>`).join('')}
    </div>
  `;
}

const AB_MOCK = {
  a:{pv:12400,clicks:620,ctr:5.0,dismiss:18.2},

    <div class="fg">
      <div class="fl">Campaign cho A/B Test</div>
      <select class="fi fsel" id="abCampaign">
        ${campaigns.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}
      </select>
    </div>
    <div class="fg">
      <div class="fl">Variant A — Landing Page</div>
      <input class="fi" id="urlA" placeholder="momo.vn/bao-hiem/xe-may" value="momo.vn/bao-hiem/xe-may">
    </div>
    <div class="fg">
      <div class="fl">Variant B — Landing Page</div>
      <input class="fi" id="urlB" placeholder="momo.vn/bao-hiem/xe-may?variant=v2" value="momo.vn/bao-hiem/xe-may?variant=v2">
    </div>
    <div class="fg">
      <div class="fl">Split Ratio</div>
      <div class="ratio-wrap">
        <div class="ratio-labels"><span>Variant A: ${r}%</span><span>Variant B: ${100-r}%</span></div>
        <div class="ratio-track" id="ratioTrack" onclick="handleRatioClick(event)">
          <div class="ratio-fill" id="ratioFill" style="width:${r}%"></div>
        </div>
        <input type="range" min="10" max="90" value="${r}" id="ratioRange" oninput="setRatio(this.value)">
      </div>
    </div>
    <button class="btn btn-pk" style="width:100%" onclick="launchAbTest()">🚀 Launch A/B Test</button>
    <div class="sep"></div>
    <div class="section-head">Mock Analytics — 7 ngày</div>
    <div class="ab-variants">
      <div class="ab-var var-a">
        <div class="ab-head"><div class="ab-badge">A</div>Variant A
          ${abState.declared==='a'?'<span class="win-chip">🏆 WINNER</span>':''}
        </div>
        <div class="ab-stat-grid">
          <div class="ab-stat"><div class="ab-stat-val">${fmtK(AB_MOCK.a.pv)}</div><div class="ab-stat-key">Pageviews</div></div>
          <div class="ab-stat"><div class="ab-stat-val">${fmtK(AB_MOCK.a.clicks)}</div><div class="ab-stat-key">Clicks</div></div>
          <div class="ab-stat"><div class="ab-stat-val" style="color:var(--blue)">${AB_MOCK.a.ctr}%</div><div class="ab-stat-key">CTR</div></div>
          <div class="ab-stat"><div class="ab-stat-val" style="color:var(--amber)">${AB_MOCK.a.dismiss}%</div><div class="ab-stat-key">Dismiss</div></div>
        </div>
      </div>
      <div class="ab-var var-b">
        <div class="ab-head"><div class="ab-badge">B</div>Variant B
          ${abState.declared==='b'?'<span class="win-chip">🏆 WINNER</span>':''}
        </div>
        <div class="ab-stat-grid">
          <div class="ab-stat"><div class="ab-stat-val">${fmtK(AB_MOCK.b.pv)}</div><div class="ab-stat-key">Pageviews</div></div>
          <div class="ab-stat"><div class="ab-stat-val">${fmtK(AB_MOCK.b.clicks)}</div><div class="ab-stat-key">Clicks</div></div>
          <div class="ab-stat"><div class="ab-stat-val" style="color:var(--purple)">${AB_MOCK.b.ctr}%</div><div class="ab-stat-key">CTR</div></div>
          <div class="ab-stat"><div class="ab-stat-val" style="color:var(--green)">${AB_MOCK.b.dismiss}%</div><div class="ab-stat-key">Dismiss</div></div>
        </div>
      </div>
    </div>
  ${abState.declared
      ? `<div class="declared-winner">✅ Đã chọn Variant ${abState.declared.toUpperCase()} làm phiên bản chính thức.</div>`
      : `<div class="declare-winner-row">
          <button class="btn-declare a" data-winner="a" onclick="declareWinner('a')">Chọn Variant A</button>
          <button class="btn-declare b" data-winner="b" onclick="declareWinner('b')">Chọn Variant B ↑ CTR</button>
        </div>`}
  `;
  syncGlobals();
}

function setRatio(v) {
  abState.ratio = +v;
  const fill = document.getElementById('ratioFill');
  if (fill) fill.style.width = v+'%';
  document.querySelector('.ratio-labels').innerHTML = `<span>Variant A: ${v}%</span><span>Variant B: ${100-v}%</span>`;
  syncGlobals();
}
function handleRatioClick(e) {
  const t = e.currentTarget;
  const r = Math.round((e.offsetX/t.offsetWidth)*100);
  document.getElementById('ratioRange').value = r;
  setRatio(Math.max(10,Math.min(90,r)));
}
function launchAbTest() {
  abState.running = true;
  showToast('🚀 A/B Test đã khởi chạy!','t-pk');
  syncGlobals();
}
function declareWinner(v) {
  abState.declared = v;
  showToast(`🏆 Variant ${v.toUpperCase()} được chọn làm winner!`,'t-green');
  renderAbTest();
  syncGlobals();
}

const PAGE_URLS = {blog:'momo.vn/blog/bao-hiem-xe-may-2026', hub:'momo.vn/vay-nhanh', home:'momo.vn'};

function setDevice(d) {
  device = d;
  document.getElementById('btnMobile')?.classList.toggle('active', d === 'mobile');
  document.getElementById('btnDesktop')?.classList.toggle('active', d === 'desktop');
  updateLivePreview();
  syncGlobals();
}
function setPage(p) {
  previewPage = p;
  document.querySelectorAll('.pt-pg').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase().includes(p==='blog'?'blog':p==='hub'?'vay':'home')));
  const urlEl = document.getElementById('ptUrlText');
  if (urlEl) urlEl.textContent = PAGE_URLS[p];
  updateLivePreview();
  syncGlobals();
}

function updateLivePreview() {
  const wrap = document.getElementById('deviceWrap');
  if (!wrap) return;
  const c = previewCampaign || (campaigns.length?campaigns[0]:null);
  const pageHtml = buildPageMockup(previewPage);
  const adHtml = c ? buildAdOverlay(c.format, c) : '';

  if (device==='mobile') {
    wrap.innerHTML = `<div class="mobile-shell"><div class="mobile-screen">
      <div class="mobile-notch"></div>
      ${pageHtml}
      ${adHtml}
    </div></div>`;
  } else {
    wrap.innerHTML = `<div class="desktop-shell">
      <div class="browser-chrome">
        <div class="bc-dots"><i></i><i></i><i></i></div>
        <div class="bc-url">${PAGE_URLS[previewPage]}</div>
      </div>
      <div style="position:relative;flex:1;overflow:hidden">
        ${pageHtml}
        ${adHtml}
      </div>
    </div>`;
  }
  document.getElementById('mTotal').textContent = campaigns.length;
  if (c) {
    document.getElementById('mFormat').textContent = FORMAT_DEFS[c.format].icon+' '+FORMAT_DEFS[c.format].name;
    document.getElementById('mCampaign').textContent = c.name;
  }
  syncGlobals();
}

      <div class="hub-card"><div class="hub-card-icon"></div><div><div class="hub-card-title">${x.t}</div><div class="hub-card-sub">${x.s}</div></div></div>`).join('')}

  return `<div class="page-mockup pg-home">${nav}
    <div class="hero">Web MoMo</div>
    <div class="body">
      <div class="service-grid">
        <div class="svc-item"><div class="svc-icon pk"></div><div class="svc-label">Vay tiền</div></div>

function getActiveAdTheme(c) {
  const adType = c?.adType || builderState.adType || 'universal';
  if (adType === 'customization' || adType === 'widget') {
    const projectId = c?.projectId || builderState.projectId;
    const proj = PROJECT_REGISTRY.find(p => p.id === projectId);
    if (proj?.theme) return {...proj.theme, source:`${proj.name} · ${proj.theme.label}`};
  }
  return {primary:'#a50064', accent:'#d82d8b', radius:'10px', font:'Inter', label:'MoMo Brand · Pink', source:'MoMo Brand'};
}

function themeStyle(theme) {
  return `style="--ad-primary:${theme.primary};--ad-accent:${theme.accent};--ad-radius:${theme.radius};--ad-font:${theme.font}"`;
}

function buildAdOverlay(format, c) {
  const name = c?.creativeHeadline || c?.contentTitle || c?.name || 'Headline ads';
  const cta  = c?.ctaUrl||'momo.vn';
  const body = c?.creativeBody || 'Ưu đãi độc quyền dành riêng cho bạn';
  const label = c?.ctaLabel || 'Tìm hiểu ngay';
  const theme = getActiveAdTheme(c);
  const ts = themeStyle(theme);
  if (format==='masthead') return `
    <div class="ad-masthead" ${ts}>
      <div class="masthead-kicker">Premium campaign</div>
      <div class="masthead-title">${name}</div>
      <div class="masthead-desc">${body}</div>
      <button class="masthead-btn" onclick="logCta('${cta}','masthead')">${label} →</button>
    </div>`;
  if (format==='banner') return `
    <div class="ad-banner" ${ts}>
      <div class="banner-thumb">🎁</div>
      <div class="banner-copy">
        <div class="banner-title">${name}</div>
        <div class="banner-desc">${body}</div>
      </div>
      <button class="banner-btn" onclick="logCta('${cta}','banner')">${label}</button>
    </div>`;
  if (format==='inline') return `
    <div class="ad-inline" ${ts}>
      <div style="flex:1;min-width:0">
        <div class="inline-label">Sponsored</div>
        <div class="inline-title">${name}</div>
        <div class="inline-desc">${body}</div>
      </div>
      <button class="inline-btn" onclick="logCta('${cta}','inline')">${label}</button>
    </div>`;
  if (format==='native') return `
    <div class="ad-native" ${ts}>
      <div class="native-kicker">Nội dung được đề xuất</div>
      <div class="native-card">
        <div class="native-img"></div>
        <div>
          <div class="native-title">${name}</div>
          <div class="native-desc">${body}</div>
          <div class="native-cta" onclick="logCta('${cta}','native')">${label} →</div>
        </div>
      </div>
    </div>`;
  if (format==='sticky') return `
    <div class="ad-sticky" ${ts}>
      <div class="sticky-icon">✨</div>
      <div class="sticky-copy">
        <div class="sticky-title">${name}</div>
        <div class="sticky-desc">${body}</div>
      </div>
      <button class="sticky-btn" onclick="logCta('${cta}','sticky')">${label}</button>
    </div>`;
  if (format==='sidebar') return `
    <div class="ad-sidebar" ${ts}>
      <div class="sidebar-kicker">Tài trợ</div>
      <div class="sidebar-title">${name}</div>
      <div class="sidebar-desc">${body}</div>
      <button class="sidebar-btn" onclick="logCta('${cta}','sidebar')">${label}</button>
    </div>`;
  if (format==='video') return `
    <div class="ad-video" ${ts}>
      <div class="video-frame">
        <div class="video-badge">Sponsored video</div>
        <div class="video-play">▶</div>
      </div>
      <div class="video-copy">
        <div class="video-title">${name}</div>
        <div class="video-desc">${body}</div>
        <button class="video-btn" onclick="logCta('${cta}','video')">${label}</button>
      </div>
    </div>`;
  if (format==='carousel') return `
    <div class="ad-carousel" ${ts}>
      <div class="carousel-head">
        <div class="carousel-title">${name}</div>
        <div class="carousel-more" onclick="logCta('${cta}','carousel')">Xem thêm</div>
      </div>
      <div class="carousel-row">
        ${['Ưu đãi 1','Ưu đãi 2','Ưu đãi 3'].map((item,i)=>`
          <div class="carousel-item" onclick="logCta('${cta}','carousel')">
            <div class="carousel-img"></div>
            <div class="carousel-name">${item}</div>
            <div class="carousel-price">Từ ${i+1}0K</div>
          </div>`).join('')}
      </div>
    </div>`;
  if (format==='balloon') return `
    <div class="ad-balloon" ${ts}>
      <div class="balloon-card">
        <div class="balloon-card-title">${name}</div>
        <div class="balloon-card-sub">${body}</div>
        <button class="balloon-card-btn" onclick="logCta('${cta}','balloon')">${label} →</button>
      </div>
      <div class="balloon-body" onclick="logCta('${cta}','balloon')">
        <div class="balloon-pulse"></div>
        <div class="balloon-icon">💡</div>
        <div class="balloon-txt">Ưu đãi</div>
      </div>
    </div>`;
  if (format==='popup') return `
    <div class="ad-popup${device==='desktop'?' desktop':''}" ${ts}>
      <div class="popup-sheet${device==='desktop'?' desktop-box':''}">
        <button class="popup-x" onclick="this.closest('.ad-popup').remove()">✕</button>
        ${device!=='desktop'?'<div class="popup-handle"></div>':''}
        <div class="popup-hero">🎉 ${c?.division||''} Special Offer</div>
        <div class="popup-title">${name}</div>
        <div class="popup-desc">${body}</div>
        <button class="popup-btn" onclick="logCta('${cta}','popup')">${label} →</button>
      </div>
    </div>`;
  if (format==='calculator') return `
    <div class="ad-calculator" ${ts}>
      <div class="calc-hd"><span>🧮</span><span>${name}</span></div>
      <div class="calc-bd">
        <div class="calc-field"><label>Số tiền cần vay</label><input class="calc-fi" value="10,000,000 đ" oninput="updateCalcResult()"></div>
        <div class="calc-field"><label>Kỳ hạn</label><input class="calc-fi" value="12 tháng"></div>
        <div class="calc-result"><span class="calc-rk">Lãi suất ước tính</span><span class="calc-rv" id="calcRv">~1.2%/tháng</span></div>
        <button class="calc-cta" onclick="logCta('${cta}','calculator')">${label} →</button>
      </div>
    </div>`;
  if (format==='purchase') return `
    <div class="ad-purchase" ${ts}>
      <div class="purch-hd"><span>🛍️</span><span>${name}</span></div>
      <div class="purch-bd">
        <div class="purch-product">
          <div class="purch-img"></div>
          <div><div class="purch-name">${c?.division||'Sản phẩm'} — Gói cơ bản</div><div class="purch-price">199,000 đ/năm</div></div>
        </div>
        <button class="purch-btn" onclick="logCta('${cta}','purchase')">${label} →</button>
      </div>
    </div>`;
  return '';
}

function logCta(url, format) {
  const slug = url.replace(/\W+/g,'_');
  showToast(`↗ CTA: ${url} [utm_medium=${format}]`,'t-pk');
}

/* ═══════════════════════════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════════════════════════ */
function fmtK(n) { return n>=1000?(n/1000).toFixed(1)+'K':n; }
function updateMetrics() {
  document.getElementById('mTotal').textContent = campaigns.length;
}
function showToast(msg,cls='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show '+(cls||'');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('show'),2800);
}
