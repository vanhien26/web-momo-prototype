<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SEO/GEO Dashboard — MoMo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
:root {
  --momo: #AF0171;
  --momo-dark: #8b0059;
  --ink: #0f172a;
  --muted: #64748b;
  --line: #e2e8f0;
  --bg: #f1f5f9;
  --white: #fff;
  --sidebar-bg: #0d1117;
  --sidebar-2: #161b22;
  --green: #10b981;
  --red: #ef4444;
  --amber: #f59e0b;
  --col-ga4: #1a73e8;
  --col-ga4-bg: #e8f0fe;
  --col-gsc: #137333;
  --col-gsc-bg: #e6f4ea;
  --col-bq: #b06000;
  --col-bq-bg: #fef3e2;
  --col-geo: #7c3aed;
  --col-geo-bg: #ede9fe;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Be Vietnam Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 13px;
}

/* ── APP SHELL ─────────────────────────── */
.app { display: grid; grid-template-rows: 50px 1fr; height: 100vh; }

/* ── TOP BAR ───────────────────────────── */
.top-bar {
  background: var(--sidebar-bg);
  border-bottom: 1px solid rgba(255,255,255,.07);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px; z-index: 10;
}

.brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.brand-mark {
  width: 28px; height: 28px; background: var(--momo); border-radius: 6px;
  display: grid; place-items: center; font-size: 8px; font-weight: 900; color: #fff; line-height: 1.2; text-align: center;
}
.brand-name { font-size: 13px; font-weight: 700; color: #fff; }
.brand-sep { color: rgba(255,255,255,.2); margin: 0 4px; }
.brand-sub { font-size: 12px; color: rgba(255,255,255,.45); font-weight: 500; }

.top-right { display: flex; align-items: center; gap: 10px; }
.freshness { font-size: 10px; color: rgba(255,255,255,.3); }

.period-sel {
  height: 28px; border: 1px solid rgba(255,255,255,.14); border-radius: 6px;
  background: rgba(255,255,255,.07); color: rgba(255,255,255,.8); font-size: 11px; font-weight: 600;
  padding: 0 10px; font-family: inherit; outline: none; cursor: pointer;
}
.btn-export {
  height: 28px; padding: 0 12px;
  border: 1px solid rgba(255,255,255,.14); border-radius: 6px;
  background: rgba(255,255,255,.06); color: rgba(255,255,255,.65);
  font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; gap: 5px;
}

/* ── LAYOUT ────────────────────────────── */
.layout { display: grid; grid-template-columns: 210px 1fr; overflow: hidden; }

/* ── SIDEBAR ───────────────────────────── */
.sidebar {
  background: var(--sidebar-bg); border-right: 1px solid rgba(255,255,255,.07);
  overflow-y: auto; display: flex; flex-direction: column;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

.sb-section-lbl {
  font-size: 9px; font-weight: 800; color: rgba(255,255,255,.25);
  text-transform: uppercase; letter-spacing: .7px; padding: 14px 14px 5px;
}
.uc-item {
  display: flex; align-items: center; gap: 9px; padding: 8px 14px;
  cursor: pointer; transition: .12s; border-left: 2px solid transparent;
}
.uc-item:hover { background: rgba(255,255,255,.05); }
.uc-item.active { background: rgba(175,1,113,.1); border-left-color: var(--momo); }
.uc-icon { font-size: 14px; flex-shrink: 0; width: 20px; text-align: center; }
.uc-info { flex: 1; min-width: 0; }
.uc-name { font-size: 11px; font-weight: 600; color: rgba(255,255,255,.65); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.uc-item.active .uc-name { color: #fff; }
.uc-cat { font-size: 9px; color: rgba(255,255,255,.28); margin-top: 1px; }
.uc-item.active .uc-cat { color: rgba(175,1,113,.7); }
.uc-pos {
  font-size: 10px; font-weight: 700; padding: 2px 5px; border-radius: 4px;
  background: rgba(255,255,255,.06); color: rgba(255,255,255,.35); flex-shrink: 0;
}
.uc-pos.good { background: rgba(16,185,129,.15); color: #34d399; }
.uc-pos.ok   { background: rgba(245,158,11,.12); color: #fbbf24; }
.uc-pos.bad  { background: rgba(239,68,68,.1); color: #f87171; }
.uc-item.active .uc-pos { background: rgba(175,1,113,.2); color: #f472b6; }
.sb-footer {
  margin-top: auto; padding: 12px 14px; border-top: 1px solid rgba(255,255,255,.06);
  font-size: 10px; color: rgba(255,255,255,.2); line-height: 1.5;
}

/* ── MAIN AREA ─────────────────────────── */
.main { overflow-y: auto; display: flex; flex-direction: column; }
.main::-webkit-scrollbar { width: 4px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

/* ── CONTENT BAR ───────────────────────── */
.content-bar {
  height: 42px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 22px; border-bottom: 1px solid var(--line); background: var(--white); flex-shrink: 0;
  position: sticky; top: 0; z-index: 6;
}
.bc { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
.bc strong { color: var(--ink); font-weight: 700; }
.bc-sep { color: var(--line); }
.src-pills { display: flex; gap: 5px; }
.src-pill {
  font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: .4px;
  padding: 3px 8px; border-radius: 5px;
}
.src-pill.ga4 { background: var(--col-ga4-bg); color: var(--col-ga4); }
.src-pill.gsc { background: var(--col-gsc-bg); color: var(--col-gsc); }
.src-pill.bq  { background: var(--col-bq-bg);  color: var(--col-bq);  }
.src-pill.geo { background: var(--col-geo-bg); color: var(--col-geo); }

/* ── TAB BAR ───────────────────────────── */
.tab-bar {
  height: 44px; display: flex; align-items: center;
  padding: 0 22px; gap: 3px;
  border-bottom: 1px solid var(--line); background: var(--white); flex-shrink: 0;
  position: sticky; top: 42px; z-index: 5;
}
.tab-btn {
  height: 32px; padding: 0 14px; border-radius: 8px; border: none;
  background: none; cursor: pointer; font-family: inherit;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; align-items: center; gap: 6px; transition: .12s;
  white-space: nowrap;
}
.tab-btn:hover { background: var(--bg); color: var(--ink); }
.tab-btn.active { background: var(--momo); color: #fff; }
.tab-icon { font-size: 13px; }
.tab-badge {
  font-size: 9px; font-weight: 800; padding: 1px 5px; border-radius: 4px;
  background: rgba(255,255,255,.22); letter-spacing: .3px;
}
.tab-btn:not(.active) .tab-badge {
  background: var(--bg); color: var(--muted);
}

/* ── CONTENT BODY ──────────────────────── */
.content-body { flex: 1; padding: 18px 22px; display: flex; flex-direction: column; gap: 16px; }

/* ── KPI ROW ───────────────────────────── */
.kpi-row { display: grid; gap: 8px; }
.kpi-row-4 { grid-template-columns: repeat(4, 1fr); }
.kpi-row-8 { grid-template-columns: repeat(8, 1fr); }

.kpi-card {
  background: var(--white); border: 1px solid var(--line); border-radius: 11px;
  padding: 11px 13px; display: flex; flex-direction: column; gap: 3px;
  position: relative; overflow: hidden;
}
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2.5px;
}
.kpi-card.ga4::before { background: var(--col-ga4); }
.kpi-card.gsc::before { background: var(--col-gsc); }
.kpi-card.bq::before  { background: var(--col-bq); }
.kpi-card.geo::before { background: var(--col-geo); }

.kpi-src { font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; }
.kpi-card.ga4 .kpi-src { color: var(--col-ga4); }
.kpi-card.gsc .kpi-src { color: var(--col-gsc); }
.kpi-card.bq .kpi-src  { color: var(--col-bq); }
.kpi-card.geo .kpi-src { color: var(--col-geo); }

.kpi-lbl { font-size: 10px; color: var(--muted); font-weight: 500; }
.kpi-val { font-size: 19px; font-weight: 900; color: var(--ink); line-height: 1.1; }
.kpi-delta { font-size: 10px; font-weight: 700; display: flex; align-items: center; gap: 2px; }
.kpi-delta.up { color: var(--green); }
.kpi-delta.dn { color: var(--red); }
.kpi-delta.nu { color: var(--muted); }

/* ── PANELS ────────────────────────────── */
.panel {
  background: var(--white); border: 1px solid var(--line); border-radius: 13px; overflow: hidden;
}
.panel-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 18px; border-bottom: 1px solid var(--line);
}
.ph-left { display: flex; align-items: center; gap: 8px; }
.ph-dot { width: 9px; height: 9px; border-radius: 50%; }
.ph-dot.ga4 { background: var(--col-ga4); }
.ph-dot.gsc { background: var(--col-gsc); }
.ph-dot.bq  { background: var(--col-bq); }
.ph-dot.geo { background: var(--col-geo); }
.ph-title { font-size: 13px; font-weight: 800; color: var(--ink); }
.ph-sub { font-size: 11px; color: var(--muted); }
.ph-right { font-size: 11px; color: var(--muted); }
.panel-body { padding: 18px; }

/* ── GA4 PANEL ─────────────────────────── */
.ga4-layout { display: grid; grid-template-columns: 1fr 200px; gap: 18px; align-items: start; }
.chart-wrap { position: relative; height: 160px; }
.ga4-mini { display: flex; flex-direction: column; gap: 8px; }
.ga4-mini-card { background: var(--bg); border-radius: 9px; padding: 11px 13px; }
.gmc-lbl { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
.gmc-val { font-size: 18px; font-weight: 800; color: var(--ink); line-height: 1; }
.gmc-rate { font-size: 10px; color: var(--muted); margin-top: 2px; }
.gmc-rate strong { color: var(--col-ga4); font-weight: 700; }

/* ── MINI FUNNEL (overview) ────────────── */
.mini-funnel {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
}
.mf-step {
  background: var(--bg); border-radius: 10px; padding: 13px 14px;
  display: flex; flex-direction: column; gap: 4px; position: relative;
}
.mf-step::after {
  content: '→'; position: absolute; right: -10px; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: 14px; font-weight: 700;
}
.mf-step:last-child::after { display: none; }
.mf-label { font-size: 10px; font-weight: 600; color: var(--muted); }
.mf-val { font-size: 18px; font-weight: 900; color: var(--ink); }
.mf-conv { font-size: 10px; font-weight: 700; margin-top: 2px; }
.mf-conv.good { color: var(--green); }
.mf-conv.warn { color: var(--amber); }
.mf-conv.low  { color: var(--red); }
.mf-bar { height: 3px; border-radius: 2px; margin-top: 5px; }

/* ── GSC PANEL ─────────────────────────── */
.gsc-layout { display: flex; flex-direction: column; gap: 14px; }
.gsc-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.gsc-stat { background: var(--col-gsc-bg); border-radius: 9px; padding: 11px 13px; }
.gsc-stat-val { font-size: 20px; font-weight: 900; color: var(--col-gsc); line-height: 1; }
.gsc-stat-lbl { font-size: 10px; color: #1e7a3a; margin-top: 3px; }

.kw-table { width: 100%; border-collapse: collapse; }
.kw-table thead th {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
  color: var(--muted); padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--line);
  cursor: pointer; user-select: none;
}
.kw-table thead th:not(:first-child) { text-align: right; }
.kw-table thead th:hover { color: var(--ink); }
.kw-table tbody td { padding: 8px 10px; border-bottom: 1px solid var(--line); font-size: 12px; }
.kw-table tbody td:not(:first-child) { text-align: right; }
.kw-table tbody tr:last-child td { border-bottom: none; }
.kw-table tbody tr:hover td { background: var(--bg); }
.kw-text { font-weight: 600; color: var(--ink); }
.kw-url { font-size: 10px; color: var(--muted); display: block; font-weight: 400; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }

.pos-tag {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 38px; padding: 2px 6px; border-radius: 5px; font-size: 11px; font-weight: 700;
}
.pos-tag.top3  { background: #d1fae5; color: #065f46; }
.pos-tag.top10 { background: #fef3c7; color: #92400e; }
.pos-tag.top20 { background: #ffedd5; color: #9a3412; }
.pos-tag.below { background: #fee2e2; color: #991b1b; }

.ctr-cell { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
.ctr-track { width: 44px; height: 4px; background: var(--line); border-radius: 2px; overflow: hidden; }
.ctr-fill { height: 100%; background: var(--col-ga4); border-radius: 2px; }

/* ── GEO PANEL ─────────────────────────── */
.geo-layout { display: flex; flex-direction: column; gap: 16px; }

.geo-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.geo-chart-box {
  background: var(--bg); border-radius: 11px; padding: 14px;
}
.geo-chart-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 10px; }
.geo-chart-wrap { position: relative; height: 130px; }

.ai-sources { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.ai-source-card {
  border: 1px solid var(--line); border-radius: 10px; padding: 12px 13px;
  display: flex; flex-direction: column; gap: 4px;
}
.ai-source-card.cited { border-color: var(--col-geo); background: #faf5ff; }
.ais-header { display: flex; align-items: center; justify-content: space-between; }
.ais-name { font-size: 11px; font-weight: 700; color: var(--ink); }
.ais-badge {
  font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 4px; letter-spacing: .3px;
}
.ais-badge.cited { background: var(--col-geo-bg); color: var(--col-geo); }
.ais-badge.uncited { background: var(--bg); color: var(--muted); }
.ais-val { font-size: 20px; font-weight: 900; color: var(--ink); line-height: 1; }
.ais-sub { font-size: 10px; color: var(--muted); }
.ais-trend { font-size: 10px; font-weight: 700; }
.ais-trend.up { color: var(--green); }
.ais-trend.dn { color: var(--red); }
.ais-trend.flat { color: var(--muted); }

.sov-table-wrap { overflow: hidden; }
.sov-table { width: 100%; border-collapse: collapse; }
.sov-table thead th {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
  color: var(--muted); padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--line);
}
.sov-table thead th:not(:first-child) { text-align: right; }
.sov-table tbody td { padding: 8px 10px; border-bottom: 1px solid var(--line); font-size: 12px; }
.sov-table tbody td:not(:first-child) { text-align: right; }
.sov-table tbody tr:last-child td { border-bottom: none; }
.sov-table tbody tr:hover td { background: var(--bg); }

.sov-bar-wrap { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
.sov-bar-bg { width: 56px; height: 5px; background: var(--line); border-radius: 3px; overflow: hidden; }
.sov-bar-fill { height: 100%; border-radius: 3px; }

.sov-leader { font-weight: 800; color: var(--col-geo); }

/* ── BQ PANEL ──────────────────────────── */
.bq-layout { display: flex; flex-direction: column; gap: 16px; }
.bq-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.bq-stat { background: var(--col-bq-bg); border-radius: 9px; padding: 11px 13px; }
.bq-stat-val { font-size: 20px; font-weight: 900; color: var(--col-bq); line-height: 1; }
.bq-stat-lbl { font-size: 10px; color: #9a5200; margin-top: 3px; }

.funnel-wrap { display: flex; flex-direction: column; gap: 6px; }
.funnel-row { display: flex; align-items: center; gap: 10px; }
.funnel-lbl { font-size: 11px; font-weight: 600; color: var(--muted); width: 110px; flex-shrink: 0; text-align: right; }
.funnel-bar-wrap { flex: 1; position: relative; height: 30px; }
.funnel-bar-bg { position: absolute; inset: 0; background: var(--bg); border-radius: 6px; }
.funnel-bar-fill {
  position: absolute; left: 0; top: 0; bottom: 0; border-radius: 6px;
  display: flex; align-items: center; padding-left: 10px;
  font-size: 11px; font-weight: 800; color: #fff;
  transition: width 1s cubic-bezier(.4,0,.2,1); min-width: 60px;
}
.funnel-meta { width: 130px; flex-shrink: 0; }
.funnel-val { font-size: 13px; font-weight: 800; color: var(--ink); }
.funnel-conv { font-size: 10px; color: var(--muted); margin-top: 1px; }
.funnel-conv.good { color: var(--green); }
.funnel-conv.warn { color: var(--amber); }
.funnel-conv.low  { color: var(--red); }

.bq-chart-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* ── RESPONSIVE ─────────────────────────── */
@media (max-width: 1200px) {
  .kpi-row-8 { grid-template-columns: repeat(4, 1fr); }
  .ga4-layout { grid-template-columns: 1fr; }
  .ga4-mini { flex-direction: row; }
  .geo-charts { grid-template-columns: 1fr; }
  .ai-sources { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 900px) {
  .mini-funnel { grid-template-columns: repeat(2, 1fr); }
  .kpi-row-4 { grid-template-columns: repeat(2, 1fr); }
  .tab-btn span.tab-icon { display: none; }
}
</style>
</head>
<body>

<div class="app">

  <!-- ── TOP BAR ─────────────────────────── -->
  <header class="top-bar">
    <div class="brand">
      <div class="brand-mark">mo<br>mo</div>
      <span class="brand-name">SEO/GEO Dashboard</span>
      <span class="brand-sep">·</span>
      <span class="brand-sub">Out-App Traffic Analytics</span>
    </div>
    <div class="top-right">
      <span class="freshness">📡 Cập nhật: hôm nay 08:00</span>
      <select class="period-sel" id="periodSel" onchange="renderAll()">
        <option value="jun26">T6/2026 (hiện tại)</option>
        <option value="may26">T5/2026</option>
        <option value="apr26">T4/2026</option>
        <option value="q2">Q2/2026</option>
      </select>
      <button class="btn-export">⬇ Export CSV</button>
    </div>
  </header>

  <div class="layout">

    <!-- ── SIDEBAR ───────────────────────── -->
    <aside class="sidebar">
      <div class="sb-section-lbl">Use Cases</div>
      <div id="ucList"></div>
      <div class="sb-footer">
        MoMo · Out-App Traffic<br>
        Cập nhật hàng ngày
      </div>
    </aside>

    <!-- ── MAIN ──────────────────────────── -->
    <main class="main">

      <!-- breadcrumb -->
      <div class="content-bar">
        <div class="bc">
          <span>Use Case</span>
          <span class="bc-sep">/</span>
          <strong id="bcName">Vay Nhanh</strong>
        </div>
        <span class="freshness" style="color:var(--muted);font-size:11px" id="bcPeriod">T6/2026</span>
      </div>

      <!-- tab bar -->
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-overview" onclick="setTab('overview')">
          <span class="tab-icon">📊</span> Overview Performance
        </button>
        <button class="tab-btn" id="tab-keywords" onclick="setTab('keywords')">
          <span class="tab-icon">🔍</span> Keyword Positioning
        </button>
        <button class="tab-btn" id="tab-geo" onclick="setTab('geo')">
          <span class="tab-icon">🤖</span> GEO · SoV &amp; AI Citation
        </button>
        <button class="tab-btn" id="tab-maumeu" onclick="setTab('maumeu')">
          <span class="tab-icon">👥</span> MAU / MEU
        </button>
      </div>

      <div class="content-body" id="contentBody"></div>
    </main>

  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────

const MONTHS = ['T1','T2','T3','T4','T5','T6'];

const USE_CASES = [
  {
    id: 'vay-nhanh', name: 'Vay Nhanh', icon: '💳', cat: 'Credit',
    ga4: {
      pageviews: 245820, users: 89340, clickApp: 12480,
      trend: {
        pv:  [168000,192000,210000,228000,241000,245820],
        usr: [62000, 71000, 77000, 83000, 87000, 89340],
        cta: [8400,  9600, 10400, 11200, 11900, 12480],
      }
    },
    gsc: {

let activeId  = 'vay-nhanh';
let activeTab = 'overview';
const CHARTS  = {};

// ── HELPERS ───────────────────────────────────────────────────────────
function fmtN(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1).replace('.0','') + 'M';
  if (n >= 1000)    return (n/1000).toFixed(1).replace('.0','') + 'K';
  return n.toLocaleString('vi-VN');
}

function posClass(p) {
  if (p <= 3)  return 'top3';
  if (p <= 10) return 'top10';
  if (p <= 20) return 'top20';
  return 'below';
}

function funnelConv(a, b) {
  if (!a) return '';
  const r = ((b/a)*100).toFixed(1);
  const cls = r > 20 ? 'good' : r > 8 ? 'warn' : 'low';
  return `<div class="funnel-conv ${cls}">→ ${r}% từ trước</div>`;
}

function destroyCharts() {
  Object.values(CHARTS).forEach(c => c && c.destroy());
  Object.keys(CHARTS).forEach(k => delete CHARTS[k]);
}

// ── SIDEBAR ───────────────────────────────────────────────────────────
function renderSidebar() {
  document.getElementById('ucList').innerHTML = USE_CASES.map(uc => {
    const p = uc.gsc.avgPos;
    const pcls = p <= 3 ? 'good' : p <= 10 ? 'ok' : 'bad';
    return `<div class="uc-item${uc.id===activeId?' active':''}" onclick="setActive('${uc.id}')">
      <span class="uc-icon">${uc.icon}</span>
      <div class="uc-info">
        <div class="uc-name">${uc.name}</div>
        <div class="uc-cat">${uc.cat} · ${uc.priority}</div>
      </div>
      <span class="uc-pos ${pcls}">#${p.toFixed(0)}</span>
    </div>`;
  }).join('');
}

// ── TAB NAV ───────────────────────────────────────────────────────────
function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  renderAll();
}

function renderAll() {
  const uc = USE_CASES.find(u => u.id === activeId);
  document.getElementById('bcName').textContent = uc.name;
  destroyCharts();

  const body = document.getElementById('contentBody');

  if (activeTab === 'overview') {
    body.innerHTML = buildOverviewKPIs(uc) + buildGA4Panel(uc) + buildMiniFunnel(uc);
    requestAnimationFrame(() => { CHARTS.ga4 = renderGA4Chart(uc); });

  } else if (activeTab === 'keywords') {
    body.innerHTML = buildKWKPIs(uc) + buildGSCPanel(uc);

  } else if (activeTab === 'geo') {
    body.innerHTML = buildGEOKPIs(uc) + buildGEOPanel(uc);
    requestAnimationFrame(() => {
      CHARTS.sovLine = renderGEOLineChart('chartSoV', uc.geo.sovTrend, '%', '#7c3aed', 'Share of Voice');
      CHARTS.aiLine  = renderGEOLineChart('chartAI',  uc.geo.aiTrend,  '',  '#AF0171', 'AI Citations');
    });

  } else if (activeTab === 'maumeu') {
    body.innerHTML = buildBQKPIs(uc) + buildBQPanel(uc);
    requestAnimationFrame(() => {
      CHARTS.bq = renderBQChart(uc);
      setTimeout(() => {
        document.querySelectorAll('.funnel-bar-fill[data-w]').forEach(el => {
          el.style.width = el.dataset.w;
        });
      }, 50);
    });
  }
}

function buildMiniFunnel(uc) {
  const steps = [

    { lbl:'Open in App',  val:uc.bq.openApp,    ref:uc.ga4.clickApp,  col:'#AF0171' },
  ];
  const stepsHtml = steps.map((s, i) => {
    const conv = s.ref ? ((s.val/s.ref)*100).toFixed(1) : null;
    const cls = conv ? (conv > 20 ? 'good' : conv > 8 ? 'warn' : 'low') : '';
    return `<div class="mf-step">

      <span class="mf-val">${fmtN(s.val)}</span>
      ${conv ? `<span class="mf-conv ${cls}">→ ${conv}% conv.</span>` : '<span class="mf-conv">—</span>'}
      <div class="mf-bar" style="background:${s.col};width:${Math.max(20,Math.round((s.val/steps[0].val)*100))}%"></div>
    </div>`;
  }).join('');
  return `<div class="panel">

          </div>
        </div>

        <div class="funnel-wrap">${funnelRows}</div>

        <div class="bq-chart-wrap">
          <div style="position:relative;height:160px"><canvas id="bqChart"></canvas></div>
          <div style="background:var(--bg);border-radius:11px;padding:16px;display:flex;flex-direction:column;gap:10px;">
            <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">Tỷ lệ Chuyển đổi</div>
            ${buildRateRow('CTA Rate',  uc.ga4.clickApp, uc.ga4.users,    '#8b5cf6')}
            ${buildRateRow('Open Rate', uc.bq.openApp,   uc.ga4.clickApp, '#AF0171')}
            ${buildRateRow('MAU Rate',  uc.bq.mau,       uc.bq.openApp,   '#ef4444')}
            ${buildRateRow('MEU/MAU',   uc.bq.meu,       uc.bq.mau,       '#f59e0b')}
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function buildRateRow(lbl, num, den, col) {
  const rate = den > 0 ? ((num/den)*100).toFixed(1) : '0.0';
  const pct  = Math.min(100, parseFloat(rate));
  return `<div>
    <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
      <span style="color:var(--muted)">${lbl}</span>
      <strong style="color:var(--ink)">${rate}%</strong>
    </div>
    <div style="height:5px;background:var(--line);border-radius:3px;overflow:hidden">
      <div style="height:100%;width:${pct}%;background:${col};border-radius:3px"></div>
    </div>
  </div>`;
}

function renderBQChart(uc) {
  const ctx = document.getElementById('bqChart');
  if (!ctx) return null;
  return new Chart(ctx, {
    type: 'line',
    data: {
      labels: MONTHS,
      datasets: [
        { label:'MAU', data:uc.bq.mauTrend, borderColor:'#AF0171', backgroundColor:'rgba(175,1,113,.08)', fill:true,  tension:.4, pointRadius:3, pointBackgroundColor:'#AF0171' },
        { label:'MEU', data:uc.bq.meuTrend, borderColor:'#f59e0b', backgroundColor:'transparent',         fill:false, tension:.4, pointRadius:3, pointBackgroundColor:'#f59e0b', borderDash:[4,3] },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{ position:'top', labels:{ font:{size:11,family:'Be Vietnam Pro'}, boxWidth:12, padding:10 } },
        tooltip:{ bodyFont:{family:'Be Vietnam Pro'}, titleFont:{family:'Be Vietnam Pro'} },
      },
      scales:{
        x:{ grid:{color:'#f1f5f9'}, ticks:{font:{size:11,family:'Be Vietnam Pro'}} },
        y:{ grid:{color:'#f1f5f9'}, ticks:{font:{size:11,family:'Be Vietnam Pro'}, callback:v=>fmtN(v)} },
      }
    }
  });
}

// ── NAVIGATION ────────────────────────────────────────────────────────
function setActive(id) {
  activeId = id;
  renderSidebar();
  renderAll();
}

// ── INIT ──────────────────────────────────────────────────────────────
renderSidebar();
renderAll();
</script>

</body>
</html>
