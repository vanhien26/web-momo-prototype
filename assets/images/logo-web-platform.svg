<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Web Platform">
  <!-- Top arc (pink) ending with dot -->
  <path d="M 30 22 A 38 38 0 0 1 86 28" stroke="#ec4899" stroke-width="3.2" stroke-linecap="round" fill="none"/>
  <circle cx="86" cy="28" r="3.4" fill="#ec4899"/>

  <!-- Sparkle top-left -->
  <path d="M 22 18 L 24 23 L 29 25 L 24 27 L 22 32 L 20 27 L 15 25 L 20 23 Z" fill="#ec4899"/>

  <!-- Dots upper-left (orbit decoration) -->
  <circle cx="17" cy="34" r="1.6" fill="#ec4899"/>
  <circle cx="12" cy="40" r="1.4" fill="#ec4899" opacity=".7"/>

  <!-- W letter (black) -->
  <path d="M 22 40 L 32 72 L 41 52 L 50 72 L 60 40" stroke="#1a1a1a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- P letter (pink) - vertical bar + loop -->
  <path d="M 62 40 L 62 76" stroke="#ec4899" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M 62 40 L 76 40 Q 86 40 86 49 Q 86 58 76 58 L 62 58" stroke="#ec4899" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Bottom arc (black) starting with dot -->
  <circle cx="20" cy="78" r="3.4" fill="#1a1a1a"/>
  <path d="M 20 78 A 38 38 0 0 0 76 88" stroke="#1a1a1a" stroke-width="3.2" stroke-linecap="round" fill="none"/>

  <!-- Dots lower-right (orbit decoration) -->
  <circle cx="80" cy="90" r="1.6" fill="#ec4899"/>
  <circle cx="85" cy="88" r="1.4" fill="#ec4899" opacity=".7"/>
  <circle cx="90" cy="85" r="1.2" fill="#ec4899" opacity=".5"/>
</svg>
